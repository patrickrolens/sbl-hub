<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SBL Hub — All-time Statistics</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>

<style>
:root{--bg:#0f1117;--bg2:#1a1d27;--bg3:#22263a;--border:#2e3248;--text:#e8eaf6;--text2:#9095b8;--accent:#7c6ff7;--nav-h:49px}
*{box-sizing:border-box;margin:0;padding:0}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:24px;margin:12px 14px}
body{font-family:Segoe UI,system-ui,-apple-system,Roboto,Arial,sans-serif;background:var(--bg);color:var(--text);padding:0 0 14px}
.page-wrap{margin:0 auto}
.search-row{display:flex;gap:8px;align-items:center;position:sticky;top:var(--nav-h);z-index:10;background:var(--bg2);border-radius:8px}
.form-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.form-row-inner{position:relative}
.form-input{background:var(--bg3);border:1px solid var(--border);padding:8px;border-radius:6px;color:var(--text);min-height:28px}
.form-input.wide{min-width:260px}
.form-input.narrow{min-width:180px}
.spinner-text{margin-left:8px;color:var(--text2);font:inherit}
.status-text{margin-left:12px;color:var(--text2);font:inherit}
.card-body{margin-top:12px;color:var(--text)}
.card-footer{margin-top:10px}
.card-heading{font-weight:800;margin-bottom:6px;font-size:1.05rem}
.card-copy{color:var(--text2);font-size:13px;margin-bottom:18px}
.sortable{cursor:pointer}
.match-row-brief{padding:6px 0;border-bottom:1px solid var(--bg3)}
.match-summary{display:grid;grid-template-columns:1fr auto 1fr;align-items:baseline;gap:12px;margin-bottom:8px;padding:12px 0}
.match-summary-p1{font-weight:700;font-size:1.5rem;text-align:right; margin-right: 12px;}
.match-summary-score{text-align:center}
.match-summary-tally{font-weight:800;color:var(--accent);font-size:1.35rem;line-height:1}
.match-summary-p2{font-weight:700;font-size:1.5rem;text-align:left; margin-left: 12px;}
.match-list{display:flex;flex-direction:column;gap:14px}
.match-detail{flex:1}
.match-detail-row{display:flex;gap:14px;margin-top:10px;justify-content:space-between}
.match-team-column{min-width:40%;display:flex;flex-direction:column;justify-content:flex-start}
.match-team-column.right-align{align-items:flex-end}
.match-team-meta{color:var(--text2);font-size:12px;margin-bottom:6px}
.match-team-meta.right-align{text-align:right}
.match-team-sprites-right{text-align:right}
.season-label{font-weight:700;margin-bottom:6px}
.record-flag{text-align:right;color:var(--accent);font-weight:700;font-size:14px;letter-spacing:0.06em}
.suggestions{position:absolute;background:var(--bg2);border:1px solid var(--border);margin-top:6px;border-radius:6px;overflow:auto;max-height:220px;width:320px}
.suggestions button{display:block;width:100%;text-align:left;padding:8px 10px;border:none;background:none;color:var(--text);cursor:pointer}
.suggestions button:hover{background:var(--bg3)}
table{width:100%;border-collapse:collapse}
th,td{padding:8px;border-bottom:1px solid var(--bg3);font-size:13px}
th{text-align:left;color:var(--text2);text-transform:uppercase;font-size:11px}
.empty{color:var(--text2);font-style:italic;padding:10px}
.link{color:var(--accent);text-decoration:none;font-weight:600}

/* Match card */
.match-card{display:grid;grid-template-columns:1fr auto 1fr;gap:20px;padding:14px 16px;border-radius:8px;background:var(--bg3);border:1px solid rgba(46,50,72,0.35);align-items:center}
.match-team-col{display:flex;flex-direction:column;gap:8px}
.match-team-col-right{align-items:flex-end}
.match-team-col-right .team-sprites{justify-content:flex-end}
.match-team-name-row{font-size:13px;color:var(--text2);display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.match-center-col{display:flex;flex-direction:column;align-items:center;gap:6px;min-width:80px;text-align:center}
.match-score{font-weight:800;color:var(--accent);font-size:1.35rem;line-height:1}
.match-center-meta{font-size:11px;color:var(--text2);white-space:nowrap}
.team-sprites{display:flex;gap:8px;align-items:center;flex-wrap:nowrap;overflow:hidden}
.team-sprites img.sprite{width:36px;height:36px;border-radius:6px;background:rgba(255,255,255,0.02);padding:4px;object-fit:contain;border:1px solid var(--border)}
.sprite-more{display:inline-flex;align-items:center;justify-content:center;min-width:36px;height:36px;border-radius:6px;background:rgba(124,111,247,0.10);color:var(--accent);font-size:12px;padding:4px;border:1px solid rgba(124,111,247,0.12)}
.team-winner{color:var(--accent);font-weight:700}
.winner-badge{display:inline-block;margin-left:8px;padding:2px 6px;border-radius:10px;background:rgba(124,111,247,0.12);color:var(--accent);font-size:11px}
.record-summary{display:flex;flex-direction:column;justify-content:flex-start;gap:16px;padding:16px 24px;border:1px solid rgba(124,111,247,0.16);background:rgba(124,111,247,0.06);border-radius:12px;margin-top:12px}
.record-summary .record-title{font-size:2.2rem;font-weight:800;color:#ffffff;margin-bottom:0;text-align:center}
.record-main-row{display:grid;grid-template-columns:1fr;gap:18px;align-items:start;margin-top:16px}
.record-side{display:flex;flex-direction:column;gap:16px}
.record-graph{min-width:0;margin:0;min-height:280px}
.record-stats-row{display:flex;flex-wrap:wrap;gap:16px;max-width:860px;margin-inline:auto;}
.record-stat{flex:1;display:flex;flex-direction:column;gap:8px;padding:12px 0;border:none;background:transparent;position:relative;min-width:140px;text-align:center;}
/* .record-stat + .record-stat::before{content:'';position:absolute;left:0;top:18px;height:calc(100% - 36px);width:1px;background:rgba(255,255,255,0.08)} */
.record-stat-title{color:#6b7280;font-size:0.65rem;text-transform:uppercase;letter-spacing:0.12em;margin:0}
.record-stat-value{font-size:2.3rem;font-weight:800;color:#ffffff;line-height:1}
.record-stat-value.positive{color:#4ade80}
.record-stat-value.negative{color:#f87171}
.record-chart{border:1px solid rgba(255,255,255,0.08);border-radius:16px;padding:16px;background:rgba(255,255,255,0.015)}
.record-chart-title{font-size:0.95rem;font-weight:700;color:#ffffff;margin-bottom:16px}
.record-chart-subtitle{font-size:0.8rem;color:#9095b8;margin-bottom:14px}
.rating-chart-svg{width:100%;height:auto;display:block;max-width:100%}
.rating-chart-grid-line{stroke:rgba(255,255,255,0.08);stroke-dasharray:3 3}
.rating-chart-axis{stroke:rgba(255,255,255,0.2)}
.rating-chart-line{fill:none;stroke:var(--accent);stroke-width:2.5;stroke-linejoin:round;stroke-linecap:round}
.rating-chart-point{fill:var(--bg);stroke:var(--accent);stroke-width:2;cursor:pointer}
.rating-chart-label{fill:rgba(255,255,255,0.65);font-size:10px;font-family:Segoe UI,system-ui,Roboto,Arial,sans-serif}
@media (max-width:800px){.match-card{grid-template-columns:1fr;gap:12px}.match-team-col-right{align-items:flex-start}.match-team-col-right .team-sprites{justify-content:flex-start}.record-main-row{grid-template-columns:1fr}.record-stats-row{flex-direction:column}.record-stat + .record-stat::before{display:none}}

.history-card-header{display:flex;align-items:center;gap:16px;margin-bottom:16px}
.history-sprite{width:56px;height:56px;border-radius:14px;background:rgba(255,255,255,0.03);border:1px solid var(--border);padding:8px;object-fit:contain}
.history-heading-text{font-size:1.35rem;font-weight:800}
.history-subtitle{color:var(--text2);font-size:13px;margin-top:4px}
.history-list{list-style:none;padding:0;margin:0;display:flex;flex-direction:column;gap:12px}
.history-item{padding:16px;border:1px solid rgba(255,255,255,0.08);background:rgba(255,255,255,0.02);border-radius:12px}
.history-team-name{color:var(--accent);font-weight:700}
.team-link{color:var(--accent);font-weight:700;text-decoration:none}.team-link:hover{text-decoration:underline}
.history-item-copy{color:var(--text2);line-height:1.5}
@media (max-width:800px){.match-card{flex-direction:column}.match-left{min-width:auto}.record-grid{grid-template-columns:1fr}} 
</style>
</head>
<body>

<script src="/nav.js"></script>
<script src="/utils.js"></script>

<div class="page-wrap">
<div class="card">
  <div class="card-heading">Pokémon History</div>
  <div class="card-copy">Search for a Pokémon to see which teams owned it (across seasons).</div>

  <div class="search-row form-row">
    <div class="form-row-inner">
      <input id="search" class="form-input wide" placeholder="Search Pokémon name…" autocomplete="off">
      <div id="suggestions" class="suggestions" hidden></div>
    </div>
    <button id="do-search" class="sbln-btn">Search</button>
    <span id="spinner" hidden class="spinner-text">Searching…</span>
    <div id="status" class="status-text"></div>
  </div>

  <div id="results" class="card-body"></div>
  <div class="card-footer"><button id="load-more" class="sbln-btn" hidden>Load more</button></div>
</div>

<div class="card" id="player-record-card">
  <div class="card-heading">Player Record</div>
  <div class="card-copy">Enter a player display name to see their season record.</div>
  <div class="form-row">
    <input id="record-player" class="form-input wide" placeholder="Player name">
    <button id="show-record" class="sbln-btn">Show record</button>
    <span id="record-spinner" hidden class="spinner-text">Loading…</span>
  </div>
  <div id="record-results" class="card-body"></div>
</div>

<div class="card" id="player-matches-card">
  <div class="card-heading">Matchup History</div>
  <div class="card-copy">Enter two player display names to view their match history.</div>
  <div class="form-row">
    <input id="player1" class="form-input narrow" placeholder="Player one name">
    <input id="player2" class="form-input narrow" placeholder="Player two name">
    <button id="show-matches" class="sbln-btn">Show matches</button>
    <span id="match-spinner" hidden class="spinner-text">Loading…</span>
  </div>
  <div id="match-results" class="card-body"></div>
</div>
</div><!-- /.page-wrap -->

<script>
const SUPABASE_URL      = "https://arypbyzeppbpbursmzcs.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_U8J3pV_KgomrWhbgoGBSUg_ttQ4d46m";
const sb = window.sb || supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
const POKEMON_JSON_URL = "https://planner.springfieldbattleleague.com/pokemon.json";
const POKEBALL_FALLBACK = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 40 40'%3E%3Ccircle cx='20' cy='20' r='19' fill='%23e05555' stroke='%23333' stroke-width='1.5'/%3E%3Cpath d='M1.1 20 A19 19 0 0 0 38.9 20 Z' fill='%23fff'/%3E%3Crect x='1' y='18' width='38' height='4' fill='%23333'/%3E%3Ccircle cx='20' cy='20' r='7' fill='%23fff' stroke='%23333' stroke-width='1.5'/%3E%3Ccircle cx='20' cy='20' r='3.5' fill='%23e8eaf6' stroke='%23333' stroke-width='1'/%3E%3C/svg%3E";
const ASSET_BASE = POKEMON_JSON_URL.replace(/[^/]*$/, '');

function spriteUrlById(id) { return id ? ASSET_BASE + 'sprites/' + localId(id) + '.png' : ''; }
function pokemonNameById(id) { const s = String(id); const p = pokemonList.find(x => String(x.id) === s || String(x.id) === String(parseInt(s,10))); return p ? p.name : String(id); }
function normalizeStage(stage) {
  if (!stage) return '';
  const s = String(stage).toLowerCase();
  if (s.includes('final')) return 'Finals';
  if (s.includes('semi')) return 'Semifinals';
  if (s.includes('play')) return 'Playoffs';
  if (s === 'regular') return 'regular';
  return String(stage).charAt(0).toUpperCase() + String(stage).slice(1);
}
function renderSpriteSet(pids) {
  const max = 6; const list = pids || [];
  const arr = list.slice(0, max);
  let out = '';
  arr.forEach(pid => { const name = pokemonNameById(pid) || pid; out += '<img src="' + spriteUrlById(pid) + '" title="' + escapeHtml(name) + '" alt="' + escapeHtml(name) + '" class="sprite">'; });
  if (list.length > max) {
    const hidden = list.slice(max).map(pokemonNameById).filter(Boolean).join(', ');
    const more = list.length - max;
    out += '<span class="sprite-more" title="' + escapeHtml(hidden) + '">+' + more + '</span>';
  }
  return '<div class="team-sprites">' + out + '</div>';
}

function getAcquisitionInfo(via) {
  const key = String(via || '').toLowerCase();
  if (key.includes('draft')) return { label: 'drafted', priority: 0 };
  if (key.includes('trade')) return { label: 'traded for', priority: 1 };
  if (key.includes('waiver')) return { label: 'claimed', priority: 2 };
  if (key.includes('drop')) return { label: 'picked up', priority: 2 };
  if (key.includes('pick')) return { label: 'added', priority: 2 };
  return { label: 'acquired', priority: 3 };
}

function formatSeasonWeek(team, week) {
  const seasonLabel = (team && team.season && (team.season.name || team.season.slug)) ? (team.season.name || team.season.slug) : 'Season';
  return seasonLabel + (week == null ? '' : ' Week ' + week);
}

function createHistoryItem(row, pokemonName) {
  const teamName = getTeamLabel(row.team, row.acquired_week);
  const action = getAcquisitionInfo(row.acquired_via).label;
  const when = formatSeasonWeek(row.team, row.acquired_week);
  const releaseNote = row.released_week == null ? '' : ' It was dropped Week ' + row.released_week + '.';
  const teamSlug = row.team && row.team.slug;
  const teamSeasonSlug = row.team && row.team.season && row.team.season.slug;
  const teamHtml = teamSlug && teamSeasonSlug
    ? '<a class="history-team-name team-link" href="team.html?season=' + teamSeasonSlug + '#' + encodeURIComponent(teamSlug) + '">' + escapeHtml(teamName) + '</a>'
    : '<span class="history-team-name">' + escapeHtml(teamName) + '</span>';
  return '<li class="history-item">'
    + '<div class="history-item-copy">' + teamHtml + ' ' + escapeHtml(action) + ' ' + escapeHtml(pokemonName) + ' in ' + escapeHtml(when) + '.' + escapeHtml(releaseNote) + '</div>'
    + '</li>';
}

function attachImageFallback(container) {
  const imgs = container.querySelectorAll('img');
  imgs.forEach(img => { img.onerror = function(){ this.onerror = null; this.src = POKEBALL_FALLBACK; this.style.opacity = '.5'; }; });
}

let pokemonList = [];
let suggestIndex = -1;
let debounceTimer = null;
let pageOffset = 0, pageSize = 100, lastPokemonId = null, allRows = [];

function $id(id) { return document.getElementById(id); }
function showStatus(txt, kind) { const s = $id('status'); s.textContent = txt || ''; s.style.color = kind === 'err' ? 'var(--red)' : 'var(--text2)'; }

async function boot() {
  $id('do-search').addEventListener('click', () => onSearchClick());
  const input = $id('search');
  input.addEventListener('input', e => { onSearchInput(e); });
  input.addEventListener('keydown', onInputKeyDown);
  input.addEventListener('blur', () => setTimeout(() => { $id('suggestions').hidden = true; suggestIndex = -1; }, 150));
  $id('load-more').addEventListener('click', loadMore);

  // Try to prefetch pokemon.json but tolerate failures.
  try {
    const res = await fetch(POKEMON_JSON_URL);
    if (!res.ok) throw new Error('Not found');
    const pj = await res.json();
    pokemonList = Array.isArray(pj) ? pj : (pj.pokemon || []);
  } catch (e) {
    console.warn('pokemon.json load failed', e);
    showStatus('Pokémon names unavailable (offline). You can still search by id.', 'err');
  }

  // deep-link support: ?q=Charizard
  const q = new URLSearchParams(location.search).get('q');
  if (q) { $id('search').value = q; debounce(() => onSearchClick(), 60); }
  // wire player record button
  const recordBtn = $id('show-record'); if (recordBtn) recordBtn.addEventListener('click', showRecordClick);
  const recordInput = $id('record-player'); if (recordInput) recordInput.addEventListener('keydown', e => { if (e.key === 'Enter') recordBtn.click(); });
  // wire player matches button
  const showBtn = $id('show-matches'); if (showBtn) showBtn.addEventListener('click', showMatchesClick);
  const p1 = $id('player1'), p2 = $id('player2');
  if (p1) p1.addEventListener('keydown', e => { if (e.key === 'Enter') showBtn.click(); });
  if (p2) p2.addEventListener('keydown', e => { if (e.key === 'Enter') showBtn.click(); });
}

function debounce(fn, ms) {
  clearTimeout(debounceTimer); debounceTimer = setTimeout(fn, ms);
}

function onSearchInput(e) {
  const q = (e.target.value || '').trim().toLowerCase();
  if (!q) { $id('suggestions').hidden = true; return; }
  // local suggest immediately
  const matches = pokemonList.filter(p => (p.name || '').toLowerCase().includes(q)).slice(0,10);
  const box = $id('suggestions');
  if (!matches.length) { box.hidden = true; return; }
  box.innerHTML = '';
  matches.forEach((m, i) => {
    const b = document.createElement('button');
    b.type = 'button';
    b.className = 'sugg-btn';
    b.dataset.idx = i;
    b.textContent = m.name;
    b.addEventListener('click', () => { $id('search').value = m.name; box.hidden = true; doSearchById(m.id); });
    box.appendChild(b);
  });
  suggestIndex = -1; box.hidden = false;
}

function onInputKeyDown(e) {
  const box = $id('suggestions');
  const items = box.hidden ? [] : [...box.querySelectorAll('.sugg-btn')];
  if (e.key === 'ArrowDown' && items.length) { e.preventDefault(); suggestIndex = Math.min(items.length - 1, suggestIndex + 1); updateSuggestFocus(items); }
  else if (e.key === 'ArrowUp' && items.length) { e.preventDefault(); suggestIndex = Math.max(0, suggestIndex - 1); updateSuggestFocus(items); }
  else if (e.key === 'Enter') {
    if (!box.hidden && suggestIndex >= 0 && items[suggestIndex]) { e.preventDefault(); items[suggestIndex].click(); return; }
    // otherwise run search
  }
}

function updateSuggestFocus(items) {
  items.forEach((it, i) => it.style.background = i === suggestIndex ? 'var(--bg3)' : '');
  if (items[suggestIndex]) items[suggestIndex].scrollIntoView({ block: 'nearest' });
}

function setLoading(loading) {
  $id('do-search').disabled = loading;
  $id('search').disabled = loading;
  $id('spinner').hidden = !loading;
}

async function onSearchClick() {
  const q = ($id('search').value || '').trim().toLowerCase();
  if (!q) return;
  // prefer exact name match if we have the data
  let hit = pokemonList.find(p => (p.name || '').toLowerCase() === q);
  if (!hit) hit = pokemonList.find(p => (p.name || '').toLowerCase().includes(q));
  if (!hit) {
    showStatus('No Pokémon found.');
    return;
  }
  doSearchById(hit.id);
}

async function doSearchById(pokemonId) {
  // reset paging
  pageOffset = 0; lastPokemonId = pokemonId; allRows = [];
  $id('results').innerHTML = '';
  await loadPage();
}

async function loadPage() {
  if (!lastPokemonId) return;
  setLoading(true);
  try {
    const from = pageOffset;
    const to = pageOffset + pageSize - 1;
    const sel = 'team_id, pokemon_id, acquired_week, released_week, acquired_via, draft_pick_number';
    const { data: rows, error } = await sb.from('team_pokemon').select(sel).eq('pokemon_id', lastPokemonId).order('acquired_week', { ascending: true }).range(from, to);
    if (error) throw error;
    if (!rows || !rows.length) {
      if (!allRows.length) showStatus('No ownership records found.');
      else showStatus('No more records.');
      setLoading(false);
      $id('load-more').hidden = true;
      renderResults(allRows);
      return;
    }
    allRows.push(...rows);
    const teamIds = [...new Set(allRows.map(r => r.team_id).filter(Boolean))];
    let teams = [], owners = [], playerById = {};
    if (teamIds.length) {
      const [teamsRes, ownersRes] = await Promise.all([
        sb.from('teams').select('id,name,slug,logo_url,season_id').in('id', teamIds),
        sb.from('team_owners').select('team_id,player_id,started_week,ended_week').in('team_id', teamIds)
      ]);
      if (teamsRes.error) throw teamsRes.error;
      if (ownersRes.error) throw ownersRes.error;
      teams = teamsRes.data || [];
      owners = ownersRes.data || [];
      const seasonIds = [...new Set(teams.map(x => x.season_id).filter(Boolean))];
      const playerIds = [...new Set(owners.map(o => o.player_id).filter(Boolean))];
      const [seasonsRes, playersRes] = await Promise.all([
        seasonIds.length ? sb.from('seasons').select('id,name,slug').in('id', seasonIds) : Promise.resolve({ data: [], error: null }),
        playerIds.length ? sb.from('players').select('id,display_name').in('id', playerIds) : Promise.resolve({ data: [], error: null })
      ]);
      if (seasonsRes.error) throw seasonsRes.error;
      if (playersRes.error) throw playersRes.error;
      const seasonById = {};
      (seasonsRes.data || []).forEach(ss => seasonById[ss.id] = ss);
      teams.forEach(ti => ti.season = seasonById[ti.season_id] || null);
      (playersRes.data || []).forEach(p => { playerById[p.id] = p; });
    }
    const teamById = {};
    teams.forEach(t => teamById[t.id] = t);
    owners.forEach(o => {
      const team = teamById[o.team_id];
      if (!team) return;
      team.owners = team.owners || [];
      team.owners.push({
        player_id: o.player_id,
        started_week: o.started_week,
        ended_week: o.ended_week,
        display_name: playerById[o.player_id] ? playerById[o.player_id].display_name : ''
      });
    });
    Object.values(teamById).forEach(team => {
      if (team.owners) team.owners.sort((a,b) => (a.started_week || 0) - (b.started_week || 0));
    });
    // attach team info
    const out = allRows.map(r => Object.assign({}, r, { team: teamById[r.team_id] || null }));
    renderResults(out);
    // show load-more if this page was full
    pageOffset += rows.length;
    $id('load-more').hidden = rows.length < pageSize;
    showStatus('Found ' + allRows.length + ' records.');
  } catch (e) {
    console.error(e);
    showStatus('Could not query records — check network or database permissions.', 'err');
  } finally { setLoading(false); }
}

async function loadMore() { await loadPage(); }

// ----- Player match history helpers -----
async function findPlayerByName(name) {
  if (!name) return null;
  name = name.trim();
  // try exact display_name first
  let res = await sb.from('players').select('id,display_name').eq('display_name', name).maybeSingle();
  if (res && !res.error && res.data) return res.data;
  // try partial match
  res = await sb.from('players').select('id,display_name').ilike('display_name', '%' + name + '%').limit(1).maybeSingle();
  if (res && !res.error && res.data) return res.data;
  return null;
}

async function getPlayerOwners(playerId) {
  if (!playerId) return [];
  const r = await sb.from('team_owners').select('team_id,started_week,ended_week').eq('player_id', playerId);
  if (r.error) throw r.error;
  return r.data || [];
}

async function getTeamsByIds(ids) {
  if (!ids || !ids.length) return [];
  const r = await sb.from('teams').select('id,name,slug,season_id').in('id', ids);
  if (r.error) throw r.error;
  return r.data || [];
}

async function getMatchesForTeamIds(ids) {
  if (!ids || !ids.length) return [];
  // use OR: team_a_id in (...) OR team_b_id in (...)
  const q = 'team_a_id.in.(' + ids.join(',') + '),team_b_id.in.(' + ids.join(',') + ')';
  const r = await sb.from('matches').select('id,season_id,stage,week,team_a_id,team_b_id,team_a_score,team_b_score,match_date,winner_team_id').or(q);
  if (r.error) throw r.error;
  return r.data || [];
}


async function showMatchesClick() {
  const name1 = ($id('player1').value || '').trim();
  const name2 = ($id('player2').value || '').trim();
  const out = $id('match-results'); out.innerHTML = '';
  if (!name1 || !name2) { out.innerHTML = '<div class="empty">Enter two player names to see head-to-head matches.</div>'; return; }
  $id('show-matches').disabled = true; $id('match-spinner').hidden = false;
  try {
    const p1 = await findPlayerByName(name1);
    const p2 = await findPlayerByName(name2);
    if (!p1 || !p2) {
      const missing = [];
      if (!p1) missing.push(escapeHtml(name1));
      if (!p2) missing.push(escapeHtml(name2));
      out.innerHTML = '<div class="empty">Player(s) not found: ' + missing.join(', ') + '</div>';
      return;
    }
    const owners1 = await getPlayerOwners(p1.id);
    const owners2 = await getPlayerOwners(p2.id);
    const teamIds1 = owners1.map(o => o.team_id).filter(Boolean);
    const teamIds2 = owners2.map(o => o.team_id).filter(Boolean);
    if (!teamIds1.length || !teamIds2.length) {
      out.innerHTML = '<div class="empty">One or both players have no team ownership records.</div>';
      return;
    }
    const allTeamIds = [...new Set([...teamIds1, ...teamIds2])];
    const teams = await getTeamsByIds(allTeamIds);
    const teamById = {}; teams.forEach(t => teamById[t.id] = t);
    const matches = await getMatchesForTeamIds(allTeamIds);
    // fetch seasons for matches
    const seasonIds = [...new Set(matches.map(m => m.season_id).filter(Boolean))];
    let seasonById = {};
    if (seasonIds.length) {
      const sres = await sb.from('seasons').select('id,name,slug').in('id', seasonIds);
      if (!sres.error && sres.data) { sres.data.forEach(s => seasonById[s.id] = s); }
    }
    // filter head-to-head: one side in teamIds1 and the other in teamIds2
    const h2h = matches.filter(m => (teamIds1.includes(m.team_a_id) && teamIds2.includes(m.team_b_id)) || (teamIds1.includes(m.team_b_id) && teamIds2.includes(m.team_a_id)));
    // fetch match_pokemon for these head-to-head matches so we can show brought sprites
    const matchIds = h2h.map(m => m.id).filter(Boolean);
    let broughtMap = {}; // match_id -> { team_id -> [pokemon_id,...] }
    if (matchIds.length) {
      const mpRes = await sb.from('match_pokemon').select('match_id,team_id,pokemon_id').in('match_id', matchIds);
      if (!mpRes.error && mpRes.data) {
        (mpRes.data || []).forEach(r => {
          broughtMap[r.match_id] = broughtMap[r.match_id] || {};
          broughtMap[r.match_id][r.team_id] = broughtMap[r.match_id][r.team_id] || [];
          broughtMap[r.match_id][r.team_id].push(r.pokemon_id);
        });
      }
    }
    if (!h2h.length) { out.innerHTML = '<div class="empty">No head-to-head matches found for these players.</div>'; return; }
    const sortedH2h = sortMatchesChronologically(h2h, seasonById);
    // compute record
    let p1wins = 0, p2wins = 0, draws = 0;
    sortedH2h.forEach(m => {
      if (!m.winner_team_id) draws++;
      else if (teamIds1.includes(m.winner_team_id)) p1wins++;
      else if (teamIds2.includes(m.winner_team_id)) p2wins++;
    });
    let html = renderMatchSummary(p1, p2, p1wins, p2wins, draws);
    html += '<div class="match-list">';
    const player1Teams = new Set(teamIds1);
    const player2Teams = new Set(teamIds2);
    sortedH2h.forEach(m => {
      html += renderMatchCard(m, teamById, player1Teams, player2Teams, seasonById, broughtMap);
    });
    html += '</div>';
    out.innerHTML = html;
    attachImageFallback(out);
  } catch (e) {
    console.error(e); out.innerHTML = '<div class="empty">Error loading matches.</div>';
  } finally {
    $id('show-matches').disabled = false; $id('match-spinner').hidden = true;
  }
}

async function showRecordClick() {
  const name = ($id('record-player').value || '').trim();
  const out = $id('record-results'); out.innerHTML = '';
  if (!name) { out.innerHTML = '<div class="empty">Enter a player name to see their record.</div>'; return; }
  $id('show-record').disabled = true; $id('record-spinner').hidden = false;
  try {
    const player = await findPlayerByName(name);
    if (!player) { out.innerHTML = '<div class="empty">Player not found: ' + escapeHtml(name) + '</div>'; return; }
    const owners = await getPlayerOwners(player.id);
    const teamIds = owners.map(o => o.team_id).filter(Boolean);
    if (!teamIds.length) { out.innerHTML = '<div class="empty">This player has no team ownership records.</div>'; return; }
    const filteredMatches = await getMatchesForTeamIds(teamIds);
    if (!filteredMatches.length) {
      out.innerHTML = '<div class="empty">No matches found for this player.</div>'; return; }
    let matchWins = 0, matchLosses = 0, draws = 0;
    let gameWins = 0, gameLosses = 0;
    filteredMatches.forEach(m => {
      const isPlayerSide = teamIds.includes(m.team_a_id);
      const teamScore = isPlayerSide ? m.team_a_score : m.team_b_score;
      const oppScore = isPlayerSide ? m.team_b_score : m.team_a_score;
      if (teamScore == null || oppScore == null) return;
      gameWins += teamScore;
      gameLosses += oppScore;
      if (!m.winner_team_id) draws++;
      else if (teamIds.includes(m.winner_team_id)) matchWins++;
      else matchLosses++;
    });
    const matchRecord = matchWins + '-' + matchLosses;
    const matchPct = filteredMatches.length ? ((matchWins / filteredMatches.length) * 100).toFixed(1) : '0.0';
    const gameTotal = gameWins + gameLosses;
    const gamePct = gameTotal ? ((gameWins / gameTotal) * 100).toFixed(1) : '0.0';
    const seasonIds = [...new Set(filteredMatches.map(m => m.season_id).filter(Boolean))];
    let seasonById = {};
    if (seasonIds.length) {
      const sres = await sb.from('seasons').select('id,name,slug').in('id', seasonIds);
      if (!sres.error && sres.data) { sres.data.forEach(s => seasonById[s.id] = s); }
    }
    const allMatchTeamIds = [...new Set(filteredMatches.flatMap(m => [m.team_a_id, m.team_b_id]).filter(Boolean))];
    const allTeams = await getTeamsByIds(allMatchTeamIds);
    const teamById = {}; allTeams.forEach(t => teamById[t.id] = t);
    const ratingHistory = calculatePlayerRatingHistory(filteredMatches, teamIds, seasonById, teamById);
    const currentElo = ratingHistory.length ? ratingHistory[ratingHistory.length - 1].rating : null;
    const chartHtml = renderPlayerRatingChart(ratingHistory);
    out.innerHTML = '<div class="record-summary">'
      + '<div class="record-title">' + escapeHtml(player.display_name) + '</div>'
      + '<div class="record-stats-row">'
        + '<div class="record-stat">'
          + '<div class="record-stat-title">Matches</div>'
          + '<div class="record-stat-value">' + escapeHtml(matchRecord) + '</div>'
        + '</div>'
        + '<div class="record-stat">'
          + '<div class="record-stat-title">Games</div>'
          + '<div class="record-stat-value">' + escapeHtml(gameWins + '-' + gameLosses) + '</div>'
        + '</div>'
        + '<div class="record-stat">'
          + '<div class="record-stat-title">Match win %</div>'
          + '<div class="record-stat-value ' + (parseFloat(matchPct) >= 50 ? 'positive' : 'negative') + '">' + escapeHtml(matchPct) + '</div>'
        + '</div>'
        + '<div class="record-stat">'
          + '<div class="record-stat-title">Game win %</div>'
          + '<div class="record-stat-value ' + (parseFloat(gamePct) >= 50 ? 'positive' : 'negative') + '">' + escapeHtml(gamePct) + '</div>'
        + '</div>'
        + (currentElo != null ? '<div class="record-stat"><div class="record-stat-title">Current ELO</div><div class="record-stat-value">' + currentElo + '</div></div>' : '')
      + '</div>'
      + '<div class="record-graph">' + chartHtml + '</div>'
    + '</div>';
    initRatingChart(ratingHistory);
  } catch (e) {
    console.error(e); out.innerHTML = '<div class="empty">Error loading record.</div>';
  } finally {
    $id('show-record').disabled = false; $id('record-spinner').hidden = true;
  }
}

function renderResults(rows) {
  const el = $id('results'); el.innerHTML = '';
  if (!rows || !rows.length) { el.innerHTML = '<div class="empty">No results.</div>'; return; }
  const pokemonName = pokemonNameById(lastPokemonId) || 'Pokémon';
  const heading = '<div class="history-card-header">'
    + renderPokemonSprite(lastPokemonId, pokemonName)
    + '<div><div class="history-heading-text">' + escapeHtml(pokemonName) + '</div></div>'
    + '</div>';
  let html = heading + '<ul class="history-list">';
  const sortedRows = rows.slice().sort((a,b) => {
    const aSeason = getSeasonNumber(a.team);
    const bSeason = getSeasonNumber(b.team);
    if (aSeason !== bSeason) return aSeason - bSeason;
    const aWeek = a.acquired_week == null ? Infinity : a.acquired_week;
    const bWeek = b.acquired_week == null ? Infinity : b.acquired_week;
    if (aWeek !== bWeek) return aWeek - bWeek;
    const aAction = getAcquisitionInfo(a.acquired_via).priority;
    const bAction = getAcquisitionInfo(b.acquired_via).priority;
    return aAction - bAction;
  });
  sortedRows.forEach(r => {
    html += createHistoryItem(r, pokemonName);
  });
  html += '</ul>';
  el.innerHTML = html;
  attachImageFallback(el);
}

function getSeasonNumber(team) {
  if (!team || !team.season) return 0;
  const label = String(team.season.name || team.season.slug || '');
  const match = label.match(/(\d+)/);
  return match ? parseInt(match[1], 10) : 0;
}


function renderPokemonSprite(id, name) {
  const src = spriteUrlById(id) || POKEBALL_FALLBACK;
  return '<img class="history-sprite" src="' + escapeHtml(src) + '" title="' + escapeHtml(name) + '" alt="' + escapeHtml(name) + '">';
}

function getOwnerDisplayName(team, week) {
  if (!team || !team.owners || !team.owners.length) return '';
  if (week != null) {
    const owner = team.owners.slice().reverse().find(o => {
      const started = o.started_week == null ? -Infinity : o.started_week;
      const ended = o.ended_week == null ? Infinity : o.ended_week;
      return started <= week && ended >= week;
    });
    if (owner && owner.display_name) return owner.display_name;
  }
  return team.owners[team.owners.length - 1].display_name || '';
}

function getTeamLabel(team, week) {
  if (!team) return 'Unknown team';
  const name = team.name || 'Unknown team';
  const ownerName = getOwnerDisplayName(team, week);
  if (!ownerName) return name;
  const normalizedTeam = String(name).trim().toLowerCase();
  const normalizedOwner = String(ownerName).trim().toLowerCase();
  if (!normalizedTeam || normalizedTeam === normalizedOwner) return name;
  return name + ' (' + ownerName + ')';
}

function parseSeasonNumberLabel(label) {
  const match = String(label || '').match(/(\d+(?:[.\-]\d+)?)/);
  if (!match) return 0;
  return parseFloat(match[1].replace('-', '.'));
}

function formatMatchWhen(m) {
  return (m.stage && m.stage !== 'regular') ? normalizeStage(m.stage) : ('Week ' + (m.week || '?'));
}

function renderMatchSummary(p1, p2, p1wins, p2wins, draws) {
  return '<div class="match-summary">'
    + '<div class="match-summary-p1">' + escapeHtml(p1.display_name) + '</div>'
    + '<div class="match-summary-score">'
      + '<div class="match-summary-tally">' + p1wins + ' — ' + p2wins + '</div>'
    + '</div>'
    + '<div class="match-summary-p2">' + escapeHtml(p2.display_name) + '</div>'
    + '</div>';
}

function sortMatchesChronologically(matches, seasonById) {
  return (matches || []).slice().sort((a, b) => {
    const sa = parseSeasonNumberLabel((seasonById[a.season_id] || {}).name || (seasonById[a.season_id] || {}).slug || '');
    const sb = parseSeasonNumberLabel((seasonById[b.season_id] || {}).name || (seasonById[b.season_id] || {}).slug || '');
    if (sa !== sb) return sa - sb;
    const aw = a.week == null ? Infinity : a.week;
    const bw = b.week == null ? Infinity : b.week;
    if (aw !== bw) return aw - bw;
    if (a.match_date && b.match_date) return String(a.match_date).localeCompare(String(b.match_date));
    return 0;
  });
}

function formatRatingLabel(m, seasonById) {
  const season = (seasonById[m.season_id] && (seasonById[m.season_id].name || seasonById[m.season_id].slug)) || '';
  const seasonNum = parseSeasonNumberLabel(season);
  const seasonLabel = seasonNum != null ? 'S' + seasonNum : season;
  const week = m.week != null ? 'W' + m.week : '';
  return (seasonLabel ? seasonLabel + ' ' : '') + week;
}

function calculatePlayerRatingHistory(matches, playerTeamIds, seasonById, teamById) {
  const sorted = sortMatchesChronologically(matches, seasonById);
  const history = [];
  let rating = 1500;
  const K = 24;
  let lastSeasonNumber = null;
  sorted.forEach(m => {
    const isPlayerA = playerTeamIds.includes(m.team_a_id);
    const isPlayerB = playerTeamIds.includes(m.team_b_id);
    if (!isPlayerA && !isPlayerB) return;
    const playerTeamId = isPlayerA ? m.team_a_id : m.team_b_id;
    const opponentTeamId = isPlayerA ? m.team_b_id : m.team_a_id;
    const opponentTeam = (teamById && teamById[opponentTeamId]) || null;
    const opponentName = opponentTeam ? (opponentTeam.name || opponentTeam.slug || '') : '';
    const opponentSlug = opponentTeam ? (opponentTeam.slug || '') : '';
    const result = m.winner_team_id == null ? 0.5 : (m.winner_team_id === playerTeamId ? 1 : 0);
    const expected = 1 / (1 + Math.pow(10, (1500 - rating) / 400));
    rating += K * (result - expected);
    const seasonLabel = (seasonById[m.season_id] && (seasonById[m.season_id].name || seasonById[m.season_id].slug)) || '';
    const seasonNumber = parseSeasonNumberLabel(seasonLabel);
    history.push({
      rating: Math.round(rating),
      result: result === 1 ? 'W' : (result === 0.5 ? 'D' : 'L'),
      label: formatRatingLabel(m, seasonById),
      opponent: opponentName,
      opponentSlug: opponentSlug,
      seasonNumber: seasonNumber || null,
      seasonSlug: (seasonById[m.season_id] && seasonById[m.season_id].slug) || '',
      xLabel: (seasonNumber && seasonNumber !== lastSeasonNumber) ? ('S' + seasonNumber) : ''
    });
    lastSeasonNumber = seasonNumber;
  });
  return history;
}

function renderPlayerRatingChart(history) {
  if (!history || !history.length) {
    return '<div class="record-chart"><div class="record-chart-title">ELO Rating Progression</div><div class="empty">No rating history available.</div></div>';
  }
  return '<div class="record-chart">'
    + '<div class="record-chart-title">ELO Rating Progression</div>'
    + '<div style="position:relative;height:260px;max-height:300px"><canvas id="rating-chart-canvas"></canvas></div>'
    + '</div>';
}

function initRatingChart(history) {
  const canvas = document.getElementById('rating-chart-canvas');
  if (!canvas || !history || !history.length) return;
  var existingTip = document.getElementById('rating-chart-tooltip');
  if (existingTip) existingTip.remove();
  var tooltipEl = null;
  var tooltipHovered = false;
  function getTooltipEl(chart) {
    if (!tooltipEl) {
      tooltipEl = document.createElement('div');
      tooltipEl.id = 'rating-chart-tooltip';
      tooltipEl.style.cssText = 'position:absolute;pointer-events:auto;z-index:10;background:#1a1d2e;border:1px solid rgba(255,255,255,0.15);border-radius:8px;padding:8px 12px;font-size:12px;color:#fff;white-space:nowrap;opacity:0;transition:opacity 0.1s';
      tooltipEl.addEventListener('mouseenter', function() { tooltipHovered = true; });
      tooltipEl.addEventListener('mouseleave', function() { tooltipHovered = false; tooltipEl.style.opacity = '0'; tooltipEl.style.pointerEvents = 'none'; });
      chart.canvas.parentNode.appendChild(tooltipEl);
    }
    return tooltipEl;
  }
  new Chart(canvas, {
    type: 'line',
    data: {
      labels: history.map(function(h) { return h.xLabel; }),
      datasets: [{
        data: history.map(function(h) { return h.rating; }),
        borderColor: '#7c6ff7',
        backgroundColor: 'rgba(124,111,247,0.08)',
        borderWidth: 2.5,
        pointBackgroundColor: '#0f1117',
        pointBorderColor: '#7c6ff7',
        pointBorderWidth: 2,
        pointRadius: 2,
        pointHoverRadius: 5,
        fill: true,
        tension: 0.1
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          enabled: false,
          external: function(context) {
            var el = getTooltipEl(context.chart);
            var model = context.tooltip;
            if (model.opacity === 0) {
              if (!tooltipHovered) { el.style.opacity = '0'; el.style.pointerEvents = 'none'; }
              return;
            }
            var idx = model.dataPoints[0].dataIndex;
            var h = history[idx];
            var delta = idx === 0 ? 0 : h.rating - history[idx - 1].rating;
            var deltaStr = delta > 0 ? '+' + delta : String(delta);
            var oppHtml = '';
            if (h.opponent) {
              var oppText = escapeHtml(h.opponent);
              if (h.opponentSlug) {
                var href = 'team.html?season=' + h.seasonSlug + '#' + encodeURIComponent(h.opponentSlug);
                oppHtml = ' (<a href="' + href + '" style="color:#7c6ff7;text-decoration:none" onmouseenter="this.style.textDecoration=\'underline\'" onmouseleave="this.style.textDecoration=\'none\'">' + oppText + '</a>)';
              } else {
                oppHtml = ' (' + oppText + ')';
              }
            }
            el.innerHTML = '<div style="font-weight:600;margin-bottom:4px">' + escapeHtml(h.label) + oppHtml + '</div>'
              + '<div style="color:rgba(255,255,255,0.75)"> Rating: ' + h.rating + ' (' + (idx === 0 ? '0' : deltaStr) + ') — ' + h.result + '</div>';
            el.style.opacity = '1';
            el.style.pointerEvents = 'auto';
            var tipW = el.offsetWidth;
            var chartW = context.chart.width;
            el.style.left = (model.caretX + 10 + tipW > chartW ? model.caretX - tipW - 10 : model.caretX + 10) + 'px';
            el.style.top = (model.caretY - 10) + 'px';
          }
        }
      },
      scales: {
        x: {
          ticks: { color: 'rgba(255,255,255,0.65)', font: { size: 10 }, maxRotation: 0, autoSkip: false },
          grid: { color: 'rgba(255,255,255,0.08)' },
          border: { color: 'rgba(255,255,255,0.2)' }
        },
        y: {
          ticks: { color: 'rgba(255,255,255,0.65)', font: { size: 10 }, callback: function(v) { return String(v); } },
          grid: { color: 'rgba(255,255,255,0.08)' },
          border: { color: 'rgba(255,255,255,0.2)' }
        }
      }
    }
  });
}

function renderMatchCard(m, teamById, player1Teams, player2Teams, seasonById, broughtMap) {
  const seasonLabel = (m.season_id && seasonById[m.season_id]) ? (seasonById[m.season_id].name || seasonById[m.season_id].slug) : '';
  const seasonShort = seasonLabel ? 'Season ' + parseSeasonNumberLabel(seasonLabel) : '';
  const winnerId = m.winner_team_id || null;
  const when = formatMatchWhen(m);
  let leftId = m.team_a_id;
  let rightId = m.team_b_id;
  if (player2Teams.has(m.team_a_id) && player1Teams.has(m.team_b_id)) {
    leftId = m.team_b_id;
    rightId = m.team_a_id;
  }
  const leftTeam = teamById[leftId] || null;
  const rightTeam = teamById[rightId] || null;
  const leftName = leftTeam ? leftTeam.name : String(leftId);
  const rightName = rightTeam ? rightTeam.name : String(rightId);
  const leftWinner = winnerId && winnerId === leftId;
  const rightWinner = winnerId && winnerId === rightId;
  const seasonNum = parseSeasonNumberLabel(seasonLabel);
  const matchSeasonSlug = (seasonById[m.season_id] && seasonById[m.season_id].slug) || '';
  const leftLink = leftTeam && leftTeam.slug && matchSeasonSlug
    ? '<a class="team-link" href="team.html?season=' + matchSeasonSlug + '#' + encodeURIComponent(leftTeam.slug) + '">' + escapeHtml(leftName) + '</a>'
    : escapeHtml(leftName);
  const rightLink = rightTeam && rightTeam.slug && matchSeasonSlug
    ? '<a class="team-link" href="team.html?season=' + matchSeasonSlug + '#' + encodeURIComponent(rightTeam.slug) + '">' + escapeHtml(rightName) + '</a>'
    : escapeHtml(rightName);
  const leftScore = leftId === m.team_a_id ? m.team_a_score : m.team_b_score;
  const rightScore = rightId === m.team_a_id ? m.team_a_score : m.team_b_score;
  const score = (leftScore != null && rightScore != null) ? (leftScore + ' — ' + rightScore) : '';
  const broughtA = (broughtMap[m.id] && broughtMap[m.id][leftId]) || [];
  const broughtB = (broughtMap[m.id] && broughtMap[m.id][rightId]) || [];
  return '<div class="match-card" tabindex="0">'
    + '<div class="match-team-col">'
      + '<div class="match-team-name-row">' + (leftWinner ? '<span class="team-winner">' + leftLink + '</span><span class="winner-badge">Winner</span>' : leftLink) + '</div>'
      + renderSpriteSet(broughtA)
    + '</div>'
    + '<div class="match-center-col">'
      + (score ? '<div class="match-score">' + escapeHtml(score) + '</div>' : '')
      + '<div class="match-center-meta">' + (seasonShort ? escapeHtml(seasonShort) + ' · ' : '') + escapeHtml(String(when)) + '</div>'
    + '</div>'
    + '<div class="match-team-col match-team-col-right">'
      + '<div class="match-team-name-row">' + (rightWinner ? '<span class="team-winner">' + rightLink + '</span><span class="winner-badge">Winner</span>' : rightLink) + '</div>'
      + renderSpriteSet(broughtB)
    + '</div>'
  + '</div>';
}

function exportCSV() {
  if (!allRows.length) return;
  const cols = ['team','team_slug','season','acquired_week','released_week'];
  const lines = [cols.join(',')];
  allRows.forEach(r => {
    const teamName = r.team ? '"' + (r.team.name || '').replace(/"/g,'""') + '"' : '';
    const teamSlug = r.team ? (r.team.slug || '') : '';
    const seasonName = r.team && r.team.season ? (r.team.season.name || r.team.season.slug || '') : '';
    lines.push([teamName,teamSlug,seasonName,r.acquired_week||'',r.released_week||''].join(','));
  });
  const blob = new Blob([lines.join('\n')], { type: 'text/csv' });
  const url = URL.createObjectURL(blob); const a = document.createElement('a'); a.href = url; a.download = 'all-time-' + (lastPokemonId || 'data') + '.csv'; document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
}

// initialize
boot();


</script>
