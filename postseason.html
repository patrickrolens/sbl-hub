<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SBL Hub - Postseason</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
/* ─── TOKENS (shared verbatim with the rest of the hub) ─── */
:root {
  --bg:#0f1117; --bg2:#1a1d27; --bg3:#22263a; --border:#2e3248;
  --text:#e8eaf6; --text2:#9095b8; --text3:#5a5f80;
  --accent:#7c6ff7; --red:#e05555; --green:#4caf7d; --blue:#60a5fa; --yellow:#f0c060;
  --nav-h: 49px;
  --col-w: 232px;   /* bracket node width; mirrored by COL_W in JS */
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 13px; }
::-webkit-scrollbar { width: 7px; height: 7px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
a { color: inherit; }

/* ─── PAGE HEAD ─── */
.preview-note { margin: 12px 16px 0; padding: 9px 13px; border: 1px solid var(--yellow); border-radius: 8px; background: rgba(240,192,96,.08); color: var(--yellow); font-size: 12px; font-weight: 600; }
.preview-note[hidden] { display: none; }
.page-head { padding: 18px 16px 4px; }
.page-title { font-size: 19px; font-weight: 700; }
.page-sub { font-size: 12px; color: var(--text2); margin-top: 2px; }

/* ─── BRACKET SECTION ─── */
.bracket-section { padding: 14px 16px 26px; }
.bracket-section-title { font-size: 14px; font-weight: 700; letter-spacing: .3px; margin-bottom: 10px; }
.stage-divider { height: 1px; background: var(--border); margin: 4px 16px; }

.bracket-scroll { overflow-x: auto; overflow-y: hidden; padding-bottom: 6px; }
.bracket-headers { position: relative; height: 22px; margin-bottom: 8px; }
.rhead { position: absolute; top: 0; width: var(--col-w); text-align: center; font-size: 11px; font-weight: 700;
  letter-spacing: .4px; text-transform: uppercase; color: var(--text3); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.bracket-inner { position: relative; }
.bracket-inner svg.connectors { position: absolute; inset: 0; z-index: 1; pointer-events: none; }
.bracket-inner svg.connectors path { fill: none; stroke: var(--border); stroke-width: 1.5; }

/* ─── MATCH NODE (collapsed) ─── */
.bnode { position: absolute; width: var(--col-w); background: var(--bg2); border: 1px solid var(--border);
  border-radius: 8px; z-index: 2; }
.bteam { display: flex; align-items: center; gap: 6px; padding: 6px 10px; font-size: 12px; line-height: 1.3; }
.bteam + .bteam { border-top: 1px solid var(--border); }
.bteam .bn { flex: 1 1 auto; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.bteam .bn .pl { color: var(--text2); font-weight: 400; }
.bteam .bsc { font-variant-numeric: tabular-nums; font-weight: 800; color: var(--text3); flex-shrink: 0; }
.bteam.win .bn { font-weight: 700; color: var(--blue); }
.bteam.win .bsc { color: var(--blue); }
.bteam.bye .bn { color: var(--text3); font-style: italic; }
.bteam.tbd .bn { color: var(--text3); }
.bteam.tbd .bsc { opacity: .5; }
/* Double-elim: feed-source labels ("Loser of W-C") in an unfilled slot. */
.bteam.src .bn { color: #c98adf; font-style: italic; font-size: 11px; }
/* Double-elim: Grand Final node accent + its round note. */
.bnode.gf { border-left: 3px solid var(--yellow); }
.gf-note { font-size: 10px; color: var(--yellow); padding: 4px 10px 6px; border-top: 1px solid var(--border);
  background: rgba(240,192,96,.05); }
/* position-letter tab straddling the right edge, vertically centered */
.bpos { position: absolute; right: -9px; top: 50%; transform: translateY(-50%); min-width: 18px; height: 18px;
  padding: 0 3px; background: var(--bg3); border: 1px solid var(--border); border-radius: 4px; font-size: 9px;
  font-weight: 700; color: var(--text2); display: flex; align-items: center; justify-content: center; z-index: 3; }

/* ─── CHAMPION CALLOUT ─── */
.champ { position: absolute; z-index: 2; width: var(--col-w); text-align: center; }
.champ .lbl { font-size: 9px; font-weight: 700; letter-spacing: .6px; text-transform: uppercase; color: var(--yellow); margin-bottom: 3px; }
.champ .nm { font-size: 13px; font-weight: 700; color: var(--text); }
.champ .nm .pl { color: var(--text2); font-weight: 400; }

.empty-state { color: var(--text3); font-size: 13px; font-style: italic; padding: 16px 2px; }

/* ─── TOOLBAR ─── */
.btn { background: var(--bg3); border: 1px solid var(--border); border-radius: 7px; color: var(--text); font-size: 12px; font-weight: 600; padding: 7px 12px; cursor: pointer; font-family: inherit; }
.btn:hover { border-color: var(--accent); }
.btn:disabled { opacity: .5; cursor: default; }
.page-head { display: flex; align-items: flex-start; gap: 12px; }
.page-head .grow { flex: 1 1 auto; min-width: 0; }
.page-head .actions { flex-shrink: 0; padding-top: 2px; }

/* ─── CLICKABLE / EXPANDED NODE ─── */
.bnode.clickable { cursor: pointer; }
.bnode.clickable:hover { border-color: var(--accent); }
.bnode.expanded { border-color: var(--border); }

.bx-roster { display: flex; gap: 3px; justify-content: center; flex-wrap: nowrap; padding: 8px 8px 6px; }
.bx-mon { width: 39px; height: 39px; object-fit: contain; image-rendering: pixelated; flex-shrink: 0; }
.bx-mon.dim { opacity: .3; }
.bx-head { display: flex; align-items: center; gap: 10px; padding: 8px 14px; font-size: 14px; }
.bx-logo { width: 39px; height: 39px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
.bx-logo img { max-width: 39px; max-height: 39px; object-fit: contain; }
.bx-logo-mono { width: 39px; height: 39px; border-radius: 8px; background: var(--bg3); border: 1px solid var(--border); font-size: 14px; font-weight: 700; color: var(--text2); display: flex; align-items: center; justify-content: center; }
.bx-name { flex: 1 1 auto; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.bx-name .pl { color: var(--text2); font-weight: 400; }
.bx-name.win { font-weight: 700; color: var(--blue); }
.bx-sc { font-variant-numeric: tabular-nums; font-weight: 800; color: var(--text3); flex-shrink: 0; }
.bx-sc.win { color: var(--blue); }
.bx-vs { text-align: center; font-size: 12px; text-transform: uppercase; letter-spacing: .5px; color: var(--text3); padding: 5px 0; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); }
.vs-link { cursor: pointer; color: var(--accent); font-weight: 700; }
.vs-link:hover { text-decoration: underline; }

/* ─── MATCH DETAIL PANEL (content ported from matches.html, shown as a right drawer) ─── */
.panel-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.55); z-index: 200; display: flex; justify-content: flex-end; }
.panel-overlay[hidden] { display: none; }
.panel { width: 44%; height: 100%; background: var(--bg2); border-left: 1px solid var(--border); display: flex; flex-direction: column; box-shadow: -8px 0 30px rgba(0,0,0,.4); }
.panel-head { flex: 0 0 auto; display: flex; align-items: center; gap: 8px; padding: 9px 12px; border-bottom: 1px solid var(--border); }
.panel-title { flex: 1 1 auto; min-width: 0; font-size: 13px; font-weight: 700; text-align: center; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.btn-icon { background: none; border: none; color: var(--text2); cursor: pointer; font-size: 14px; font-family: inherit; padding: 6px 10px; border-radius: 6px; font-weight: 600; flex-shrink: 0; }
.btn-icon:hover { background: var(--bg3); color: var(--text); }
.panel-body { flex: 1 1 auto; min-height: 0; overflow-y: auto; overscroll-behavior: contain; padding: 16px 16px 40px; }

.dm-score { text-align: center; font-size: 30px; font-weight: 800; font-variant-numeric: tabular-nums; color: var(--text2); }
.dm-score .win { color: var(--blue); }
.dm-score .dash { color: var(--text3); margin: 0 6px; font-weight: 600; }
.dm-meta { text-align: center; font-size: 11px; color: var(--text3); margin-top: 2px; margin-bottom: 14px; }
.dm-sides { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.dm-top { margin-bottom: 18px; }
.dm-side { min-width: 0; }
.dm-team { display: block; font-size: 13px; font-weight: 700; text-decoration: none; margin-bottom: 8px; text-align: center; overflow: hidden; text-overflow: ellipsis; }
.dm-team:hover { color: var(--accent); }
.dm-team .pl { color: var(--text2); font-weight: 400; }
.brought-row { display: flex; flex-wrap: wrap; gap: 3px; justify-content: center; }
.brought-row img.bi { width: 38px; height: 38px; object-fit: contain; }
.brought-row img.ball { opacity: .4; }
.dm-section-title { font-size: 11px; font-weight: 700; letter-spacing: .5px; text-transform: uppercase; color: var(--text3); margin: 4px 0 9px; padding-top: 14px; border-top: 1px solid var(--border); text-align: center; }
.stat-row { display: flex; align-items: center; gap: 6px; padding: 3px 0; font-size: 12px; }
.stat-row img.si { width: 26px; height: 26px; object-fit: contain; flex-shrink: 0; }
.stat-row .sn { flex: 1 1 auto; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.stat-row .sk, .stat-row .sf { font-variant-numeric: tabular-nums; font-weight: 700; color: var(--text3); flex-shrink: 0; }
.stat-row .sk { color: var(--blue); }
.dm-game { background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; padding: 9px 10px; margin-bottom: 8px; }
.dm-game-head { font-size: 11px; font-weight: 700; color: var(--text2); margin-bottom: 8px; text-align: center; }
.dm-game-head .gw { color: var(--blue); }
.dm-game-head .replay { color: var(--accent); text-decoration: none; font-weight: 600; }
.dm-game-head .replay:hover { text-decoration: underline; }
.dm-game .dm-sides { gap: 10px; }
.game-mon { display: flex; align-items: center; gap: 5px; padding: 2px 0; font-size: 11px; }
.game-mon img { width: 24px; height: 24px; object-fit: contain; flex-shrink: 0; }
.game-mon .gmn { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.game-mon.fainted { opacity: .42; }
.dm-loading, .dm-empty { color: var(--text3); font-size: 13px; font-style: italic; padding: 12px 2px; }
@media (max-width: 900px) { .panel { width: 100%; border-left: none; } }

.banner { margin: 16px; padding: 10px 14px; border: 1px solid var(--border); border-radius: 8px; background: var(--bg2); font-size: 12px; color: var(--text2); }
.banner.err { border-color: rgba(224,85,85,.5); color: var(--red); }

#toast-container { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 300; display: flex; flex-direction: column; gap: 8px; align-items: center; }
.toast { background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; padding: 10px 16px; font-size: 13px; color: var(--text); box-shadow: 0 4px 16px rgba(0,0,0,.4); max-width: 90vw; }
.toast.err { border-color: rgba(224,85,85,.55); color: #ff9c9c; }

</style>
</head>
<body>

<script src="/nav.js"></script>

<div id="boot-banner" class="banner">Loading…</div>

<div id="layout" hidden>
  <div id="preview-note" class="preview-note" hidden>Preview - this postseason isn’t published yet, so it’s only visible to admins. Publish it from the Matches admin page when you’re ready.</div>
  <div class="page-head">
    <div class="grow">
      <div class="page-title">Postseason</div>
      <div class="page-sub" id="season-sub"></div>
    </div>
    <div class="actions">
      <button class="btn" id="toggle-all" onclick="toggleAll()" disabled>Expand all</button>
    </div>
  </div>

  <!-- Single-elimination sections (Playoffs + Cup). Shown unless the season is double-elim. -->
  <div id="single-elim-sections">
    <div class="bracket-section">
      <div class="bracket-section-title">Playoffs</div>
      <div id="playoffs-mount"></div>
    </div>

    <div class="stage-divider"></div>

    <div class="bracket-section">
      <div class="bracket-section-title">Cup</div>
      <div id="cup-mount"></div>
    </div>
  </div>

  <!-- Double-elimination sections. Shown only when the season's playoff_format is double_elim. -->
  <div id="double-elim-sections" hidden>
    <div class="bracket-section">
      <div class="bracket-section-title">Winners Bracket &amp; Grand Final</div>
      <div id="winners-mount"></div>
    </div>

    <div class="stage-divider"></div>

    <div class="bracket-section">
      <div class="bracket-section-title">Losers Bracket</div>
      <div id="losers-mount"></div>
    </div>
  </div>
</div>

<div class="panel-overlay" id="panel-overlay" hidden onclick="if(event.target===this)closePanel()">
  <div class="panel">
    <div class="panel-head">
      <span class="panel-title" id="panel-title"></span>
      <button class="btn-icon" onclick="closePanel()">✕</button>
    </div>
    <div class="panel-body" id="panel-body"></div>
  </div>
</div>

<div id="toast-container"></div>

<script>
// ─────────────────────────────────────────────────────────────────────────────
// CONFIG
// ─────────────────────────────────────────────────────────────────────────────
const SUPABASE_URL      = "https://arypbyzeppbpbursmzcs.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_U8J3pV_KgomrWhbgoGBSUg_ttQ4d46m";
const sb = window.sb || supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// Bracket geometry (COL_W must match --col-w above). EXP_W is the widened column for expanded cards.
const COL_W = 232, EXP_W = 450, COL_GAP = 60, V_GAP = 22;

const POKEMON_JSON_URL = "https://planner.springfieldbattleleague.com/pokemon.json";
const ASSET_BASE = POKEMON_JSON_URL.replace(/[^/]*$/, '');
const POKEBALL_FALLBACK = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 40 40'%3E%3Ccircle cx='20' cy='20' r='19' fill='%23e05555' stroke='%23333' stroke-width='1.5'/%3E%3Cpath d='M1.1 20 A19 19 0 0 0 38.9 20 Z' fill='%23fff'/%3E%3Crect x='1' y='18' width='38' height='4' fill='%23333'/%3E%3Ccircle cx='20' cy='20' r='7' fill='%23fff' stroke='%23333' stroke-width='1.5'/%3E%3Ccircle cx='20' cy='20' r='3.5' fill='%23e8eaf6' stroke='%23333' stroke-width='1'/%3E%3C/svg%3E";

// ─────────────────────────────────────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────────────────────────────────────
let season = null;
let teams = [], teamById = {}, ownersByTeam = {};
let matches = [];                  // postseason matches only (playoffs + cup)
let pokemonById = {};
let rosterByTeam = {};             // team_id -> [team_pokemon rows]
let broughtMap = {};               // "matchId|teamId" -> Set(pokemon_id)
let expanded = new Set();          // expanded node keys ("stage:Letter")
let expandableKeys = [];           // all expandable keys from the last render
let matchById = {};                // postseason match id -> match row
let matchDetailCache = {};         // match id -> { games, stats }
let detailLoading = {};            // match id -> bool
let isAdmin = false;               // logged-in admin (for previewing before publish)

// ─────────────────────────────────────────────────────────────────────────────
// HELPERS (mirror the rest of the hub)
// ─────────────────────────────────────────────────────────────────────────────
function escapeHtml(s) { return String(s).replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c])); }

// Paginate past Supabase's 1000-row response cap. fetchAllIn scopes by an IN() list;
// fetchAll pulls an entire (unfiltered) table.
async function fetchAllIn(table, columns, column, values) {
  const IN_CHUNK = 300, PAGE = 1000, out = [];
  for (let i = 0; i < values.length; i += IN_CHUNK) {
    const slice = values.slice(i, i + IN_CHUNK);
    for (let from = 0; ; from += PAGE) {
      const { data, error } = await sb.from(table).select(columns)
        .in(column, slice).range(from, from + PAGE - 1);
      if (error) throw error;
      if (data && data.length) out.push(...data);
      if (!data || data.length < PAGE) break;
    }
  }
  return out;
}
async function fetchAll(table, columns) {
  const PAGE = 1000, out = [];
  for (let from = 0; ; from += PAGE) {
    const { data, error } = await sb.from(table).select(columns).range(from, from + PAGE - 1);
    if (error) throw error;
    if (data && data.length) out.push(...data);
    if (!data || data.length < PAGE) break;
  }
  return out;
}

// Carry the active ?season=<slug> onto internal links so navigating from a past
// season keeps you in it. Absent (current season) → bare; external untouched;
// preserves any existing query/hash on the href.
const SEASON_SLUG = new URLSearchParams(location.search).get('season') || '';
function withSeason(href) {
  if (!SEASON_SLUG) return href;
  if (/^https?:\/\//i.test(href)) return href;
  const hashI = href.indexOf('#');
  const hash = hashI === -1 ? '' : href.slice(hashI);
  const base = hashI === -1 ? href : href.slice(0, hashI);
  const sep = base.indexOf('?') === -1 ? '?' : '&';
  return base + sep + 'season=' + encodeURIComponent(SEASON_SLUG) + hash;
}
function patchStaticSeasonLinks() {
  if (!SEASON_SLUG) return;
  document.querySelectorAll('a[href]').forEach(a => {
    const raw = a.getAttribute('href');
    if (!raw || raw.startsWith('#') || /^https?:\/\//i.test(raw) || raw.startsWith('mailto:')) return;
    if (/[?&]season=/.test(raw)) return;
    a.setAttribute('href', withSeason(raw));
  });
}
function teamName(id) { const t = teamById[id]; return t ? t.name : 'TBD'; }
// Coach active for a team during a given week - falls back to current owner, then team name.
function coachAtWeek(teamId, week) {
  const stints = ownersByTeam[teamId] || [];
  let s = stints.find(x => x.started_week <= week && (x.ended_week == null || x.ended_week > week));
  if (!s) s = stints.find(x => x.ended_week == null) || stints[0];
  return s ? s.name : null;
}
// No transactions happen after the regular season, so postseason labels use the current owner.
function coachNow(teamId) { return coachAtWeek(teamId, 1e9); }
// "Team Name (Coach)"; collapses to one when coach == team name.
function bracketTeamLabel(team) {
  if (!team) return 'TBD';
  const c = coachNow(team.id), name = team.name;
  if (!c || c === name) return escapeHtml(name);
  return escapeHtml(name) + ' <span class="pl">(' + escapeHtml(c) + ')</span>';
}
function pairKey(a, b) { return [a, b].sort().join('|'); }

// ── Sprites / icons (mirror the rest of the hub) ──
function localId(id) {
  const m = String(id).match(/^(\d+)(.*)$/); if (!m) return id;
  const num = parseInt(m[1]);
  return (num >= 1000 ? String(num) : String(num).padStart(3, '0')) + m[2];
}
function iconUrl(id) { return id ? ASSET_BASE + 'icons/' + localId(id) + '.png' : ''; }
function spriteUrl(id) { return id ? ASSET_BASE + 'sprites/' + localId(id) + '.png' : ''; }
function attachIconFallback(img, id) {
  img.onerror = function () {
    if (this.src.includes('/icons/')) { this.src = spriteUrl(id); }
    else { this.onerror = null; this.src = POKEBALL_FALLBACK; this.style.opacity = '.5'; }
  };
}
function monName(id) { const p = pokemonById[id]; return p ? p.name : id; }

// ── Roster (temporal) + brought-set + team logo ──
function activeRoster(teamId, week) {
  return (rosterByTeam[teamId] || [])
    .filter(r => (r.acquired_week || 1) <= week && (r.released_week == null || r.released_week > week))
    .sort((a, b) => (a.draft_pick_number ?? 1e9) - (b.draft_pick_number ?? 1e9) || String(a.pokemon_id).localeCompare(String(b.pokemon_id)))
    .map(r => r.pokemon_id);
}
const EMPTY_SET = new Set();
function broughtSet(matchId, teamId) { return (matchId && broughtMap[matchId + '|' + teamId]) || EMPTY_SET; }
function monogram(team) {
  if (!team || !team.name) return '?';
  const w = team.name.trim().split(/\s+/);
  const s = w.length > 1 ? (w[0][0] + w[1][0]) : team.name.slice(0, 2);
  return escapeHtml(s.toUpperCase());
}
function logoHtml(team) {
  if (team && team.logo_url)
    return '<span class="bx-logo"><img class="bx-logo-img" data-team="' + escapeHtml(team.id) + '" src="' + escapeHtml(team.logo_url) + '" alt=""></span>';
  return '<span class="bx-logo"><span class="bx-logo-mono">' + monogram(team) + '</span></span>';
}

// A node can expand only when it's a real match between two known teams (no byes/TBD).
function isExpandable(node) { return !!(node.aTeam && node.bTeam && !node.aBye && !node.bBye); }

function stageLabel(s) { return ({ regular: 'Regular Season', playoffs: 'Playoffs', cup: 'Cup' })[s] || 'Postseason'; }
function fmtDateTime(s) {
  if (!s) return '';
  const d = new Date(s); if (isNaN(d.getTime())) return '';
  const p = n => String(n).padStart(2, '0');
  return p(d.getMonth() + 1) + '/' + p(d.getDate()) + '/' + d.getFullYear() + ' ' + p(d.getHours()) + ':' + p(d.getMinutes());
}
function teamLinkHtml(id) {
  const t = teamById[id]; if (!t) return '<span class="dm-team">TBD</span>';
  const c = coachNow(id);
  return '<a class="dm-team" href="' + withSeason('team.html#' + encodeURIComponent(t.slug)) + '">'
    + escapeHtml(t.name) + (c && c !== t.name ? ' <span class="pl">(' + escapeHtml(c) + ')</span>' : '') + '</a>';
}

// ─────────────────────────────────────────────────────────────────────────────
// BRACKET MODEL (seed-driven)
// ─────────────────────────────────────────────────────────────────────────────
// Standard single-elim seed order for a bracket of `size` slots: e.g. size 8 -> [1,8,4,5,2,7,3,6].
function seedSlots(size) {
  let pls = [1, 2];
  while (pls.length < size) {
    const sum = pls.length * 2 + 1;
    const out = [];
    for (const p of pls) out.push(p, sum - p);
    pls = out;
  }
  return pls;
}

// Build the round/node tree from a seeded team list (index 0 = top seed). Returns array of rounds.
function buildBracket(seeded) {
  const N = seeded.length;
  if (N < 2) return null;
  const size = 1 << Math.ceil(Math.log2(N));
  const order = seedSlots(size);
  const slotTeam = order.map(seedNum => (seedNum <= N ? seeded[seedNum - 1] : null)); // null = BYE

  const rounds = [];
  const round0 = [];
  for (let i = 0; i < size / 2; i++) {
    round0.push({ round: 0, index: i, slotA: slotTeam[2 * i], slotB: slotTeam[2 * i + 1], childA: null, childB: null });
  }
  rounds.push(round0);

  const totalRounds = Math.log2(size);
  for (let r = 1; r < totalRounds; r++) {
    const prev = rounds[r - 1], cur = [];
    for (let i = 0; i < prev.length / 2; i++) {
      cur.push({ round: r, index: i, slotA: null, slotB: null, childA: prev[2 * i], childB: prev[2 * i + 1] });
    }
    rounds.push(cur);
  }
  return rounds;
}

// Forward pass: resolve each node's two teams, attach a match by participating pair, advance winners/byes.
function resolveBracket(rounds, stage) {
  const matchByPair = {};
  matches.filter(m => m.stage === stage).forEach(m => { matchByPair[pairKey(m.team_a_id, m.team_b_id)] = m; });

  for (let r = 0; r < rounds.length; r++) {
    for (const node of rounds[r]) {
      // Determine the two teams entering this node.
      if (r === 0) {
        node.aTeam = node.slotA; node.bTeam = node.slotB;
        node.aBye = node.slotA == null; node.bBye = node.slotB == null;
      } else {
        node.aTeam = node.childA.winnerTeam || null; node.bTeam = node.childB.winnerTeam || null;
        node.aBye = false; node.bBye = false;
      }
      node.aScore = 0; node.bScore = 0; node.match = null; node.winnerTeam = null; node.resolved = false;

      if (node.aBye && node.bTeam) { node.winnerTeam = node.bTeam; node.resolved = true; node.isBye = true; }
      else if (node.bBye && node.aTeam) { node.winnerTeam = node.aTeam; node.resolved = true; node.isBye = true; }
      else if (node.aTeam && node.bTeam) {
        const m = matchByPair[pairKey(node.aTeam.id, node.bTeam.id)] || null;
        node.match = m;
        if (m) {
          // Orient scores to match the node's A/B sides (match.team_a_id may be either side).
          if (m.team_a_id === node.aTeam.id) { node.aScore = m.team_a_score || 0; node.bScore = m.team_b_score || 0; }
          else { node.aScore = m.team_b_score || 0; node.bScore = m.team_a_score || 0; }
          if (m.winner_team_id) { node.winnerTeam = teamById[m.winner_team_id] || null; node.resolved = true; }
        }
      }
    }
  }
}

function roundHeader(round, ri, totalRounds) {
  const labels = new Set();
  round.forEach(n => { if (n.match && n.match.postseason_round) labels.add(n.match.postseason_round); });
  if (labels.size === 1) return [...labels][0];           // honor a consistent admin-entered label
  const fromEnd = totalRounds - 1 - ri;
  if (fromEnd === 0) return 'Finals';
  if (fromEnd === 1) return 'Semifinals';
  if (fromEnd === 2) return 'Quarterfinals';
  return 'Round of ' + (round.length * 2);
}

// ─────────────────────────────────────────────────────────────────────────────
// RENDER
// ─────────────────────────────────────────────────────────────────────────────
function seededTeams(seedField) {
  return teams.filter(t => t[seedField] != null).sort((a, b) => a[seedField] - b[seedField]);
}

function nodeRowHtml(node, side) {
  const team = side === 'a' ? node.aTeam : node.bTeam;
  const bye  = side === 'a' ? node.aBye  : node.bBye;
  const score = side === 'a' ? node.aScore : node.bScore;
  const isWinner = node.match && node.match.winner_team_id && team && node.match.winner_team_id === team.id;
  let cls = 'bteam', label;
  if (bye)        { cls += ' bye'; label = 'Bye'; }
  else if (team)  { label = bracketTeamLabel(team); if (isWinner) cls += ' win'; }
  else            { cls += ' tbd'; label = 'TBD'; }
  return '<div class="' + cls + '"><span class="bn">' + label + '</span><span class="bsc">' + (score || 0) + '</span></div>';
}

// ── Expanded card: roster strip + head row per team, Team A on top, Team B on bottom ──
function rosterStripHtml(teamId, week, matchId) {
  const roster = activeRoster(teamId, week);
  const brought = broughtSet(matchId, teamId);
  // Brought first, benched (dimmed) sorted to the end. Stable sort preserves base order within each group.
  const ordered = roster.slice().sort((a, b) => (brought.has(a) ? 0 : 1) - (brought.has(b) ? 0 : 1));
  if (!ordered.length) return '<div class="bx-roster"></div>';
  return '<div class="bx-roster">' + ordered.map(id => {
    const dim = (brought.size && !brought.has(id)) ? ' dim' : '';
    return '<img class="bx-mon' + dim + '" src="' + iconUrl(id) + '" data-mon="' + escapeHtml(id) + '" title="' + escapeHtml(monName(id)) + '" alt="">';
  }).join('') + '</div>';
}
function headHtml(team, score, win) {
  return '<div class="bx-head">' + logoHtml(team)
    + '<span class="bx-name' + (win ? ' win' : '') + '">' + bracketTeamLabel(team) + '</span>'
    + '<span class="bx-sc' + (win ? ' win' : '') + '">' + (score || 0) + '</span></div>';
}
function expandedCardHtml(node) {
  const matchId = node.match ? node.match.id : null;
  const week = node.match ? node.match.week : 1e9;   // post-RS roster is week-invariant
  const aWin = !!(node.match && node.match.winner_team_id === node.aTeam.id);
  const bWin = !!(node.match && node.match.winner_team_id === node.bTeam.id);
  const vs = matchId
    ? '<div class="bx-vs"><span class="vs-link" data-match="' + escapeHtml(matchId) + '">vs · view match</span></div>'
    : '<div class="bx-vs">vs</div>';
  return rosterStripHtml(node.aTeam.id, week, matchId)
    + headHtml(node.aTeam, node.aScore, aWin)
    + vs
    + headHtml(node.bTeam, node.bScore, bWin)
    + rosterStripHtml(node.bTeam.id, week, matchId)
    + '<span class="bpos">' + node.posLetter + '</span>';
}

// Measure heights, stack round 0 (skipping hidden byes), center each parent on its
// VISIBLE children (slide-to-child). A parent whose bye child is hidden aligns to its
// one real child; a parent with no visible children falls back to the bracket midpoint.
function layoutBracket(rounds) {
  let cursor = 0;
  rounds[0].forEach(node => {
    if (node._hidden) return;
    node._h = node.el.offsetHeight;
    node._top = cursor;
    node._center = cursor + node._h / 2;
    cursor += node._h + V_GAP;
  });
  const midH = Math.max(cursor - V_GAP, 0) / 2;
  for (let r = 1; r < rounds.length; r++) {
    rounds[r].forEach(node => {
      if (node._hidden) return;
      node._h = node.el.offsetHeight;
      const vis = [node.childA, node.childB].filter(c => c && !c._hidden && c._center != null);
      node._center = vis.length ? vis.reduce((s, c) => s + c._center, 0) / vis.length : midH;
      node._top = node._center - node._h / 2;
    });
  }
  rounds.forEach(round => round.forEach(node => { if (!node._hidden) node.el.style.top = node._top + 'px'; }));
}

// A champion callout to the right of the final once its winner is set.
function renderChampion(rounds, inner) {
  const final = rounds[rounds.length - 1][0];
  if (!final || !final.resolved || !final.winnerTeam) return null;
  const c = document.createElement('div'); c.className = 'champ';
  c.style.left = (final._left + final._w + COL_GAP) + 'px';
  c.innerHTML = '<div class="lbl">Champion</div><div class="nm">' + bracketTeamLabel(final.winnerTeam) + '</div>';
  inner.appendChild(c);
  // Vertically center on the final node once it's in the DOM.
  c.style.top = (final._center - c.offsetHeight / 2) + 'px';
  return c;
}

function sizeInner(rounds, inner, innerW, champ) {
  let maxBottom = 0;
  rounds.forEach(round => round.forEach(node => { if (!node._hidden) maxBottom = Math.max(maxBottom, node._top + node._h); }));
  if (champ) {
    maxBottom = Math.max(maxBottom, parseFloat(champ.style.top) + champ.offsetHeight);
    inner.style.width = (parseFloat(champ.style.left) + champ.offsetWidth) + 'px';
  }
  inner.style.height = maxBottom + 'px';
}

function drawConnectors(svg, rounds) {
  const NS = 'http://www.w3.org/2000/svg';
  while (svg.firstChild) svg.removeChild(svg.firstChild);
  // Size the SVG viewport to the bracket; relying on CSS inset:0 alone lets it
  // fall back to the intrinsic 300x150 default and clip most connectors.
  const inner = svg.parentNode;
  const W = parseFloat(inner.style.width) || inner.clientWidth;
  const H = parseFloat(inner.style.height) || inner.clientHeight;
  svg.setAttribute('width', W);
  svg.setAttribute('height', H);
  svg.setAttribute('viewBox', '0 0 ' + W + ' ' + H);
  for (let r = 1; r < rounds.length; r++) {
    rounds[r].forEach(parent => {
      if (parent._hidden) return;
      const px = parent._left != null ? parent._left : parseFloat(parent.el.style.left);
      [parent.childA, parent.childB].forEach(child => {
        if (!child || child._hidden || child._left == null) return;   // hidden bye → no connector
        const cx = child._left + child._w;   // child's right edge (column-width aware)
        const cy = child._center, py = parent._center;
        const midX = cx + COL_GAP / 2;
        const path = document.createElementNS(NS, 'path');
        path.setAttribute('d', 'M ' + cx + ' ' + cy + ' H ' + midX + ' V ' + py + ' H ' + px);
        svg.appendChild(path);
      });
    });
  }
}

// Stable position letters (A, B, C…) assigned round-by-round, top-to-bottom across the whole bracket.
function assignLetters(rounds) {
  let i = 0;
  rounds.forEach(round => round.forEach(node => { node.posLetter = String.fromCharCode(65 + (i++ % 26)); }));
}

// ─────────────────────────────────────────────────────────────────────────────
// MATCH DETAIL PANEL (content mirrors matches.html, scoped to postseason matches)
// ─────────────────────────────────────────────────────────────────────────────
function openPanel(matchId) {
  const m = matchById[matchId]; if (!m) return;
  document.getElementById('panel-overlay').hidden = false;
  document.getElementById('panel-title').textContent = teamName(m.team_a_id) + ' vs ' + teamName(m.team_b_id);
  const body = document.getElementById('panel-body');
  if (matchDetailCache[matchId]) { renderMatchDetail(body, m, matchDetailCache[matchId]); return; }
  body.innerHTML = '<div class="dm-loading">Loading match\u2026</div>';
  if (!detailLoading[matchId]) loadMatchDetail(matchId);
}
function closePanel() { document.getElementById('panel-overlay').hidden = true; }
document.addEventListener('keydown', e => { if (e.key === 'Escape') closePanel(); });

async function loadMatchDetail(id) {
  detailLoading[id] = true;
  try {
    const { data: games, error: gErr } = await sb.from('games')
      .select('id, game_number, replay_url, winner_team_id').eq('match_id', id).order('game_number');
    if (gErr) throw gErr;
    const gameIds = (games || []).map(g => g.id);
    let stats = [];
    if (gameIds.length) {
      stats = await fetchAllIn('game_pokemon_stats', 'game_id, team_id, pokemon_id, kills, deaths', 'game_id', gameIds);
    }
    matchDetailCache[id] = { games: games || [], stats };
  } catch (err) {
    console.error(err); matchDetailCache[id] = { games: [], stats: [], error: true };
    showToast('Could not load match details.', 'err');
  } finally {
    detailLoading[id] = false;
    const m = matchById[id];
    if (m && !document.getElementById('panel-overlay').hidden) renderMatchDetail(document.getElementById('panel-body'), m, matchDetailCache[id]);
  }
}

// Brought six: prefer match_pokemon (already loaded), fall back to distinct mons seen in the games.
function panelBroughtIds(matchId, teamId, d) {
  let ids = [...broughtSet(matchId, teamId)];
  if (!ids.length && d) {
    const seen = new Set();
    d.stats.filter(s => s.team_id === teamId).forEach(s => seen.add(s.pokemon_id));
    ids = [...seen];
  }
  return ids.slice(0, 6);
}
function broughtIconsHtml(ids) {
  let h = '';
  for (let i = 0; i < 6; i++) {
    const id = ids[i];
    if (id) h += '<img class="bi" src="' + iconUrl(id) + '" data-mon="' + escapeHtml(id) + '" alt="' + escapeHtml(monName(id)) + '" title="' + escapeHtml(monName(id)) + '">';
    else h += '<img class="bi ball" src="' + POKEBALL_FALLBACK + '" alt="">';
  }
  return h;
}
function statListHtml(matchId, teamId, d) {
  const ids = panelBroughtIds(matchId, teamId, d);
  if (!ids.length) return '<div class="dm-empty">No data</div>';
  return ids.map(id => {
    let k = 0, dd = 0;
    d.stats.filter(s => s.team_id === teamId && s.pokemon_id === id).forEach(s => { k += s.kills || 0; dd += s.deaths || 0; });
    return '<div class="stat-row"><img class="si" src="' + iconUrl(id) + '" data-mon="' + escapeHtml(id) + '" alt="">'
      + '<span class="sn">' + escapeHtml(monName(id)) + '</span>'
      + '<span class="sk">' + k + ' K</span><span class="sf">' + dd + ' F</span></div>';
  }).join('');
}
function gameHtml(m, g, d) {
  const winName = g.winner_team_id ? teamName(g.winner_team_id) : null;
  let head = 'Game ' + g.game_number;
  if (winName) head += ' \u00B7 <span class="gw">' + escapeHtml(winName) + ' won</span>';
  if (g.replay_url) head += ' \u00B7 <a class="replay" href="' + escapeHtml(g.replay_url) + '" target="_blank" rel="noopener">Replay \u2197</a>';
  const sideHtml = teamId => {
    const rows = d.stats.filter(s => s.game_id === g.id && s.team_id === teamId);
    if (!rows.length) return '<div class="dm-empty">-</div>';
    return rows.map(s => '<div class="game-mon' + ((s.deaths || 0) > 0 ? ' fainted' : '') + '">'
      + '<img src="' + iconUrl(s.pokemon_id) + '" data-mon="' + escapeHtml(s.pokemon_id) + '" alt="">'
      + '<span class="gmn">' + escapeHtml(monName(s.pokemon_id)) + '</span></div>').join('');
  };
  return '<div class="dm-game"><div class="dm-game-head">' + head + '</div>'
    + '<div class="dm-sides"><div class="dm-side">' + sideHtml(m.team_a_id) + '</div>'
    + '<div class="dm-side">' + sideHtml(m.team_b_id) + '</div></div></div>';
}
function matchHasResults(m) { return !!m.winner_team_id || (m.team_a_score || 0) > 0 || (m.team_b_score || 0) > 0; }
function renderMatchDetail(body, m, d) {
  const aWin = m.winner_team_id === m.team_a_id, bWin = m.winner_team_id === m.team_b_id;
  const date = fmtDateTime(m.match_date);
  const meta = [stageLabel(m.stage), (m.postseason_round || 'Week ' + m.week), 'Bo' + (m.series_length || 3)]
    .concat(date ? [date] : []).join(' \u00B7 ');
  const h = [];
  h.push('<div class="dm-score"><span class="' + (aWin ? 'win' : '') + '">' + (m.team_a_score || 0) + '</span><span class="dash">\u2013</span><span class="' + (bWin ? 'win' : '') + '">' + (m.team_b_score || 0) + '</span></div>');
  h.push('<div class="dm-meta">' + escapeHtml(meta) + '</div>');

  h.push('<div class="dm-sides dm-top">');
  [m.team_a_id, m.team_b_id].forEach(teamId => {
    h.push('<div class="dm-side">' + teamLinkHtml(teamId) + '<div class="brought-row">' + broughtIconsHtml(panelBroughtIds(m.id, teamId, d)) + '</div></div>');
  });
  h.push('</div>');

  h.push('<div class="dm-section-title">Brought Pokémon &amp; stats</div>');
  h.push('<div class="dm-sides"><div class="dm-side">' + statListHtml(m.id, m.team_a_id, d) + '</div><div class="dm-side">' + statListHtml(m.id, m.team_b_id, d) + '</div></div>');

  h.push('<div class="dm-section-title">Games</div>');
  if (d.games.length) d.games.forEach(g => h.push(gameHtml(m, g, d)));
  else h.push('<div class="dm-empty">' + (matchHasResults(m) ? 'Result recorded without game-by-game detail.' : 'This match hasn\u2019t been played yet.') + '</div>');

  body.innerHTML = h.join('');
  body.querySelectorAll('img[data-mon]').forEach(img => attachIconFallback(img, img.getAttribute('data-mon')));
}

// ─────────────────────────────────────────────────────────────────────────────
// BOOT
// ─────────────────────────────────────────────────────────────────────────────
// ═════════════════════════════════════════════════════════════════════════════
// DOUBLE-ELIMINATION RENDERER
// A season with playoff_format = 'double_elim' renders three structures — a winners
// bracket (with the Grand Final appended), a losers bracket, and the GF — from a
// hand-authored skeleton of lettered nodes. Matches attach to nodes by their
// bracket_position letter (set in admin-matches); there is no seed-derived winner
// advancement. A node with no teams of its own hides when the slot it feeds forward
// already holds a real team (a bye/float-through), per the agreed model.
// ═════════════════════════════════════════════════════════════════════════════

// Build the winners-bracket skeleton for `size` slots (a power of two), lettered
// W-A, W-B, … round by round, top to bottom, each node pointing at the node/slot it
// feeds. Mirrors buildBracket's shape but as described nodes keyed by letter.
function deWinnersSkeleton(size) {
  const rounds = [];
  let letterIdx = 0;
  const nextLetter = () => 'W-' + String.fromCharCode(65 + (letterIdx++));
  // Round 0.
  const r0 = [];
  for (let i = 0; i < size / 2; i++) r0.push({ pos: nextLetter(), feeds: ['Seed', 'Seed'], feedsTo: null });
  rounds.push(r0);
  const totalRounds = Math.log2(size);
  for (let r = 1; r < totalRounds; r++) {
    const cur = [];
    for (let i = 0; i < rounds[r - 1].length / 2; i++) cur.push({ pos: nextLetter(), feeds: ['Winner', 'Winner'], feedsTo: null });
    rounds.push(cur);
  }
  // Wire forward pointers: child i of round r feeds slot (i % 2) of parent ⌊i/2⌋ in r+1.
  for (let r = 0; r < rounds.length - 1; r++) {
    rounds[r].forEach((node, i) => {
      const parent = rounds[r + 1][Math.floor(i / 2)];
      node.feedsTo = [parent.pos, i % 2];
      node.feeds = ['Winner of ' + (rounds[r][i].pos), '']; // refined below per-slot
    });
  }
  // Refine feed labels: each parent slot names the child feeding it.
  for (let r = 1; r < rounds.length; r++) {
    rounds[r].forEach((parent, i) => {
      const childTop = rounds[r - 1][2 * i], childBot = rounds[r - 1][2 * i + 1];
      parent.feeds = ['Winner of ' + childTop.pos, childBot ? 'Winner of ' + childBot.pos : 'Winner'];
    });
  }
  rounds[0].forEach(n => { n.feeds = ['Seed', 'Seed']; });
  return rounds;
}

// Standard-rules losers bracket for a winners bracket of `size` slots. For a size-S
// winners bracket the losers bracket has 2*(log2(S)-1) rounds alternating "minor"
// (LB survivors play) and "major" (absorb the next WB round's losers). Lettered
// L-A, L-B, … round by round. Forward pointers wired for bye-hiding.
function deLosersSkeleton(size) {
  const wbRounds = Math.log2(size);           // e.g. 8 -> 3
  if (wbRounds < 2) return [];
  const rounds = [];
  let letterIdx = 0;
  const nextLetter = () => 'L-' + String.fromCharCode(65 + (letterIdx++));

  // LB round 0 (minor): pairs of WB round-0 losers. size/4 nodes.
  let count = size / 4;
  const r0 = [];
  for (let i = 0; i < count; i++) r0.push({ pos: nextLetter(), feeds: ['Loser of W', 'Loser of W'], feedsTo: null });
  rounds.push(r0);

  // Alternate major/minor. A major round keeps the same node count and absorbs a WB
  // dropdown into slot 1; a minor round halves the node count (LB survivors play).
  let isMajor = true;
  while (count > 1 || (count === 1 && isMajor && rounds.length < 2 * (wbRounds - 1))) {
    const prev = rounds[rounds.length - 1];
    const cur = [];
    if (isMajor) {
      // Same count: each node = winner of the aligned prev node vs a WB dropdown.
      for (let i = 0; i < prev.length; i++) cur.push({ pos: nextLetter(), feeds: ['Winner of ' + prev[i].pos, 'Loser of W'], feedsTo: null });
    } else {
      count = Math.max(1, prev.length / 2);
      for (let i = 0; i < count; i++) cur.push({ pos: nextLetter(), feeds: ['Winner of ' + prev[2 * i].pos, prev[2 * i + 1] ? 'Winner of ' + prev[2 * i + 1].pos : 'Winner'], feedsTo: null });
    }
    rounds.push(cur);
    isMajor = !isMajor;
    if (rounds.length >= 2 * (wbRounds - 1)) break;
  }

  // Wire forward pointers along the LB spine (each node feeds the aligned node next round).
  for (let r = 0; r < rounds.length - 1; r++) {
    const cur = rounds[r], nxt = rounds[r + 1];
    cur.forEach((node, i) => {
      if (nxt.length === cur.length) node.feedsTo = [nxt[i].pos, 0];          // major carry
      else node.feedsTo = [nxt[Math.floor(i / 2)].pos, i % 2];               // minor merge
    });
  }
  return rounds;
}

let deSkeleton = null;   // { W: rounds, L: rounds, GF: node }

function buildDeSkeleton() {
  const seeded = seededTeams('playoff_seed');
  const N = Math.max(seeded.length, 2);
  const size = 1 << Math.ceil(Math.log2(N));
  const W = deWinnersSkeleton(size);
  const L = deLosersSkeleton(size);
  const wbFinal = W[W.length - 1][0];
  const lbFinal = L.length ? L[L.length - 1][0] : null;
  const GF = { pos: 'GF', feeds: ['Winner of ' + wbFinal.pos, lbFinal ? 'Winner of ' + lbFinal.pos : 'LB champion'], feedsTo: null, isGF: true };
  // WB final and LB final feed the Grand Final.
  wbFinal.feedsTo = ['GF', 0];
  if (lbFinal) lbFinal.feedsTo = ['GF', 1];
  deSkeleton = { W, L, GF };
  return deSkeleton;
}

// Flat lookup of skeleton nodes by position letter.
function deNodeByPos() {
  const idx = {};
  deSkeleton.W.forEach(r => r.forEach(n => idx[n.pos] = n));
  deSkeleton.L.forEach(r => r.forEach(n => idx[n.pos] = n));
  idx['GF'] = deSkeleton.GF;
  return idx;
}

// Matches assigned to nodes by bracket_position, oriented so slot A/B are stable.
function deAssignedByPos() {
  const byPos = {};
  matches.filter(m => m.stage === 'playoffs' && m.bracket_position).forEach(m => { byPos[m.bracket_position.trim()] = m; });
  return byPos;
}

// A node hides when it has NO team of its own AND the slot it feeds forward already
// holds a real team (agreed bye/float rule). Assignments are matches keyed by pos.
function deIsHiddenBye(pos, assignedByPos) {
  const skel = deNodeByPos()[pos];
  if (!skel || !skel.feedsTo) return false;
  const self = assignedByPos[pos];
  if (self && (self.team_a_id || self.team_b_id)) return false;         // has teams → always show
  const [destPos, destSlot] = skel.feedsTo;
  const dest = assignedByPos[destPos];
  if (!dest) return false;
  const destTeam = destSlot === 0 ? dest.team_a_id : dest.team_b_id;
  return !!destTeam;
}

// Turn a skeleton node + assigned match into a render node in the shape the existing
// renderer machinery understands (aTeam/bTeam/scores/match/posLetter/etc.).
function deResolveNode(skel, m) {
  const node = { posLetter: skel.pos, feeds: skel.feeds, isGF: !!skel.isGF,
                 aTeam: null, bTeam: null, aScore: 0, bScore: 0, aBye: false, bBye: false,
                 match: null, winnerTeam: null, resolved: false };
  if (m) {
    node.match = m;
    node.aTeam = teamById[m.team_a_id] || null;
    node.bTeam = teamById[m.team_b_id] || null;
    node.aScore = m.team_a_score || 0;
    node.bScore = m.team_b_score || 0;
    if (m.winner_team_id) { node.winnerTeam = teamById[m.winner_team_id] || null; node.resolved = true; }
  }
  return node;
}

function renderDoubleElim() {
  buildDeSkeleton();
  const assignedByPos = deAssignedByPos();

  // Winners section = winners rounds + a trailing GF column.
  const wRounds = deSkeleton.W.map(round =>
    round.map(skel => {
      const rn = deResolveNode(skel, assignedByPos[skel.pos]);
      rn._skel = skel;
      rn._hidden = deIsHiddenBye(skel.pos, assignedByPos);
      return rn;
    })
  );
  const gfNode = deResolveNode(deSkeleton.GF, assignedByPos['GF']);
  gfNode._skel = deSkeleton.GF;
  gfNode._hidden = false;

  const lRounds = deSkeleton.L.map(round =>
    round.map(skel => {
      const rn = deResolveNode(skel, assignedByPos[skel.pos]);
      rn._skel = skel;
      rn._hidden = deIsHiddenBye(skel.pos, assignedByPos);
      return rn;
    })
  );

  deRenderSection(document.getElementById('winners-mount'), wRounds, 'playoffs', gfNode);
  deRenderSection(document.getElementById('losers-mount'), lRounds, 'playoffs', null);
}

// Render one described section. Reuses nodeRowHtml / expandedCardHtml / the panel.
// Positions use slide-to-child (a parent centers on its VISIBLE children); hidden
// bye nodes are skipped entirely (no box, no connector).
function deRenderSection(mount, rounds, stage, gfNode) {
  mount.innerHTML = '';
  const scroll = document.createElement('div'); scroll.className = 'bracket-scroll';
  const headers = document.createElement('div'); headers.className = 'bracket-headers';
  const inner = document.createElement('div'); inner.className = 'bracket-inner';
  const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg'); svg.setAttribute('class', 'connectors');
  inner.appendChild(svg);

  // Columns: one per round, plus a trailing GF column if provided.
  const nCols = rounds.length + (gfNode ? 1 : 0);
  const colLeft = []; let x = 0;
  for (let r = 0; r < nCols; r++) { colLeft[r] = x; x += COL_W + COL_GAP; }

  // Expandable state (reuse existing isExpandable + expand set).
  const allNodes = rounds.flat().concat(gfNode ? [gfNode] : []);
  allNodes.forEach(node => {
    node._expandable = !node._hidden && isExpandable(node);
    node._key = stage + ':' + node.posLetter;
    node._open = node._expandable && expanded.has(node._key);
    if (node._expandable) expandableKeys.push(node._key);
  });

  // Headers per round.
  const roundLabels = deRoundLabels(rounds, !!gfNode);
  rounds.forEach((round, ri) => {
    const h = document.createElement('div'); h.className = 'rhead';
    h.style.left = colLeft[ri] + 'px'; h.style.width = COL_W + 'px';
    h.textContent = roundLabels[ri];
    headers.appendChild(h);
  });
  if (gfNode) {
    const h = document.createElement('div'); h.className = 'rhead';
    h.style.left = colLeft[rounds.length] + 'px'; h.style.width = COL_W + 'px';
    h.textContent = 'Grand Final';
    headers.appendChild(h);
  }

  // Build node elements (skip hidden byes).
  const drawNode = (node, ri) => {
    if (node._hidden) return;
    const el = document.createElement('div');
    node._left = colLeft[ri]; node._w = COL_W;
    el.style.left = node._left + 'px'; el.style.width = COL_W + 'px';
    el.className = 'bnode' + (node._expandable ? ' clickable' : '') + (node._open ? ' expanded' : '') + (node.isGF ? ' gf' : '');
    if (node._open) el.innerHTML = expandedCardHtml(node);
    else {
      el.innerHTML = deNodeRowHtml(node, 'a') + deNodeRowHtml(node, 'b') + '<span class="bpos">' + node.posLetter + '</span>';
      if (node.isGF && node.match && node.match.postseason_round) {
        el.innerHTML += '<div class="gf-note">' + escapeHtml(node.match.postseason_round) + '</div>';
      }
    }
    if (node._expandable) el.onclick = () => toggleNode(node._key);
    inner.appendChild(el);
    node.el = el;
  };
  rounds.forEach((round, ri) => round.forEach(node => drawNode(node, ri)));
  if (gfNode) drawNode(gfNode, rounds.length);

  const innerW = colLeft[nCols - 1] + COL_W;
  headers.style.width = innerW + 'px';
  inner.style.width = innerW + 'px';
  scroll.appendChild(headers); scroll.appendChild(inner);
  mount.appendChild(scroll);

  // Fallbacks + vs links (reuse existing behaviors).
  mount.querySelectorAll('img[data-mon]').forEach(img => attachIconFallback(img, img.getAttribute('data-mon')));
  mount.querySelectorAll('img.bx-logo-img').forEach(img => {
    img.onerror = () => { img.onerror = null; img.parentNode.innerHTML = '<span class="bx-logo-mono">' + monogram(teamById[img.dataset.team]) + '</span>'; };
  });
  mount.querySelectorAll('.vs-link').forEach(el => { el.onclick = e => { e.stopPropagation(); openPanel(el.dataset.match); }; });

  deLayoutSection(rounds, gfNode);
  deDrawConnectors(svg, rounds, gfNode, inner, innerW);
}

// Row HTML for a described node. Unassigned slots show the feed label ("Loser of W-C").
function deNodeRowHtml(node, side) {
  const team = side === 'a' ? node.aTeam : node.bTeam;
  const score = side === 'a' ? node.aScore : node.bScore;
  const feed = node.feeds ? (side === 'a' ? node.feeds[0] : node.feeds[1]) : '';
  const isWinner = node.match && node.match.winner_team_id && team && node.match.winner_team_id === team.id;
  if (team) {
    return '<div class="bteam' + (isWinner ? ' win' : '') + '"><span class="bn">' + bracketTeamLabel(team) + '</span><span class="bsc">' + (score || 0) + '</span></div>';
  }
  return '<div class="bteam src"><span class="bn">' + escapeHtml(feed || 'TBD') + '</span><span class="bsc"></span></div>';
}

// Slide-to-child layout: round 0 stacks; each later node centers on its VISIBLE
// children (falling back to grid share when it has none rendered).
function deLayoutSection(rounds, gfNode) {
  let cursor = 0;
  const round0 = rounds[0].filter(n => !n._hidden);
  round0.forEach(node => {
    node._h = node.el.offsetHeight;
    node._top = cursor;
    node._center = cursor + node._h / 2;
    cursor += node._h + V_GAP;
  });
  const totalH0 = Math.max(cursor - V_GAP, 0);

  for (let r = 1; r < rounds.length; r++) {
    rounds[r].forEach((node, i) => {
      if (node._hidden) return;
      node._h = node.el.offsetHeight;
      // Visible children feeding this node (spine-aligned).
      const prev = rounds[r - 1];
      const kids = prev.length === rounds[r].length ? [prev[i]] : [prev[2 * i], prev[2 * i + 1]].filter(Boolean);
      const vis = kids.filter(k => !k._hidden && k._center != null);
      node._center = vis.length ? vis.reduce((s, k) => s + k._center, 0) / vis.length : totalH0 / 2;
      node._top = node._center - node._h / 2;
    });
  }
  // GF centers on the WB final (last winners round's single visible node).
  if (gfNode) {
    gfNode._h = gfNode.el.offsetHeight;
    const wbFinal = rounds[rounds.length - 1].find(n => !n._hidden);
    gfNode._center = wbFinal ? wbFinal._center : totalH0 / 2;
    gfNode._top = gfNode._center - gfNode._h / 2;
    gfNode._left = parseFloat(gfNode.el.style.left);
    gfNode._w = COL_W;
  }
  rounds.forEach(round => round.forEach(node => { if (!node._hidden) node.el.style.top = node._top + 'px'; }));
  if (gfNode) gfNode.el.style.top = gfNode._top + 'px';
}

// Connectors between visible nodes; hidden byes contribute no line.
function deDrawConnectors(svg, rounds, gfNode, inner, innerW) {
  const NS = 'http://www.w3.org/2000/svg';
  while (svg.firstChild) svg.removeChild(svg.firstChild);
  let maxBottom = 0;
  rounds.forEach(round => round.forEach(n => { if (!n._hidden) maxBottom = Math.max(maxBottom, n._top + n._h); }));
  if (gfNode) maxBottom = Math.max(maxBottom, gfNode._top + gfNode._h);
  inner.style.height = maxBottom + 'px';
  const W = innerW, H = maxBottom;
  svg.setAttribute('width', W); svg.setAttribute('height', H); svg.setAttribute('viewBox', '0 0 ' + W + ' ' + H);

  for (let r = 1; r < rounds.length; r++) {
    rounds[r].forEach((parent, i) => {
      if (parent._hidden) return;
      const prev = rounds[r - 1];
      const kids = prev.length === rounds[r].length ? [prev[i]] : [prev[2 * i], prev[2 * i + 1]].filter(Boolean);
      kids.forEach(child => {
        if (!child || child._hidden || child._left == null) return;
        const cx = child._left + child._w, cy = child._center, px = parent._left, py = parent._center, midX = cx + COL_GAP / 2;
        const path = document.createElementNS(NS, 'path');
        path.setAttribute('d', 'M ' + cx + ' ' + cy + ' H ' + midX + ' V ' + py + ' H ' + px);
        svg.appendChild(path);
      });
    });
  }
  // WB final -> GF connector.
  if (gfNode) {
    const wbFinal = rounds[rounds.length - 1].find(n => !n._hidden);
    if (wbFinal && wbFinal._left != null) {
      const cx = wbFinal._left + wbFinal._w, cy = wbFinal._center, px = gfNode._left, py = gfNode._center, midX = cx + COL_GAP / 2;
      const path = document.createElementNS(NS, 'path');
      path.setAttribute('d', 'M ' + cx + ' ' + cy + ' H ' + midX + ' V ' + py + ' H ' + px);
      svg.appendChild(path);
    }
  }
}

// Round headers for a described section: honor a consistent admin-entered
// postseason_round label if present in the round, else a generic name.
function deRoundLabels(rounds, isWinners) {
  return rounds.map((round, ri) => {
    const labels = new Set();
    round.forEach(n => { if (n.match && n.match.postseason_round) labels.add(n.match.postseason_round); });
    if (labels.size === 1) return [...labels][0];
    if (isWinners) {
      const fromEnd = rounds.length - 1 - ri;
      if (fromEnd === 0) return 'Winners Final';
      if (fromEnd === 1) return 'Winners Semifinals';
      return 'W-Round ' + (ri + 1);
    }
    const fromEnd = rounds.length - 1 - ri;
    if (fromEnd === 0) return 'Losers Final';
    if (fromEnd === 1) return 'Losers Semifinals';
    return 'L-Round ' + (ri + 1);
  });
}

function renderAll() {
  expandableKeys = [];
  const isDouble = season && season.playoff_format === 'double_elim';
  document.getElementById('single-elim-sections').hidden = isDouble;
  document.getElementById('double-elim-sections').hidden = !isDouble;
  if (isDouble) {
    renderDoubleElim();
  } else {
    drawSection(document.getElementById('playoffs-mount'), seededTeams('playoff_seed'), 'playoffs');
    drawSection(document.getElementById('cup-mount'), seededTeams('cup_seed'), 'cup');
  }
  updateToggleAll();
}

function toggleNode(key) {
  if (expanded.has(key)) expanded.delete(key); else expanded.add(key);
  renderAll();
}
function toggleAll() {
  const allOpen = expandableKeys.length && expandableKeys.every(k => expanded.has(k));
  if (allOpen) expandableKeys.forEach(k => expanded.delete(k));
  else expandableKeys.forEach(k => expanded.add(k));
  renderAll();
}
function updateToggleAll() {
  const btn = document.getElementById('toggle-all');
  btn.disabled = expandableKeys.length === 0;
  const allOpen = expandableKeys.length && expandableKeys.every(k => expanded.has(k));
  btn.textContent = allOpen ? 'Collapse all' : 'Expand all';
}

function drawSection(mount, seeded, stage) {
  mount.innerHTML = '';
  const rounds = buildBracket(seeded);
  if (!rounds) {
    mount.innerHTML = '<div class="empty-state">' +
      (seeded.length === 0 ? 'No teams have been seeded for this bracket yet.'
                           : 'Need at least two seeded teams to render a bracket.') + '</div>';
    return;
  }
  assignLetters(rounds);
  renderResolved(mount, rounds, stage);
}

function renderResolved(mount, rounds, stage) {
  resolveBracket(rounds, stage);

  const scroll = document.createElement('div'); scroll.className = 'bracket-scroll';
  const headers = document.createElement('div'); headers.className = 'bracket-headers';
  const inner = document.createElement('div'); inner.className = 'bracket-inner';
  const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg'); svg.setAttribute('class', 'connectors');
  inner.appendChild(svg);

  const total = rounds.length;

  // First pass: resolve open/expandable state and which columns contain an expanded card.
  // A bye node (auto-advanced, no real match) is hidden so its team appears to start at
  // its parent node - consistent with the double-elim float-through behavior.
  const expandedCols = new Set();
  rounds.forEach((round, ri) => round.forEach(node => {
    node._hidden = !!node.isBye;
    node._expandable = !node._hidden && isExpandable(node);
    node._key = stage + ':' + node.posLetter;
    node._open = node._expandable && expanded.has(node._key);
    if (node._expandable) expandableKeys.push(node._key);
    if (node._open) expandedCols.add(ri);
  }));

  // A column widens to EXP_W only when it holds an expanded card; later columns shift right to follow.
  const colW = rounds.map((_, ri) => (expandedCols.has(ri) ? EXP_W : COL_W));
  const colLeft = []; let x = 0;
  for (let r = 0; r < total; r++) { colLeft[r] = x; x += colW[r] + COL_GAP; }
  const innerW = colLeft[total - 1] + colW[total - 1];

  rounds.forEach((round, ri) => {
    const h = document.createElement('div'); h.className = 'rhead';
    h.style.left = colLeft[ri] + 'px';
    h.style.width = colW[ri] + 'px';
    h.textContent = roundHeader(round, ri, total);
    headers.appendChild(h);
  });

  rounds.forEach((round, ri) => {
    round.forEach(node => {
      node._left = colLeft[ri]; node._w = colW[ri];
      if (node._hidden) return;   // bye: no box drawn; team floats to its parent node
      const el = document.createElement('div');
      el.style.left = node._left + 'px';
      el.style.width = node._w + 'px';
      el.className = 'bnode' + (node._expandable ? ' clickable' : '') + (node._open ? ' expanded' : '');
      if (node._open) el.innerHTML = expandedCardHtml(node);
      else el.innerHTML = nodeRowHtml(node, 'a') + nodeRowHtml(node, 'b') + '<span class="bpos">' + node.posLetter + '</span>';
      if (node._expandable) el.onclick = () => toggleNode(node._key);
      inner.appendChild(el);
      node.el = el;
    });
  });

  headers.style.width = innerW + 'px';
  inner.style.width = innerW + 'px';
  scroll.appendChild(headers); scroll.appendChild(inner);
  mount.appendChild(scroll);

  // Sprite/logo fallbacks for any expanded cards.
  mount.querySelectorAll('img[data-mon]').forEach(img => attachIconFallback(img, img.getAttribute('data-mon')));
  mount.querySelectorAll('img.bx-logo-img').forEach(img => {
    img.onerror = () => { img.onerror = null; img.parentNode.innerHTML = '<span class="bx-logo-mono">' + monogram(teamById[img.dataset.team]) + '</span>'; };
  });
  // "vs" opens the match panel without collapsing the card.
  mount.querySelectorAll('.vs-link').forEach(el => {
    el.onclick = e => { e.stopPropagation(); openPanel(el.dataset.match); };
  });

  layoutBracket(rounds);
  const champ = renderChampion(rounds, inner);
  sizeInner(rounds, inner, innerW, champ);
  drawConnectors(svg, rounds);
}

// Re-render on resize (cheap rebuild; keeps node measurements honest if wrapping changes).
let resizeTimer = null;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => { if (!document.getElementById('layout').hidden) renderAll(); }, 150);
});

function showToast(msg, kind) {
  const t = document.createElement('div'); t.className = 'toast' + (kind ? ' ' + kind : ''); t.textContent = msg;
  document.getElementById('toast-container').appendChild(t);
  setTimeout(() => { t.style.transition = 'opacity .3s'; t.style.opacity = '0'; setTimeout(() => t.remove(), 300); }, 3400);
}

// Reuses the Supabase session shared across the hub (same origin); no login UI here.
async function detectAdmin() {
  // Admin status comes from the shared nav (nav.js owns the session).
  const { isAdmin: a } = await ((window.SBLNav && window.SBLNav.ready) || Promise.resolve({ isAdmin: false }));
  isAdmin = !!a;
}

async function init() {
  const banner = document.getElementById('boot-banner');
  try {
    const { data: seasonRow, error: seasonErr } = await (async () => {
      const slug = new URLSearchParams(location.search).get('season');
      if (slug) {
        const bySlug = await sb.from('seasons').select('*').eq('slug', slug).maybeSingle();
        if (bySlug.error) return bySlug;
        if (bySlug.data) return bySlug;
      }
      return await sb.from('seasons').select('*').eq('is_current', true).maybeSingle();
    })();
    if (seasonErr) throw seasonErr;
    if (!seasonRow) throw new Error('No current season found.');
    season = seasonRow;

    // Visibility gate: hidden from the public until published; admins can always preview.
    const published = !!season.postseason_published;
    await detectAdmin();
    if (!published && !isAdmin) {
      banner.className = 'banner';
      banner.textContent = 'The postseason hasn\u2019t started yet - check back when the brackets go live.';
      banner.hidden = false;
      return;
    }

    const pjPromise = fetch(POKEMON_JSON_URL).then(r => r.ok ? r.json() : Promise.reject(new Error('pokemon.json ' + r.status)));

    const [teamsRes, matchRes] = await Promise.all([
      sb.from('teams').select('id, name, slug, logo_url, playoff_seed, cup_seed').eq('season_id', season.id),
      sb.from('matches').select('id, stage, week, postseason_round, bracket_position, series_length, team_a_id, team_b_id, team_a_score, team_b_score, match_date, winner_team_id')
        .eq('season_id', season.id).in('stage', ['playoffs', 'cup']),
    ]);
    for (const r of [teamsRes, matchRes]) if (r.error) throw r.error;
    // Unfiltered all-seasons table -> paginate past the 1000-row cap.
    const ownersAll = await fetchAll('team_owners', 'team_id, started_week, ended_week, players(display_name)');

    teams = teamsRes.data || [];
    teams.forEach(t => { teamById[t.id] = t; });
    const teamIds = new Set(teams.map(t => t.id));
    ownersAll.filter(o => teamIds.has(o.team_id) && o.players).forEach(o => {
      (ownersByTeam[o.team_id] = ownersByTeam[o.team_id] || []).push({ started_week: o.started_week || 1, ended_week: o.ended_week, name: o.players.display_name });
    });
    Object.values(ownersByTeam).forEach(list => list.sort((a, b) => a.started_week - b.started_week));
    matches = matchRes.data || [];
    matches.forEach(m => { matchById[m.id] = m; });

    // Rosters for bracket teams + brought-sets for postseason matches (small, scoped data -> instant expand).
    const seededIds = teams.filter(t => t.playoff_seed != null || t.cup_seed != null).map(t => t.id);
    const matchIds = matches.map(m => m.id);
    const [tpRows, mpRes] = await Promise.all([
      seededIds.length ? fetchAllIn('team_pokemon', 'team_id, pokemon_id, acquired_week, released_week, draft_pick_number', 'team_id', seededIds) : Promise.resolve([]),
      matchIds.length ? sb.from('match_pokemon').select('match_id, team_id, pokemon_id').in('match_id', matchIds) : Promise.resolve({ data: [] }),
    ]);
    if (mpRes.error) throw mpRes.error;
    (tpRows || []).forEach(r => { (rosterByTeam[r.team_id] = rosterByTeam[r.team_id] || []).push(r); });
    (mpRes.data || []).forEach(r => { const k = r.match_id + '|' + r.team_id; (broughtMap[k] = broughtMap[k] || new Set()).add(r.pokemon_id); });

    try {
      const pj = await pjPromise;
      const arr = Array.isArray(pj) ? pj : (pj.pokemon || []);
      arr.forEach(p => { pokemonById[p.id] = p; });
    } catch (e) { console.error('pokemon.json:', e); showToast('Pokémon data didn\u2019t load - names/icons may be missing.', 'err'); }

    document.getElementById('season-sub').textContent = season.name;
    if (!season.postseason_published && isAdmin) document.getElementById('preview-note').hidden = false;
    banner.hidden = true;
    document.getElementById('layout').hidden = false;
    renderAll();
    patchStaticSeasonLinks();
  } catch (err) {
    console.error(err);
    banner.className = 'banner err';
    banner.textContent = 'Could not load the postseason page: ' + (err.message || err);
  }
}
init();
</script>
