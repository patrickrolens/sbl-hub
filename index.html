<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SBL Hub - Seasons</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
/* ─── TOKENS (shared verbatim with the rest of the hub) ─── */
:root {
  --bg:#0f1117; --bg2:#1a1d27; --bg3:#22263a; --border:#2e3248;
  --text:#e8eaf6; --text2:#9095b8; --text3:#5a5f80;
  --accent:#7c6ff7; --red:#e05555; --green:#4caf7d; --blue:#60a5fa; --yellow:#f0c060;
  --silver:#c2c7d6;
  --nav-h: 49px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 13px; }
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
a { color: inherit; }

/* ─── PAGE SHELL ─── */
.wrap { max-width: 1100px; margin: 0 auto; padding: 22px 16px 60px; }

/* ─── MASTHEAD ─── */
.masthead { display: flex; align-items: flex-end; justify-content: space-between; gap: 16px; flex-wrap: wrap; margin-bottom: 6px; }
.masthead h1 { font-size: 26px; font-weight: 800; letter-spacing: -.3px; line-height: 1.1; }
.masthead .sub { font-size: 13px; color: var(--text2); margin-top: 4px; }
.masthead .meta { font-size: 11px; color: var(--text3); white-space: nowrap; }
.rule { height: 1px; background: var(--border); margin: 16px 0 22px; }

.sec-label { font-size: 11px; font-weight: 700; letter-spacing: .6px; text-transform: uppercase; color: var(--text3); margin: 0 0 12px; }

/* ─── CURRENT SEASON: spotlight ─── */
.spotlight {
  position: relative; border: 1px solid var(--border); border-radius: 14px; overflow: hidden;
  background: var(--bg2); margin-bottom: 30px;
  display: flex; align-items: stretch;
}
.spotlight .art { position: relative; flex: 1 1 54%; min-width: 0; min-height: 240px; overflow: hidden; background: var(--bg3); }
.spotlight .art img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; display: block; }
.spotlight .art.logo { background: var(--bg2); }
.spotlight .art.logo img { object-fit: contain; padding: 28px; }
.spotlight .art.logo::after { display: none; }
.spotlight .art .fallback { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 48px; font-weight: 800; letter-spacing: 3px; color: var(--accent); opacity: .5; }
.spotlight .art::after { content: ""; position: absolute; inset: 0; background: linear-gradient(90deg, transparent 50%, var(--bg2) 99%); pointer-events: none; }
.spotlight .body { flex: 1 1 46%; min-width: 0; padding: 24px 26px; display: flex; flex-direction: column; }
.status-badge { display: inline-flex; align-items: center; gap: 7px; font-size: 10px; font-weight: 800; letter-spacing: .8px; text-transform: uppercase; margin-bottom: 12px; }
.status-badge .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.spotlight h2 { font-size: 30px; font-weight: 800; line-height: 1.08; letter-spacing: -.4px; margin-bottom: 8px; }
.spotlight .fmt { font-size: 13px; color: var(--text2); margin-bottom: 18px; }
.facts { display: flex; gap: 26px; margin-bottom: 22px; flex-wrap: wrap; }
.fact .k { font-size: 9px; font-weight: 700; letter-spacing: .5px; text-transform: uppercase; color: var(--text3); margin-bottom: 3px; }
.fact .v { font-size: 17px; font-weight: 700; }
.cta-row { display: flex; gap: 9px; flex-wrap: wrap; margin-top: auto; }
.cta { background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 12px; font-weight: 600; padding: 9px 15px; text-decoration: none; transition: border-color .12s, color .12s; }
.cta:hover { border-color: var(--accent); color: var(--accent); }
.cta.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
.cta.primary:hover { filter: brightness(1.08); color: #fff; }
.cta.gold { border-color: var(--yellow); color: var(--yellow); }
.cta.gold:hover { filter: brightness(1.1); }

/* ─── ARCHIVE GRID ─── */
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(252px, 1fr)); gap: 14px; }
.scard { position: relative; border: 1px solid var(--border); border-radius: 12px; overflow: hidden; background: var(--bg2); text-decoration: none; color: inherit; display: flex; flex-direction: column; transition: border-color .12s, transform .12s; }
.scard:hover { border-color: var(--accent); transform: translateY(-2px); }
.scard .art { position: relative; aspect-ratio: 2.04 / 1; overflow: hidden; background: var(--bg3); }
.scard .art img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; display: block; }
.scard .art .fallback { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 26px; font-weight: 800; letter-spacing: 2px; color: var(--accent); opacity: .4; }
.scard .body { padding: 13px 14px 14px; display: flex; flex-direction: column; gap: 10px; flex: 1; }
.scard .nm { font-size: 15px; font-weight: 700; line-height: 1.2; }
.scard .rows { display: flex; flex-direction: column; gap: 5px; }
.scard .row { display: flex; justify-content: space-between; gap: 10px; font-size: 11px; }
.scard .row .lk { color: var(--text3); } .scard .row .lv { color: var(--text2); }
.scard .row .right { text-align: right; }
.scard .results { margin-top: auto; padding-top: 10px; border-top: 1px solid var(--border); display: flex; flex-direction: column; gap: 3px; }
.scard .champ { font-size: 12px; }
.scard .champ .lbl { color: var(--yellow); font-weight: 700; }
.scard .champ .who { font-weight: 600; }
.scard .runner { font-size: 11px; }
.scard .runner .lbl { color: var(--silver); font-weight: 700; }
.scard .runner .who { color: var(--text2); }
.scard .none { font-size: 11px; color: var(--text3); font-style: italic; }

.empty { color: var(--text3); font-size: 13px; font-style: italic; padding: 30px 2px; text-align: center; }
.err { color: #ff9c9c; font-size: 13px; padding: 16px; border: 1px solid rgba(224,85,85,.4); border-radius: 8px; background: rgba(224,85,85,.07); }

@media (max-width: 720px) {
  .spotlight { flex-direction: column; }
  .spotlight .art { flex: none; min-height: 150px; }
  .spotlight .art::after { background: linear-gradient(180deg, transparent 55%, var(--bg2) 99%); }
  .spotlight h2 { font-size: 24px; }
}
</style>
</head>
<body>

<script src="/nav.js?v=20260618"></script>

<div class="wrap">
  <div class="masthead">
    <div>
      <h1>Springfield Battle League</h1>
      <div class="sub">A 20-player Pokémon VGC draft league. Pick a season to explore.</div>
    </div>
    <div class="meta" id="meta"></div>
  </div>
  <div class="rule"></div>

  <div id="content">
    <div class="empty">Loading seasons…</div>
  </div>
</div>

<script>
// nav.js owns the shared Supabase client as window.sb. Fall back to a local
// client if this page is ever loaded without the nav (defensive only).
const SUPABASE_URL  = "https://arypbyzeppbpbursmzcs.supabase.co";
const SUPABASE_ANON = "sb_publishable_U8J3pV_KgomrWhbgoGBSUg_ttQ4d46m";
const ASSET_BASE    = "/assets/";

const esc = s => String(s == null ? "" : s).replace(/[&<>"']/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c]));

// ── Link builder: current season → bare URL; past season → ?season=slug ──
function link(page, season) {
  return season.is_current ? page : page + "?season=" + encodeURIComponent(season.slug);
}

// ── Date formatting (full date, e.g. "Jan 14, 2025") ──
function fmtDate(d) {
  if (!d) return "-";
  // Treat a bare YYYY-MM-DD as a local date (avoid UTC-shift to the previous day).
  const dt = /^\d{4}-\d{2}-\d{2}$/.test(d) ? new Date(d + "T00:00:00") : new Date(d);
  if (isNaN(dt)) return "-";
  return dt.toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" });
}

// ── Current-season state → status badge {text, color} ──
// Draft pending/in-progress dominate; otherwise regular-season week, or postseason.
function deriveStatus(season, draft, regMatches) {
  const C = { green: "var(--green)", amber: "var(--yellow)", blue: "var(--blue)", yellow: "var(--yellow)" };
  const dStatus = draft ? draft.status : "pending";

  if (dStatus === "pending") {
    const when = draft && draft.draft_date ? " · " + fmtDate(draft.draft_date) : "";
    return { text: "Draft Day Pending" + when, color: C.amber };
  }
  if (dStatus === "in_progress") {
    return { text: "Drafting in Progress", color: C.amber };
  }

  // Draft complete. If postseason is published/active, say so.
  if (season.postseason_published) {
    return { text: "Postseason", color: C.yellow };
  }

  // Otherwise show the active regular-season week: the highest week with a
  // played match, falling back to the lowest scheduled-but-unplayed week.
  const played = regMatches.filter(m => m.winner_team_id).map(m => m.week || 0);
  const scheduled = regMatches.map(m => m.week || 0);
  let week = 0;
  if (played.length) week = Math.max(...played);
  else if (scheduled.length) week = Math.min(...scheduled.filter(w => w > 0));
  if (week > 0) return { text: "Regular Season · Week " + week, color: C.green };
  return { text: "Season Underway", color: C.green };
}

// ── Champion / runner-up from the playoffs final ──
// The final is the resolved playoffs match at the highest week. Its winner is
// champion; the other side is runner-up.
function deriveResult(playoffs, teamName) {
  const resolved = playoffs.filter(m => m.winner_team_id);
  if (!resolved.length) return { champ: null, runner: null };
  const maxWeek = Math.max(...resolved.map(m => m.week || 0));
  const final = resolved
    .filter(m => (m.week || 0) === maxWeek)
    .sort((a, b) =>
      ((b.team_a_score || 0) + (b.team_b_score || 0)) -
      ((a.team_a_score || 0) + (a.team_b_score || 0))
    )[0];
  if (!final) return { champ: null, runner: null };
  const loserId = final.winner_team_id === final.team_a_id ? final.team_b_id : final.team_a_id;
  return { champ: teamName[final.winner_team_id] || null, runner: teamName[loserId] || null };
}

async function load() {
  const content = document.getElementById("content");
  const sb = window.sb || supabase.createClient(SUPABASE_URL, SUPABASE_ANON);
  try {
    const { data: seasons, error: sErr } = await sb.from("seasons")
      .select("id, slug, name, vgc_format, team_size, started_at, ended_at, is_current, postseason_published")
      .order("slug", { ascending: false });
    if (sErr) throw sErr;
    if (!seasons || !seasons.length) { content.innerHTML = '<div class="empty">No seasons yet.</div>'; return; }

    const seasonIds = seasons.map(s => s.id);
    const [teamsRes, matchRes, draftRes] = await Promise.all([
      sb.from("teams").select("id, name, season_id").in("season_id", seasonIds),
      sb.from("matches").select("season_id, week, stage, team_a_id, team_b_id, team_a_score, team_b_score, winner_team_id")
        .in("season_id", seasonIds).in("stage", ["regular", "playoffs"]),
      sb.from("drafts").select("season_id, status, draft_date").in("season_id", seasonIds),
    ]);
    if (teamsRes.error) throw teamsRes.error;
    if (matchRes.error) throw matchRes.error;
    if (draftRes.error) throw draftRes.error;

    const teamName = {}; (teamsRes.data || []).forEach(t => { teamName[t.id] = t.name; });

    // Bucket matches and drafts by season.
    const playoffsBy = {}, regBy = {}, draftBy = {};
    seasonIds.forEach(id => { playoffsBy[id] = []; regBy[id] = []; });
    (matchRes.data || []).forEach(m => {
      if (m.stage === "playoffs") playoffsBy[m.season_id].push(m);
      else if (m.stage === "regular") regBy[m.season_id].push(m);
    });
    (draftRes.data || []).forEach(d => { draftBy[d.season_id] = d; });

    const current = seasons.find(s => s.is_current);
    const past = seasons.filter(s => !s.is_current);

    document.getElementById("meta").textContent =
      seasons.length + " season" + (seasons.length === 1 ? "" : "s") + " on record";

    let html = "";

    // ── Current season spotlight ──
    if (current) {
      const status = deriveStatus(current, draftBy[current.id], regBy[current.id]);
      const logo = ASSET_BASE + "SBL_Logo.png";
      html += '<div class="sec-label">Current season</div>';
      html += '<div class="spotlight">'
            +   '<div class="art logo">'
            +     '<img src="' + logo + '" alt="" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\'">'
            +     '<div class="fallback" style="display:none">SBL</div>'
            +   '</div>'
            +   '<div class="body">'
            +     '<span class="status-badge" style="color:' + status.color + '"><span class="dot" style="background:' + status.color + ';box-shadow:0 0 6px ' + status.color + '"></span>' + esc(status.text) + '</span>'
            +     '<h2>' + esc(current.name) + '</h2>'
            +     '<div class="fmt">' + esc(current.vgc_format || "") + '</div>'
            +     '<div class="facts">'
            +       (current.team_size ? '<div class="fact"><div class="k">Teams</div><div class="v">' + esc(current.team_size) + '</div></div>' : '')
            +       '<div class="fact"><div class="k">Started</div><div class="v">' + esc(fmtDate(current.started_at)) + '</div></div>'
            +     '</div>'
            +     '<div class="cta-row">'
            +       cta("Standings", link("standings.html", current), current)
            +       cta("Draft Board", link("draft.html", current))
            +       cta("Teams", link("team.html", current))
            +       cta("Matches", link("matches.html", current))
            +       cta("Statistics", link("statistics.html", current))
            +       (current.postseason_published ? cta("Postseason", link("postseason.html", current), "gold") : "")
            +     '</div>'
            +   '</div>'
            + '</div>';
    }

    // ── Archive grid ──
    html += '<div class="sec-label">' + (current ? "Past seasons" : "Seasons") + '</div>';
    if (!past.length) {
      html += '<div class="empty">No past seasons archived yet - they\u2019ll appear here as the league grows.</div>';
    } else {
      html += '<div class="grid">';
      past.forEach(s => {
        const { champ, runner } = deriveResult(playoffsBy[s.id], teamName);
        const cover = ASSET_BASE + esc(s.slug) + ".png";
        const slugUp = esc((s.slug || "S").toUpperCase());
        html += '<a class="scard" href="' + esc(link("standings.html", s)) + '">'
              +   '<div class="art">'
              +     '<img src="' + cover + '" alt="" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\'">'
              +     '<div class="fallback" style="display:none">' + slugUp + '</div>'
              +   '</div>'
              +   '<div class="body">'
              +     '<div class="nm">' + esc(s.name) + '</div>'
              +     '<div class="rows">'
              +       row("Teams", s.team_size || "-", "Started", fmtDate(s.started_at))
              +       row("Format", s.vgc_format || "-", "Ended", fmtDate(s.ended_at))
              +     '</div>'
              +     '<div class="results">'
              +       (champ
                        ? '<div class="champ"><span class="lbl">Champion:</span> <span class="who">' + esc(champ) + '</span></div>'
                          + (runner ? '<div class="runner"><span class="lbl">Runner-up:</span> <span class="who">' + esc(runner) + '</span></div>' : '')
                        : '<div class="none">Champion not recorded</div>')
              +     '</div>'
              +   '</div>'
              + '</a>';
      });
      html += '</div>';
    }

    content.innerHTML = html;
  } catch (err) {
    console.error(err);
    content.innerHTML = '<div class="err">Could not load seasons: ' + esc(err.message || err) + '</div>';
  }
}

function cta(label, href, cls) {
  return '<a class="cta' + (cls ? " " + cls : "") + '" href="' + esc(href) + '">' + esc(label) + '</a>';
}
function row(k1, v1, k2, v2) {
  return '<div class="row">'
       +   '<span><span class="lk">' + esc(k1) + '</span> <span class="lv">' + esc(v1) + '</span></span>'
       +   '<span class="right"><span class="lk">' + esc(k2) + '</span> <span class="lv">' + esc(v2) + '</span></span>'
       + '</div>';
}

// nav.js creates window.sb synchronously on load, but guard for script order.
if (window.sb) load();
else window.addEventListener("DOMContentLoaded", load);
</script>
</body>
</html>
