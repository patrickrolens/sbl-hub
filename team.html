<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="/assets/favicon.png">
<title>SBL Hub - Team</title>

<!-- Supabase JS client (v2). Same pattern as draft.html / hello-world.html. -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<link rel="stylesheet" href="/tokens.css?v=20260709">
<style>
/* ─────────────────────────────────────────────────────────────────────────────
   TOKENS - shared verbatim with the Planner / Draft page so all hub pages match.
───────────────────────────────────────────────────────────────────────────── */
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 13px; }

::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }


/* ── TYPE BADGES ── (lifted from the Planner) ── */
.type-badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; letter-spacing: .5px; text-transform: uppercase; }
.t-Normal{background:#9199a1;color:#fff}.t-Fire{background:#e6724a;color:#fff}.t-Water{background:#539ddf;color:#fff}
.t-Grass{background:#5bbd58;color:#fff}.t-Electric{background:#f3d23b;color:#333}.t-Ice{background:#74cfc0;color:#fff}
.t-Fighting{background:#ce4069;color:#fff}.t-Poison{background:#ab6ac8;color:#fff}.t-Ground{background:#d97845;color:#fff}
.t-Flying{background:#89aae3;color:#fff}.t-Psychic{background:#f97176;color:#fff}.t-Bug{background:#90c12c;color:#fff}
.t-Rock{background:#c7b78b;color:#fff}.t-Ghost{background:#5269ac;color:#fff}.t-Dragon{background:#0b6dc3;color:#fff}
.t-Dark{background:#5a5366;color:#fff}.t-Steel{background:#5a8ea1;color:#fff}.t-Fairy{background:#ec8fe6;color:#fff}

/* ── PAGE GRID: team panel | roster | schedule ── */
.layout {
  display: grid;
  grid-template-columns: 340px minmax(0, 1fr) 320px;
  align-items: start;
  gap: 0;
}
.col { min-width: 0; }
.col-left  { border-right: 1px solid var(--border); }
.col-right { border-left: 1px solid var(--border); }
.col-main  { padding: 16px; }

/* Shared "card" surface used across the panels. */
.card {
  background: var(--bg2); border: 1px solid var(--border); border-radius: 10px;
  padding: 14px; margin: 12px;
}
.card-title {
  font-size: 11px; font-weight: 700; letter-spacing: .5px; color: var(--text3);
  text-transform: uppercase; margin-bottom: 10px;
}

/* ── IDENTITY (logo-backed overlay; mirrors the sprite-name treatment) ── */
.identity { position: relative; margin: -14px;}

/* The logo fills the overlay box. Aspect-ratio keeps it responsive across the
   340px / 320px / full-width breakpoints without a fixed height. */
.identity .logo-frame {
  position: relative; width: 100%; aspect-ratio: 16 / 9;   /* 1/1 square - change to 4/3, 16/9, etc. */
  border-radius: 12px; overflow: hidden;
  background: var(--bg3); border: 1px solid var(--border);
  cursor: pointer; outline: none;
}
.identity .logo-frame:focus-visible { box-shadow: inset 0 0 0 2px var(--accent); }
.identity .logo {
  position: absolute; inset: 0; width: 100%; height: 100%;
  object-fit: contain; display: block;   /* cover = full-bleed crop; use contain to letterbox */
}

/* Bottom scrim so light logos don't wash out the white overlay text. */
.identity .logo-frame::after {
  content: ''; position: absolute; left: 0; right: 0; bottom: 0; height: 55%;
  background: linear-gradient(transparent, rgba(0,0,0,.6)); pointer-events: none; z-index: 1;
}

/* Name + coaches pinned to the bottom band, same outline as .sprite-name. */
.identity .id-overlay {
  position: absolute; left: 0; right: 0; bottom: 0; z-index: 2;
  padding: 10px 10px 9px; text-align: center; pointer-events: none;
}
.identity .team-name {
  font-size: 20px; font-weight: 800; line-height: 1.15; color: #fff;
  text-shadow: -1.5px -1.5px 0 #000, 1.5px -1.5px 0 #000, -1.5px 1.5px 0 #000, 1.5px 1.5px 0 #000, 0 0 3px #000;
}
.coach-current {
  font-size: 13px; font-weight: 700; color: #fff; margin-top: 3px;
  text-shadow: -1.5px -1.5px 0 #000, 1.5px -1.5px 0 #000, -1.5px 1.5px 0 #000, 1.5px 1.5px 0 #000, 0 0 3px #000;
}
.coach-current .lead {
  color: #fff; opacity: .85; font-weight: 600; font-size: 11px;
  text-transform: uppercase; letter-spacing: .5px; margin-right: 4px;
}
.coach-past {
  font-size: 12px; color: #fff; opacity: .9; margin-top: 2px;
  text-shadow: -1.5px -1.5px 0 #000, 1.5px -1.5px 0 #000, -1.5px 1.5px 0 #000, 1.5px 1.5px 0 #000, 0 0 3px #000;
}

/* ── LOGO LIGHTBOX ── */
.logo-lightbox {
  position: fixed; inset: 0; z-index: 1000;
  display: flex; align-items: center; justify-content: center;
  background: rgba(0,0,0,.8); padding: 24px; cursor: zoom-out;
}
.logo-lightbox[hidden] { display: none; }
.logo-lightbox img {
  max-width: min(90vw, 640px); max-height: 90vh;
  object-fit: contain; border-radius: 12px;
  box-shadow: 0 8px 40px rgba(0,0,0,.6); cursor: default;
}

/* ── TEAM STATS ── */
.record-big { text-align: center; margin-bottom: 12px; }
.record-big .matches { font-size: 26px; font-weight: 800; color: var(--text); line-height: 1.1; }
.record-big .games   { font-size: 13px; color: var(--text2); margin-top: 2px; }
.stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.stat-box {
  background: var(--bg3); border: 1px solid var(--border); border-radius: 8px;
  padding: 8px 10px; display: flex; flex-direction: column; align-items: center; gap: 2px; text-align: center;
}
/* Team Stats cells that carry a click tooltip - same hover/press cue as the roster. */
.stat-box.has-tip, .kf-cell.has-tip { cursor: pointer; transition: background .12s; }
.stat-box.has-tip:hover, .kf-cell.has-tip:hover { background: rgba(255,255,255,.05); }
.stat-box.has-tip:active, .kf-cell.has-tip:active { background: rgba(255,255,255,.09); }
.stat-box .k { font-size: 10px; font-weight: 700; letter-spacing: .4px; color: var(--text3); text-transform: uppercase; }
.stat-box .v { font-size: 16px; font-weight: 700; color: var(--text); }
.stat-box .v.pos { color: var(--blue); }
.stat-box .v.neg { color: var(--red); }
.kf-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin-top: 8px; }
.kf-cell { text-align: center; background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; padding: 7px 4px; }
.kf-cell .k { font-size: 9px; font-weight: 700; letter-spacing: .3px; color: var(--text3); text-transform: uppercase; }
.kf-cell .v { font-size: 14px; font-weight: 700; margin-top: 2px; }

/* ── ROSTER (active member cards) - no header; Copy lives on the identity panel. ── */
.sec-identity { position: relative; }
.copy-team-btn {
  position: absolute; bottom: 2px; right: 2px; z-index: 2;
  background: var(--bg3); border: 1px solid var(--border); border-radius: 7px;
  color: var(--text2); font-size: 11px; font-weight: 600; font-family: inherit;
  padding: 5px 10px; cursor: pointer; transition: color .12s, border-color .12s;
}
.copy-team-btn:hover { color: var(--text); border-color: var(--accent); }
.copy-team-btn.copied { color: var(--green); border-color: var(--green); }
.roster-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

/* ── MEMBER CARD: 170px sprite block (left) + inline stat grid (right). The card
   border encodes the Pokémon's type(s) - set inline by JS (solid or split). ── */
.member {
  background: var(--bg2); border: 2px solid var(--border); border-radius: 10px;
  display: flex; align-items: stretch; overflow: hidden; min-height: 170px;
}

/* Sprite block - fills card height; point value + name overlaid; opens popover.
   Source art is 250×250; we render at 170 (downscale = crisp, no upscaling blur). */
.member-sprite-block {
  position: relative; width: 170px; flex-shrink: 0; align-self: stretch;
  background: var(--bg3); cursor: pointer; outline: none;
}
.member-sprite-block:focus-visible { box-shadow: inset 0 0 0 2px var(--accent); }
.member-sprite-block .slot-sprite {
  position: absolute; inset: 0; margin: auto; width: 170px; height: 170px;
  object-fit: contain; image-rendering: auto; display: block;
}
.member-sprite-block .slot-sprite.illegal-img { opacity: .3; filter: grayscale(90%); }
.sprite-pts {
  position: absolute; top: 6px; left: 8px; z-index: 2;
  font-size: 24px; font-weight: 800; color: #fff; line-height: 1;
  text-shadow: -1.5px -1.5px 0 #000, 1.5px -1.5px 0 #000, -1.5px 1.5px 0 #000, 1.5px 1.5px 0 #000, 0 0 3px #000;
}
.sprite-pts.illegal-pts { color: var(--red); }
.sprite-pts.tera-pts { color: var(--yellow); }
.sprite-name {
  position: absolute; left: 0; right: 0; bottom: 0; z-index: 2;
  padding: 8px 6px 7px; text-align: center; color: #fff; font-weight: 800; line-height: 1.05;
  text-shadow: -1.5px -1.5px 0 #000, 1.5px -1.5px 0 #000, -1.5px 1.5px 0 #000, 1.5px 1.5px 0 #000, 0 0 3px #000;
  white-space: nowrap;
}
/* Length tiers so long names (e.g. Tauros-Paldea-Combat) stay on one line within
   the 170px sprite block. */
.sprite-name { font-size: 17px; }           /* short, default */
.sprite-name.n-med  { font-size: 14px; }    /* ~11–14 chars */
.sprite-name.n-long { font-size: 12px; }    /* ~15–19 chars */
.sprite-name.n-xl   { font-size: 10px; }    /* 20+ chars */

/* Stat grid - inline "label value" cells, rows of 2 / 3 / 3, filling the height. */
.member-statgrid {
  flex: 1; min-width: 0; display: grid;
  grid-template-columns: repeat(6, 1fr);
  grid-auto-rows: 1fr; gap: 2px; padding: 2px; background: var(--border);
}
.member-statgrid .sc {
  display: flex; align-items: center; justify-content: center; gap: 8px;
  background: var(--bg2); padding: 4px 10px; min-width: 0;
}
.member-statgrid .sc.r1 { grid-column: span 3; }
.member-statgrid .sc.r2 { grid-column: span 2; }
.member-statgrid .sc.r3 { grid-column: span 2; }
.member-statgrid .sc-k { font-size: 13px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: .3px; }
.member-statgrid .sc-v { font-size: 19px; font-weight: 800; color: var(--text); font-variant-numeric: tabular-nums; }
.member-statgrid .sc-v.pos { color: var(--blue); }
.member-statgrid .sc-v.neg { color: var(--red); }
/* MB/MP/GP cells open a tooltip - signal it's tappable with a hover/press state. */
.member-statgrid .sc[data-tip] { cursor: pointer; transition: background .12s; }
.member-statgrid .sc[data-tip]:hover { background: var(--bg3); }
.member-statgrid .sc[data-tip]:active { background: var(--border); }
.member-statgrid .sc[data-tip] .sc-k { color: var(--text2); }

/* ── INACTIVE VARIANT: shorter card, icon instead of full sprite. Icons are ~40px
   native, so the block is compact and the card height drops accordingly. ── */
.member.inactive { min-height: 96px; }
.member-sprite-block.compact { width: 96px; }
.member-sprite-block.compact .slot-sprite {
  width: 96px; height: 96px; image-rendering: auto; inset: 0;
}
.member-sprite-block.compact .sprite-pts { font-size: 16px; top: 4px; left: 5px; }
.member-sprite-block.compact .sprite-name { font-size: 11px; padding: 4px; }
.member-sprite-block.compact .sprite-name.n-med  { font-size: 10px; }
.member-sprite-block.compact .sprite-name.n-long { font-size: 9px; }
.member-sprite-block.compact .sprite-name.n-xl   { font-size: 8px; }
/* Inactive stat text can be a touch smaller so it never collides at the short height. */
.member.inactive .member-statgrid .sc-v { font-size: 11px; }
.member.inactive .member-statgrid .sc-k { font-size: 11px; }

/* ── MEMBER DETAIL POPOVER (hover/tap the sprite) ── */
.member-pop {
  width: 260px; background: var(--bg2); border: 1px solid var(--accent); border-radius: 12px;
  box-shadow: 0 16px 40px rgba(0,0,0,.6); padding: 0; text-align: left;
}
.member-pop .pop-head { display: flex; align-items: center; justify-content: space-between; gap: 8px; padding: 11px 13px 9px; border-bottom: 1px solid var(--border); }
.member-pop .pop-name { font-size: 14px; font-weight: 800; }
.member-pop .pop-types { display: flex; gap: 4px; }
.member-pop .pop-type { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .4px; padding: 2px 7px; border-radius: 4px; }
.member-pop .pop-sec { padding: 9px 13px; border-bottom: 1px solid var(--border); }
.member-pop .pop-lbl { font-size: 9px; font-weight: 800; text-transform: uppercase; letter-spacing: .5px; color: var(--text3); margin-bottom: 5px; }
.member-pop .pop-row { display: flex; flex-wrap: wrap; gap: 5px; }
.member-pop .pop-ability { font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 12px; background: rgba(124,111,247,.15); color: #a89df9; border: 1px solid rgba(124,111,247,.3); }
.member-pop .pop-move { font-size: 10px; background: var(--bg3); border: 1px solid var(--border); padding: 2px 7px; border-radius: 4px; color: var(--text2); }
.member-pop .pop-dim { color: var(--text3); font-size: 11px; }
.member-pop .pop-stats { display: grid; grid-template-columns: repeat(6, 1fr); gap: 4px; }
.member-pop .pop-stat { text-align: center; background: var(--bg3); border-radius: 5px; padding: 4px 2px; }
.member-pop .pop-stat .ps-k { display: block; font-size: 8px; font-weight: 700; color: var(--text3); text-transform: uppercase; }
.member-pop .pop-stat .ps-v { display: block; font-size: 13px; font-weight: 700; margin-top: 1px; }
.member-pop .pop-bst { margin-top: 6px; font-size: 11px; color: var(--text2); text-align: right; }
.member-pop .pop-bst b { color: var(--text); font-weight: 800; }
.member-pop .pop-foot { padding: 9px 13px; font-size: 11px; color: var(--text3); }

/* ── INACTIVE SECTION - inside col-main, directly below the roster. ── */
.sec-inactive {
  padding-top: 16px;
}
.inactive-bar {
  display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
  padding: 4px 0 10px;
}
.inactive-bar .card-title { margin: 0; flex: none; }
.inactive-count { font-size: 11px; color: var(--text3); }
.inactive-toolbar { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; margin-left: auto; }
.sort-group { display: flex; gap: 3px; }
.sort-btn, .filter-btn {
  background: var(--bg3); border: 1px solid var(--border); border-radius: 6px;
  color: var(--text2); cursor: pointer; font-size: 11px; font-weight: 600;
  font-family: inherit; padding: 4px 10px; transition: color .12s, border-color .12s, background .12s;
}
.sort-btn:hover, .filter-btn:hover { color: var(--text); border-color: var(--accent); }
.sort-btn.active { color: var(--accent); border-color: var(--accent); background: rgba(124,111,247,.1); }
.filter-btn.active { color: var(--green); border-color: var(--green); background: rgba(76,175,125,.1); }
.inactive-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 8px;
}

/* Collapsible card header (Recent Transactions): centered label, arrow pinned right. */
.card-title.center { text-align: center; }
.card-title.row { position: relative; display: block; text-align: center; }
.card-title.row .expand-arrow { position: absolute; right: 0; top: 50%; transform: translateY(-50%); }
.expand-arrow { background: var(--bg3); border: 1px solid var(--border); border-radius: 6px; color: var(--text2); cursor: pointer; font-size: 11px; line-height: 1; padding: 3px 7px; }
.expand-arrow:hover { color: var(--text); border-color: var(--accent); }
.expand-arrow[hidden] { display: none; }

/* ── TRANSACTIONS ── */
.txn-list { display: flex; flex-direction: column; gap: 8px; }
.txn { background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; padding: 8px 10px; }
.txn .swap { font-size: 12px; font-weight: 600; color: var(--text); display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
.txn .swap .drop { color: var(--red); } .txn .swap .gain { color: var(--blue); }
.txn .swap img { width: 22px; height: 22px; image-rendering: pixelated; vertical-align: middle; }
.txn .with { font-size: 10px; color: var(--text3); margin-top: 4px; }

/* ── PLAYER SCHEDULE ── */
.sched-list { display: flex; flex-direction: column; gap: 8px; }
.sched-row {
  display: block; text-decoration: none; color: inherit;
  background: var(--bg3); border: 1px solid var(--border); border-left: 3px solid var(--border);
  border-radius: 8px; padding: 9px 11px; transition: border-color .15s, background .15s;
}
.sched-row:hover { border-color: var(--accent); }
.sched-row.win  { border-left-color: var(--blue); }
.sched-row.loss { border-left-color: var(--red); }
.sched-row.next { border-left-color: var(--yellow); background: rgba(240,192,96,.06); }
/* header row: Week label left, result/Next right */
.sched-top { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
.sched-wk { font-size: 10px; font-weight: 700; letter-spacing: .4px; color: var(--text3); text-transform: uppercase; }
.sched-result { font-size: 13px; font-weight: 800; font-variant-numeric: tabular-nums; }
.sched-row.win  .sched-result { color: var(--blue); }
.sched-row.loss .sched-result { color: var(--red); }
.sched-result.next { font-size: 10px; font-weight: 700; color: var(--yellow); text-transform: uppercase; letter-spacing: .4px; }
/* matchup: centered, each side on its own line so coaches never wrap under the other team */
.sched-match { display: flex; flex-direction: column; align-items: center; text-align: center; gap: 1px; margin-top: 5px; font-size: 12px; color: var(--text); line-height: 1.35; }
.sched-team { display: block; }
.sched-team.me { font-weight: 700; }
.sched-match .pl { color: var(--text2); font-weight: 400; }
.sched-match .vs { color: var(--text3); font-size: 10px; text-transform: uppercase; letter-spacing: .3px; }

/* ── EMPTY STATES ── */
.empty { font-size: 11px; color: var(--text3); font-style: italic; padding: 4px 0; }

/* ── LOADING / ERROR BANNER ── */
.banner { margin: 16px; padding: 10px 14px; border: 1px solid var(--border); border-radius: 8px; background: var(--bg2); font-size: 12px; color: var(--text2); }
.banner.err { border-color: rgba(224,85,85,.5); color: var(--red); }


/* ─────────────────────────────────────────────────────────────────────────────
   RESPONSIVE - the sketch calls for the roster to drop from 2 columns to 1 on
   narrow screens; the side panels stack under the roster before that. A proper
   mobile pass is Phase 5, so this is just the coarse breakpoints for now.
───────────────────────────────────────────────────────────────────────────── */
@media (max-width: 1180px) {
  .layout { grid-template-columns: 320px minmax(0, 1fr); }
  .col-right { grid-column: 1 / -1; border-left: none; border-top: 1px solid var(--border); }
}
@media (max-width: 820px) {
  /* Flatten the three columns so individual cards can be reordered: roster moves
     above Recent Transactions and Inactive Team Members. */
  .layout { display: flex; flex-direction: column; align-items: stretch; }
  .col-left, .col-right { display: contents; }
  .col-left { border-right: none; }
  /* Every flattened section is a full-width flex item with consistent side margins;
     the roster column drops its grid padding so its cards line up with the rest. */
  .sec-identity, .sec-stats, .sec-txns, .sec-right-sched {
    width: auto; align-self: stretch;
  }
  .col-main { padding: 0; margin: 8px; }
  .sec-identity { order: 1; } .sec-stats { order: 2; }
  .sec-roster { order: 3; } .sec-right-sched { order: 4; }
  .sec-txns { order: 5; }
  .roster-grid { grid-template-columns: 1fr; }
  /* Reclaim a little horizontal room for the cards on mobile. */
  .card { margin: 8px; }
  .inactive-grid { grid-template-columns: 1fr; }
}
@media (max-width: 460px) {
  /* Team Stats KO/Faint/Ratio/Δ row: 2×2 instead of a cramped single row of four. */
  .kf-row { grid-template-columns: 1fr 1fr; }
  /* Give the member stat grid more room on small phones so KOs/Faints stay side by
     side: trim the active sprite and the cell padding. (Icon-mode stays compact.) */
  .member-sprite-block:not(.compact) { width: 132px; }
  .member-sprite-block:not(.compact) .slot-sprite { width: 132px; height: 132px; }
  .member:not(.inactive) { min-height: 132px; }
  .member-statgrid .sc { padding: 4px 5px; gap: 4px; }
  .member-statgrid .sc-k { font-size: 11px; }
  .member-statgrid .sc-v { font-size: 16px; }
}
</style>
</head>
<body>

<script src="/nav.js?v=20260709"></script>
<script src="/utils.js?v=20260709"></script>
<script src="/tooltip.js?v=20260709"></script>

<div id="week-banner" class="sbln-week-banner" hidden></div>
<div id="boot-banner" class="banner">Loading team…</div>

<div class="layout" id="layout" hidden>

  <!-- ── LEFT: identity + stats + transactions + inactive ── -->
  <div class="col col-left">
    <div class="card sec-identity">
      <button class="copy-team-btn" id="roster-copy" onclick="copyRoster()" title="Copy this team's active roster (one Pokémon per line) for the Planner import">⧉ Copy Team</button>
      <div class="identity" id="identity"><!-- logo, name, coaches --></div>
    </div>

    <div class="card sec-stats">
      <div class="card-title center">Team Stats</div>
      <div id="team-stats"><!-- record + OW%/OOW%/deltas + KOs/Faints --></div>
    </div>

    <div class="card sec-txns">
      <div class="card-title row center">
        <span>Recent Transactions</span>
        <button class="expand-arrow" id="txn-arrow" onclick="toggleTxns()" hidden>▼</button>
      </div>
      <div id="transactions"><!-- free agency / trades --></div>
    </div>
  </div>

  <!-- ── CENTER: active member cards + inactive members ── -->

// ─────────────────────────────────────────────────────────────────────────────
// WHICH TEAM? - the hash can be the team's canonical slug or a coach name
// (current or past, slugified). On a match via a coach alias we normalize the URL
// to the canonical slug so every team has one shareable permalink.
// Collision priority: slug > current coach > past coach. A lower-priority source
// never shadows a key already claimed by a higher one.
// ─────────────────────────────────────────────────────────────────────────────
function slugify(s) {
  return String(s || '')
    .trim().toLowerCase()
    .replace(/[^a-z0-9]+/g, '-')   // non-alphanumerics → hyphen
    .replace(/^-+|-+$/g, '');      // trim leading/trailing hyphens
}

// alias key -> team.id, built once. Higher-priority sources are registered first
// and win; we never overwrite an existing key (so a real slug can't be shadowed).
let _aliasIndex = null;
function buildAliasIndex() {
  const idx = {};
  const claim = (key, teamId) => { const k = slugify(key); if (k && !(k in idx)) idx[k] = teamId; };

  // 1) canonical slugs (matched verbatim; stored as-is so slugify() can't alter them)
  allTeams.forEach(t => { if (t.slug) idx[t.slug.trim().toLowerCase()] = t.id; });
  // 2) current coaches
  allTeams.forEach(t => { const c = coachByTeam[t.id]; if (c) claim(c, t.id); });
  // 3) past coaches (from the full owner history)
  allOwners.forEach(o => { if (o.players && o.players.display_name) claim(o.players.display_name, o.team_id); });

  _aliasIndex = idx;
}

function resolveTeam() {
  if (!_aliasIndex) buildAliasIndex();
  const raw = (location.hash || '').replace(/^#/, '').trim().toLowerCase();
  if (raw) {
    // exact slug match first (preserves slugs that slugify() would alter), then alias index
    let hit = allTeams.find(t => (t.slug || '').toLowerCase() === raw);
    if (!hit) {
      const id = _aliasIndex[raw] || _aliasIndex[slugify(raw)];
      if (id) hit = allTeams.find(t => t.id === id);
    }
    if (hit) {
      // normalize the URL to the canonical slug (Option A); guard prevents loops
      const canon = (hit.slug || '').toLowerCase();
      if (canon && raw !== canon) {
        history.replaceState(null, '', location.pathname + location.search + '#' + canon);
      }
      return hit;
    }
  }
  return [...allTeams].sort((a, b) =>
    (a.initial_seed ?? 999) - (b.initial_seed ?? 999) || a.name.localeCompare(b.name)
  )[0] || null;
}

// Season-wide data that doesn't change when the viewer switches teams.

  const pjPromise = fetch(POKEMON_JSON_URL).then(async res => {
    const ct = res.headers.get('content-type') || '';
    if (!res.ok || !ct.includes('json')) {
      throw new Error('pokemon.json not found at "' + POKEMON_JSON_URL + '" (got ' + res.status + ').');

    return res.json();
  });

  season = await resolveSeason();

  const [teamsRes, tiersRes, regMatchRes] = await Promise.all([
    sb.from('teams').select('id,name,slug,logo_url,initial_seed').eq('season_id', season.id),
    sb.from('season_pokemon_tiers').select('pokemon_id, point_cost, tera_point_cost').eq('season_id', season.id),
    sb.from('matches').select('team_a_id, team_b_id, winner_team_id, week, stage').eq('season_id', season.id).eq('stage', 'regular'),
  ]);
  for (const r of [teamsRes, tiersRes, regMatchRes]) if (r.error) throw r.error;
  // Unfiltered all-seasons table → paginate past the 1000-row cap.
  const ownersAll = await fetchAll('team_owners', 'team_id, started_week, ended_week, players(display_name)');

  allTeams = teamsRes.data || [];
  const teamIds = allTeams.map(t => t.id);

  tierCost = {}; teraCost = {};
  (tiersRes.data || []).forEach(t => { tierCost[t.pokemon_id] = t.point_cost; teraCost[t.pokemon_id] = t.tera_point_cost; });

  // Keep every owner row (for per-team history) and derive each team's current coach.
  allOwners = ownersAll.filter(o => teamIds.includes(o.team_id));
  coachByTeam = {};
  allOwners.filter(o => o.ended_week == null).forEach(o => {
    if (o.players) coachByTeam[o.team_id] = o.players.display_name;
  });

  // Owner stints (for coach-as-of-week labels on the schedule/transaction feed).
  ownersByTeam = {};
  allOwners.filter(o => o.players).forEach(o => {
    (ownersByTeam[o.team_id] = ownersByTeam[o.team_id] || []).push({ started_week: o.started_week || 1, ended_week: o.ended_week, name: o.players.display_name });
  });
  Object.values(ownersByTeam).forEach(list => list.sort((a, b) => a.started_week - b.started_week));
  coachAtWeek = makeCoachAtWeek(ownersByTeam);

  // Week cap (?week=N): the nav's Week Selector caps every query on this page at a
  // chosen week (see utils.js).
  weekCap = resolveWeekCap();
  let regMatches;
  ({ filtered: regMatches, trueMaxWeek } = applyWeekCap(regMatchRes.data || [], weekCap));
  updateWeekBanner(weekCap, trueMaxWeek);

  // Season-wide regular-season records + opponent map, used for OW% / OOW%.
  regularRecords = computeRegularRecords(regMatches, teamIds);
  regularOpponents = {};
  teamIds.forEach(id => { regularOpponents[id] = []; });
  regMatches.forEach(m => {
    if (regularOpponents[m.team_a_id]) regularOpponents[m.team_a_id].push(m.team_b_id);
    if (regularOpponents[m.team_b_id]) regularOpponents[m.team_b_id].push(m.team_a_id);
  });

  const pj = await pjPromise;
  const arr = Array.isArray(pj) ? pj : pj.pokemon;
  pokemonById = {};
  arr.forEach(p => { pokemonById[p.id] = p; });
}

// Per-team W/L and win rate across the regular season (decided matches only).
function computeRegularRecords(regMatches, teamIds) {
  const rec = {};
  teamIds.forEach(id => { rec[id] = { w: 0, l: 0 }; });
  regMatches.forEach(m => {
    if (!m.winner_team_id) return;
    [m.team_a_id, m.team_b_id].forEach(tid => {
      if (!rec[tid]) return;
      if (tid === m.winner_team_id) rec[tid].w++; else rec[tid].l++;
    });
  });
  Object.values(rec).forEach(r => {
    const dec = r.w + r.l;
    r.winRate = dec > 0 ? r.w / dec : null;
  });
  return rec;
}

function buildTransactions(faMoves, trades) {
  const feed = [];
  // Week-1 moves are 48-hour swap-period corrections, not real in-season transactions; hide them.
  faMoves.filter(m => m.effective_week !== 1).forEach(m => feed.push({
    kind: 'fa', week: m.effective_week, when: m.occurred_at,
    added: m.pokemon_added_id, dropped: m.pokemon_dropped_id, withLabel: 'Free Agency',
  }));
  trades.filter(t => t.effective_week !== 1).forEach(t => {
    const weGiveUp = t.team_a_id === team.id ? t.pokemon_a_id : t.pokemon_b_id;
    const weGet    = t.team_a_id === team.id ? t.pokemon_b_id : t.pokemon_a_id;
    const otherId  = t.team_a_id === team.id ? t.team_b_id : t.team_a_id;
    const other      = allTeams.find(x => x.id === otherId);
    const otherCoach = other ? coachAtWeek(otherId, t.effective_week) : null;
    const withName   = other ? other.name + (otherCoach ? ' (' + otherCoach + ')' : '') : 'another team';
    feed.push({ kind: 'trade', week: t.effective_week, when: t.occurred_at, added: weGet, dropped: weGiveUp, withLabel: withName });
  });
  const capped = weekCap == null ? feed : feed.filter(x => (x.week || 0) <= weekCap);
  return capped.sort((a, b) => (b.week || 0) - (a.week || 0) || String(b.when).localeCompare(String(a.when)));
}

// ─────────────────────────────────────────────────────────────────────────────
// STAT AGGREGATION - all derive from the loaded arrays. With no game data these
// return zeros / nulls, which the renderers turn into "0", "-", or "+0".
// ─────────────────────────────────────────────────────────────────────────────
function teamMatchRecord() {
  let w = 0, l = 0, gw = 0, gl = 0;
  matches.filter(m => m.stage === 'regular').forEach(m => {
    const isA  = m.team_a_id === team.id;
    const my   = isA ? m.team_a_score : m.team_b_score;
    const opp  = isA ? m.team_b_score : m.team_a_score;
    gw += my || 0; gl += opp || 0;
    if (m.winner_team_id === team.id) w++;
    else if (m.winner_team_id) l++;
  });
  return { w, l, gw, gl };
}

function teamKoFaint() {
  let kos = 0, faints = 0;
  statRows.forEach(s => { kos += s.kills || 0; faints += s.deaths || 0; });
  return { kos, faints };
}

// OW% (opponents' win percentage): average regular-season win rate of opponents faced.
// OOW%: average win rate of those opponents' opponents (matches standings.html).
function opponentsWinPct() {
  const myOpponents = regularOpponents[team.id] || [];
  if (!myOpponents.length) return { owp: null, oowp: null };

  const rateOf = id => (regularRecords[id] ? regularRecords[id].winRate : null);
  const avg = arr => { const v = arr.filter(x => x != null); return v.length ? v.reduce((a, b) => a + b, 0) / v.length : null; };

  const owp = avg(myOpponents.map(rateOf));

  // Second degree: win rate of every opponent's opponents.
  const second = [];
  myOpponents.forEach(o => (regularOpponents[o] || []).forEach(oo => second.push(rateOf(oo))));
  const oowp = avg(second);

  return { owp, oowp };
}

function fmtRate(r) { return r == null ? '-' : (r * 100).toFixed(0) + '%'; }

// ─────────────────────────────────────────────────────────────────────────────
// FORM TOGGLES - ported from the Planner. A Mega/Primal entry (has baseForm) shows
// its Mega by default and can flip to the base form; a base entry with an altForm
// can flip to that alt. Display-only here, so toggling just re-renders the cards.
// ─────────────────────────────────────────────────────────────────────────────
function getDisplayMon(mon) {
  if (!mon) return mon;
  if (mon.baseForm && megaBaseActive.has(mon.id)) {
    const base = pokemonById[mon.baseForm];
    if (base) return Object.assign({}, base);
  }
  if (!mon.altForm || !altFormActive.has(mon.id)) return mon;
  return Object.assign({}, mon, {
    name: mon.altForm.name,
    type1: mon.altForm.type1,
    type2: mon.altForm.type2,
    stats: mon.altForm.stats,
    id: mon.altForm.spriteId || mon.id,
  });
}
function toggleAltForm(id) {
  altFormActive.has(id) ? altFormActive.delete(id) : altFormActive.add(id);
  renderRoster(); renderInactive();
}
function toggleMegaBase(id) {
  megaBaseActive.has(id) ? megaBaseActive.delete(id) : megaBaseActive.add(id);
  renderRoster(); renderInactive();
}

  if (past.length) {
    const p = document.createElement('div');
    p.className = 'coach-past';
    p.textContent = 'Formerly: ' + past.join(', ');
    overlay.appendChild(p);
  }

  frame.appendChild(overlay);
  el.appendChild(frame);

  // Click (or Enter/Space) opens the lightbox with whatever the logo resolved to,
  // unless it's the Pokéball placeholder data URI.
  function openLogoLightbox() {
    if (logo.src.startsWith('data:')) return;
    document.getElementById('logo-lightbox-img').src = logo.src;
    document.getElementById('logo-lightbox').hidden = false;
  }
  frame.addEventListener('click', openLogoLightbox);
  frame.addEventListener('keydown', e => {
    if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); openLogoLightbox(); }
  });
}

function statBox(k, v, cls, tip) {
  const t = tip ? ' data-tip-title="' + escapeHtml(k) + '" data-tip="' + escapeHtml(tip) + '"' : '';
  return '<div class="stat-box' + (tip ? ' has-tip' : '') + '"' + t + '><span class="k">' + k + '</span><span class="v ' + (cls || '') + '">' + v + '</span></div>';
}
function kfCell(k, v, cls, tip) {
  const t = tip ? ' data-tip-title="' + escapeHtml(k) + '" data-tip="' + escapeHtml(tip) + '"' : '';
  return '<div class="kf-cell' + (tip ? ' has-tip' : '') + '"' + t + '><div class="k">' + k + '</div><div class="v ' + (cls || '') + '">' + v + '</div></div>';
}

// Per-Pokémon KOs/Faints and participation, scoped to the weeks it was rostered.
function memberStats(row) {
  const aw = row.acquired_week || 1;
  const rw = row.released_week; // null = still active

  // Games/matches this team played while the mon was owned (regular + post).
  let ownedGames = 0, ownedMatches = 0, broughtMatches = 0;
  const ownedGameIds = new Set();
  matches.forEach(m => {
    const inWindow = (m.week >= aw) && (rw == null || m.week < rw);
    if (!inWindow) return;
    const gs = gamesByMatch[m.id] || [];
    if (gs.length) { ownedMatches++; gs.forEach(g => { ownedGames++; ownedGameIds.add(g.id); }); }
    // Brought = appeared in this team's match_pokemon for an owned match (regardless of play).
    if ((broughtByMatch[m.id] && broughtByMatch[m.id].has(row.pokemon_id))) broughtMatches++;
  });

  // Appearances + KOs/Faints from this mon's stat rows (only games it played).
  let kos = 0, faints = 0;
  const appearedGameIds = new Set();
  const gameToMatch = {};
  matches.forEach(m => (gamesByMatch[m.id] || []).forEach(g => { gameToMatch[g.id] = m.id; }));
  statRows.filter(s => s.pokemon_id === row.pokemon_id).forEach(s => {
    if (!ownedGameIds.has(s.game_id)) return; // ignore stats outside the owned window
    appearedGameIds.add(s.game_id);
    kos += s.kills || 0; faints += s.deaths || 0;
  });
  const appearedMatchIds = new Set([...appearedGameIds].map(gid => gameToMatch[gid]));

  const rawPct = (part, whole) => whole > 0 ? (part / whole) * 100 : null;
  return {
    kos, faints,
    kpg: appearedGameIds.size ? kos / appearedGameIds.size : null,
    gpCount: appearedGameIds.size, gpWhole: ownedGames, gpPct: pct(appearedGameIds.size, ownedGames), gpRaw: rawPct(appearedGameIds.size, ownedGames),
    mpCount: appearedMatchIds.size, mpWhole: ownedMatches, mpPct: pct(appearedMatchIds.size, ownedMatches), mpRaw: rawPct(appearedMatchIds.size, ownedMatches),
    mbCount: broughtMatches, mbWhole: ownedMatches, mbPct: pct(broughtMatches, ownedMatches), mbRaw: rawPct(broughtMatches, ownedMatches),
  };
}
// Tooltip line for a participation metric: "83.33% · 15 of 18 matches" + description.
function partTip(label, raw, count, whole, unit, desc) {
  const pctStr = raw == null ? '-' : raw.toFixed(2) + '%';
  return pctStr + ' · ' + count + ' of ' + whole + ' ' + unit + '<br>' + desc;
}

// Capitalize a lowercase type id to match the Planner's TYPE_COLORS keys.
function typeColor(t) {
  if (!t) return null;
  const key = t.charAt(0).toUpperCase() + t.slice(1).toLowerCase();
  return TEAM_TYPE_COLORS[key] || null;
}

let _cardSeq = 0;

function memberCard(row, opts) {
  opts = opts || {};
  const mon  = pokemonById[row.pokemon_id] || { id: row.pokemon_id, name: row.pokemon_id, stats: {} };
  const disp = getDisplayMon(mon);
  // Cost shown is this entry's effective price: the Tera price when this entry took
  // Tera and the season prices Tera for it, else the base price. isTeraEntry drives
  // the gold styling. Both collapse to today's behavior for non-Tera seasons/entries.
  const teraPrice = teraCost[row.pokemon_id];
  const isTeraEntry = !!row.is_tera && teraPrice != null;
  const cost = (row.pokemon_id in tierCost)
    ? (isTeraEntry ? teraPrice : tierCost[row.pokemon_id])
    : (mon.points != null ? mon.points : '-');
  const st   = memberStats(row);
  const kfDelta = st.kos - st.faints;
  const uid  = 'pop-' + (++_cardSeq);

  const card = document.createElement('div');
  card.className = 'member' + (opts.inactive ? ' inactive' : '');

  // Type-colored border. Single type → solid border. Two types → top half is the
  // first type, bottom half the second, painted as a border-box background layer so
  // the corners stay rounded (border-image would square them). Both halves are flat
  // solid colors with a hard split - no gradient blend.
  const c1 = typeColor(disp.type1), c2 = typeColor(disp.type2);
  if (c1 && c2) {
    card.style.border = '2px solid transparent';
    card.style.background =
      'linear-gradient(var(--bg2), var(--bg2)) padding-box, '
      + 'linear-gradient(to bottom, ' + c1 + ' 0 50%, ' + c2 + ' 50% 100%) border-box';
  } else if (c1) {
    card.style.borderColor = c1;
  }

  // ── SPRITE BLOCK: full 170px sprite (active) or compact icon (inactive). Point
  //    value + name overlaid; click opens the detail popover. ──
  const spriteBlock = document.createElement('div');
  spriteBlock.className = 'member-sprite-block' + (opts.inactive ? ' compact' : '');
  spriteBlock.setAttribute('data-pop-target', uid);
  spriteBlock.setAttribute('tabindex', '0');
  const imgUrl = spriteUrl(disp);
  spriteBlock.innerHTML =
      '<img loading="lazy" class="slot-sprite" src="' + imgUrl + '" alt="' + escapeHtml(disp.name) + '">'
    + '<div class="sprite-pts' + (isTeraEntry ? ' tera-pts' : '') + '"' + (isTeraEntry ? ' title="Terastallized — Tera price ' + teraPrice + ' pts (base ' + tierCost[row.pokemon_id] + ')"' : '') + '>' + cost + '</div>'
    + '<div class="sprite-name ' + nameTier(disp.name) + '">' + escapeHtml(disp.name) + '</div>';
  const imgEl = spriteBlock.querySelector('.slot-sprite');
  attachSpriteFallback(imgEl, disp);
  card.appendChild(spriteBlock);

  // ── DETAIL POPOVER (page-owned node, appended to <body> so the card's
  //    overflow:hidden border-clip doesn't crop it; tooltip.js positions it) ──
  document.body.appendChild(buildDetailPopover(uid, row, mon, disp));

  // ── STAT GRID: inline "label value" cells, rows of 2 / 3 / 3 ──
  const grid = document.createElement('div');
  grid.className = 'member-statgrid';
  grid.innerHTML =
      statCell('r1 tip', 'KOs', st.kos, '', 'The number of KOs scored by this Pokémon')
    + statCell('r1 tip', 'Faints', st.faints, '', 'The number of faints by this Pokémon')
    + statCell('r2 tip', 'K/F', kfRatio(st.kos, st.faints), '', 'The ratio of KOs to Faints by this Pokémon')
    + statCell('r2 tip', 'KFΔ', signed(kfDelta), deltaClass(kfDelta), 'The difference between the Pokémon\'s KOs and Faints')
    + statCell('r2 tip', 'KPG', fmtKpg(st.kpg), '', 'KOs per Game: The total number of KOs scored by this Pokémon divided by the total number of games in which it participated')
    + statCell('r3 tip', 'MB', st.mbPct, '', partTip('Match Bring', st.mbRaw, st.mbCount, st.mbWhole, 'matches', 'Share of available matches this Pokémon was brought in the team of 6'))
    + statCell('r3 tip', 'MP', st.mpPct, '', partTip('Match Participation', st.mpRaw, st.mpCount, st.mpWhole, 'matches', 'Share of available matches this Pokémon actually played'))
    + statCell('r3 tip', 'GP', st.gpPct, '', partTip('Game Participation', st.gpRaw, st.gpCount, st.gpWhole, 'games', 'Share of available games this Pokémon actually played'));
  card.appendChild(grid);

  return card;
}

// One inline stat cell: label left, value right. `rowCls` = r1|r2|r3 (+ optional "tip").
// Tip cells make the whole cell the tooltip trigger (click-to-toggle via tooltip.js).
function statCell(rowCls, label, value, valCls, tip) {
  const isTip = rowCls.indexOf('tip') !== -1;
  const tipAttrs = isTip ? ' data-tip-title="' + escapeHtml(label) + '" data-tip="' + escapeHtml(tip) + '"' : '';
  return '<div class="sc ' + rowCls + '"' + tipAttrs + '>'
    + '<span class="sc-k">' + label + '</span>'
    + '<span class="sc-v ' + (valCls || '') + '">' + value + '</span></div>';
}

// The hover/click detail popover content for a member: types, abilities, base
// stats, join (and drop) week, and utility moves. Markup only - positioning is
// handled by tooltip.js via the matching data-pop-target id.
function buildDetailPopover(uid, row, mon, disp) {
  const pop = document.createElement('div');
  pop.className = 'member-pop';
  pop.id = uid;

  // types
  let typesHtml = '';
  [disp.type1, disp.type2].forEach(t => {
    if (!t) return;
    const c = typeColor(t) || 'var(--bg3)';
    const dark = TEAM_TYPE_TEXT_DARK.has(t.charAt(0).toUpperCase() + t.slice(1).toLowerCase());
    typesHtml += '<span class="pop-type" style="background:' + c + ';color:' + (dark ? '#222' : '#fff') + '">' + escapeHtml(t) + '</span>';
  });

  // abilities
  const abilities = (mon.abilities || []).map(a => '<span class="pop-ability">' + escapeHtml(a) + '</span>').join('') || '<span class="pop-dim">-</span>';

  // base stats (color speed by tier, mirror the old compact row)
  let statsHtml = '';
  if (disp.stats && disp.stats.hp != null) {
    statsHtml = BAR_SK.map((k, j) => {
      const val = disp.stats[k];
      if (k === 'spe') {
        const sc = speedTierColor(val);
        return '<div class="pop-stat"><span class="ps-k">' + BAR_SL[j] + '</span><span class="ps-v" style="color:' + sc + ';font-weight:700">' + val + '</span></div>';
      }
      return '<div class="pop-stat"><span class="ps-k">' + BAR_SL[j] + '</span><span class="ps-v">' + val + '</span></div>';
    }).join('');
    statsHtml = '<div class="pop-stats">' + statsHtml + '</div>'
      + '<div class="pop-bst">BST <b>' + disp.stats.bst + '</b></div>';
  }

  // utility moves (from the drafted entry, like the Planner)
  const moves = (mon.moves || []).map(m => '<span class="pop-move">' + escapeHtml(m) + '</span>').join('') || '<span class="pop-dim">-</span>';

  // join / drop weeks
  let weeks = 'Joined Week ' + (row.acquired_week || '-');
  if (row.released_week != null) weeks += ' · Dropped Week ' + row.released_week;

  pop.innerHTML =
      '<div class="pop-head"><span class="pop-name">' + escapeHtml(disp.name) + '</span><span class="pop-types">' + typesHtml + '</span></div>'
    + '<div class="pop-sec"><div class="pop-lbl">Abilities</div><div class="pop-row">' + abilities + '</div></div>'
    + (statsHtml ? '<div class="pop-sec"><div class="pop-lbl">Base Stats</div>' + statsHtml + '</div>' : '')
    + '<div class="pop-sec"><div class="pop-lbl">Utility Moves</div><div class="pop-row">' + moves + '</div></div>'
    + '<div class="pop-foot">' + weeks + '</div>';
  return pop;
}

// Roster status "as of" the capped week - a mon dropped AFTER the capped week was
// still active at that point in time, and one acquired after it wasn't on the
// roster yet at all (excluded from both active/inactive, not just miscategorized).
// weekCap == null (live view) keeps today's exact behavior: released_week alone decides.
function rosterStatusAtWeek(row, weekCap) {
  if (weekCap == null) return row.released_week == null ? 'active' : 'inactive';
  if ((row.acquired_week || 1) > weekCap) return 'not-yet';
  return (row.released_week != null && row.released_week <= weekCap) ? 'inactive' : 'active';
}

function renderRoster() {
  const el = document.getElementById('roster');
  el.innerHTML = '';
  const active = roster
    .filter(r => rosterStatusAtWeek(r, weekCap) === 'active')
    .sort((a, b) => (a.draft_pick_number || 999) - (b.draft_pick_number || 999) || (a.acquired_week || 0) - (b.acquired_week || 0));

  if (!active.length) { el.innerHTML = '<div class="empty">No active Pokémon on this roster yet.</div>'; return; }
  active.forEach(r => el.appendChild(memberCard(r)));
  if (window.SBLTooltip) window.SBLTooltip.refresh();
}

// Name size tier by length (CSS handles the actual sizes). 170px sprite width fits
// roughly ≤10 chars at the default size, then steps down in three tiers.
function nameTier(name) {
  const n = (name || '').length;
  if (n >= 20) return 'n-xl';
  if (n >= 15) return 'n-long';
  if (n >= 11) return 'n-med';
  return '';
}

function renderInactive() {
  const el       = document.getElementById('inactive');
  const countEl  = document.getElementById('inactive-count');
  el.innerHTML   = '';

  const allInactive = roster
    .filter(r => rosterStatusAtWeek(r, weekCap) === 'inactive' && r.released_week !== 1);

  if (!allInactive.length) {
    el.innerHTML = '<div class="empty">No inactive Pokémon.</div>';
    if (countEl) countEl.textContent = '';
    return;
  }

  // Pre-compute stats so we can sort and filter before rendering.
  const withStats = allInactive.map(r => ({ row: r, st: memberStats(r) }));

  // Filter: hide mons that never appeared in a game and have zero KOs/faints.
  const displayed = inactiveShowAll
    ? withStats
    : withStats.filter(({ st }) => st.gpCount > 0 || st.kos > 0 || st.faints > 0);

  // Sort.
  const cmp = {
    'dropped':   (a, b) => (b.row.released_week || 0) - (a.row.released_week || 0),
    'most-used': (a, b) => b.st.mbCount - a.st.mbCount || b.st.gpCount - a.st.gpCount || (b.row.released_week || 0) - (a.row.released_week || 0),
    'most-kos':  (a, b) => b.st.kos - a.st.kos || b.st.faints - a.st.faints     || (b.row.released_week || 0) - (a.row.released_week || 0),
  };
  const sorted = [...displayed].sort(cmp[inactiveSortMode] || cmp['dropped']);

  // Update count label.
  if (countEl) {
    const total = allInactive.length;
    countEl.textContent = sorted.length === total
      ? total + ' inactive'
      : sorted.length + ' of ' + total + ' shown';
  }

  if (!sorted.length) {
    el.innerHTML = '<div class="empty">No inactive Pokémon with battle stats.</div>';
    return;
  }

  // Hide grid + toolbar when collapsed; update arrow direction.
  const toolbar = document.getElementById('inactive-toolbar');
  const arrow   = document.getElementById('inactive-arrow');
  if (el)      el.hidden      = !inactiveExpanded;
  if (toolbar) toolbar.hidden = !inactiveExpanded;
  if (arrow)   arrow.textContent = inactiveExpanded ? '▲' : '▼';
  if (!inactiveExpanded) return;

  sorted.forEach(({ row }) => el.appendChild(memberCard(row, { inactive: true })));
  if (window.SBLTooltip) window.SBLTooltip.refresh();
}

function setInactiveSort(mode) {
  inactiveSortMode = mode;
  document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
  const btn = document.getElementById('sort-' + mode);
  if (btn) btn.classList.add('active');
  renderInactive();
}

function toggleInactiveFilter() {
  inactiveShowAll = !inactiveShowAll;
  const btn = document.getElementById('filter-stats-btn');
  if (btn) btn.classList.toggle('active', !inactiveShowAll);
  renderInactive();
}

function toggleInactive() {
  inactiveExpanded = !inactiveExpanded;
  renderInactive();
}

function toggleTxns() { txnExpanded = !txnExpanded; renderTransactions(); }

// Copy the active roster as plain Pokémon names, one per line, for the Planner's
// import window. Uses the drafted entry's canonical name (not the alt-form view).
function copyRoster() {
  const active = roster
    .filter(r => r.released_week == null)
    .sort((a, b) => (a.draft_pick_number || 999) - (b.draft_pick_number || 999) || (a.acquired_week || 0) - (b.acquired_week || 0));
  const names = active.map(r => { const m = pokemonById[r.pokemon_id]; return m ? m.name : r.pokemon_id; });
  const text = names.join('\n\n');
  const btn = document.getElementById('roster-copy');
  const done = ok => {
    if (!btn) return;
    btn.classList.toggle('copied', ok);
    btn.textContent = ok ? '✓ Copied' : '⧉ Copy Team';
    setTimeout(() => { btn.classList.remove('copied'); btn.textContent = '⧉ Copy Team'; }, 1600);
  };
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(() => done(true)).catch(() => fallbackCopy(text, done));
  } else { fallbackCopy(text, done); }
}
function fallbackCopy(text, done) {
  try {
    const ta = document.createElement('textarea');
    ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
    document.body.appendChild(ta); ta.select();
    const ok = document.execCommand('copy');
    document.body.removeChild(ta); done(ok);
  } catch (e) { done(false); }
}

function renderTransactions() {
  const el = document.getElementById('transactions');
  const arrow = document.getElementById('txn-arrow');
  el.innerHTML = '';
  if (!txns.length) { el.innerHTML = '<div class="empty">No transactions yet.</div>'; if (arrow) arrow.hidden = true; return; }

  // Collapsed by default: show the two most recent. Arrow appears only when there
  // are more than two to reveal.
  if (arrow) { arrow.hidden = txns.length <= 2; arrow.textContent = txnExpanded ? '▲' : '▼'; }
  const shown = txnExpanded ? txns : txns.slice(0, 2);

  const list = document.createElement('div');
  list.className = 'txn-list';
  shown.forEach(t => {
    const dropped = pokemonById[t.dropped] || { id: t.dropped, name: t.dropped };
    const added   = pokemonById[t.added]   || { id: t.added,   name: t.added };
    const row = document.createElement('div');
    row.className = 'txn';
    const di = '<img loading="lazy" src="' + iconUrl(dropped) + '" alt="" title="' + escapeHtml(dropped.name) + '">';
    const ai = '<img loading="lazy" src="' + iconUrl(added)   + '" alt="" title="' + escapeHtml(added.name)   + '">';
    row.innerHTML =
      '<div class="swap"><span class="drop">' + di + ' ' + escapeHtml(dropped.name) + '</span>'
      + '<span>⇄</span><span class="gain">' + ai + ' ' + escapeHtml(added.name) + '</span></div>'
      + '<div class="with">Week ' + (t.week || '-') + ' · ' + escapeHtml(t.withLabel) + '</div>';
    list.appendChild(row);
    // onerror chains for the inline imgs
    row.querySelectorAll('img').forEach((im, i) => attachIconFallback(im, i === 0 ? dropped : added));
  });
  el.appendChild(list);
}

function renderSchedule() {
  const el = document.getElementById('schedule');
  el.innerHTML = '';
  if (!matches.length) { el.innerHTML = '<div class="empty">No matches scheduled yet.</div>'; return; }

  // The "next" match is the earliest one with no recorded winner.
  const nextId = (matches.find(m => !m.winner_team_id) || {}).id;

  const list = document.createElement('div');
  list.className = 'sched-list';
  matches.forEach(m => {
    const isA   = m.team_a_id === team.id;
    const oppId = isA ? m.team_b_id : m.team_a_id;
    const opp   = allTeams.find(x => x.id === oppId);
    const my    = isA ? m.team_a_score : m.team_b_score;
    const their = isA ? m.team_b_score : m.team_a_score;

    let cls = '';
    if (m.winner_team_id === team.id) cls = 'win';
    else if (m.winner_team_id)        cls = 'loss';
    else if (m.id === nextId)         cls = 'next';

    const myCoachName  = coachAtWeek(team.id, m.week);
    const oppCoachName = opp ? coachAtWeek(oppId, m.week) : null;
    const myCoach  = myCoachName  ? ' <span class="pl">(' + escapeHtml(myCoachName) + ')</span>'  : '';
    const oppCoach = oppCoachName ? ' <span class="pl">(' + escapeHtml(oppCoachName) + ')</span>' : '';
    const oppName  = opp ? escapeHtml(opp.name) : 'TBD';

    // Right side of the header row: final score, or the "Next" tag.
    let resultHtml = '';
    if (m.winner_team_id) resultHtml = '<span class="sched-result ' + cls + '">' + (my || 0) + ' – ' + (their || 0) + '</span>';
    else if (cls === 'next') resultHtml = '<span class="sched-result next">Next match</span>';

    const a = document.createElement('a');
    a.className = 'sched-row ' + cls;
    a.href = withSeason('matches.html#' + m.id);
    a.innerHTML =
      '<div class="sched-top">'
      +   '<span class="sched-wk">Week ' + (m.week || '-') + (m.stage !== 'regular' ? ' · ' + escapeHtml(m.stage) : '') + '</span>'
      +   resultHtml
      + '</div>'
      + '<div class="sched-match">'
      +   '<span class="sched-team me">' + escapeHtml(team.name) + myCoach + '</span>'
      +   '<span class="vs">vs</span>'
      +   '<span class="sched-team">' + oppName + oppCoach + '</span>'
      + '</div>';
    list.appendChild(a);
  });
  el.appendChild(list);
}


// ─────────────────────────────────────────────────────────────────────────────
// TEAM SELECTOR - searchable dropdown off the Teams tab. Teams listed as
// "Team Name (Coach)"; selecting one swaps the page in place and updates #slug.
// ─────────────────────────────────────────────────────────────────────────────
async function selectTeam(teamId) {
  const t = allTeams.find(x => x.id === teamId);
  if (!t || (team && t.id === team.id)) return;
  team = t;

  const banner = document.getElementById('boot-banner');
  document.getElementById('layout').hidden = true;
  banner.className = 'banner'; banner.textContent = 'Loading ' + t.name + '…'; banner.hidden = false;
  try {
    await loadTeamData();
    render();
    banner.hidden = true;
    document.getElementById('layout').hidden = false;
  } catch (err) {
    console.error(err);
    banner.className = 'banner err';
    banner.textContent = 'Could not load ' + t.name + ': ' + (err.message || err);
  }
}

// Back/forward or an edited #slug swaps teams in place (not our own hash writes).
window.addEventListener('hashchange', () => {
  const t = resolveTeam();
  if (t && (!team || t.id !== team.id)) selectTeam(t.id);
});

// ─────────────────────────────────────────────────────────────────────────────
// BOOT
// ─────────────────────────────────────────────────────────────────────────────
async function init() {
  const banner = document.getElementById('boot-banner');
  try {
    await loadGlobalData();
    team = resolveTeam();
    if (!team) throw new Error('No teams found for the current season.');
    await loadTeamData();
    render();
    banner.hidden = true;
    document.getElementById('layout').hidden = false;
    patchStaticSeasonLinks();
  } catch (err) {
    console.error(err);
    banner.className = 'banner err';
    banner.textContent = 'Could not load the team page: ' + (err.message || err);
  }
}
init();
</script>
