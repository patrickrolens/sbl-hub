<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SBL Hub — Team</title>

<!-- Supabase JS client (v2). Same pattern as draft.html / hello-world.html. -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
/* ─────────────────────────────────────────────────────────────────────────────
   TOKENS — shared verbatim with the Planner / Draft page so all hub pages match.
───────────────────────────────────────────────────────────────────────────── */
:root {
  --bg:#0f1117; --bg2:#1a1d27; --bg3:#22263a; --border:#2e3248;
  --text:#e8eaf6; --text2:#9095b8; --text3:#5a5f80;
  --accent:#7c6ff7; --red:#e05555; --green:#4caf7d; --blue:#60a5fa; --yellow:#f0c060;
  --nav-h: 49px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 13px; }

::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }


/* ── TYPE BADGES ── (lifted from the Planner) ── */
.type-badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; letter-spacing: .5px; text-transform: uppercase; }
.t-Normal{background:#9199a1;color:#fff}.t-Fire{background:#e6724a;color:#fff}.t-Water{background:#539ddf;color:#fff}
.t-Grass{background:#5bbd58;color:#fff}.t-Electric{background:#f3d23b;color:#333}.t-Ice{background:#74cfc0;color:#fff}
.t-Fighting{background:#ce4069;color:#fff}.t-Poison{background:#ab6ac8;color:#fff}.t-Ground{background:#d97845;color:#fff}
.t-Flying{background:#89aae3;color:#fff}.t-Psychic{background:#f97176;color:#fff}.t-Bug{background:#90c12c;color:#fff}
.t-Rock{background:#c7b78b;color:#fff}.t-Ghost{background:#5269ac;color:#fff}.t-Dragon{background:#0b6dc3;color:#fff}
.t-Dark{background:#5a5366;color:#fff}.t-Steel{background:#5a8ea1;color:#fff}.t-Fairy{background:#ec8fe6;color:#fff}

/* ── PAGE GRID: team panel | roster | schedule ── */
.layout {
  display: grid;
  grid-template-columns: 340px minmax(0, 1fr) 320px;
  align-items: start;
  gap: 0;
}
.col { min-width: 0; }
.col-left  { border-right: 1px solid var(--border); }
.col-right { border-left: 1px solid var(--border); }
.col-main  { padding: 16px; }

/* Shared "card" surface used across the panels. */
.card {
  background: var(--bg2); border: 1px solid var(--border); border-radius: 10px;
  padding: 14px; margin: 12px;
}
.card-title {
  font-size: 11px; font-weight: 700; letter-spacing: .5px; color: var(--text3);
  text-transform: uppercase; margin-bottom: 10px;
}

/* ── TEAM IDENTITY ── */
.identity { display: flex; flex-direction: column; align-items: center; text-align: center; gap: 8px; }
.identity .logo {
  width: 92px; height: 92px; object-fit: contain; border-radius: 12px;
  background: var(--bg3); border: 1px solid var(--border); padding: 6px;
}
.identity .team-name { font-size: 20px; font-weight: 700; line-height: 1.15; }
.coach-current { font-size: 13px; font-weight: 600; color: var(--text); }
.coach-current .lead { color: var(--text3); font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: .5px; margin-right: 4px; }
.coach-past { font-size: 12px; color: var(--text3); margin-top: 2px; }

/* ── TEAM STATS ── */
.record-big { text-align: center; margin-bottom: 12px; }
.record-big .matches { font-size: 26px; font-weight: 800; color: var(--text); line-height: 1.1; }
.record-big .games   { font-size: 13px; color: var(--text2); margin-top: 2px; }
.stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.stat-box {
  background: var(--bg3); border: 1px solid var(--border); border-radius: 8px;
  padding: 8px 10px; display: flex; flex-direction: column; gap: 2px;
}
.stat-box .k { font-size: 10px; font-weight: 700; letter-spacing: .4px; color: var(--text3); text-transform: uppercase; }
.stat-box .v { font-size: 16px; font-weight: 700; color: var(--text); }
.stat-box .v.pos { color: var(--green); }
.stat-box .v.neg { color: var(--red); }
.kf-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin-top: 8px; }
.kf-cell { text-align: center; background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; padding: 7px 4px; }
.kf-cell .k { font-size: 9px; font-weight: 700; letter-spacing: .3px; color: var(--text3); text-transform: uppercase; }
.kf-cell .v { font-size: 14px; font-weight: 700; margin-top: 2px; }

/* ── ROSTER (active member cards) ── */
.roster-head { display: flex; align-items: baseline; gap: 8px; margin-bottom: 10px; }
.roster-head h2 { font-size: 15px; font-weight: 700; }
.roster-head .sub { font-size: 11px; color: var(--text3); }
.roster-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

.member {
  background: var(--bg2); border: 1px solid var(--border); border-radius: 10px;
  padding: 12px; display: flex; gap: 12px; align-items: flex-start; flex-wrap: wrap;
}
/* Left rail — mirrors the Planner's Draft Builder .slot-left (sprite, form toggle,
   point value), with Week Joined/Dropped stacked beneath. */
.member-left { display: flex; flex-direction: column; align-items: center; flex-shrink: 0; gap: 4px; width: 72px; }
.member-left .slot-sprite { width: 72px; height: 72px; image-rendering: auto; display: block; }
.member-left .slot-sprite.illegal-img { opacity: .3; filter: grayscale(90%); }
.slot-pts-display { font-size: 20px; font-weight: 700; color: #fff; line-height: 1; }
.slot-pts-display.illegal-pts { color: var(--red); font-size: 13px; }
.slot-alt-form-btn { display: block; width: 100%; padding: 2px 4px; font-size: 9px; font-weight: 700; background: rgba(124,111,247,.15); border: 1px solid rgba(124,111,247,.35); color: var(--accent); border-radius: 3px; cursor: pointer; text-align: center; white-space: nowrap; transition: background .15s; }
.slot-alt-form-btn:hover { background: rgba(124,111,247,.28); }
.slot-alt-form-btn.active { background: rgba(124,111,247,.3); border-color: rgba(124,111,247,.65); }
.slot-alt-form-placeholder { height: 21px; }
.member-left .wk { font-size: 10px; color: var(--text3); text-align: center; line-height: 1.3; }
.member-left .wk b { color: var(--text2); font-weight: 700; }

/* Body — name, types, BST, and the compact stat row (speed color-coded), lifted
   from the Planner's slot-stats-compact so the stat presentation matches. */
.member-body { flex: 1; min-width: 130px; }
.member-name { font-size: 15px; font-weight: 700; line-height: 1.15; }
.member-types { display: flex; gap: 4px; margin-top: 5px; flex-wrap: wrap; }
.member-abilities { display: flex; gap: 4px; margin-top: 6px; flex-wrap: wrap; }
.ability-tag { font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 12px; background: rgba(124,111,247,.15); color: #a89df9; border: 1px solid rgba(124,111,247,.3); }
.slot-bst { font-size: 11px; color: var(--text3); margin-top: 6px; }
.slot-stats-compact { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 4px; }
.stat-num { font-size: 10px; color: var(--text2); }
.stat-num span { color: var(--text); font-weight: 600; }
.slot-moves { display: flex; gap: 4px; margin-top: 5px; flex-wrap: wrap; }
.move-tag { font-size: 10px; background: var(--bg3); border: 1px solid var(--border); padding: 1px 6px; border-radius: 3px; color: var(--text2); }

/* Right — KOs / Faints / K/F / KF Δ as a 2×2, with Match% / Game% as a third row;
   the participation count sits in parentheses directly beneath each percentage. */
.member-statgrid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; flex-shrink: 0; width: 134px; }
.member-statgrid .cell { text-align: center; background: var(--bg3); border: 1px solid var(--border); border-radius: 7px; padding: 6px 2px; }
.member-statgrid .cell .k { font-size: 9px; font-weight: 700; letter-spacing: .3px; color: var(--text3); text-transform: uppercase; }
.member-statgrid .cell .v { font-size: 14px; font-weight: 700; margin-top: 2px; }
.member-statgrid .cell .sub { font-size: 9px; color: var(--text3); font-weight: 600; margin-top: 1px; }
.v.pos { color: var(--green); } .v.neg { color: var(--red); }

/* ── INACTIVE MEMBERS — same card component, just stacked. ── */
.inactive-list { display: flex; flex-direction: column; gap: 12px; }

/* Collapsible card header (Recent Transactions). */
.card-title.center { text-align: center; }
.card-title.row { display: flex; align-items: center; justify-content: space-between; }
.expand-arrow { background: var(--bg3); border: 1px solid var(--border); border-radius: 6px; color: var(--text2); cursor: pointer; font-size: 11px; line-height: 1; padding: 3px 7px; }
.expand-arrow:hover { color: var(--text); border-color: var(--accent); }
.expand-arrow[hidden] { display: none; }

/* ── TRANSACTIONS ── */
.txn-list { display: flex; flex-direction: column; gap: 8px; }
.txn { background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; padding: 8px 10px; }
.txn .swap { font-size: 12px; font-weight: 600; color: var(--text); display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
.txn .swap .drop { color: var(--red); } .txn .swap .gain { color: var(--green); }
.txn .swap img { width: 22px; height: 22px; image-rendering: pixelated; vertical-align: middle; }
.txn .with { font-size: 10px; color: var(--text3); margin-top: 4px; }

/* ── PLAYER SCHEDULE ── */
.sched-list { display: flex; flex-direction: column; gap: 8px; }
.sched-row {
  display: block; text-decoration: none; color: inherit;
  background: var(--bg3); border: 1px solid var(--border); border-left: 3px solid var(--border);
  border-radius: 8px; padding: 9px 11px; transition: border-color .15s, background .15s;
}
.sched-row:hover { border-color: var(--accent); }
.sched-row.win  { border-left-color: var(--blue); }
.sched-row.loss { border-left-color: var(--red); }
.sched-row.next { border-left-color: var(--yellow); background: rgba(240,192,96,.06); }
.sched-wk { font-size: 10px; font-weight: 700; letter-spacing: .4px; color: var(--text3); text-transform: uppercase; }
.sched-match { font-size: 12px; color: var(--text); margin-top: 3px; line-height: 1.4; }
.sched-match .me  { font-weight: 700; }
.sched-match .pl  { color: var(--text3); font-weight: 400; }
.sched-match .vs  { color: var(--text3); }
.sched-score { font-size: 13px; font-weight: 700; margin-top: 4px; }
.sched-row.win  .sched-score { color: var(--blue); }
.sched-row.loss .sched-score { color: var(--red); }
.sched-tag { font-size: 10px; font-weight: 700; color: var(--yellow); text-transform: uppercase; letter-spacing: .4px; margin-top: 3px; }

/* ── EMPTY STATES ── */
.empty { font-size: 11px; color: var(--text3); font-style: italic; padding: 4px 0; }

/* ── LOADING / ERROR BANNER ── */
.banner { margin: 16px; padding: 10px 14px; border: 1px solid var(--border); border-radius: 8px; background: var(--bg2); font-size: 12px; color: var(--text2); }
.banner.err { border-color: rgba(224,85,85,.5); color: var(--red); }


/* ─────────────────────────────────────────────────────────────────────────────
   RESPONSIVE — the sketch calls for the roster to drop from 2 columns to 1 on
   narrow screens; the side panels stack under the roster before that. A proper
   mobile pass is Phase 5, so this is just the coarse breakpoints for now.
───────────────────────────────────────────────────────────────────────────── */
@media (max-width: 1180px) {
  .layout { grid-template-columns: 320px minmax(0, 1fr); }
  .col-right { grid-column: 1 / -1; border-left: none; border-top: 1px solid var(--border); }
}
@media (max-width: 820px) {
  .layout { grid-template-columns: 1fr; }
  .col-left { border-right: none; border-bottom: 1px solid var(--border); }
  .roster-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<script src="/nav.js"></script>

<div id="boot-banner" class="banner">Loading team…</div>

<div class="layout" id="layout" hidden>

  <!-- ── LEFT: identity + stats + transactions + inactive ── -->
  <div class="col col-left">
    <div class="card">
      <div class="identity" id="identity"><!-- logo, name, coaches --></div>
    </div>

    <div class="card">
      <div class="card-title center">Team Stats</div>
      <div id="team-stats"><!-- record + SoS/deltas + KOs/Faints --></div>
    </div>

    <div class="card">
      <div class="card-title row">
        <span>Recent Transactions</span>
        <button class="expand-arrow" id="txn-arrow" onclick="toggleTxns()" hidden>▼</button>
      </div>
      <div id="transactions"><!-- free agency / trades --></div>
    </div>

    <div class="card">
      <div class="card-title">Inactive Team Members</div>

    </div>
  </div>

  <!-- ── CENTER: active member cards ── -->
  <div class="col col-main">
    <div class="roster-head">
      <h2 id="roster-title">Active Roster</h2>
      <span class="sub" id="roster-sub"></span>
    </div>
    <div class="roster-grid" id="roster"><!-- member cards --></div>
  </div>

  <!-- ── RIGHT: player schedule ── -->
  <div class="col col-right">
    <div class="card">
      <div class="card-title">Player Schedule</div>
      <div id="schedule"><!-- match list --></div>
    </div>
  </div>

</div>

<!-- Reusable modal (admin login) -->

<script>
// ─────────────────────────────────────────────────────────────────────────────
// CONFIG — anon key is public by design; RLS enforces access (same as draft.html).
// ─────────────────────────────────────────────────────────────────────────────
const SUPABASE_URL      = "https://arypbyzeppbpbursmzcs.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_U8J3pV_KgomrWhbgoGBSUg_ttQ4d46m";
const sb = window.sb || supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const POKEMON_JSON_URL = "https://planner.springfieldbattleleague.com/pokemon.json";
const ASSET_BASE = POKEMON_JSON_URL.replace(/[^/]*$/, '');

const POKEBALL_FALLBACK = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 40 40'%3E%3Ccircle cx='20' cy='20' r='19' fill='%23e05555' stroke='%23333' stroke-width='1.5'/%3E%3Cpath d='M1.1 20 A19 19 0 0 0 38.9 20 Z' fill='%23fff'/%3E%3Crect x='1' y='18' width='38' height='4' fill='%23333'/%3E%3Ccircle cx='20' cy='20' r='7' fill='%23fff' stroke='%23333' stroke-width='1.5'/%3E%3Ccircle cx='20' cy='20' r='3.5' fill='%23e8eaf6' stroke='%23333' stroke-width='1'/%3E%3C/svg%3E";

// Speed-tier ramp — lifted verbatim from the Planner so card speed colors match.
const SPEED_TIERS = [
  { l: "≤30",     a: 0,   b: 30,   col: "#7c4dff" },
  { l: "31–50",   a: 31,  b: 50,   col: "#2979ff" },
  { l: "51–70",   a: 51,  b: 70,   col: "#00bcd4" },
  { l: "71–90",   a: 71,  b: 90,   col: "#4caf50" },
  { l: "91–110",  a: 91,  b: 110,  col: "#ffeb3b" },
  { l: "111–130", a: 111, b: 130,  col: "#ff9800" },
  { l: ">130",    a: 131, b: 9999, col: "#f44336" },
];
function speedTierColor(spe) {
  const t = SPEED_TIERS.find(t => spe >= t.a && spe <= t.b);
  return t ? t.col : "#f44336";
}

// Compact stat row order/labels/colors — lifted verbatim from the Planner so the
// member-card stat presentation matches the Draft Builder exactly.
const BAR_SK = ["hp", "atk", "def", "spa", "spd", "spe"];
const BAR_SL = ["HP", "Atk", "Def", "SpA", "SpD", "Spe"];
const BAR_SC = ["#e05555", "#f08040", "#f0c060", "#7c6ff7", "#539ddf", "#4caf7d"];

// ── STATE ──
let season       = null;   // current seasons row
let allTeams     = [];      // every team in the season (for opponents + transactions)
let team         = null;    // the team being rendered
let allOwners    = [];      // every team_owners row in the season
let ownerHistory = [];      // this team's team_owners rows, sorted by started_week
let coachByTeam  = {};      // team_id -> current coach display_name (any team)
let tierCost     = {};      // pokemon_id -> point_cost (this season)
let roster       = [];      // team_pokemon rows for this team (active + inactive)
let matches      = [];      // matches involving this team (any stage), by week
let gamesByMatch = {};      // match_id -> [game rows]
let statRows     = [];      // game_pokemon_stats rows for this team
let regularRecords = {};    // team_id -> { w, l, winRate } over regular season (for SoS)
let txns         = [];      // unified transaction feed (free agency + trades)
let pokemonById  = {};      // id -> pokemon.json entry
let currentUser  = null;
let isAdmin      = false;

// View-only form toggles, keyed by Pokémon id (survives nothing — purely display).
let altFormActive  = new Set();   // base entries currently showing their alt form
let megaBaseActive = new Set();   // Mega/Primal entries currently showing their base
let txnExpanded    = false;       // Recent Transactions collapsed by default

// ─────────────────────────────────────────────────────────────────────────────
// URL / ID HELPERS — mirror the Planner so sprite/icon paths resolve identically.
//   Member cards lead with the larger SPRITE (sprite → icon → Pokéball); compact
//   spots (inactive list, transactions) use the smaller ICON (icon → sprite → ball).
// ─────────────────────────────────────────────────────────────────────────────
function localId(id) {
  const m = String(id).match(/^(\d+)(.*)$/);
  if (!m) return id;
  const num = parseInt(m[1]);
  return (num >= 1000 ? String(num) : String(num).padStart(3, '0')) + m[2];
}
function iconUrl(mon)   { return mon && mon.id ? ASSET_BASE + 'icons/'   + localId(mon.id) + '.png' : ''; }
function spriteUrl(mon) { return mon && mon.id ? ASSET_BASE + 'sprites/' + localId(mon.id) + '.png' : ''; }

function attachSpriteFallback(img, mon) {
  img.onerror = function () {
    if (this.src.includes('/sprites/'))    { this.src = iconUrl(mon); }
    else                                   { this.onerror = null; this.src = POKEBALL_FALLBACK; this.style.opacity = '.5'; }
  };
}
function attachIconFallback(img, mon) {
  img.onerror = function () {
    if (this.src.includes('/icons/'))      { this.src = spriteUrl(mon); }
    else                                   { this.onerror = null; this.src = POKEBALL_FALLBACK; this.style.opacity = '.5'; }
  };
}

// ── FORMAT HELPERS ──
function signed(n) { return (n > 0 ? '+' : '') + n; }
function deltaClass(n) { return n > 0 ? 'pos' : (n < 0 ? 'neg' : ''); }
// KOs/Faints ratio: — when nothing happened, ∞ when faints are zero but KOs aren't.
function kfRatio(kos, faints) {
  if (faints === 0) return kos === 0 ? '—' : '∞';
  return (kos / faints).toFixed(2);
}
function pct(part, whole) { return whole > 0 ? Math.round((part / whole) * 100) + '%' : '—'; }
function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
}

// ─────────────────────────────────────────────────────────────────────────────
// WHICH TEAM? — the hash can be any of several aliases for a team: its canonical
// slug, its slugified full name, or its current/past coach name (slugified).
// On a match via a non-canonical alias we normalize the URL to the canonical slug
// so every team has one shareable permalink (aliases just redirect to it).
// Collision priority: slug > team name > current coach > past coach. A lower
// priority source never shadows a key already claimed by a higher one.
// ─────────────────────────────────────────────────────────────────────────────
function slugify(s) {
  return String(s || '')
    .trim().toLowerCase()
    .replace(/[^a-z0-9]+/g, '-')   // non-alphanumerics → hyphen
    .replace(/^-+|-+$/g, '');      // trim leading/trailing hyphens
}

// alias key -> team.id, built once. Higher-priority sources are registered first
// and win; we never overwrite an existing key (so a real slug can't be shadowed).
let _aliasIndex = null;
function buildAliasIndex() {
  const idx = {};
  const claim = (key, teamId) => { const k = slugify(key); if (k && !(k in idx)) idx[k] = teamId; };

  // 1) canonical slugs (also covers slugs that aren't alphanumeric-clean, matched verbatim below)
  allTeams.forEach(t => { if (t.slug) idx[t.slug.trim().toLowerCase()] = t.id; });
  // 2) slugified full names
  allTeams.forEach(t => claim(t.name, t.id));
  // 3) current coaches
  allTeams.forEach(t => { const c = coachByTeam[t.id]; if (c) claim(c, t.id); });
  // 4) past coaches (from the full owner history)
  allOwners.forEach(o => { if (o.players && o.players.display_name) claim(o.players.display_name, o.team_id); });

  _aliasIndex = idx;
}

function resolveTeam() {
  if (!_aliasIndex) buildAliasIndex();
  const raw = (location.hash || '').replace(/^#/, '').trim().toLowerCase();
  if (raw) {
    // exact slug match first (preserves slugs that slugify() would alter), then alias index
    let hit = allTeams.find(t => (t.slug || '').toLowerCase() === raw);
    if (!hit) {
      const id = _aliasIndex[raw] || _aliasIndex[slugify(raw)];
      if (id) hit = allTeams.find(t => t.id === id);
    }
    if (hit) {
      // normalize the URL to the canonical slug (Option A); guard prevents loops
      const canon = (hit.slug || '').toLowerCase();
      if (canon && raw !== canon) {
        history.replaceState(null, '', location.pathname + location.search + '#' + canon);
      }
      return hit;
    }
  }
  return [...allTeams].sort((a, b) =>
    (a.initial_seed ?? 999) - (b.initial_seed ?? 999) || a.name.localeCompare(b.name)
  )[0] || null;
}

// ─────────────────────────────────────────────────────────────────────────────
// DATA LOAD
// ─────────────────────────────────────────────────────────────────────────────
// Season-wide data that doesn't change when the viewer switches teams.
async function loadGlobalData() {
  const pjPromise = fetch(POKEMON_JSON_URL).then(async res => {
    const ct = res.headers.get('content-type') || '';
    if (!res.ok || !ct.includes('json')) {
      throw new Error('pokemon.json not found at "' + POKEMON_JSON_URL + '" (got ' + res.status + ').');
    }
    return res.json();
  });

  const { data: seasonRow, error: seasonErr } = await sb
    .from('seasons').select('*').eq('is_current', true).maybeSingle();
  if (seasonErr) throw seasonErr;
  if (!seasonRow) throw new Error('No current season found (seasons.is_current = true).');
  season = seasonRow;

  const [teamsRes, ownersRes, tiersRes, regMatchRes] = await Promise.all([
    sb.from('teams').select('id,name,slug,logo_url,initial_seed').eq('season_id', season.id),
    sb.from('team_owners').select('team_id, started_week, ended_week, players(display_name)'),
    sb.from('season_pokemon_tiers').select('pokemon_id, point_cost').eq('season_id', season.id),
    sb.from('matches').select('team_a_id, team_b_id, winner_team_id').eq('season_id', season.id).eq('stage', 'regular'),
  ]);
  for (const r of [teamsRes, ownersRes, tiersRes, regMatchRes]) if (r.error) throw r.error;

  allTeams = teamsRes.data || [];
  const teamIds = allTeams.map(t => t.id);

  tierCost = {};
  (tiersRes.data || []).forEach(t => { tierCost[t.pokemon_id] = t.point_cost; });

  // Keep every owner row (for per-team history) and derive each team's current coach.
  allOwners = (ownersRes.data || []).filter(o => teamIds.includes(o.team_id));
  coachByTeam = {};
  allOwners.filter(o => o.ended_week == null).forEach(o => {
    if (o.players) coachByTeam[o.team_id] = o.players.display_name;
  });

  // Season-wide regular-season records, used only for Strength of Schedule.
  regularRecords = computeRegularRecords(regMatchRes.data || [], teamIds);

  const pj = await pjPromise;
  const arr = Array.isArray(pj) ? pj : pj.pokemon;
  pokemonById = {};
  arr.forEach(p => { pokemonById[p.id] = p; });
}

// Everything tied to the currently-selected `team`. Re-run on team switch.
// Matches/games/stats/transactions are empty until results are entered, so these
// resolve to [] for now and the page shows placeholders.
async function loadTeamData() {
  ownerHistory = allOwners
    .filter(o => o.team_id === team.id)
    .sort((a, b) => (a.started_week || 0) - (b.started_week || 0));

  const [rosterRes, matchRes, faRes, tradeRes] = await Promise.all([
    sb.from('team_pokemon')
      .select('pokemon_id, acquired_week, released_week, acquired_via, draft_pick_number')
      .eq('team_id', team.id),
    sb.from('matches')
      .select('id, stage, week, team_a_id, team_b_id, team_a_score, team_b_score, winner_team_id, match_date')
      .eq('season_id', season.id)
      .or('team_a_id.eq.' + team.id + ',team_b_id.eq.' + team.id),
    sb.from('free_agency_moves')
      .select('pokemon_added_id, pokemon_dropped_id, effective_week, occurred_at')
      .eq('season_id', season.id).eq('team_id', team.id),
    sb.from('trades')
      .select('team_a_id, pokemon_a_id, team_b_id, pokemon_b_id, effective_week, occurred_at')
      .eq('season_id', season.id).or('team_a_id.eq.' + team.id + ',team_b_id.eq.' + team.id),
  ]);
  for (const r of [rosterRes, matchRes, faRes, tradeRes]) if (r.error) throw r.error;

  roster  = rosterRes.data || [];
  matches = (matchRes.data || []).sort((a, b) => (a.week || 0) - (b.week || 0));

  // Games + per-Pokémon stats for this team's matches (only if any matches exist).
  gamesByMatch = {}; statRows = [];
  const matchIds = matches.map(m => m.id);
  if (matchIds.length) {
    const [gamesRes, statsRes] = await Promise.all([
      sb.from('games').select('id, match_id, game_number, winner_team_id').in('match_id', matchIds),
      sb.from('game_pokemon_stats').select('game_id, pokemon_id, kills, deaths').eq('team_id', team.id),
    ]);
    for (const r of [gamesRes, statsRes]) if (r.error) throw r.error;
    (gamesRes.data || []).forEach(g => { (gamesByMatch[g.match_id] = gamesByMatch[g.match_id] || []).push(g); });
    statRows = statsRes.data || [];
  }

  // Reset per-team view state and rebuild the transaction feed.
  altFormActive.clear(); megaBaseActive.clear(); txnExpanded = false;
  txns = buildTransactions(faRes.data || [], tradeRes.data || []);
}

// Per-team W/L and win rate across the regular season (decided matches only).
function computeRegularRecords(regMatches, teamIds) {
  const rec = {};
  teamIds.forEach(id => { rec[id] = { w: 0, l: 0 }; });
  regMatches.forEach(m => {
    if (!m.winner_team_id) return;
    [m.team_a_id, m.team_b_id].forEach(tid => {
      if (!rec[tid]) return;
      if (tid === m.winner_team_id) rec[tid].w++; else rec[tid].l++;
    });
  });
  Object.values(rec).forEach(r => {
    const dec = r.w + r.l;
    r.winRate = dec > 0 ? r.w / dec : null;
  });
  return rec;
}

function buildTransactions(faMoves, trades) {
  const feed = [];
  faMoves.forEach(m => feed.push({
    kind: 'fa', week: m.effective_week, when: m.occurred_at,
    added: m.pokemon_added_id, dropped: m.pokemon_dropped_id, withLabel: 'Free Agency',
  }));
  trades.forEach(t => {
    const weGiveUp = t.team_a_id === team.id ? t.pokemon_a_id : t.pokemon_b_id;
    const weGet    = t.team_a_id === team.id ? t.pokemon_b_id : t.pokemon_a_id;
    const otherId  = t.team_a_id === team.id ? t.team_b_id : t.team_a_id;
    const other    = allTeams.find(x => x.id === otherId);
    const withName = other ? other.name + (coachByTeam[otherId] ? ' (' + coachByTeam[otherId] + ')' : '') : 'another team';
    feed.push({ kind: 'trade', week: t.effective_week, when: t.occurred_at, added: weGet, dropped: weGiveUp, withLabel: withName });
  });
  return feed.sort((a, b) => (b.week || 0) - (a.week || 0) || String(b.when).localeCompare(String(a.when)));
}

// ─────────────────────────────────────────────────────────────────────────────
// STAT AGGREGATION — all derive from the loaded arrays. With no game data these
// return zeros / nulls, which the renderers turn into "0", "—", or "+0".
// ─────────────────────────────────────────────────────────────────────────────
function teamMatchRecord() {
  let w = 0, l = 0, gw = 0, gl = 0;
  matches.filter(m => m.stage === 'regular').forEach(m => {
    const isA  = m.team_a_id === team.id;
    const my   = isA ? m.team_a_score : m.team_b_score;
    const opp  = isA ? m.team_b_score : m.team_a_score;
    gw += my || 0; gl += opp || 0;
    if (m.winner_team_id === team.id) w++;
    else if (m.winner_team_id) l++;
  });
  return { w, l, gw, gl };
}

function teamKoFaint() {
  let kos = 0, faints = 0;
  statRows.forEach(s => { kos += s.kills || 0; faints += s.deaths || 0; });
  return { kos, faints };
}

// Strength of schedule: average regular-season win rate of opponents faced.
// SoSoS: average win rate of those opponents' opponents.
function strengthOfSchedule() {
  const regMatches = matches.filter(m => m.stage === 'regular');
  const myOpponents = regMatches.map(m => (m.team_a_id === team.id ? m.team_b_id : m.team_a_id));
  if (!myOpponents.length) return { sos: null, sosos: null };

  const rateOf = id => (regularRecords[id] ? regularRecords[id].winRate : null);
  const avg = arr => { const v = arr.filter(x => x != null); return v.length ? v.reduce((a, b) => a + b, 0) / v.length : null; };

  const sos = avg(myOpponents.map(rateOf));

  // Opponents-of-opponents requires the full regular-season opponent map.
  // We only loaded thin (team_a, team_b, winner) rows for records, so rebuild the
  // adjacency from this team's view plus a best-effort: without every team's full
  // schedule on hand, SoSoS stays null until the standings page shares that map.
  // (Left as a clearly-scoped follow-up; SoS alone is meaningful for now.)
  const sosos = null;
  return { sos, sosos };
}

function fmtRate(r) { return r == null ? '—' : (r * 100).toFixed(0) + '%'; }

// ─────────────────────────────────────────────────────────────────────────────
// FORM TOGGLES — ported from the Planner. A Mega/Primal entry (has baseForm) shows
// its Mega by default and can flip to the base form; a base entry with an altForm
// can flip to that alt. Display-only here, so toggling just re-renders the cards.
// ─────────────────────────────────────────────────────────────────────────────
function getDisplayMon(mon) {
  if (!mon) return mon;
  if (mon.baseForm && megaBaseActive.has(mon.id)) {
    const base = pokemonById[mon.baseForm];
    if (base) return Object.assign({}, base);
  }
  if (!mon.altForm || !altFormActive.has(mon.id)) return mon;
  return Object.assign({}, mon, {
    name: mon.altForm.name,
    type1: mon.altForm.type1,
    type2: mon.altForm.type2,
    stats: mon.altForm.stats,
    id: mon.altForm.spriteId || mon.id,
  });
}
function toggleAltForm(id) {
  altFormActive.has(id) ? altFormActive.delete(id) : altFormActive.add(id);
  renderRoster(); renderInactive();
}
function toggleMegaBase(id) {
  megaBaseActive.has(id) ? megaBaseActive.delete(id) : megaBaseActive.add(id);
  renderRoster(); renderInactive();
}

  const el = document.getElementById('team-stats');

}
function statBox(k, v, cls) { return '<div class="stat-box"><span class="k">' + k + '</span><span class="v ' + (cls || '') + '">' + v + '</span></div>'; }
function kfCell(k, v, cls)  { return '<div class="kf-cell"><div class="k">' + k + '</div><div class="v ' + (cls || '') + '">' + v + '</div></div>'; }

// Per-Pokémon KOs/Faints and participation, scoped to the weeks it was rostered.
function memberStats(row) {
  const aw = row.acquired_week || 1;
  const rw = row.released_week; // null = still active

  // Games/matches this team played while the mon was owned (regular + post).
  let ownedGames = 0, ownedMatches = 0;
  const ownedGameIds = new Set();
  matches.forEach(m => {
    const inWindow = (m.week >= aw) && (rw == null || m.week < rw);
    if (!inWindow) return;
    const gs = gamesByMatch[m.id] || [];
    if (gs.length) { ownedMatches++; gs.forEach(g => { ownedGames++; ownedGameIds.add(g.id); }); }
  });

  // Appearances + KOs/Faints from this mon's stat rows (only games it played).
  let kos = 0, faints = 0;
  const appearedGameIds = new Set();
  const gameToMatch = {};
  matches.forEach(m => (gamesByMatch[m.id] || []).forEach(g => { gameToMatch[g.id] = m.id; }));
  statRows.filter(s => s.pokemon_id === row.pokemon_id).forEach(s => {
    if (!ownedGameIds.has(s.game_id)) return; // ignore stats outside the owned window
    appearedGameIds.add(s.game_id);
    kos += s.kills || 0; faints += s.deaths || 0;
  });
  const appearedMatchIds = new Set([...appearedGameIds].map(gid => gameToMatch[gid]));

  return {
    kos, faints,
    gpCount: appearedGameIds.size, gpPct: pct(appearedGameIds.size, ownedGames),
    mpCount: appearedMatchIds.size, mpPct: pct(appearedMatchIds.size, ownedMatches),
  };
}

function memberCard(row, opts) {
  opts = opts || {};
  const mon  = pokemonById[row.pokemon_id] || { id: row.pokemon_id, name: row.pokemon_id, stats: {} };
  const disp = getDisplayMon(mon);
  const cost = (row.pokemon_id in tierCost) ? tierCost[row.pokemon_id] : (mon.points != null ? mon.points : '—');
  const st   = memberStats(row);
  const kfDelta = st.kos - st.faints;

  const card = document.createElement('div');
  card.className = 'member';

  // ── LEFT RAIL: sprite, form toggle, point value, week(s) ── (mirrors .slot-left)
  const hasMega = !!mon.baseForm, megaShowing = megaBaseActive.has(mon.id);
  const hasAlt  = !!mon.altForm,  altShowing  = altFormActive.has(mon.id);
  const formBtn = hasMega
    ? '<button class="slot-alt-form-btn' + (megaShowing ? ' active' : '') + '" onclick="toggleMegaBase(\'' + mon.id + '\')" title="' + (megaShowing ? 'Switch to Mega form' : 'Switch to base form') + '">' + (megaShowing ? '▶ Mega' : '◀ Base') + '</button>'
    : hasAlt
      ? '<button class="slot-alt-form-btn' + (altShowing ? ' active' : '') + '" onclick="toggleAltForm(\'' + mon.id + '\')" title="' + (altShowing ? 'Switch to base form' : 'Switch to ' + escapeHtml(mon.altForm.name)) + '">' + (altShowing ? '◀ Base' : '▶ Alt') + '</button>'
      : '<div class="slot-alt-form-placeholder"></div>';

  let wkHtml = '<div class="wk"><b>Joined</b><br>Week ' + (row.acquired_week || '—') + '</div>';
  if (opts.inactive) wkHtml += '<div class="wk"><b>Dropped</b><br>Week ' + (row.released_week || '—') + '</div>';

  const left = document.createElement('div');
  left.className = 'member-left';
  left.innerHTML =
    '<img class="slot-sprite" src="' + spriteUrl(disp) + '" alt="' + escapeHtml(disp.name) + '">'
    + formBtn
    + '<div class="slot-pts-display">' + cost + '</div>'
    + wkHtml;
  attachSpriteFallback(left.querySelector('.slot-sprite'), disp);
  card.appendChild(left);

  // ── BODY: name, types, abilities, BST, compact stats, utility moves ──
  // Abilities/moves come from the drafted entry (mon), matching the Draft Builder —
  // altForm sub-objects don't carry their own ability/move data.
  let typesHtml = '';
  if (disp.type1) typesHtml += '<span class="type-badge t-' + disp.type1 + '">' + disp.type1 + '</span>';
  if (disp.type2) typesHtml += '<span class="type-badge t-' + disp.type2 + '">' + disp.type2 + '</span>';

  const abilities = (mon.abilities || []).map(a => '<span class="ability-tag">' + escapeHtml(a) + '</span>').join('');
  const moves     = (mon.moves || []).slice(0, 8).map(m => '<span class="move-tag">' + escapeHtml(m) + '</span>').join('');

  let statsHtml = '';
  if (disp.stats && disp.stats.hp != null) {
    const statNums = BAR_SK.map(function (k, j) {
      if (k === 'spe') {
        const sc = speedTierColor(disp.stats[k]);
        return '<span class="stat-num" style="background:' + sc + '22;border:1px solid ' + sc + '55;border-radius:3px;padding:1px 5px">'
          + BAR_SL[j] + ' <span style="color:' + sc + ';font-weight:700">' + disp.stats[k] + '</span></span>';
      }
      return '<span class="stat-num">' + BAR_SL[j] + ' <span>' + disp.stats[k] + '</span></span>';
    }).join('');
    statsHtml = '<div class="slot-bst">BST ' + disp.stats.bst + '</div><div class="slot-stats-compact">' + statNums + '</div>';
  }

  const body = document.createElement('div');
  body.className = 'member-body';
  body.innerHTML =
    '<div class="member-name">' + escapeHtml(disp.name) + '</div>'
    + '<div class="member-types">' + typesHtml + '</div>'
    + (abilities ? '<div class="member-abilities">' + abilities + '</div>' : '')
    + statsHtml
    + (moves ? '<div class="slot-moves">' + moves + '</div>' : '');
  card.appendChild(body);

  // ── RIGHT: KOs / Faints / K/F / KF Δ (2×2) + Match% / Game% with counts below ──
  const grid = document.createElement('div');
  grid.className = 'member-statgrid';
  grid.innerHTML =
    cell('KOs', st.kos)
    + cell('Faints', st.faints)
    + cell('K/F', kfRatio(st.kos, st.faints))
    + cell('KF Δ', signed(kfDelta), deltaClass(kfDelta))
    + cellSub('Match %', st.mpPct, '(' + st.mpCount + ')')
    + cellSub('Game %', st.gpPct, '(' + st.gpCount + ')');
  card.appendChild(grid);

  return card;
}
function cell(k, v, cls)   { return '<div class="cell"><div class="k">' + k + '</div><div class="v ' + (cls || '') + '">' + v + '</div></div>'; }
function cellSub(k, v, sub) { return '<div class="cell"><div class="k">' + k + '</div><div class="v">' + v + '</div><div class="sub">' + sub + '</div></div>'; }

function renderRoster() {
  const el = document.getElementById('roster');

    .filter(r => r.released_week == null)

  if (!active.length) { el.innerHTML = '<div class="empty">No active Pokémon on this roster yet.</div>'; return; }

  // Same card component as the active roster (with Week Dropped added). The narrow

function renderTransactions() {
  const el = document.getElementById('transactions');
  const arrow = document.getElementById('txn-arrow');
  el.innerHTML = '';
  if (!txns.length) { el.innerHTML = '<div class="empty">No transactions yet.</div>'; if (arrow) arrow.hidden = true; return; }

  // Collapsed by default: show only the most recent. Arrow appears only when there
  // is more than one to reveal.
  if (arrow) { arrow.hidden = txns.length <= 1; arrow.textContent = txnExpanded ? '▲' : '▼'; }
  const shown = txnExpanded ? txns : txns.slice(0, 1);

  const list = document.createElement('div');
  list.className = 'txn-list';
  shown.forEach(t => {
    const dropped = pokemonById[t.dropped] || { id: t.dropped, name: t.dropped };
    const added   = pokemonById[t.added]   || { id: t.added,   name: t.added };
    const row = document.createElement('div');
    row.className = 'txn';
    const di = '<img src="' + iconUrl(dropped) + '" alt="" title="' + escapeHtml(dropped.name) + '">';
    const ai = '<img src="' + iconUrl(added)   + '" alt="" title="' + escapeHtml(added.name)   + '">';
    row.innerHTML =
      '<div class="swap"><span class="drop">' + di + ' ' + escapeHtml(dropped.name) + '</span>'
      + '<span>⇄</span><span class="gain">' + ai + ' ' + escapeHtml(added.name) + '</span></div>'
      + '<div class="with">Week ' + (t.week || '—') + ' · ' + escapeHtml(t.withLabel) + '</div>';
    list.appendChild(row);
    // onerror chains for the inline imgs
    row.querySelectorAll('img').forEach((im, i) => attachIconFallback(im, i === 0 ? dropped : added));
  });
  el.appendChild(list);
}

function renderSchedule() {
  const el = document.getElementById('schedule');
  el.innerHTML = '';
  if (!matches.length) { el.innerHTML = '<div class="empty">No matches scheduled yet.</div>'; return; }

  // The "next" match is the earliest one with no recorded winner.
  const nextId = (matches.find(m => !m.winner_team_id) || {}).id;

  const list = document.createElement('div');
  list.className = 'sched-list';
  matches.forEach(m => {
    const isA   = m.team_a_id === team.id;
    const oppId = isA ? m.team_b_id : m.team_a_id;
    const opp   = allTeams.find(x => x.id === oppId);
    const my    = isA ? m.team_a_score : m.team_b_score;
    const their = isA ? m.team_b_score : m.team_a_score;

    let cls = '';
    if (m.winner_team_id === team.id) cls = 'win';
    else if (m.winner_team_id)        cls = 'loss';
    else if (m.id === nextId)         cls = 'next';

    const myCoach  = coachByTeam[team.id]  ? ' <span class="pl">(' + escapeHtml(coachByTeam[team.id]) + ')</span>' : '';
    const oppCoach = (opp && coachByTeam[oppId]) ? ' <span class="pl">(' + escapeHtml(coachByTeam[oppId]) + ')</span>' : '';
    const oppName  = opp ? escapeHtml(opp.name) : 'TBD';

    const a = document.createElement('a');
    a.className = 'sched-row ' + cls;
    a.href = 'match.html#' + m.id;
    let html =
      '<div class="sched-wk">Week ' + (m.week || '—') + (m.stage !== 'regular' ? ' · ' + escapeHtml(m.stage) : '') + '</div>'
      + '<div class="sched-match"><span class="me">' + escapeHtml(team.name) + '</span>' + myCoach
      + ' <span class="vs">vs</span> ' + oppName + oppCoach + '</div>';
    if (m.winner_team_id) html += '<div class="sched-score">' + (my || 0) + ' – ' + (their || 0) + '</div>';
    else if (cls === 'next') html += '<div class="sched-tag">Next match</div>';
    a.innerHTML = html;
    list.appendChild(a);
  });
  el.appendChild(list);
}


// ─────────────────────────────────────────────────────────────────────────────
// TEAM SELECTOR — searchable dropdown off the Teams tab. Teams listed as
// "Team Name (Coach)"; selecting one swaps the page in place and updates #slug.
// ─────────────────────────────────────────────────────────────────────────────
async function selectTeam(teamId) {
  const t = allTeams.find(x => x.id === teamId);
  if (!t || (team && t.id === team.id)) return;
  team = t;

  const banner = document.getElementById('boot-banner');
  document.getElementById('layout').hidden = true;
  banner.className = 'banner'; banner.textContent = 'Loading ' + t.name + '…'; banner.hidden = false;
  try {
    await loadTeamData();
    render();
    banner.hidden = true;
    document.getElementById('layout').hidden = false;
  } catch (err) {
    console.error(err);
    banner.className = 'banner err';
    banner.textContent = 'Could not load ' + t.name + ': ' + (err.message || err);
  }
}

// Back/forward or an edited #slug swaps teams in place (not our own hash writes).
window.addEventListener('hashchange', () => {
  const t = resolveTeam();
  if (t && (!team || t.id !== team.id)) selectTeam(t.id);
});

// ─────────────────────────────────────────────────────────────────────────────
// BOOT
// ─────────────────────────────────────────────────────────────────────────────
async function init() {
  const banner = document.getElementById('boot-banner');
  try {
    await loadGlobalData();
    team = resolveTeam();
    if (!team) throw new Error('No teams found for the current season.');
    await loadTeamData();
    render();
    banner.hidden = true;
    document.getElementById('layout').hidden = false;
  } catch (err) {
    console.error(err);
    banner.className = 'banner err';
    banner.textContent = 'Could not load the team page: ' + (err.message || err);
  }
}
init();
</script>
