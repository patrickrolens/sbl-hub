<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SBL Hub — Tier Admin</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --bg:#0f1117; --bg2:#1a1d27; --bg3:#22263a; --border:#2e3248;
  --text:#e8eaf6; --text2:#9095b8; --text3:#5a5f80;
  --accent:#7c6ff7; --red:#e05555; --green:#4caf7d; --blue:#60a5fa; --yellow:#f0c060;
  --nav-h: 49px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 13px; }
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* ── BUTTONS ── */
.btn { background: var(--bg3); border: 1px solid var(--border); border-radius: 7px; color: var(--text); font-size: 12px; font-weight: 600; padding: 7px 14px; cursor: pointer; font-family: inherit; transition: border-color .15s, background .15s; text-decoration: none; display: inline-flex; align-items: center; gap: 6px; }
.btn:hover { border-color: var(--accent); }
.btn:disabled { opacity: .5; cursor: default; }
.btn-accent { background: var(--accent); border-color: var(--accent); color: #fff; }
.btn-accent:hover { filter: brightness(1.08); border-color: var(--accent); }

/* ── PAGE ── */
.wrap { max-width: 1200px; margin: 0 auto; padding: 20px 16px 60px; }
.page-title { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
.page-sub { font-size: 13px; color: var(--text2); margin-bottom: 20px; }

/* ── ADMIN GATE ── */
.gate { max-width: 420px; margin: 80px auto; text-align: center; background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 28px; }
.gate h2 { font-size: 17px; margin-bottom: 8px; }
.gate p { font-size: 13px; color: var(--text2); margin-bottom: 18px; line-height: 1.5; }

/* ── CONTROLS ── */
.controls { display: flex; flex-wrap: wrap; align-items: center; gap: 10px; background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; margin-bottom: 14px; }
.controls .group { display: flex; align-items: center; gap: 8px; }
.controls label { font-size: 11px; font-weight: 700; letter-spacing: .5px; color: var(--text3); text-transform: uppercase; }
select#season-select { background: var(--bg3); border: 1px solid var(--border); border-radius: 7px; color: var(--text); font-size: 13px; font-family: inherit; padding: 7px 10px; outline: none; cursor: pointer; }
select#season-select:focus { border-color: var(--accent); }
.controls .spacer { flex: 1; }
.tier-editor-link { font-size: 12px; color: var(--accent); text-decoration: none; }
.tier-editor-link:hover { text-decoration: underline; }

/* ── SUMMARY ── */
.summary { font-size: 12px; color: var(--text2); margin-bottom: 12px; }
.summary b { color: var(--text); }
.summary .muted { color: var(--text3); }

/* ── TIER PREVIEW (read-only, matching the editor / draft pool style) ── */
.pool { display: flex; flex-direction: column; gap: 6px; }
.tier-lane { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
.tier-header { display: flex; align-items: center; gap: 10px; padding: 8px 12px; border-bottom: 1px solid var(--border); cursor: pointer; user-select: none; }
.tier-header:hover { background: rgba(255,255,255,.02); }
.tier-pts { font-size: 20px; font-weight: 700; color: var(--accent); min-width: 40px; }
.tier-label { font-size: 11px; color: var(--text3); font-weight: 600; }
.tier-count { font-size: 12px; color: var(--text3); margin-left: 6px; }
.tier-collapse-icon { font-size: 11px; color: var(--text3); margin-left: 4px; }
.tier-body { display: flex; flex-wrap: wrap; gap: 6px; padding: 10px 12px; min-height: 58px; }
.tier-body.collapsed { display: none; }
.pmon { display: flex; flex-direction: column; align-items: center; background: var(--bg3); border: 1px solid var(--border); border-radius: 6px; padding: 5px 5px 3px; width: 68px; position: relative; }
.pmon-tera { position: absolute; top: -5px; right: -5px; background: var(--yellow); color: #1a1d27; font-size: 9px; font-weight: 800; line-height: 1; padding: 2px 4px; border-radius: 5px; box-shadow: 0 1px 3px rgba(0,0,0,.4); }
.pmon img { width: 40px; height: 40px; image-rendering: pixelated; display: block; }
.pmon-name { font-size: 9px; color: var(--text2); text-align: center; margin-top: 2px; line-height: 1.2; word-break: break-word; }
.empty-state { text-align: center; color: var(--text3); font-size: 13px; padding: 40px; font-style: italic; }

/* ── MODAL ── */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.6); z-index: 200; display: flex; align-items: center; justify-content: center; padding: 20px; }
.modal-overlay[hidden] { display: none; }
.modal { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 20px; width: 100%; max-width: 400px; box-shadow: 0 12px 40px rgba(0,0,0,.5); }
.modal h3 { font-size: 16px; font-weight: 700; margin-bottom: 8px; }
.modal p { font-size: 13px; color: var(--text2); line-height: 1.5; margin-bottom: 14px; }
.modal .warn { color: var(--yellow); font-weight: 600; }
.modal input[type=email] { width: 100%; background: var(--bg3); border: 1px solid var(--border); border-radius: 7px; padding: 9px 12px; color: var(--text); font-size: 13px; outline: none; margin-bottom: 14px; }
.modal input[type=email]:focus { border-color: var(--accent); }
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; }

/* ── TOASTS ── */
#toast-container { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 300; display: flex; flex-direction: column; gap: 8px; align-items: center; }
.toast { background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; padding: 10px 16px; font-size: 13px; color: var(--text); box-shadow: 0 4px 16px rgba(0,0,0,.4); animation: toast-in .18s ease; max-width: 90vw; }
.toast.ok { border-color: rgba(76,175,125,.5); }
.toast.err { border-color: rgba(224,85,85,.55); color: #ff9c9c; }
@keyframes toast-in { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

.banner { margin: 16px; padding: 10px 14px; border: 1px solid var(--border); border-radius: 8px; background: var(--bg2); font-size: 12px; color: var(--text2); }
.banner.err { border-color: rgba(224,85,85,.5); color: var(--red); }

@media (max-width: 768px) {
  .btn { padding: 6px 10px; }
}
</style>
</head>
<body>

<script src="/nav.js"></script>

<div id="boot-banner" class="banner">Loading…</div>

<!-- Shown to non-admins -->
<div class="gate" id="gate" hidden>
  <h2>Admin access required</h2>
  <p>Log in with an admin account to manage season tier lists.</p>
  <button class="btn btn-accent" onclick="window.SBLNav && window.SBLNav.login()">Admin Login</button>
</div>

<!-- The tool (admins only) -->
<div class="wrap" id="tool" hidden>
  <div class="page-title">Season Tier Lists</div>
  <div class="page-sub">Ingest a season's legal Pokémon and point costs. Editing happens in the tier editor; this page imports the result and assigns it to a season.</div>

  <div class="controls">
    <div class="group">
      <label for="season-select">Season</label>
      <select id="season-select" onchange="onSeasonChange()"></select>
    </div>
    <div class="group">
      <button class="btn" id="import-json-btn" onclick="importFromPokemonJson()">⬇ Import from pokemon.json</button>
      <button class="btn" id="import-csv-btn" onclick="document.getElementById('csv-file').click()">⬆ Import from CSV</button>
      <button class="btn" id="export-csv-btn" onclick="exportCsv()">⬇ Export to CSV</button>
      <input type="file" id="csv-file" accept=".csv,text/csv" hidden onchange="onCsvChosen(event)">
    </div>
    <div class="spacer"></div>
    <a class="tier-editor-link" id="tier-editor-link" href="#" target="_blank" rel="noopener">Open tier editor ↗</a>
  </div>

  <div class="summary" id="summary"></div>
  <div class="pool" id="preview"></div>
</div>

<div class="modal-overlay" id="modal-overlay" hidden onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modal"></div>
</div>
<div id="toast-container"></div>

<script>
// ── CONFIG ──
const SUPABASE_URL      = "https://arypbyzeppbpbursmzcs.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_U8J3pV_KgomrWhbgoGBSUg_ttQ4d46m";
const sb = window.sb || supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// pokemon.json + art live in the planner repo (same as the draft page).
const POKEMON_JSON_URL = "https://planner.springfieldbattleleague.com/pokemon.json";
const ASSET_BASE = POKEMON_JSON_URL.replace(/[^/]*$/, '');
// Where the tier editor is hosted (planner repo). Adjust if it moves.
const TIER_EDITOR_URL = ASSET_BASE + 'tier_editor.html';

const POKEBALL_FALLBACK = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 40 40'%3E%3Ccircle cx='20' cy='20' r='19' fill='%23e05555' stroke='%23333' stroke-width='1.5'/%3E%3Cpath d='M1.1 20 A19 19 0 0 0 38.9 20 Z' fill='%23fff'/%3E%3Crect x='1' y='18' width='38' height='4' fill='%23333'/%3E%3Ccircle cx='20' cy='20' r='7' fill='%23fff' stroke='%23333' stroke-width='1.5'/%3E%3Ccircle cx='20' cy='20' r='3.5' fill='%23e8eaf6' stroke='%23333' stroke-width='1'/%3E%3C/svg%3E";

// ── STATE ──
let isAdmin     = false;
let pokemonById = {};               // id -> pokemon.json entry
let seasons     = [];               // all seasons
let selectedSeasonId = null;
let currentTiers = {};              // pokemon_id -> { point_cost, tera_point_cost } for the selected season
                                    // tera_point_cost is null unless the season prices Tera separately (S9).
let collapsed = new Set();

// ── HELPERS ──
function localId(id) {
  const m = String(id).match(/^(\d+)(.*)$/);
  if (!m) return id;
  const num = parseInt(m[1]);
  return (num >= 1000 ? String(num) : String(num).padStart(3, '0')) + m[2];
}
function iconUrl(mon)   { return mon && mon.id ? ASSET_BASE + 'icons/'   + localId(mon.id) + '.png' : ''; }
function spriteUrl(mon) { return mon && mon.id ? ASSET_BASE + 'sprites/' + localId(mon.id) + '.png' : ''; }
function attachIconFallback(img, mon) {
  img.onerror = function () {
    if (this.src.includes('/icons/'))       { this.src = spriteUrl(mon); }
    else { this.onerror = null; this.src = POKEBALL_FALLBACK; this.style.opacity = '.5'; }
  };
}
function escapeHtml(s) { return String(s).replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c])); }
function seasonName(id) { const s = seasons.find(x => x.id === id); return s ? s.name : '—'; }

// ─────────────────────────────────────────────────────────────────────────────
// DATA LOAD
// ─────────────────────────────────────────────────────────────────────────────
async function loadBaseData() {
  const pj = await fetch(POKEMON_JSON_URL).then(async res => {
    const ct = res.headers.get('content-type') || '';
    if (!res.ok || !ct.includes('json')) throw new Error('pokemon.json not reachable at ' + POKEMON_JSON_URL);
    return res.json();
  });
  const arr = Array.isArray(pj) ? pj : pj.pokemon;
  pokemonById = {};
  arr.forEach(p => { pokemonById[p.id] = p; });

  const { data: seasonRows, error } = await sb.from('seasons').select('*').order('slug', { ascending: false });
  if (error) throw error;
  seasons = seasonRows || [];
}

function populateSeasonDropdown() {
  const sel = document.getElementById('season-select');
  sel.innerHTML = '';
  seasons.forEach(s => {
    const opt = document.createElement('option');
    opt.value = s.id;
    opt.textContent = s.name + (s.is_current ? '  (current)' : '');
    sel.appendChild(opt);
  });
  const current = seasons.find(s => s.is_current) || seasons[0];
  if (current) { selectedSeasonId = current.id; sel.value = current.id; }
}

async function loadSeasonTiers(seasonId) {
  currentTiers = {};
  if (!seasonId) { renderPreview(); return; }
  const { data, error } = await sb.from('season_pokemon_tiers').select('pokemon_id, point_cost, tera_point_cost').eq('season_id', seasonId);
  if (error) { showToast('Could not load tiers: ' + error.message, 'err'); return; }
  (data || []).forEach(r => { currentTiers[r.pokemon_id] = { point_cost: r.point_cost, tera_point_cost: r.tera_point_cost }; });
  renderPreview();
}

function onSeasonChange() {
  selectedSeasonId = document.getElementById('season-select').value;
  loadSeasonTiers(selectedSeasonId);
}

// ─────────────────────────────────────────────────────────────────────────────
// PREVIEW (read-only tier lanes)
// ─────────────────────────────────────────────────────────────────────────────
function renderPreview() {
  const pool = document.getElementById('preview');
  const summary = document.getElementById('summary');
  pool.innerHTML = '';

  const ids = Object.keys(currentTiers);
  const legalCount = ids.length;
  const totalMon = Object.keys(pokemonById).length;
  const totalPts = ids.reduce((s, id) => s + (currentTiers[id].point_cost || 0), 0);
  const teraCount = ids.filter(id => currentTiers[id].tera_point_cost != null).length;

  summary.innerHTML = legalCount
    ? '<b>' + legalCount + '</b> legal Pokémon · total pool value <b>' + totalPts + '</b> pts '
      + '<span class="muted">· ' + (totalMon - legalCount) + ' not legal this season</span>'
      + (teraCount ? ' <span style="color:var(--yellow)">· ' + teraCount + ' with Tera pricing</span>' : '')
    : '<span class="muted">No tiers set for ' + escapeHtml(seasonName(selectedSeasonId)) + ' yet — import from pokemon.json or a CSV to populate it.</span>';

  if (!legalCount) {
    pool.innerHTML = '<div class="empty-state">This season has no tier list yet.</div>';
    return;
  }

  const costs = [...new Set(ids.map(id => currentTiers[id].point_cost))].sort((a, b) => b - a);
  costs.forEach(cost => {
    const mons = ids.filter(id => currentTiers[id].point_cost === cost)
      .map(id => pokemonById[id] || { id, name: id })
      .sort((a, b) => a.name.localeCompare(b.name));
    pool.appendChild(makeLane(cost, mons));
  });
}

function makeLane(cost, mons) {
  const lane = document.createElement('div');
  lane.className = 'tier-lane';

  const header = document.createElement('div');
  header.className = 'tier-header';
  header.onclick = () => { collapsed.has(cost) ? collapsed.delete(cost) : collapsed.add(cost); renderPreview(); };
  header.innerHTML = '<div class="tier-pts">' + cost + '</div><div class="tier-label">pts</div>'
    + '<div class="tier-count">(' + mons.length + ')</div>'
    + '<span class="tier-collapse-icon">' + (collapsed.has(cost) ? '▶' : '▼') + '</span>';
  lane.appendChild(header);

  const body = document.createElement('div');
  body.className = 'tier-body' + (collapsed.has(cost) ? ' collapsed' : '');
  mons.forEach(mon => {
    const card = document.createElement('div');
    card.className = 'pmon';
    const tera = currentTiers[mon.id] && currentTiers[mon.id].tera_point_cost;
    card.title = tera != null ? mon.name + ' — Tera ' + tera + ' pts' : mon.name;
    const img = document.createElement('img');
    img.src = iconUrl(mon); img.alt = mon.name;
    attachIconFallback(img, mon);
    const nm = document.createElement('div');
    nm.className = 'pmon-name'; nm.textContent = mon.name;
    card.appendChild(img); card.appendChild(nm);
    if (tera != null) {
      const badge = document.createElement('div');
      badge.className = 'pmon-tera';
      badge.textContent = '+' + (tera - cost);
      badge.title = 'Tera price: ' + tera + ' pts';
      card.appendChild(badge);
    }
    body.appendChild(card);
  });
  lane.appendChild(body);
  return lane;
}

// ─────────────────────────────────────────────────────────────────────────────
// IMPORT (confirmed replace of the selected season's tier list)
// ─────────────────────────────────────────────────────────────────────────────
function tierSummaryLine(map) {
  const ids = Object.keys(map);
  const total = ids.reduce((s, id) => s + (map[id].point_cost || 0), 0);
  const tera = ids.filter(id => map[id].tera_point_cost != null).length;
  return ids.length + ' legal Pokémon, ' + total + ' total points'
    + (tera ? ', ' + tera + ' Tera-priced' : '');
}

function importFromPokemonJson() {
  if (!selectedSeasonId) { showToast('Pick a season first.', 'err'); return; }
  // pokemon.json: legal mon with a point value become this season's tiers.
  // The json has no Tera concept, so tera_point_cost is null across the board.
  const map = {};
  Object.values(pokemonById).forEach(p => {
    if (p.legal && p.points != null) map[p.id] = { point_cost: p.points, tera_point_cost: null };
  });
  if (!Object.keys(map).length) { showToast('pokemon.json has no legal Pokémon with point values.', 'err'); return; }
  confirmImport(map, 'the pokemon.json baseline');
}

function onCsvChosen(event) {
  const file = event.target.files[0];
  event.target.value = '';          // allow re-selecting the same file later
  if (!file) return;
  if (!selectedSeasonId) { showToast('Pick a season first.', 'err'); return; }
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const map = parseTierCsv(reader.result);
      if (!Object.keys(map.tiers).length) { showToast('No legal Pokémon found in that CSV.', 'err'); return; }
      const notes = [];
      if (map.unknown.length) notes.push(map.unknown.length + ' row(s) had IDs not in pokemon.json and were skipped.');
      if (map.teraBelowBase.length) notes.push('⚠ ' + map.teraBelowBase.length + ' row(s) have a Tera price below the base price (' + map.teraBelowBase.slice(0, 5).join(', ') + (map.teraBelowBase.length > 5 ? '…' : '') + ') — double-check the Tera column wasn\u2019t transposed.');
      confirmImport(map.tiers, 'the uploaded CSV', notes.join(' '));
    } catch (err) {
      console.error(err);
      showToast('Could not parse that CSV: ' + (err.message || err), 'err');
    }
  };
  reader.readAsText(file);
}

// Parse the tier editor's CSV. Columns: id, name, points|"N/A", and an OPTIONAL
// 4th tera-points column (number or "N/A"/blank). Returns { id -> {point_cost,
// tera_point_cost} } for legal rows, plus any unknown ids and any rows whose Tera
// price is below the base (a likely transposition/typo, surfaced as a soft warning).
function parseTierCsv(text) {
  const rows = parseCsvRows(text);
  const tiers = {}; const unknown = []; const teraBelowBase = [];
  rows.forEach((row, i) => {
    if (row.length < 3) return;
    const id = (row[0] || '').trim();
    const pts = (row[2] || '').trim();
    const teraRaw = (row[3] || '').trim();   // undefined for 3-col CSVs => ''
    if (i === 0 && (id === '#' || pts.toLowerCase() === 'points')) return;  // header
    if (!id) return;
    if (!/^-?\d+$/.test(pts)) return;   // "N/A" or blank => illegal => skip
    if (!(id in pokemonById)) { unknown.push(id); return; }
    const point_cost = parseInt(pts, 10);
    let tera_point_cost = null;
    if (/^-?\d+$/.test(teraRaw)) {
      tera_point_cost = parseInt(teraRaw, 10);
      if (tera_point_cost < point_cost) teraBelowBase.push(pokemonById[id].name || id);
    }
    tiers[id] = { point_cost, tera_point_cost };
  });
  return { tiers, unknown, teraBelowBase };
}

// Minimal RFC-style CSV parser (handles quoted fields and escaped quotes).
function parseCsvRows(text) {
  const rows = []; let row = [], field = '', q = false;
  for (let i = 0; i < text.length; i++) {
    const c = text[i];
    if (q) {
      if (c === '"') { if (text[i + 1] === '"') { field += '"'; i++; } else q = false; }
      else field += c;
    } else if (c === '"') q = true;
    else if (c === ',') { row.push(field); field = ''; }
    else if (c === '\n' || c === '\r') {
      if (c === '\r' && text[i + 1] === '\n') i++;
      row.push(field); rows.push(row); row = []; field = '';
    } else field += c;
  }
  if (field.length || row.length) { row.push(field); rows.push(row); }
  return rows;
}

function confirmImport(map, sourceLabel, note) {
  const season = seasons.find(s => s.id === selectedSeasonId);
  const hadTiers = Object.keys(currentTiers).length;
  let warn = '';
  if (season && season.is_current) warn += '<p class="warn">This is the current season. Changing tiers mid-season affects the live draft pool.</p>';
  if (hadTiers) warn += '<p class="warn">This replaces ' + season.name + '\u2019s existing ' + hadTiers + '-Pokémon list.</p>';

  openModal(
    '<h3>Import tier list?</h3>'
    + '<p>Set <b>' + escapeHtml(seasonName(selectedSeasonId)) + '</b>\u2019s tiers from ' + sourceLabel + ':<br>'
    +   '<b>' + tierSummaryLine(map) + '</b>.' + (note ? '<br><span style="color:var(--text3)">' + escapeHtml(note) + '</span>' : '') + '</p>'
    + warn
    + '<div class="modal-actions">'
    +   '<button class="btn" onclick="closeModal()">Cancel</button>'
    +   '<button class="btn btn-accent" id="confirm-import-btn">Replace tier list</button>'
    + '</div>'
  );
  document.getElementById('confirm-import-btn').onclick = () => { closeModal(); saveTiers(map); };
}

async function saveTiers(map) {
  const rows = Object.entries(map).map(([pokemon_id, v]) => ({ season_id: selectedSeasonId, pokemon_id, point_cost: v.point_cost, tera_point_cost: v.tera_point_cost }));
  try {
    // Replace = clear the season's rows, then insert the new set.
    const { error: delErr } = await sb.from('season_pokemon_tiers').delete().eq('season_id', selectedSeasonId);
    if (delErr) throw delErr;
    const { error: insErr } = await sb.from('season_pokemon_tiers').insert(rows);
    if (insErr) throw new Error('Rows were cleared but the insert failed (' + insErr.message + '). Re-import to restore the list.');

    await loadSeasonTiers(selectedSeasonId);
    showToast('Saved ' + rows.length + ' tier entries to ' + seasonName(selectedSeasonId) + '.', 'ok');
  } catch (err) {
    console.error(err);
    showToast('Import failed: ' + (err.message || err), 'err');
  }
}

// ─────────────────────────────────────────────────────────────────────────────
// EXPORT — reproduce the tier editor's CSV (id, name, points|"N/A"), covering every
// Pokémon so it round-trips into the editor / update_pokemon.py. If (and only if) the
// season prices Tera, a 4th "Tera Points" column is appended; non-Tera seasons export
// the identical 3-column CSV as before so the editor paste path is unaffected.
// ─────────────────────────────────────────────────────────────────────────────
function exportCsv() {
  if (!Object.keys(pokemonById).length) return;
  const hasTera = Object.keys(currentTiers).some(id => currentTiers[id].tera_point_cost != null);
  const rows = [hasTera ? ['#', 'Pokémon', 'Points', 'Tera Points'] : ['#', 'Pokémon', 'Points']];
  const sorted = [...Object.values(pokemonById)].sort((a, b) => {
    const na = parseInt(a.id), nb = parseInt(b.id);
    return na !== nb ? na - nb : a.id.localeCompare(b.id);
  });
  sorted.forEach(p => {
    const entry = currentTiers[p.id];
    const ptsCell = entry ? String(entry.point_cost) : 'N/A';
    if (hasTera) {
      const teraCell = (entry && entry.tera_point_cost != null) ? String(entry.tera_point_cost) : 'N/A';
      rows.push([p.id, p.name, ptsCell, teraCell]);
    } else {
      rows.push([p.id, p.name, ptsCell]);
    }
  });
  const csv = rows.map(r => r.map(c => '"' + String(c).replace(/"/g, '""') + '"').join(',')).join('\n');
  const blob = new Blob([csv], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const season = seasons.find(s => s.id === selectedSeasonId);
  a.href = url; a.download = 'tiers-' + (season ? season.slug : 'season') + '.csv'; a.click();
  URL.revokeObjectURL(url);
  showToast('Exported ' + seasonName(selectedSeasonId) + '\u2019s tiers to CSV.', 'ok');
}

// ─────────────────────────────────────────────────────────────────────────────
// AUTH (same magic-link pattern as the draft page)
// ─────────────────────────────────────────────────────────────────────────────
// Admin status comes from the shared nav (nav.js owns the session).
function initAuth() {
  const ready = (window.SBLNav && window.SBLNav.ready) || Promise.resolve({ isAdmin: false });
  ready.then(({ isAdmin: a }) => { isAdmin = !!a; updateAuthUI(); });
  window.addEventListener('sbl-auth', e => { isAdmin = !!(e.detail && e.detail.isAdmin); updateAuthUI(); });
  return ready;
}

function updateAuthUI() {
  // Gate the tool behind admin.
  document.getElementById('tool').hidden = !isAdmin;
  document.getElementById('gate').hidden = isAdmin;
}

// ── MODAL / TOAST ──
function openModal(html) { document.getElementById('modal').innerHTML = html; document.getElementById('modal-overlay').hidden = false; }
function closeModal() { document.getElementById('modal-overlay').hidden = true; }
function showToast(msg, kind) {
  const t = document.createElement('div');
  t.className = 'toast' + (kind ? ' ' + kind : '');
  t.textContent = msg;
  document.getElementById('toast-container').appendChild(t);
  setTimeout(() => { t.style.transition = 'opacity .3s'; t.style.opacity = '0'; setTimeout(() => t.remove(), 300); }, 3400);
}

document.addEventListener('keydown', e => { if (e.key === 'Escape' && !document.getElementById('modal-overlay').hidden) closeModal(); });

// ── BOOT ──
async function init() {
  const banner = document.getElementById('boot-banner');
  try {
    document.getElementById('tier-editor-link').href = TIER_EDITOR_URL;
    await loadBaseData();
    populateSeasonDropdown();
    await loadSeasonTiers(selectedSeasonId);
    await initAuth();   // reveals the tool (or the gate) once admin status resolves
    banner.hidden = true;
  } catch (err) {
    console.error(err);
    banner.className = 'banner err';
    banner.textContent = 'Could not load: ' + (err.message || err);
  }
}
init();
