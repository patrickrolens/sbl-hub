<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SBL Hub - Draft</title>

<!-- Supabase JS client (v2). Same pattern as hello-world.html. -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
/* ─────────────────────────────────────────────────────────────────────────────
   TOKENS - lifted verbatim from the Planner / Tier Editor so the three apps share
   one palette. (Planner uses --cb-green for colorblind mode; the hub doesn't need
   that axis yet, so --blue stays the plain blue.)
───────────────────────────────────────────────────────────────────────────── */
:root {
  --bg:#0f1117; --bg2:#1a1d27; --bg3:#22263a; --border:#2e3248;
  --text:#e8eaf6; --text2:#9095b8; --text3:#5a5f80;
  --accent:#7c6ff7; --red:#e05555; --green:#4caf7d; --blue:#60a5fa; --yellow:#f0c060;
  --nav-h: 49px;   /* measured at runtime so sticky offsets match the real nav */
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 13px; }

::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

.live-badge { display: flex; align-items: center; gap: 6px; font-size: 11px; font-weight: 600; color: var(--text3); }
.live-badge .live-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--text3); transition: background .2s; }
.live-badge.on  { color: var(--green); }
.live-badge.on  .live-dot { background: var(--green); box-shadow: 0 0 6px rgba(76,175,125,.8); animation: live-pulse 2s infinite; }
.live-badge.err { color: var(--red); }
.live-badge.err .live-dot { background: var(--red); }
@keyframes live-pulse { 0%,100% { opacity: 1; } 50% { opacity: .4; } }
.btn {
  background: var(--bg3); border: 1px solid var(--border); border-radius: 7px;
  color: var(--text); font-size: 12px; font-weight: 600; padding: 7px 14px; cursor: pointer;
  font-family: inherit; transition: border-color .15s, background .15s;
}
.btn:hover { border-color: var(--accent); }
.btn:disabled { opacity: .5; cursor: default; }
.btn-accent { background: var(--accent); border-color: var(--accent); color: #fff; }
.btn-accent:hover { filter: brightness(1.08); border-color: var(--accent); }

/* ── PAGE GRID: sidebar | main ── */
.layout { display: flex; align-items: flex-start; gap: 0; }

/* ── SIDEBAR ── */
.sidebar {
  width: 340px; flex-shrink: 0; border-right: 1px solid var(--border);
  background: var(--bg); min-height: calc(100vh - var(--nav-h));
  display: flex; flex-direction: column;
  transition: width .18s ease;
}
.sidebar.collapsed { width: 44px; }
.sidebar-head {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 12px; border-bottom: 1px solid var(--border);
  position: sticky; top: var(--nav-h); background: var(--bg); z-index: 5;
}
.sidebar-title { font-size: 11px; font-weight: 700; letter-spacing: .5px; color: var(--text3); text-transform: uppercase; white-space: nowrap; }
.sidebar.collapsed .sidebar-title { display: none; }
.sidebar-toggle {
  background: var(--bg3); border: 1px solid var(--border); border-radius: 6px;
  color: var(--text2); cursor: pointer; font-size: 13px; line-height: 1;
  padding: 5px 8px; margin-left: auto;
}
.sidebar.collapsed .sidebar-toggle { margin-left: 0; }
.sidebar-toggle:hover { color: var(--text); border-color: var(--accent); }
.sidebar-body { padding: 10px; display: flex; flex-direction: column; gap: 8px; overflow-y: auto; }
.sidebar.collapsed .sidebar-body { display: none; }

/* ── ACTIVITY PANEL (right): draft + transaction log, mirrors the sidebar ── */
.activity {
  width: 340px; flex-shrink: 0; border-left: 1px solid var(--border);
  background: var(--bg); min-height: calc(100vh - var(--nav-h));
  display: flex; flex-direction: column; transition: width .18s ease;
}
.activity.collapsed { width: 44px; }
.activity-head {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 12px; border-bottom: 1px solid var(--border);
  position: sticky; top: var(--nav-h); background: var(--bg); z-index: 5;
}
.activity.collapsed .activity-head { justify-content: center; padding-left: 0; padding-right: 0; }
.activity-title { font-size: 11px; font-weight: 700; letter-spacing: .5px; color: var(--text3); text-transform: uppercase; white-space: nowrap; }
.activity.collapsed .activity-title { display: none; }
.activity-toggle {
  background: var(--bg3); border: 1px solid var(--border); border-radius: 6px;
  color: var(--text2); cursor: pointer; font-size: 13px; line-height: 1; padding: 5px 8px;
}
.activity-toggle:hover { color: var(--text); border-color: var(--accent); }
.activity-body { padding: 10px; display: flex; flex-direction: column; gap: 8px; overflow-y: auto; }
.activity.collapsed .activity-body { display: none; }

/* accordion sections */
.log-sec { border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
.log-sec-head { display: flex; align-items: center; gap: 8px; padding: 8px 10px; background: var(--bg2); cursor: pointer; user-select: none; font-size: 11px; font-weight: 700; letter-spacing: .4px; text-transform: uppercase; color: var(--text2); }
.log-sec-head:hover { color: var(--text); }
.log-sec-head .chev { color: var(--text3); font-size: 9px; transition: transform .15s; }
.log-sec.collapsed .chev { transform: rotate(-90deg); }
.log-sec-head .count { margin-left: auto; color: var(--text3); font-weight: 600; }
.log-sec-body { padding: 8px; display: flex; flex-direction: column; gap: 6px; }
.log-sec.collapsed .log-sec-body { display: none; }

/* log entries */
.log-item { background: var(--bg2); border: 1px solid var(--border); border-radius: 7px; padding: 7px 9px; font-size: 12px; }
.log-item .li-head { display: flex; align-items: center; gap: 6px; margin-bottom: 5px; }
.li-badge { font-size: 8px; font-weight: 700; letter-spacing: .3px; text-transform: uppercase; padding: 1px 6px; border-radius: 4px; white-space: nowrap; }
.li-badge.trade { background: rgba(124,111,247,.16); color: var(--accent); }
.li-badge.fa { background: rgba(76,175,125,.16); color: var(--green); }
.li-when { margin-left: auto; color: var(--text3); font-size: 10px; }
.li-line { display: flex; align-items: center; gap: 5px; padding: 1px 0; flex-wrap: wrap; }
.li-pickno { color: var(--text3); font-variant-numeric: tabular-nums; font-weight: 700; flex-shrink: 0; }
.li-team { font-weight: 700; color: var(--text); text-decoration: none; }
.li-team:hover { color: var(--accent); }
.li-team .pl { color: var(--text2); font-weight: 400; }
.li-verb { color: var(--text3); }
.li-mon { display: inline-flex; align-items: center; gap: 4px; min-width: 0; }
.li-mon img { width: 24px; height: 24px; image-rendering: pixelated; object-fit: contain; flex-shrink: 0; }
.li-mon .nm { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.li-mon.add { color: var(--blue); font-weight: 600; }
.li-mon.drop { color: var(--text2); }
.li-mon.drop img { opacity: .55; }
.li-notes { font-size: 10px; color: var(--text3); font-style: italic; margin-top: 4px; }
.log-empty { color: var(--text3); font-style: italic; font-size: 12px; text-align: center; padding: 24px 8px; }

/* ── TEAM CARD (sidebar) ── */
.team-card {
  background: var(--bg2); border: 2px solid var(--border); border-radius: 10px;
  padding: 9px 11px; transition: border-color .15s, background .15s; cursor: pointer;
}
.team-card.is-current { border-color: var(--accent); box-shadow: 0 0 0 1px rgba(124,111,247,.35); }
.team-card.is-next    { border-color: var(--yellow); box-shadow: 0 0 0 1px rgba(240,192,96,.3); }
/* Selected (clicked) team - blue. outline sits outside the border so it coexists
   with the current/next border colors. */
.team-card.selected  { outline: 2px solid var(--blue); outline-offset: 1px; background: rgba(96,165,250,.08); }
.team-card-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
.team-card-names { min-width: 0; }
.team-card-name  { font-size: 13px; font-weight: 700; color: var(--text); line-height: 1.2; text-decoration: none; display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.team-card-name:hover { color: var(--accent); }
.team-card-coach { font-size: 11px; color: var(--text2); margin-top: 1px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
/* Point tracker: spent sum (left) · remaining (right) / total - all white, readable. */
.team-card-pts   { display: flex; align-items: baseline; gap: 8px; flex-shrink: 0; white-space: nowrap; }
.team-card-pts .spent { font-size: 13px; font-weight: 700; color: var(--text); }
.team-card-pts .rem   { font-size: 17px; font-weight: 800; color: var(--text); }
.team-card-pts .total { font-size: 13px; color: var(--text); font-weight: 700; }
/* Icons in a single row across the card. */
.team-card-icons { display: flex; flex-wrap: nowrap; gap: 2px; margin-top: 8px; }
.team-card-icons img { width: 24px; height: 24px; image-rendering: pixelated; flex: 1 1 0; min-width: 0; object-fit: contain; }
/* Unfilled roster slots: a faded Pokéball placeholder. */
.slot-empty { opacity: .28; filter: grayscale(40%); }

/* ── MAIN COLUMN ── */
.main { flex: 1; min-width: 0; display: flex; flex-direction: column; }

/* ── STATUS STRIP (big current-drafter card + up-next) ── */
.status-strip {
  display: flex; align-items: stretch; justify-content: center; gap: 16px;
  padding: 16px; border-bottom: 1px solid var(--border);
}
.now-card {
  flex: 0 0 auto; min-width: 360px; max-width: 520px;
  background: var(--bg2); border: 2px solid var(--accent);
  box-shadow: 0 0 0 1px rgba(124,111,247,.3); border-radius: 12px; padding: 14px 16px;
  display: flex; flex-direction: column; align-items: center; text-align: center;
}
.now-label { font-size: 10px; font-weight: 700; letter-spacing: 1px; color: var(--accent); text-transform: uppercase; }
.now-coach { font-size: 22px; font-weight: 700; color: var(--text); line-height: 1.1; margin-top: 4px; }
.now-team  { font-size: 13px; color: var(--text2); margin-top: 2px; }
.now-icons { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 10px; min-height: 36px; justify-content: center; }
.now-icons img { width: 36px; height: 36px; image-rendering: pixelated; }
.now-pts   { display: flex; align-items: baseline; justify-content: center; gap: 8px; margin-top: 10px; }
.now-pts .spent { font-size: 14px; font-weight: 700; color: var(--text); }
.now-pts .rem   { font-size: 22px; font-weight: 800; color: var(--text); }
.now-pts .total { font-size: 14px; color: var(--text); font-weight: 700; }

.upnext-col { display: flex; flex-direction: column; gap: 10px; justify-content: flex-start; }
.upnext-card {
  background: var(--bg2); border: 1px solid var(--border); border-left: 3px solid var(--yellow);
  border-radius: 8px; padding: 10px 14px; text-align: center;
}
.upnext-label { font-size: 10px; font-weight: 700; letter-spacing: 1px; color: var(--yellow); text-transform: uppercase; }
.upnext-text  { font-size: 14px; font-weight: 600; color: var(--text); margin-top: 3px; }
.upnext-text .pl { color: var(--text2); font-weight: 400; }

/* Admin-only controls live here; hidden until Stage 3 wires auth. */
#admin-controls[hidden] { display: none; }

/* ── TOOLBAR / SEARCH ── (copied from Tier Editor for matching style) ── */
.toolbar {
  background: var(--bg2); border-bottom: 1px solid var(--border);
  padding: 10px 16px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
  position: sticky; top: var(--nav-h); z-index: 40;
}
.toolbar-search { position: relative; flex: 1; min-width: 200px; max-width: 360px; }
.toolbar-search input {
  width: 100%; background: var(--bg3); border: 1px solid var(--border); border-radius: 6px;
  padding: 7px 32px; color: var(--text); font-size: 13px; outline: none;
}
.toolbar-search input:focus { border-color: var(--accent); }
.toolbar-search input::placeholder { color: var(--text3); }
.toolbar-search .si { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--text3); pointer-events: none; }
.toolbar-search .sc { position: absolute; right: 8px; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--text3); cursor: pointer; font-size: 14px; padding: 0; line-height: 1; display: none; }
.toolbar-search .sc.visible { display: block; }
.toolbar-search .sc:hover { color: var(--text); }
/* Pool filter toggles (Hide Drafted / Sprites Only). */
.toolbar-toggle {
  display: inline-flex; align-items: center; gap: 5px; cursor: pointer; user-select: none;
  font-size: 12px; font-weight: 600; color: var(--text2);
  background: var(--bg3); border: 1px solid var(--border); border-radius: 6px; padding: 6px 10px;
  white-space: nowrap;
}
.toolbar-toggle:hover { color: var(--text); border-color: var(--accent); }
.toolbar-toggle input { accent-color: var(--accent); cursor: pointer; margin: 0; }
/* Filters: inline on desktop. The ellipsis button is mobile-only (hidden here). */
.toolbar-filters { display: flex; align-items: center; gap: 8px; }
#filter-btn { display: none; }

/* Selectable search results dropdown (mirrors the Planner; click scrolls to + flags
   the Pokémon in the pool). */
.search-results {
  position: absolute; top: calc(100% + 4px); left: 0; right: 0; z-index: 50;
  background: var(--bg2); border: 1px solid var(--border); border-radius: 8px;
  max-height: 320px; overflow-y: auto; display: none; box-shadow: 0 10px 30px rgba(0,0,0,.5);
}
.search-results.open { display: block; }
.sr-item { display: flex; align-items: center; gap: 9px; padding: 7px 10px; cursor: pointer; border-bottom: 1px solid var(--border); }
.sr-item:last-child { border-bottom: none; }
.sr-item:hover, .sr-item.highlighted { background: var(--bg3); }
.sr-item.drafted-r { opacity: .55; }
.sr-item.drafted-r .sr-name { text-decoration: line-through; }
.sr-sprite { width: 32px; height: 32px; image-rendering: pixelated; flex-shrink: 0; object-fit: contain; }
.sr-name { font-size: 13px; font-weight: 600; color: var(--text); }
.sr-sub { font-size: 10px; color: var(--text3); margin-top: 1px; }
.sr-pts { margin-left: auto; font-size: 12px; font-weight: 700; white-space: nowrap; }
.sr-empty { padding: 12px; color: var(--text3); font-size: 13px; text-align: center; }

/* ── POOL (tier lanes: point-value rail on the left, even card grid on the right) ── */
.pool { padding: 16px; display: flex; flex-direction: column; gap: 6px; }
.tier-lane {
  background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; overflow: hidden;
  display: flex; align-items: stretch;
}
.tier-lane.illegal-lane { border-color: rgba(224,85,85,.25); }
/* Left rail holds the point value and is the collapse toggle. */
.tier-rail {
  flex: 0 0 64px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1px;
  padding: 8px 6px; background: var(--bg3); border-right: 1px solid var(--border);
  cursor: pointer; user-select: none;
}
.tier-rail:hover { background: rgba(255,255,255,.03); }
.tier-rail.illegal-rail { background: rgba(224,85,85,.06); }
.tier-pts { font-size: 22px; font-weight: 800; color: var(--accent); line-height: 1; }
.tier-pts.illegal-pts { color: var(--red); font-size: 15px; letter-spacing: .5px; }
.tier-count { font-size: 13px; font-weight: 700; color: var(--text); margin-top: 4px; font-variant-numeric: tabular-nums; }
.tier-count .cslash { color: var(--text3); margin: 0 1px; font-weight: 400; }
.tier-collapse-icon { font-size: 9px; color: var(--text3); margin-top: 3px; }
/* Card area: an even grid so rows line up (note 21). auto-fill keeps columns tidy. */
.tier-body {
  flex: 1; min-width: 0; display: grid;
  grid-template-columns: repeat(auto-fill, minmax(68px, 1fr)); gap: 6px;
  padding: 10px 12px; align-content: start; justify-items: center;
}
.tier-lane.is-collapsed .tier-body { display: none; }
/* Collapsed lanes get compact: smaller point value, no count, a slim rail - so a
   stack of collapsed tiers takes minimal vertical room. */
.tier-lane.is-collapsed { }
.tier-lane.is-collapsed .tier-rail { flex-basis: 48px; flex-direction: row; gap: 6px; padding: 5px 8px; }
.tier-lane.is-collapsed .tier-pts { font-size: 14px; }
.tier-lane.is-collapsed .tier-pts.illegal-pts { font-size: 11px; }
.tier-lane.is-collapsed .tier-count { display: none; }
.tier-lane.is-collapsed .tier-collapse-icon { margin-top: 0; }
.tier-body.collapsed { display: none; }
.tier-empty-msg { font-size: 11px; color: var(--text3); font-style: italic; }

/* ── POKEMON CARD ── */
.pmon {
  display: flex; flex-direction: column; align-items: center;
  background: var(--bg3); border: 1px solid var(--border); border-radius: 6px;
  padding: 5px 5px 4px; width: 68px; position: relative; user-select: none; cursor: pointer;
  transition: border-color .15s, opacity .15s, box-shadow .15s, background .15s;
}
.pmon:hover { border-color: var(--accent); }
.pmon img { width: 40px; height: 40px; image-rendering: pixelated; pointer-events: none; display: block; }
/* Fixed two-line name area so 1- and 2-line names take the same height - keeps every
   card uniform so the grid rows line up cleanly (e.g. on the big draft-night screen). */
.pmon-name {
  font-size: 9px; color: var(--text2); text-align: center; margin-top: 3px; line-height: 1.2;
  pointer-events: none; width: 100%;
  height: 22px;                 /* ~2 lines at 9px/1.2 */
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
  word-break: break-word;
}

/* Illegal: not in this season's tier list. Image dimmed/grayscaled (image only). */
.pmon.illegal-card img { opacity: .4; filter: grayscale(70%); }

/* ── SPRITES-ONLY MODE: drop names, shrink cards so more fit per screen. ── */
.pool.sprites-only .tier-body { grid-template-columns: repeat(auto-fill, minmax(48px, 1fr)); }
.pool.sprites-only .pmon { width: 48px; padding: 4px; }
.pool.sprites-only .pmon img { width: 38px; height: 38px; }
.pool.sprites-only .pmon-name { display: none; }

/* ── COLOR STATE (one at a time, by precedence: blue > red > yellow) ──
   A card gets exactly one of team-pick / drafted / pinned, assigned in JS, so the
   precedence is enforced at assignment time and no !important juggling is needed. */
/* Team-selected (sidebar click) - blue. Highest priority. */
.pmon.team-pick { border-color: rgba(96,165,250,.7); background: rgba(96,165,250,.1); box-shadow: 0 0 0 1px rgba(96,165,250,.35); }
.pmon.team-pick .pmon-name { color: var(--blue); }
/* Drafted: legal but already taken. Red - NOT dimmed (dimming is reserved for illegal). */
.pmon.drafted { border-color: rgba(224,85,85,.7); background: rgba(224,85,85,.08); box-shadow: 0 0 0 1px rgba(224,85,85,.35); }
.pmon.drafted .pmon-name { color: var(--red); }
/* User pin (single-click) - yellow. Unlimited, multi-select. */
.pmon.pinned { border-color: rgba(240,192,96,.7); background: rgba(240,192,96,.1); box-shadow: 0 0 0 1px rgba(240,192,96,.35); }
.pmon.pinned .pmon-name { color: var(--yellow); }
/* Cross-division: taken by the OTHER division only - still available to me. A solid
   border in that division's color (set inline via --xdiv), no fill, distinct from the
   red "taken in my division" state. Can co-exist with red when taken in both. */
.pmon.xdiv { border-color: var(--xdiv, var(--accent)); box-shadow: 0 0 0 1px var(--xdiv, var(--accent)); }
/* When taken in both, red fill wins for the background but the cross-div ring shows. */
.pmon.drafted.xdiv { border-color: var(--xdiv, var(--accent)); }

/* Division toggle */
.div-toggle { display: inline-flex; gap: 0; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
.div-toggle button { background: var(--bg2); color: var(--text2); border: none; padding: 6px 14px; font-size: 12px; font-weight: 700; cursor: pointer; font-family: inherit; border-left: 1px solid var(--border); }
.div-toggle button:first-child { border-left: none; }
.div-toggle button.active { color: #fff; }
.div-toggle button .swatch { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; vertical-align: middle; }

/* Search: matches get accent ring, non-matches fade. Opacity-only so any color above
   survives the fade. */
.pmon.search-dim   { opacity: .18; }
.pmon.search-match { border-color: var(--accent); box-shadow: 0 0 0 1px rgba(124,111,247,.4); }
/* Flash ring when a search-result is selected and scrolled into view. */
.pmon.search-flash { animation: pmon-flash 1.6s ease; }
@keyframes pmon-flash {
  0%, 100% { box-shadow: 0 0 0 0 rgba(124,111,247,0); }
  15%      { box-shadow: 0 0 0 3px rgba(124,111,247,.9); }
  60%      { box-shadow: 0 0 0 3px rgba(124,111,247,.5); }
}

/* ── ADMIN OPERATOR HINT (shown in the status strip when logged in as admin) ── */
.op-hint { font-size: 11px; color: var(--text3); display: flex; align-items: center; gap: 6px; }
.op-hint[hidden] { display: none; }
.op-hint .op-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); }
.btn-undo { border-color: rgba(224,85,85,.4); color: #ffb3b3; }
.btn-undo:hover { border-color: var(--red); }
.btn-undo:disabled { color: var(--text3); border-color: var(--border); }

/* ── MODAL ── */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.6); z-index: 200;
  display: flex; align-items: center; justify-content: center; padding: 20px;
}
.modal-overlay[hidden] { display: none; }
.modal {
  background: var(--bg2); border: 1px solid var(--border); border-radius: 12px;
  padding: 20px; width: 100%; max-width: 380px; box-shadow: 0 12px 40px rgba(0,0,0,.5);
}
.modal h3 { font-size: 16px; font-weight: 700; margin-bottom: 6px; }
.modal p { font-size: 13px; color: var(--text2); line-height: 1.5; margin-bottom: 14px; }
.modal .modal-warn { color: var(--red); font-weight: 600; }
.modal input[type=email] {
  width: 100%; background: var(--bg3); border: 1px solid var(--border); border-radius: 7px;
  padding: 9px 12px; color: var(--text); font-size: 13px; outline: none; margin-bottom: 14px;
}
.modal input[type=email]:focus { border-color: var(--accent); }
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; }
.modal-mon { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
.modal-mon img { width: 48px; height: 48px; image-rendering: pixelated; }
.modal-mon .mm-name { font-size: 15px; font-weight: 700; }
.modal-mon .mm-cost { font-size: 12px; color: var(--accent); font-weight: 600; }

/* ── TOASTS ── */
#toast-container {
  position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
  z-index: 300; display: flex; flex-direction: column; gap: 8px; align-items: center;
}
.toast {
  background: var(--bg3); border: 1px solid var(--border); border-radius: 8px;
  padding: 10px 16px; font-size: 13px; color: var(--text); box-shadow: 0 4px 16px rgba(0,0,0,.4);
  animation: toast-in .18s ease; max-width: 90vw;
}
.toast.ok  { border-color: rgba(76,175,125,.5); }
.toast.err { border-color: rgba(224,85,85,.55); color: #ff9c9c; }
@keyframes toast-in { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

/* ── LOADING / ERROR BANNER ── */
.banner { margin: 16px; padding: 10px 14px; border: 1px solid var(--border); border-radius: 8px; background: var(--bg2); font-size: 12px; color: var(--text2); }
.banner.err { border-color: rgba(224,85,85,.5); color: var(--red); }
.banner.ok  { border-color: rgba(76,175,125,.4); color: var(--green); }

/* Mobile-only control; hidden on desktop. */
#mobile-teams-btn { display: none; }
#mobile-activity-btn { display: none; }

/* ── MOBILE (≤768px) ──
   The sidebar leaves the column and becomes a full-screen overlay, so the pool
   always spans the full width. The collapse toggle now switches between the
   draft-cards view (sidebar shown) and the tier-lanes view (sidebar hidden). */
@media (max-width: 768px) {
  .live-badge #live-text { display: none; }            /* dot only on phones */
  .btn { padding: 6px 10px; }

  /* Sidebar overlays the main area (position:fixed removes it from the flex row,
     so .main gets the full width). collapsed = slid off-canvas. */
  .sidebar {
    position: fixed; top: var(--nav-h); left: 0; bottom: 0; width: 100%;
    min-height: 0; z-index: 60; border-right: none;
    transform: translateX(0); transition: transform .2s ease;
  }
  .sidebar.collapsed { width: 100%; transform: translateX(-100%); }
  .sidebar-head { position: static; }

  /* Main now owns the full width; keep the big card from forcing overflow. */
  .status-strip { flex-direction: column; gap: 10px; padding: 12px; }
  .now-card { min-width: 0; max-width: none; width: 100%; }
  .upnext-col { width: 100%; }
  .pool { padding: 12px; }

  /* Toolbar layout on mobile: [☰ Teams] [search……] [⋯ filters] [☰ Log] on one row.
     The two filter checkboxes live in a popover opened by the ellipsis button. */
  #mobile-teams-btn { display: inline-flex; order: 1; flex-shrink: 0; }
  .toolbar-search   { order: 2; flex: 1 1 90px; min-width: 70px; max-width: none; }
  #filter-btn       { display: inline-flex; order: 3; flex-shrink: 0; }
  #mobile-activity-btn { display: inline-flex; order: 4; flex-shrink: 0; }

  /* Filters popover: anchored to the toolbar's right edge, below it. */
  .toolbar { position: sticky; }
  .toolbar-filters {
    position: absolute; top: calc(100% + 4px); right: 8px; z-index: 55;
    flex-direction: column; align-items: stretch; gap: 6px;
    background: var(--bg2); border: 1px solid var(--border); border-radius: 8px;
    padding: 8px; box-shadow: 0 10px 30px rgba(0,0,0,.5);
    display: none;
  }
  .toolbar-filters.open { display: flex; }
  .toolbar-filters .toolbar-toggle { font-size: 12px; }
  .toolbar .btn-icon { padding: 6px 9px; display: inline-flex; align-items: center; justify-content: center; }
  .toolbar .btn-icon svg { display: block; }

  /* The toolbar is the sticky element on mobile; pin it flush under the nav with
     no seam. (Pull up 1px to cover sub-pixel rounding between the two sticky bars.) */
  .toolbar { top: calc(var(--nav-h) - 1px); }

  /* Same non-shrink guard for the sidebar's team cards so they scroll, not smush. */
  .sidebar-body { flex: 1; min-height: 0; overflow-y: auto; }
  .sidebar-body .team-card { flex-shrink: 0; }
  /* Activity / sidebar overlays fill the viewport and scroll internally; the body
     behind them is locked (see toggleActivity/toggleSidebar adding .overlay-open). */
  .activity-body, .sidebar-body { -webkit-overflow-scrolling: touch; }

  /* Activity panel mirrors the sidebar overlay, sliding in from the right. */
  .activity {
    position: fixed; top: var(--nav-h); right: 0; bottom: 0; left: auto; width: 100%;
    min-height: 0; z-index: 60; border-left: none;
    transform: translateX(0); transition: transform .2s ease;
  }
  .activity.collapsed { width: 100%; transform: translateX(100%); }
  .activity.collapsed .activity-head { justify-content: flex-start; padding: 10px 12px; }
  .activity-head { position: static; }
  /* The log body fills remaining height and scrolls; sections keep their natural
     height (flex-shrink:0) so the body scrolls instead of compressing them. */
  .activity-body { flex: 1; min-height: 0; overflow-y: auto; }
  .activity-body .log-sec { flex-shrink: 0; }
  .log-sec-body { max-height: none; }
}
/* When a mobile overlay is open, lock the page behind it. */
body.overlay-open { overflow: hidden; }
</style>

<!-- Reusable modal (login + draft confirmation) -->

<!-- Toast feedback -->
