<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SBL Hub — Draft</title>

<!-- Supabase JS client (v2). Same pattern as hello-world.html. -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
/* ─────────────────────────────────────────────────────────────────────────────
   TOKENS — lifted verbatim from the Planner / Tier Editor so the three apps share
   one palette. (Planner uses --cb-green for colorblind mode; the hub doesn't need
   that axis yet, so --blue stays the plain blue.)
───────────────────────────────────────────────────────────────────────────── */
:root {
  --bg:#0f1117; --bg2:#1a1d27; --bg3:#22263a; --border:#2e3248;
  --text:#e8eaf6; --text2:#9095b8; --text3:#5a5f80;
  --accent:#7c6ff7; --red:#e05555; --green:#4caf7d; --blue:#60a5fa; --yellow:#f0c060;
  --nav-h: 49px;   /* measured at runtime so sticky offsets match the real nav */
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 13px; }

::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* ── NAV ── (logo + page tabs, matching the Tier Editor nav bar) ── */
nav {
  background: var(--bg2); border-bottom: 1px solid var(--border);
  display: flex; align-items: center; padding: 0 1rem;
  position: sticky; top: 0; z-index: 100;
}
.nav-logo {
  font-size: 15px; font-weight: 700; color: var(--accent);
  padding: 14px 16px 14px 0; margin-right: 8px;
  border-right: 1px solid var(--border); white-space: nowrap;
}
.nav-tabs { display: flex; align-items: stretch; }
.nav-tab {
  padding: 14px 16px; font-size: 13px; font-weight: 600; color: var(--text2);
  text-decoration: none; border-bottom: 2px solid transparent; transition: color .15s, border-color .15s;
}
.nav-tab:hover { color: var(--text); }
.nav-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
.nav-right { margin-left: auto; display: flex; align-items: center; gap: 10px; padding-left: 12px; }
.live-badge { display: flex; align-items: center; gap: 6px; font-size: 11px; font-weight: 600; color: var(--text3); }
.live-badge .live-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--text3); transition: background .2s; }
.live-badge.on  { color: var(--green); }
.live-badge.on  .live-dot { background: var(--green); box-shadow: 0 0 6px rgba(76,175,125,.8); animation: live-pulse 2s infinite; }
.live-badge.err { color: var(--red); }
.live-badge.err .live-dot { background: var(--red); }
@keyframes live-pulse { 0%,100% { opacity: 1; } 50% { opacity: .4; } }
.btn {
  background: var(--bg3); border: 1px solid var(--border); border-radius: 7px;
  color: var(--text); font-size: 12px; font-weight: 600; padding: 7px 14px; cursor: pointer;
  font-family: inherit; transition: border-color .15s, background .15s;
}
.btn:hover { border-color: var(--accent); }
.btn:disabled { opacity: .5; cursor: default; }
.btn-accent { background: var(--accent); border-color: var(--accent); color: #fff; }
.btn-accent:hover { filter: brightness(1.08); border-color: var(--accent); }
.user-chip { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--text2); }
.user-chip .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); }
.user-chip .email { color: var(--text); font-weight: 600; }

/* ── PAGE GRID: sidebar | main ── */
.layout { display: flex; align-items: flex-start; gap: 0; }

/* ── SIDEBAR ── */
.sidebar {
  width: 300px; flex-shrink: 0; border-right: 1px solid var(--border);
  background: var(--bg); min-height: calc(100vh - var(--nav-h));
  display: flex; flex-direction: column;
  transition: width .18s ease;
}
.sidebar.collapsed { width: 44px; }
.sidebar-head {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 12px; border-bottom: 1px solid var(--border);
  position: sticky; top: var(--nav-h); background: var(--bg); z-index: 5;
}
.sidebar-title { font-size: 11px; font-weight: 700; letter-spacing: .5px; color: var(--text3); text-transform: uppercase; white-space: nowrap; }
.sidebar.collapsed .sidebar-title { display: none; }
.sidebar-toggle {
  background: var(--bg3); border: 1px solid var(--border); border-radius: 6px;
  color: var(--text2); cursor: pointer; font-size: 13px; line-height: 1;
  padding: 5px 8px; margin-left: auto;
}
.sidebar.collapsed .sidebar-toggle { margin-left: 0; }
.sidebar-toggle:hover { color: var(--text); border-color: var(--accent); }
.sidebar-body { padding: 10px; display: flex; flex-direction: column; gap: 8px; overflow-y: auto; }
.sidebar.collapsed .sidebar-body { display: none; }

/* ── TEAM CARD (sidebar) ── */
.team-card {
  background: var(--bg2); border: 2px solid var(--border); border-radius: 10px;
  padding: 9px 11px; transition: border-color .15s, background .15s; cursor: pointer;
}
.team-card.is-current { border-color: var(--accent); box-shadow: 0 0 0 1px rgba(124,111,247,.35); }
.team-card.is-next    { border-color: var(--yellow); box-shadow: 0 0 0 1px rgba(240,192,96,.3); }
/* Selected (clicked) team — blue. outline sits outside the border so it coexists
   with the current/next border colors. */
.team-card.selected  { outline: 2px solid var(--blue); outline-offset: 1px; background: rgba(96,165,250,.08); }
.team-card-coach { font-size: 13px; font-weight: 700; color: var(--text); line-height: 1.2; }
.team-card-name  { font-size: 11px; color: var(--text2); margin-top: 1px; }
.team-card-row   { display: flex; align-items: center; gap: 8px; margin-top: 7px; }
.team-card-icons { display: flex; flex-wrap: wrap; gap: 2px; flex: 1; min-height: 22px; }
.team-card-icons img { width: 22px; height: 22px; image-rendering: pixelated; }
.team-card-pts   { font-size: 11px; font-weight: 700; color: var(--accent); white-space: nowrap; align-self: flex-end; }
.team-card-pts .total { color: var(--text3); font-weight: 600; }
/* Unfilled roster slots: a faded Pokéball placeholder. */
.slot-empty { opacity: .28; filter: grayscale(40%); }

/* ── MAIN COLUMN ── */
.main { flex: 1; min-width: 0; display: flex; flex-direction: column; }

/* ── STATUS STRIP (big current-drafter card + up-next) ── */
.status-strip {
  display: flex; align-items: stretch; gap: 16px;
  padding: 16px; border-bottom: 1px solid var(--border);
}
.now-card {
  flex: 0 0 auto; min-width: 360px; max-width: 520px;
  background: var(--bg2); border: 2px solid var(--accent);
  box-shadow: 0 0 0 1px rgba(124,111,247,.3); border-radius: 12px; padding: 14px 16px;
}
.now-label { font-size: 10px; font-weight: 700; letter-spacing: 1px; color: var(--accent); text-transform: uppercase; }
.now-coach { font-size: 22px; font-weight: 700; color: var(--text); line-height: 1.1; margin-top: 4px; }
.now-team  { font-size: 13px; color: var(--text2); margin-top: 2px; }
.now-icons { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 10px; min-height: 36px; }
.now-icons img { width: 36px; height: 36px; image-rendering: pixelated; }
.now-pts   { font-size: 13px; font-weight: 700; color: var(--accent); margin-top: 10px; }
.now-pts .total { color: var(--text3); font-weight: 600; }

.upnext-col { display: flex; flex-direction: column; gap: 10px; justify-content: flex-start; }
.upnext-card {
  background: var(--bg2); border: 1px solid var(--border); border-left: 3px solid var(--yellow);
  border-radius: 8px; padding: 10px 14px;
}
.upnext-label { font-size: 10px; font-weight: 700; letter-spacing: 1px; color: var(--yellow); text-transform: uppercase; }
.upnext-text  { font-size: 14px; font-weight: 600; color: var(--text); margin-top: 3px; }
.upnext-text .pl { color: var(--text2); font-weight: 400; }

/* Admin-only controls live here; hidden until Stage 3 wires auth. */
#admin-controls[hidden] { display: none; }

/* ── TOOLBAR / SEARCH ── (copied from Tier Editor for matching style) ── */
.toolbar {
  background: var(--bg2); border-bottom: 1px solid var(--border);
  padding: 10px 16px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
  position: sticky; top: var(--nav-h); z-index: 40;
}
.toolbar-search { position: relative; flex: 1; min-width: 200px; max-width: 360px; }
.toolbar-search input {
  width: 100%; background: var(--bg3); border: 1px solid var(--border); border-radius: 6px;
  padding: 7px 32px; color: var(--text); font-size: 13px; outline: none;
}
.toolbar-search input:focus { border-color: var(--accent); }
.toolbar-search input::placeholder { color: var(--text3); }
.toolbar-search .si { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--text3); pointer-events: none; }
.toolbar-search .sc { position: absolute; right: 8px; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--text3); cursor: pointer; font-size: 14px; padding: 0; line-height: 1; display: none; }
.toolbar-search .sc.visible { display: block; }
.toolbar-search .sc:hover { color: var(--text); }

/* ── POOL (tier lanes — Tier Editor format) ── */
.pool { padding: 16px; display: flex; flex-direction: column; gap: 6px; }
.tier-lane { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
.tier-lane.illegal-lane { border-color: rgba(224,85,85,.25); }
.tier-header { display: flex; align-items: center; gap: 10px; padding: 8px 12px; border-bottom: 1px solid var(--border); cursor: pointer; user-select: none; }
.tier-header:hover { background: rgba(255,255,255,.02); }
.tier-pts { font-size: 20px; font-weight: 700; color: var(--accent); min-width: 40px; }
.tier-pts.illegal-pts { color: var(--red); font-size: 14px; letter-spacing: .5px; }
.tier-label { font-size: 11px; color: var(--text3); font-weight: 600; }
.tier-count { font-size: 12px; color: var(--text3); margin-left: 6px; }
.tier-collapse-icon { font-size: 11px; color: var(--text3); margin-left: 4px; }
.tier-body { display: flex; flex-wrap: wrap; gap: 6px; padding: 10px 12px; min-height: 58px; }
.tier-body.collapsed { display: none; }
.tier-empty-msg { font-size: 11px; color: var(--text3); font-style: italic; }

/* ── POKEMON CARD ── */
.pmon {
  display: flex; flex-direction: column; align-items: center;
  background: var(--bg3); border: 1px solid var(--border); border-radius: 6px;
  padding: 5px 5px 3px; width: 68px; position: relative; user-select: none; cursor: pointer;
  transition: border-color .15s, opacity .15s, box-shadow .15s, background .15s;
}
.pmon:hover { border-color: var(--accent); }
.pmon img { width: 40px; height: 40px; image-rendering: pixelated; pointer-events: none; display: block; }
.pmon-name { font-size: 9px; color: var(--text2); text-align: center; margin-top: 2px; line-height: 1.2; word-break: break-word; pointer-events: none; }

/* Illegal: not in this season's tier list. Image dimmed/grayscaled (image only). */
.pmon.illegal-card img { opacity: .4; filter: grayscale(70%); }

/* ── COLOR STATE (one at a time, by precedence: blue > red > yellow) ──
   A card gets exactly one of team-pick / drafted / pinned, assigned in JS, so the
   precedence is enforced at assignment time and no !important juggling is needed. */
/* Team-selected (sidebar click) — blue. Highest priority. */
.pmon.team-pick { border-color: rgba(96,165,250,.7); background: rgba(96,165,250,.1); box-shadow: 0 0 0 1px rgba(96,165,250,.35); }
.pmon.team-pick .pmon-name { color: var(--blue); }
/* Drafted: legal but already taken. Red — NOT dimmed (dimming is reserved for illegal). */
.pmon.drafted { border-color: rgba(224,85,85,.7); background: rgba(224,85,85,.08); box-shadow: 0 0 0 1px rgba(224,85,85,.35); }
.pmon.drafted .pmon-name { color: var(--red); }
/* User pin (single-click) — yellow. Unlimited, multi-select. */
.pmon.pinned { border-color: rgba(240,192,96,.7); background: rgba(240,192,96,.1); box-shadow: 0 0 0 1px rgba(240,192,96,.35); }
.pmon.pinned .pmon-name { color: var(--yellow); }

/* Search: matches get accent ring, non-matches fade. Opacity-only so any color above
   survives the fade. */
.pmon.search-dim   { opacity: .18; }
.pmon.search-match { border-color: var(--accent); box-shadow: 0 0 0 1px rgba(124,111,247,.4); }

/* ── ADMIN OPERATOR HINT (shown in the status strip when logged in as admin) ── */
.op-hint { font-size: 11px; color: var(--text3); display: flex; align-items: center; gap: 6px; }
.op-hint .op-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); }
.btn-undo { border-color: rgba(224,85,85,.4); color: #ffb3b3; }
.btn-undo:hover { border-color: var(--red); }
.btn-undo:disabled { color: var(--text3); border-color: var(--border); }

/* ── MODAL ── */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.6); z-index: 200;
  display: flex; align-items: center; justify-content: center; padding: 20px;
}
.modal-overlay[hidden] { display: none; }
.modal {
  background: var(--bg2); border: 1px solid var(--border); border-radius: 12px;
  padding: 20px; width: 100%; max-width: 380px; box-shadow: 0 12px 40px rgba(0,0,0,.5);
}
.modal h3 { font-size: 16px; font-weight: 700; margin-bottom: 6px; }
.modal p { font-size: 13px; color: var(--text2); line-height: 1.5; margin-bottom: 14px; }
.modal .modal-warn { color: var(--red); font-weight: 600; }
.modal input[type=email] {
  width: 100%; background: var(--bg3); border: 1px solid var(--border); border-radius: 7px;
  padding: 9px 12px; color: var(--text); font-size: 13px; outline: none; margin-bottom: 14px;
}
.modal input[type=email]:focus { border-color: var(--accent); }
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; }
.modal-mon { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
.modal-mon img { width: 48px; height: 48px; image-rendering: pixelated; }
.modal-mon .mm-name { font-size: 15px; font-weight: 700; }
.modal-mon .mm-cost { font-size: 12px; color: var(--accent); font-weight: 600; }

/* ── TOASTS ── */
#toast-container {
  position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
  z-index: 300; display: flex; flex-direction: column; gap: 8px; align-items: center;
}
.toast {
  background: var(--bg3); border: 1px solid var(--border); border-radius: 8px;
  padding: 10px 16px; font-size: 13px; color: var(--text); box-shadow: 0 4px 16px rgba(0,0,0,.4);
  animation: toast-in .18s ease; max-width: 90vw;
}
.toast.ok  { border-color: rgba(76,175,125,.5); }
.toast.err { border-color: rgba(224,85,85,.55); color: #ff9c9c; }
@keyframes toast-in { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

/* ── LOADING / ERROR BANNER ── */
.banner { margin: 16px; padding: 10px 14px; border: 1px solid var(--border); border-radius: 8px; background: var(--bg2); font-size: 12px; color: var(--text2); }
.banner.err { border-color: rgba(224,85,85,.5); color: var(--red); }
.banner.ok  { border-color: rgba(76,175,125,.4); color: var(--green); }

/* Mobile-only control; hidden on desktop. */
#mobile-teams-btn { display: none; }

/* ── MOBILE (≤768px) ──
   The sidebar leaves the column and becomes a full-screen overlay, so the pool
   always spans the full width. The collapse toggle now switches between the
   draft-cards view (sidebar shown) and the tier-lanes view (sidebar hidden). */
@media (max-width: 768px) {
  /* Keep the nav on one row within the viewport — the tab strip absorbs the
     slack and scrolls horizontally instead of pushing the page wider. */
  nav { padding: 0 8px; }
  .nav-logo { padding: 12px 10px 12px 0; margin-right: 6px; font-size: 14px; flex-shrink: 0; }
  .nav-tabs { flex: 1 1 auto; min-width: 0; overflow-x: auto; scrollbar-width: none; }
  .nav-tabs::-webkit-scrollbar { display: none; }
  .nav-tab  { padding: 12px 10px; }
  .nav-right { flex-shrink: 0; gap: 8px; padding-left: 8px; }
  .live-badge #live-text { display: none; }            /* dot only on phones */
  .user-chip .email { max-width: 96px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .btn { padding: 6px 10px; }

  /* Sidebar overlays the main area (position:fixed removes it from the flex row,
     so .main gets the full width). collapsed = slid off-canvas. */
  .sidebar {
    position: fixed; top: var(--nav-h); left: 0; bottom: 0; width: 100%;
    min-height: 0; z-index: 60; border-right: none;
    transform: translateX(0); transition: transform .2s ease;
  }
  .sidebar.collapsed { width: 100%; transform: translateX(-100%); }
  .sidebar-head { position: static; }

  /* Main now owns the full width; keep the big card from forcing overflow. */
  .status-strip { flex-direction: column; gap: 10px; padding: 12px; }
  .now-card { min-width: 0; max-width: none; width: 100%; }
  .upnext-col { width: 100%; }
  .pool { padding: 12px; }

  /* Reveal the open-overlay button (lives in the toolbar, shown in lanes view). */
  #mobile-teams-btn { display: inline-flex; }
}
</style>
</head>
<body>

<nav>
  <div class="nav-logo">SBL Hub</div>
  <div class="nav-tabs">
    <a class="nav-tab" href="standings.html">Standings</a>
    <a class="nav-tab active" href="draft.html">Draft</a>
    <a class="nav-tab" href="schedule.html">Schedule</a>
    <a class="nav-tab" href="schedule.html">Matches</a>
  </div>
  <div class="nav-right">
    <span class="live-badge" id="live-badge" title="Live updates"><span class="live-dot"></span><span id="live-text">Connecting…</span></span>
    <button class="btn" id="login-btn" onclick="openLogin()" hidden>Admin Login</button>
    <span class="user-chip" id="user-chip" hidden>
      <span class="dot"></span><span class="email" id="user-email"></span>
      <button class="btn" onclick="doLogout()">Log out</button>
    </span>
  </div>
</nav>

<div id="boot-banner" class="banner">Loading draft…</div>

<div class="layout" id="layout" hidden>
  <!-- ── SIDEBAR: all teams in draft order ── -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-head">
      <span class="sidebar-title">Draft Order</span>
      <button class="sidebar-toggle" id="sidebar-toggle" title="Collapse sidebar" onclick="toggleSidebar()">⟨</button>
    </div>
    <div class="sidebar-body" id="sidebar-body"></div>
  </aside>

  <!-- ── MAIN ── -->
  <div class="main">
    <div class="status-strip">
      <div class="now-card" id="now-card"><!-- current drafter, big --></div>
      <div class="upnext-col">
        <div class="upnext-card">
          <div class="upnext-label">Up Next</div>
          <div class="upnext-text" id="upnext-text">—</div>
        </div>
        <div class="op-hint" id="op-hint" hidden>
          <span class="op-dot"></span>Operator mode — double-click a Pokémon to draft it
        </div>
        <!-- Admin-only draft controls, revealed once an admin session resolves. -->
        <div id="admin-controls" hidden>
          <button class="btn btn-undo" id="undo-btn" onclick="undoLastPick()">↩ Undo last pick</button>
        </div>
      </div>
    </div>

    <div class="toolbar">
      <button class="btn" id="mobile-teams-btn" onclick="toggleSidebar()">☰ Teams</button>
      <div class="toolbar-search">
        <span class="si">🔍</span>
        <input type="text" id="search-input" placeholder="Search Pokémon…"
               oninput="onSearch()" onkeydown="if(event.key==='Escape')clearSearch()">
        <button class="sc" id="search-clear" onclick="clearSearch()">✕</button>
      </div>
    </div>

    <div class="pool" id="pool"></div>
  </div>
</div>

<!-- Reusable modal (login + draft confirmation) -->
<div class="modal-overlay" id="modal-overlay" hidden onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modal"></div>
</div>

<!-- Toast feedback -->
<div id="toast-container"></div>

<script>
// ─────────────────────────────────────────────────────────────────────────────
// CONFIG — anon key is public by design; RLS enforces access (same as hello-world).
// ─────────────────────────────────────────────────────────────────────────────
const SUPABASE_URL      = "https://arypbyzeppbpbursmzcs.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_U8J3pV_KgomrWhbgoGBSUg_ttQ4d46m";
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// Where pokemon.json lives. The icons/ and sprites/ folders live alongside it in
// the same (planner) repo, so ASSET_BASE is derived by stripping the filename —
// one URL drives the data and the art. To move everything into the hub repo later,
// set this back to "./pokemon.json".
const POKEMON_JSON_URL = "https://patrickrolens.github.io/vgc-draft-planner/pokemon.json";
const ASSET_BASE = POKEMON_JSON_URL.replace(/[^/]*$/, '');  // ".../vgc-draft-planner/"

// Pokéball fallback — identical to the Planner / Tier Editor.
const POKEBALL_FALLBACK = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 40 40'%3E%3Ccircle cx='20' cy='20' r='19' fill='%23e05555' stroke='%23333' stroke-width='1.5'/%3E%3Cpath d='M1.1 20 A19 19 0 0 0 38.9 20 Z' fill='%23fff'/%3E%3Crect x='1' y='18' width='38' height='4' fill='%23333'/%3E%3Ccircle cx='20' cy='20' r='7' fill='%23fff' stroke='%23333' stroke-width='1.5'/%3E%3Ccircle cx='20' cy='20' r='3.5' fill='%23e8eaf6' stroke='%23333' stroke-width='1'/%3E%3C/svg%3E";

// ── STATE ──
let season       = null;            // current seasons row
let teams        = [];              // teams rows for the season
let coachByTeam  = {};              // team_id -> coach display_name
let tierCost     = {};              // pokemon_id -> point_cost (this season's legal set)
let draft        = null;            // drafts row (may be null until Patrick seeds it)
let picksByTeam  = {};              // team_id -> [pokemon_id, …] in draft order
let draftPicks   = [];              // global ordered [{pick_number, team_id, pokemon_id}] for undo
let draftedSet   = new Set();       // pokemon_id that are already drafted
let orderedTeams = [];              // team_ids in sidebar/draft order
let pokemonById  = {};              // id -> pokemon.json entry
let collapsed    = new Set();       // collapsed tier lane keys
let searchQ      = '';
let selectedTeam = null;            // team_id whose roster is blue-highlighted (one at a time)
let pinnedIds    = new Set();       // pokemon_id the viewer yellow-pinned (unlimited)
let currentUser  = null;            // Supabase auth user (null = anonymous)
let isAdmin      = false;           // profiles.is_admin for the logged-in user

// ─────────────────────────────────────────────────────────────────────────────
// URL / ID HELPERS — mirror the Planner so sprite/icon paths resolve identically.
//   Draft pool + sidebar use ICONS first, falling back to SPRITES, then Pokéball.
// ─────────────────────────────────────────────────────────────────────────────
function localId(id) {
  const m = String(id).match(/^(\d+)(.*)$/);
  if (!m) return id;
  const num = parseInt(m[1]);
  return (num >= 1000 ? String(num) : String(num).padStart(3, '0')) + m[2];
}
function iconUrl(mon)   { return mon && mon.id ? ASSET_BASE + 'icons/'   + localId(mon.id) + '.png' : ''; }
function spriteUrl(mon) { return mon && mon.id ? ASSET_BASE + 'sprites/' + localId(mon.id) + '.png' : ''; }

// icon → sprite → Pokéball, applied as an inline onerror chain on each <img>.
function attachIconFallback(img, mon) {
  img.onerror = function () {
    if (this.src.includes('/icons/'))       { this.src = spriteUrl(mon); }
    else if (this.src.includes('/sprites/')){ this.onerror = null; this.src = POKEBALL_FALLBACK; this.style.opacity = '.5'; }
    else                                    { this.onerror = null; this.src = POKEBALL_FALLBACK; this.style.opacity = '.5'; }
  };
}

// ─────────────────────────────────────────────────────────────────────────────
// SNAKE ORDER — for the read-only current/next display in Stage 1.
//   draft_order is the round-1 team sequence; even rounds (0-indexed) go forward,
//   odd rounds reverse. Skip-aware computation arrives in Stage 4.
// ─────────────────────────────────────────────────────────────────────────────
function teamAtPick(pickNumber) {
  if (!draft || !orderedTeams.length || !season) return null;
  const n = orderedTeams.length;
  const totalPicks = n * (season.team_size || 0);
  if (pickNumber < 1 || (totalPicks && pickNumber > totalPicks)) return null;
  const round = Math.floor((pickNumber - 1) / n);   // 0-indexed round
  const idx   = (pickNumber - 1) % n;
  return (round % 2 === 0) ? orderedTeams[idx] : orderedTeams[n - 1 - idx];
}

// ─────────────────────────────────────────────────────────────────────────────
// DATA LOAD
// ─────────────────────────────────────────────────────────────────────────────
async function loadData() {
  // pokemon.json (reference data) + Supabase rows in parallel.
  // Guard the fetch: a 404 returns an HTML page, which would otherwise blow up
  // as "Unexpected token '<'" when we try to JSON.parse it.
  const pjPromise = fetch(POKEMON_JSON_URL).then(async res => {
    const ct = res.headers.get('content-type') || '';
    if (!res.ok || !ct.includes('json')) {
      throw new Error(
        'pokemon.json not found at "' + POKEMON_JSON_URL + '" (got ' + res.status +
        (ct ? ', ' + ct.split(';')[0] : '') + '). ' +
        'Place pokemon.json next to draft.html or set POKEMON_JSON_URL to its real location.'
      );
    }
    return res.json();
  });

  const { data: seasonRow, error: seasonErr } = await sb
    .from('seasons').select('*').eq('is_current', true).maybeSingle();
  if (seasonErr) throw seasonErr;
  if (!seasonRow) throw new Error('No current season found (seasons.is_current = true).');
  season = seasonRow;

  const [teamsRes, ownersRes, tiersRes, draftRes] = await Promise.all([
    sb.from('teams').select('id,name,slug,logo_url,initial_seed').eq('season_id', season.id),
    sb.from('team_owners').select('team_id, ended_week, players(display_name)').is('ended_week', null),
    sb.from('season_pokemon_tiers').select('pokemon_id, point_cost').eq('season_id', season.id),
    sb.from('drafts').select('draft_order, current_pick_number, status').eq('season_id', season.id).maybeSingle(),
  ]);
  for (const r of [teamsRes, ownersRes, tiersRes, draftRes]) if (r.error) throw r.error;

  teams = teamsRes.data || [];
  const teamIds = teams.map(t => t.id);

  coachByTeam = {};
  (ownersRes.data || []).forEach(o => {
    if (teamIds.includes(o.team_id) && o.players) coachByTeam[o.team_id] = o.players.display_name;
  });

  tierCost = {};
  (tiersRes.data || []).forEach(t => { tierCost[t.pokemon_id] = t.point_cost; });

  draft = draftRes.data || null;

  // Drafted picks for this season's teams.
  picksByTeam = {}; draftedSet = new Set(); draftPicks = [];
  if (teamIds.length) {
    const { data: picks, error: picksErr } = await sb
      .from('team_pokemon')
      .select('team_id, pokemon_id, draft_pick_number')
      .eq('acquired_via', 'draft')
      .in('team_id', teamIds);
    if (picksErr) throw picksErr;
    (picks || [])
      .sort((a, b) => (a.draft_pick_number || 0) - (b.draft_pick_number || 0))
      .forEach(p => {
        (picksByTeam[p.team_id] = picksByTeam[p.team_id] || []).push(p.pokemon_id);
        draftedSet.add(p.pokemon_id);
        draftPicks.push({ pick_number: p.draft_pick_number, team_id: p.team_id, pokemon_id: p.pokemon_id });
      });
  }

  // Sidebar / draft order: prefer drafts.draft_order, else initial_seed, else name.
  if (draft && Array.isArray(draft.draft_order) && draft.draft_order.length) {
    orderedTeams = draft.draft_order.filter(id => teamIds.includes(id));
  } else {
    orderedTeams = [...teams]
      .sort((a, b) => (a.initial_seed ?? 999) - (b.initial_seed ?? 999) || a.name.localeCompare(b.name))
      .map(t => t.id);
  }

  // pokemon.json index.
  const pj = await pjPromise;
  const arr = Array.isArray(pj) ? pj : pj.pokemon;
  pokemonById = {};
  arr.forEach(p => { pokemonById[p.id] = p; });

  // Illegal lanes are noisy; collapse them by default.
  collapsed.add('illegal');
}

// ─────────────────────────────────────────────────────────────────────────────
// RENDER
// ─────────────────────────────────────────────────────────────────────────────
function teamName(id)  { const t = teams.find(x => x.id === id); return t ? t.name : '—'; }
function coachName(id) { return coachByTeam[id] || '—'; }
function pointsUsed(id){ return (picksByTeam[id] || []).reduce((s, pid) => s + (tierCost[pid] || 0), 0); }

// Render a row of drafted icons, optionally padded out to `slotCount` total slots
// with faded Pokéball placeholders for not-yet-drafted roster spots.
function iconRow(pokemonIds, sizeClass, slotCount) {
  const wrap = document.createElement('div');
  wrap.className = sizeClass;
  const ids = pokemonIds || [];
  ids.forEach(pid => {
    const mon = pokemonById[pid];
    const img = document.createElement('img');
    img.src = iconUrl(mon || { id: pid });
    img.alt = mon ? mon.name : pid;
    img.title = mon ? mon.name : pid;
    attachIconFallback(img, mon || { id: pid });
    wrap.appendChild(img);
  });
  // Pad to the team's roster size with empty (Pokéball) slots.
  const empties = Math.max(0, (slotCount || 0) - ids.length);
  for (let i = 0; i < empties; i++) {
    const img = document.createElement('img');
    img.className = 'slot-empty';
    img.src = POKEBALL_FALLBACK;
    img.alt = 'Empty slot';
    wrap.appendChild(img);
  }
  return wrap;
}

function renderSidebar() {
  const body = document.getElementById('sidebar-body');
  body.innerHTML = '';
  const currentTeam = draft ? teamAtPick(draft.current_pick_number) : null;
  const nextTeam    = draft ? teamAtPick((draft.current_pick_number || 0) + 1) : null;

  orderedTeams.forEach(id => {
    const card = document.createElement('div');
    card.className = 'team-card'
      + (id === currentTeam ? ' is-current' : '')
      + (id === nextTeam    ? ' is-next'    : '')
      + (id === selectedTeam ? ' selected'  : '');
    card.dataset.team = id;
    card.onclick = () => selectTeam(id);

    const coach = document.createElement('div');
    coach.className = 'team-card-coach';
    coach.textContent = coachName(id);
    card.appendChild(coach);

    const name = document.createElement('div');
    name.className = 'team-card-name';
    name.textContent = teamName(id);
    card.appendChild(name);

    const row = document.createElement('div');
    row.className = 'team-card-row';
    row.appendChild(iconRow(picksByTeam[id], 'team-card-icons', season.team_size));

    const pts = document.createElement('div');
    pts.className = 'team-card-pts';
    pts.innerHTML = pointsUsed(id) + '<span class="total">/' + (season.point_limit ?? '—') + '</span>';
    row.appendChild(pts);

    card.appendChild(row);
    body.appendChild(card);
  });
}

function renderStatus() {
  const nowCard = document.getElementById('now-card');
  const upnext  = document.getElementById('upnext-text');

  if (!draft || draft.status === 'pending' || !draft.current_pick_number) {
    nowCard.innerHTML = '<div class="now-label">On the Clock</div>'
      + '<div class="now-coach">Draft not started</div>'
      + '<div class="now-team">' + (draft ? 'Status: ' + draft.status : 'No draft row for this season yet') + '</div>';
    upnext.textContent = '—';
    return;
  }

  const curId = teamAtPick(draft.current_pick_number);
  if (draft.status === 'complete' || !curId) {
    nowCard.innerHTML = '<div class="now-label">Draft</div>'
      + '<div class="now-coach">Draft complete</div>'
      + '<div class="now-team">All ' + (orderedTeams.length * (season.team_size || 0)) + ' picks are in.</div>';
    upnext.textContent = '—';
    return;
  }

  nowCard.innerHTML = '';
  const lab = document.createElement('div'); lab.className = 'now-label'; lab.textContent = 'On the Clock';
  const co  = document.createElement('div'); co.className  = 'now-coach'; co.textContent  = coachName(curId);
  const tm  = document.createElement('div'); tm.className  = 'now-team';  tm.textContent  = teamName(curId);
  nowCard.appendChild(lab); nowCard.appendChild(co); nowCard.appendChild(tm);
  nowCard.appendChild(iconRow(picksByTeam[curId], 'now-icons', season.team_size));
  const pts = document.createElement('div'); pts.className = 'now-pts';
  pts.innerHTML = 'Points: ' + pointsUsed(curId) + '<span class="total">/' + (season.point_limit ?? '—') + '</span>';
  nowCard.appendChild(pts);

  const nextId = teamAtPick(draft.current_pick_number + 1);
  if (nextId) {
    upnext.innerHTML = teamName(nextId) + ' <span class="pl">(' + coachName(nextId) + ')</span>';
  } else {
    upnext.textContent = 'Draft complete';
  }
}

function makeCard(mon) {
  const isIllegal = !(mon.id in tierCost);

  const card = document.createElement('div');
  card.className = 'pmon' + (isIllegal ? ' illegal-card' : '');
  card.dataset.id = mon.id;
  card.dataset.name = mon.name.toLowerCase();
  card.title = mon.name;

  const img = document.createElement('img');
  img.src = iconUrl(mon);
  img.alt = mon.name;
  attachIconFallback(img, mon);
  card.appendChild(img);

  const nm = document.createElement('div');
  nm.className = 'pmon-name';
  nm.textContent = mon.name;
  card.appendChild(nm);

  // Single-click = yellow pin; double-click = draft (admin, Stage 3). A single
  // click is delayed briefly so a double-click can cancel it — otherwise every
  // draft would also leave a stray yellow pin behind.
  card.addEventListener('click', () => {
    clearTimeout(card._clickTimer);
    card._clickTimer = setTimeout(() => onPoolClick(mon, card), 220);
  });
  card.addEventListener('dblclick', () => {
    clearTimeout(card._clickTimer);
    onPoolDblClick(mon, card);
  });

  applyCardState(card, mon.id);   // initial color (drafted / selected-team / pinned)
  return card;
}

// ── COLOR STATE ──
// Exactly one color class per card, by precedence: team-pick (blue) > drafted (red)
// > pinned (yellow). illegal-card (image grayscale) and search-* (opacity) are
// independent axes and are left untouched here.
function applyCardState(card, id) {
  card.classList.remove('team-pick', 'drafted', 'pinned');
  const ownedBySelected = selectedTeam && (picksByTeam[selectedTeam] || []).includes(id);
  if (ownedBySelected)        card.classList.add('team-pick');
  else if (draftedSet.has(id)) card.classList.add('drafted');
  else if (pinnedIds.has(id))  card.classList.add('pinned');
}

// Reapply color state to every pool card (after a selection change).
function refreshPoolColors() {
  document.querySelectorAll('.pmon').forEach(card => applyCardState(card, card.dataset.id));
}

// ── INTERACTIONS ──
function onPoolClick(mon, card) {
  // A drafted Pokémon can't be a draft target, so it can't be yellow-pinned.
  if (draftedSet.has(mon.id)) return;
  if (pinnedIds.has(mon.id)) pinnedIds.delete(mon.id);
  else                       pinnedIds.add(mon.id);
  applyCardState(card, mon.id);
}

function onPoolDblClick(mon, card) {
  if (!isAdmin) return;                       // public viewers: double-click is inert
  if (!draft || draft.status !== 'in_progress') { showToast('The draft isn\u2019t in progress.', 'err'); return; }
  if (!(mon.id in tierCost)) { showToast(mon.name + ' isn\u2019t a legal pick this season.', 'err'); return; }
  if (draftedSet.has(mon.id)) { showToast(mon.name + ' has already been drafted.', 'err'); return; }

  const teamId = teamAtPick(draft.current_pick_number);
  if (!teamId) { showToast('No team is on the clock.', 'err'); return; }

  const cost  = tierCost[mon.id] || 0;
  const left  = remaining(teamId);
  const rosterFull = (picksByTeam[teamId] || []).length >= (season.team_size || Infinity);

  // Confirmation — surfaces team, cost, and any budget/roster warning before committing.
  let warn = '';
  if (cost > left)  warn += '<p class="modal-warn">Over budget by ' + (cost - left) + ' pts (' + left + ' remaining).</p>';
  if (rosterFull)   warn += '<p class="modal-warn">' + teamName(teamId) + ' already has a full roster.</p>';

  openModal(
    '<h3>Draft this Pok\u00e9mon?</h3>'
    + '<div class="modal-mon">'
    +   '<img src="' + iconUrl(mon) + '" alt="">'
    +   '<div><div class="mm-name">' + escapeHtml(mon.name) + '</div>'
    +   '<div class="mm-cost">' + cost + ' pts</div></div>'
    + '</div>'
    + '<p>To <b>' + escapeHtml(teamName(teamId)) + '</b> (' + escapeHtml(coachName(teamId)) + ')'
    +   ' \u2014 pick #' + draft.current_pick_number + '. '
    +   'Budget after: ' + (left - cost) + '/' + (season.point_limit ?? '\u2014') + '.</p>'
    + warn
    + '<div class="modal-actions">'
    +   '<button class="btn" onclick="closeModal()">Cancel</button>'
    +   '<button class="btn btn-accent" id="confirm-draft-btn">Draft</button>'
    + '</div>'
  );
  document.getElementById('confirm-draft-btn').onclick = () => {
    closeModal();
    draftPokemon(mon, teamId, draft.current_pick_number);
  };
}

// Points a team has left to spend.
function remaining(teamId) { return (season.point_limit ?? 0) - pointsUsed(teamId); }

// Commit a pick: insert the team_pokemon row, advance (or complete) the draft,
// then update local state and re-render. No realtime yet (Stage 5) — we update
// optimistically after the writes succeed.
async function draftPokemon(mon, teamId, pickNumber) {
  const totalPicks = orderedTeams.length * (season.team_size || 0);
  const isLast = totalPicks && pickNumber >= totalPicks;

  try {
    const { error: insErr } = await sb.from('team_pokemon').insert({
      team_id: teamId,
      pokemon_id: mon.id,
      acquired_week: 1,                 // draft picks join in week 1 per the schema
      acquired_via: 'draft',
      draft_pick_number: pickNumber,
    });
    if (insErr) throw insErr;

    const update = isLast
      ? { current_pick_number: pickNumber + 1, status: 'complete', completed_at: new Date().toISOString() }
      : { current_pick_number: pickNumber + 1 };
    const { error: updErr } = await sb.from('drafts').update(update).eq('season_id', season.id);
    if (updErr) throw updErr;

    // Local state.
    (picksByTeam[teamId] = picksByTeam[teamId] || []).push(mon.id);
    draftedSet.add(mon.id);
    draftPicks.push({ pick_number: pickNumber, team_id: teamId, pokemon_id: mon.id });
    pinnedIds.delete(mon.id);           // a drafted Pokémon clears its yellow pin
    draft.current_pick_number = pickNumber + 1;
    if (isLast) { draft.status = 'complete'; }

    renderSidebar();
    renderStatus();
    refreshPoolColors();
    updateUndoButton();
    showToast('Drafted ' + mon.name + ' to ' + teamName(teamId) + '.', 'ok');
    if (isLast) showToast('Draft complete!', 'ok');
  } catch (err) {
    console.error(err);
    showToast('Draft failed: ' + (err.message || err), 'err');
  }
}

function selectTeam(id) {
  selectedTeam = (selectedTeam === id) ? null : id;   // click again to deselect
  document.querySelectorAll('.team-card').forEach(c =>
    c.classList.toggle('selected', c.dataset.team === selectedTeam));
  refreshPoolColors();
  // On mobile the sidebar is an overlay; selecting a team closes it so the
  // newly blue-highlighted picks are visible in the pool underneath.
  if (selectedTeam && isMobile()) setSidebarCollapsed(true);
}

function makeLane(key, mons) {
  const isIllegal = key === 'illegal';
  const lane = document.createElement('div');
  lane.className = 'tier-lane' + (isIllegal ? ' illegal-lane' : '');

  const header = document.createElement('div');
  header.className = 'tier-header';
  header.onclick = () => { collapsed.has(key) ? collapsed.delete(key) : collapsed.add(key); renderPool(); };

  const pts = document.createElement('div');
  pts.className = 'tier-pts' + (isIllegal ? ' illegal-pts' : '');
  pts.textContent = isIllegal ? 'ILLEGAL' : String(key);
  header.appendChild(pts);

  if (!isIllegal) {
    const lbl = document.createElement('div'); lbl.className = 'tier-label'; lbl.textContent = 'pts';
    header.appendChild(lbl);
  }
  const cnt = document.createElement('div'); cnt.className = 'tier-count'; cnt.textContent = '(' + mons.length + ')';
  header.appendChild(cnt);
  const ci = document.createElement('span'); ci.className = 'tier-collapse-icon'; ci.textContent = collapsed.has(key) ? '▶' : '▼';
  header.appendChild(ci);
  lane.appendChild(header);

  const bodyEl = document.createElement('div');
  bodyEl.className = 'tier-body' + (collapsed.has(key) ? ' collapsed' : '');
  if (mons.length === 0) {
    const msg = document.createElement('span'); msg.className = 'tier-empty-msg'; msg.textContent = 'No Pokémon in this tier';
    bodyEl.appendChild(msg);
  } else {
    mons.sort((a, b) => a.name.localeCompare(b.name));
    mons.forEach(m => bodyEl.appendChild(makeCard(m)));
  }
  lane.appendChild(bodyEl);
  return lane;
}

function renderPool() {
  const pool = document.getElementById('pool');
  pool.innerHTML = '';

  // Legal lanes: distinct point costs present this season, descending.
  const costs = [...new Set(Object.values(tierCost))].sort((a, b) => b - a);
  const allMons = Object.values(pokemonById);

  costs.forEach(cost => {
    const mons = allMons.filter(m => tierCost[m.id] === cost);
    pool.appendChild(makeLane(cost, mons));
  });

  // Illegal lane: everything not in this season's tier list.
  const illegalMons = allMons.filter(m => !(m.id in tierCost));
  pool.appendChild(makeLane('illegal', illegalMons));

  applySearch();
}

// ── SEARCH (opacity-only dim; matches keep their color) ──
function onSearch() {
  searchQ = document.getElementById('search-input').value.trim().toLowerCase();
  document.getElementById('search-clear').classList.toggle('visible', searchQ.length > 0);
  applySearch();
}
function clearSearch() {
  document.getElementById('search-input').value = '';
  searchQ = '';
  document.getElementById('search-clear').classList.remove('visible');
  applySearch();
}
function applySearch() {
  document.querySelectorAll('.pmon').forEach(card => {
    const name = card.dataset.name || '';
    if (!searchQ)                 { card.classList.remove('search-dim', 'search-match'); }
    else if (name.includes(searchQ)) { card.classList.remove('search-dim'); card.classList.add('search-match'); }
    else                          { card.classList.add('search-dim'); card.classList.remove('search-match'); }
  });
}

// ── SIDEBAR COLLAPSE ──
function isMobile() { return window.matchMedia('(max-width: 768px)').matches; }

function setSidebarCollapsed(collapsed) {
  document.getElementById('sidebar').classList.toggle('collapsed', collapsed);
  document.getElementById('sidebar-toggle').textContent = collapsed ? '⟩' : '⟨';
}

function toggleSidebar() {
  const isCollapsed = document.getElementById('sidebar').classList.contains('collapsed');
  setSidebarCollapsed(!isCollapsed);
}

// ── KEYBOARD ──
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    if (!document.getElementById('modal-overlay').hidden) closeModal();
    else clearSearch();
  }
  if ((e.key === 'f' || e.key === 'F') && (e.ctrlKey || e.metaKey)) { e.preventDefault(); document.getElementById('search-input').focus(); }
});

// ─────────────────────────────────────────────────────────────────────────────
// AUTH — magic-link login; admin status comes from profiles.is_admin.
// ─────────────────────────────────────────────────────────────────────────────
async function initAuth() {
  // Reflect the existing session (also catches the magic-link redirect, which
  // supabase-js parses out of the URL on load).
  const { data: { session } } = await sb.auth.getSession();
  await applySession(session);

  // React to sign-in / sign-out (including the post-redirect SIGNED_IN event).
  sb.auth.onAuthStateChange((_event, session) => { applySession(session); });
}

async function applySession(session) {
  currentUser = session?.user || null;
  isAdmin = false;
  if (currentUser) {
    // profiles RLS lets a user read their own row.
    const { data, error } = await sb.from('profiles').select('is_admin').eq('id', currentUser.id).maybeSingle();
    if (error) console.error('profile lookup failed:', error);
    isAdmin = !!(data && data.is_admin);
  }
  updateAuthUI();
}

function updateAuthUI() {
  const loginBtn = document.getElementById('login-btn');
  const chip     = document.getElementById('user-chip');
  const opHint   = document.getElementById('op-hint');
  if (currentUser) {
    loginBtn.hidden = true;
    chip.hidden = false;
    document.getElementById('user-email').textContent = currentUser.email + (isAdmin ? '' : ' (no admin)');
  } else {
    loginBtn.hidden = false;
    chip.hidden = true;
  }
  // Operator hint and controls only when an admin can actually draft.
  opHint.hidden = !isAdmin;
  document.getElementById('admin-controls').hidden = !isAdmin;
  updateUndoButton();
}

// Enable Undo only when there's a pick to reverse.
function updateUndoButton() {
  const btn = document.getElementById('undo-btn');
  if (!btn) return;
  btn.disabled = !(isAdmin && draftPicks.length > 0);
}

// Reverse the most recent pick: delete its team_pokemon row, move the pointer
// back to that drafter, and return the Pokémon to the pool. No skips exist, so
// the last pick is simply the highest draft_pick_number.
function undoLastPick() {
  if (!isAdmin) return;
  if (!draftPicks.length) { showToast('Nothing to undo.', 'err'); return; }
  const last = draftPicks[draftPicks.length - 1];
  const mon  = pokemonById[last.pokemon_id];
  const monName = mon ? mon.name : last.pokemon_id;

  openModal(
    '<h3>Undo last pick?</h3>'
    + '<p>This removes <b>' + escapeHtml(monName) + '</b> from <b>' + escapeHtml(teamName(last.team_id)) + '</b>'
    +   ' (pick #' + last.pick_number + ') and puts it back in the pool. '
    +   '<b>' + escapeHtml(coachName(last.team_id)) + '</b> goes back on the clock.</p>'
    + '<div class="modal-actions">'
    +   '<button class="btn" onclick="closeModal()">Cancel</button>'
    +   '<button class="btn btn-undo" id="confirm-undo-btn">Undo</button>'
    + '</div>'
  );
  document.getElementById('confirm-undo-btn').onclick = () => { closeModal(); performUndo(last); };
}

async function performUndo(last) {
  try {
    const { error: delErr } = await sb.from('team_pokemon')
      .delete()
      .eq('team_id', last.team_id)
      .eq('pokemon_id', last.pokemon_id)
      .eq('acquired_via', 'draft');
    if (delErr) throw delErr;

    // Pointer goes back to the undone pick; reopening the draft if it had completed.
    const { error: updErr } = await sb.from('drafts')
      .update({ current_pick_number: last.pick_number, status: 'in_progress', completed_at: null })
      .eq('season_id', season.id);
    if (updErr) throw updErr;

    // Local state.
    draftPicks.pop();
    draftedSet.delete(last.pokemon_id);
    const arr = picksByTeam[last.team_id] || [];
    const at = arr.lastIndexOf(last.pokemon_id);
    if (at !== -1) arr.splice(at, 1);
    draft.current_pick_number = last.pick_number;
    draft.status = 'in_progress';

    renderSidebar();
    renderStatus();
    refreshPoolColors();
    updateUndoButton();
    const mon = pokemonById[last.pokemon_id];
    showToast('Undid pick #' + last.pick_number + ' — ' + (mon ? mon.name : last.pokemon_id) + ' returned to the pool.', 'ok');
  } catch (err) {
    console.error(err);
    showToast('Undo failed: ' + (err.message || err), 'err');
  }
}

function openLogin() {
  openModal(
    '<h3>Admin Login</h3>'
    + '<p>Enter your admin email and we\u2019ll send a magic link. Click it on this device to sign in.</p>'
    + '<input type="email" id="login-email" placeholder="you@example.com" autocomplete="email">'
    + '<div class="modal-actions">'
    +   '<button class="btn" onclick="closeModal()">Cancel</button>'
    +   '<button class="btn btn-accent" id="send-link-btn" onclick="sendMagicLink()">Send link</button>'
    + '</div>'
  );
  setTimeout(() => document.getElementById('login-email').focus(), 30);
  document.getElementById('login-email').addEventListener('keydown', e => { if (e.key === 'Enter') sendMagicLink(); });
}

async function sendMagicLink() {
  const email = (document.getElementById('login-email').value || '').trim();
  if (!email) { showToast('Enter an email first.', 'err'); return; }
  const btn = document.getElementById('send-link-btn');
  btn.disabled = true; btn.textContent = 'Sending…';
  // Redirect back to this exact page; matches the allow-listed hub URL.
  const redirectTo = window.location.origin + window.location.pathname;
  const { error } = await sb.auth.signInWithOtp({ email, options: { emailRedirectTo: redirectTo } });
  if (error) {
    console.error(error);
    showToast('Could not send link: ' + error.message, 'err');
    btn.disabled = false; btn.textContent = 'Send link';
    return;
  }
  closeModal();
  showToast('Magic link sent to ' + email + '. Check your inbox.', 'ok');
}

async function doLogout() {
  await sb.auth.signOut();
  showToast('Logged out.', 'ok');
}

// ── MODAL ──
function openModal(html) {
  document.getElementById('modal').innerHTML = html;
  document.getElementById('modal-overlay').hidden = false;
}
function closeModal() { document.getElementById('modal-overlay').hidden = true; }

// ── TOAST ──
function showToast(msg, kind) {
  const t = document.createElement('div');
  t.className = 'toast' + (kind ? ' ' + kind : '');
  t.textContent = msg;
  document.getElementById('toast-container').appendChild(t);
  setTimeout(() => { t.style.transition = 'opacity .3s'; t.style.opacity = '0'; setTimeout(() => t.remove(), 300); }, 3200);
}

// ── MISC ──
function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
}

// ─────────────────────────────────────────────────────────────────────────────
// REALTIME — subscribe to draft picks + the draft row. On any change, re-fetch the
// small slice of state and re-render. Re-fetching (rather than diffing the event
// payload) keeps inserts/updates/deletes uniform and sidesteps the thin DELETE
// payload. Client-only state (yellow pins, team selection, collapsed lanes,
// search) lives in globals the renderers read, so it survives a refresh untouched.
// ─────────────────────────────────────────────────────────────────────────────
let liveChannel = null;
let refreshTimer = null;

function initRealtime() {
  liveChannel = sb.channel('draft-live')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'team_pokemon' }, scheduleRefresh)
    .on('postgres_changes', { event: '*', schema: 'public', table: 'drafts' }, scheduleRefresh)
    .subscribe(status => updateLiveBadge(status));
}

function updateLiveBadge(status) {
  const badge = document.getElementById('live-badge');
  const text  = document.getElementById('live-text');
  badge.classList.remove('on', 'err');
  if (status === 'SUBSCRIBED')      { badge.classList.add('on');  text.textContent = 'Live'; }
  else if (status === 'CHANNEL_ERROR' || status === 'TIMED_OUT') { badge.classList.add('err'); text.textContent = 'Reconnecting…'; }
  else                              { text.textContent = 'Connecting…'; }
}

// Coalesce bursts of events (e.g. an INSERT + a drafts UPDATE from one pick) into
// a single re-fetch.
function scheduleRefresh() {
  clearTimeout(refreshTimer);
  refreshTimer = setTimeout(refreshDraftState, 200);
}

async function refreshDraftState() {
  try {
    const teamIds = teams.map(t => t.id);

    const [draftRes, picksRes] = await Promise.all([
      sb.from('drafts').select('draft_order, current_pick_number, status').eq('season_id', season.id).maybeSingle(),
      teamIds.length
        ? sb.from('team_pokemon').select('team_id, pokemon_id, draft_pick_number').eq('acquired_via', 'draft').in('team_id', teamIds)
        : Promise.resolve({ data: [], error: null }),
    ]);
    if (draftRes.error) throw draftRes.error;
    if (picksRes.error) throw picksRes.error;

    draft = draftRes.data || null;

    // Rebuild pick-derived state from scratch.
    picksByTeam = {}; draftedSet = new Set(); draftPicks = [];
    (picksRes.data || [])
      .sort((a, b) => (a.draft_pick_number || 0) - (b.draft_pick_number || 0))
      .forEach(p => {
        (picksByTeam[p.team_id] = picksByTeam[p.team_id] || []).push(p.pokemon_id);
        draftedSet.add(p.pokemon_id);
        draftPicks.push({ pick_number: p.draft_pick_number, team_id: p.team_id, pokemon_id: p.pokemon_id });
      });

    // A Pokémon that's now drafted can't stay yellow-pinned (matches the local rule).
    pinnedIds.forEach(id => { if (draftedSet.has(id)) pinnedIds.delete(id); });

    // Draft order can change (e.g. admin edit), so recompute it too.
    if (draft && Array.isArray(draft.draft_order) && draft.draft_order.length) {
      orderedTeams = draft.draft_order.filter(id => teamIds.includes(id));
    } else {
      orderedTeams = [...teams]
        .sort((a, b) => (a.initial_seed ?? 999) - (b.initial_seed ?? 999) || a.name.localeCompare(b.name))
        .map(t => t.id);
    }

    renderSidebar();
    renderStatus();
    refreshPoolColors();
    updateUndoButton();
  } catch (err) {
    console.error('Realtime refresh failed:', err);
  }
}

// Keep --nav-h in sync with the actual nav height so the sticky toolbar and the
// mobile sidebar overlay line up exactly (the nav is shorter on phones).
function setNavHeight() {
  const nav = document.querySelector('nav');
  if (nav) document.documentElement.style.setProperty('--nav-h', nav.offsetHeight + 'px');
}
window.addEventListener('resize', setNavHeight);

// ─────────────────────────────────────────────────────────────────────────────
// BOOT
// ─────────────────────────────────────────────────────────────────────────────
async function init() {
  const banner = document.getElementById('boot-banner');
  try {
    await loadData();
    renderSidebar();
    renderStatus();
    renderPool();
    setNavHeight();
    if (isMobile()) setSidebarCollapsed(true);   // phones open to the tier-lanes view
    banner.hidden = true;
    document.getElementById('layout').hidden = false;
    initAuth();       // non-blocking; reveals admin controls once the session resolves
    initRealtime();   // live updates for all viewers
  } catch (err) {
    console.error(err);
    banner.className = 'banner err';
    banner.textContent = 'Could not load the draft: ' + (err.message || err);
  }
}
init();
