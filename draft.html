<script>
// ─────────────────────────────────────────────────────────────────────────────
// CONFIG - anon key is public by design; RLS enforces access (same as hello-world).
// ─────────────────────────────────────────────────────────────────────────────
const SUPABASE_URL      = "https://arypbyzeppbpbursmzcs.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_U8J3pV_KgomrWhbgoGBSUg_ttQ4d46m";
const sb = window.sb || supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// Paginate past Supabase's 1000-row response cap. fetchAllIn scopes by an IN() list;
// fetchAll pulls an entire (unfiltered) table.
async function fetchAllIn(table, columns, column, values) {
  const IN_CHUNK = 300, PAGE = 1000, out = [];
  for (let i = 0; i < values.length; i += IN_CHUNK) {
    const slice = values.slice(i, i + IN_CHUNK);
    for (let from = 0; ; from += PAGE) {
      const { data, error } = await sb.from(table).select(columns)
        .in(column, slice).range(from, from + PAGE - 1);
      if (error) throw error;
      if (data && data.length) out.push(...data);
      if (!data || data.length < PAGE) break;
    }
  }
  return out;
}
async function fetchAll(table, columns) {
  const PAGE = 1000, out = [];
  for (let from = 0; ; from += PAGE) {
    const { data, error } = await sb.from(table).select(columns).range(from, from + PAGE - 1);
    if (error) throw error;
    if (data && data.length) out.push(...data);
    if (!data || data.length < PAGE) break;
  }
  return out;
}

// Where pokemon.json lives. The icons/ and sprites/ folders live alongside it in
// the same (planner) repo, so ASSET_BASE is derived by stripping the filename -
// one URL drives the data and the art. To move everything into the hub repo later,
// set this back to "./pokemon.json".
const POKEMON_JSON_URL = "https://planner.springfieldbattleleague.com/pokemon.json";
const ASSET_BASE = POKEMON_JSON_URL.replace(/[^/]*$/, '');  // ".../vgc-draft-planner/"

// Pokéball fallback - identical to the Planner / Tier Editor.
const POKEBALL_FALLBACK = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 40 40'%3E%3Ccircle cx='20' cy='20' r='19' fill='%23e05555' stroke='%23333' stroke-width='1.5'/%3E%3Cpath d='M1.1 20 A19 19 0 0 0 38.9 20 Z' fill='%23fff'/%3E%3Crect x='1' y='18' width='38' height='4' fill='%23333'/%3E%3Ccircle cx='20' cy='20' r='7' fill='%23fff' stroke='%23333' stroke-width='1.5'/%3E%3Ccircle cx='20' cy='20' r='3.5' fill='%23e8eaf6' stroke='%23333' stroke-width='1'/%3E%3C/svg%3E";

// ── STATE ──
let season       = null;            // current seasons row
let teams        = [];              // teams rows for the season
let coachByTeam  = {};              // team_id -> current coach display_name
let ownersByTeam = {};              // team_id -> [{started_week, ended_week, name}] stints
let txns         = [];              // unified transaction feed for the activity log
let tierCost     = {};              // pokemon_id -> point_cost (this season's legal set)
let draft        = null;            // ACTIVE division's drafts row (or the sole row when undivided)
let picksByTeam  = {};              // team_id -> [pokemon_id, …] CURRENT active roster (icons/points)
let rosterByTeam = {};              // alias of the above current-roster map
let draftPicks   = [];              // global ordered [{pick_number, team_id, pokemon_id}] for undo
let draftedSet   = new Set();       // ACTIVE division's taken pokemon_ids (derived; see refreshActiveDivision)
let orderedTeams = [];              // team_ids in sidebar/draft order (ACTIVE division)

// ── DIVISION STATE ──
// A season "has divisions" iff `divisions` has rows. When it does, the board shows
// a toggle; the ACTIVE division drives draft/orderedTeams/draftedSet via accessors.
let divisions       = [];           // [{id, name, abbr, color, sort_order}] sorted
let activeDivisionId = null;        // currently-toggled division id (null when undivided)
let draftByDivision = {};           // divisionId|'__none__' -> drafts row
let teamDivision    = {};           // team_id -> division_id (null when undivided)
let takenByDivision = {};           // pokemon_id -> Set(division_id|'__none__')  (current rosters)
let orderByDivision = {};           // divisionId|'__none__' -> [team_id] ordered
let pokemonById  = {};              // id -> pokemon.json entry
let collapsed    = new Set();       // collapsed tier lane keys
let searchQ      = '';
let hideDrafted  = false;           // pool filter: omit rostered Pokémon
let spritesOnly  = false;           // pool view: sprites only, no names, smaller cards
let selectedTeam = null;            // team_id whose roster is blue-highlighted (one at a time)
let pinnedIds    = new Set();       // pokemon_id the viewer yellow-pinned (unlimited)

// ── CLIENT-ONLY PERSISTENCE (yellow pins + blue team selection survive refresh) ──
// Scoped per-season so switching seasons doesn't carry highlights across. localStorage
// is viewer-local; it never touches the database.
function persistKey() { return 'sbl-draft-' + (season ? season.id : 'none'); }
function savePins() {
  try {
    localStorage.setItem(persistKey(), JSON.stringify({
      pins: [...pinnedIds], sel: selectedTeam,
      hideDrafted: hideDrafted, spritesOnly: spritesOnly,
    }));
  } catch (e) { /* private mode / disabled storage - silently skip */ }
}
function loadPins() {
  try {
    const raw = localStorage.getItem(persistKey());
    if (!raw) return;
    const data = JSON.parse(raw);
    if (Array.isArray(data.pins)) pinnedIds = new Set(data.pins.filter(id => !draftedSet.has(id)));
    if (data.sel && teams.some(t => t.id === data.sel)) selectedTeam = data.sel;
    hideDrafted = !!data.hideDrafted;
    spritesOnly = !!data.spritesOnly;
    // Reflect restored toggles in the checkboxes.
    const hd = document.getElementById('hide-drafted'); if (hd) hd.checked = hideDrafted;
    const so = document.getElementById('sprites-only'); if (so) so.checked = spritesOnly;
  } catch (e) { /* ignore corrupt/unavailable storage */ }
}
let isAdmin      = false;           // profiles.is_admin for the logged-in user

// ─────────────────────────────────────────────────────────────────────────────
// URL / ID HELPERS - mirror the Planner so sprite/icon paths resolve identically.
//   Draft pool + sidebar use ICONS first, falling back to SPRITES, then Pokéball.
// ─────────────────────────────────────────────────────────────────────────────
function localId(id) {
  const m = String(id).match(/^(\d+)(.*)$/);
  if (!m) return id;
  const num = parseInt(m[1]);
  return (num >= 1000 ? String(num) : String(num).padStart(3, '0')) + m[2];
}
function iconUrl(mon)   { return mon && mon.id ? ASSET_BASE + 'icons/'   + localId(mon.id) + '.png' : ''; }
function spriteUrl(mon) { return mon && mon.id ? ASSET_BASE + 'sprites/' + localId(mon.id) + '.png' : ''; }

// icon → sprite → Pokéball, applied as an inline onerror chain on each <img>.
function attachIconFallback(img, mon) {
  img.onerror = function () {
    if (this.src.includes('/icons/'))       { this.src = spriteUrl(mon); }
    else if (this.src.includes('/sprites/')){ this.onerror = null; this.src = POKEBALL_FALLBACK; this.style.opacity = '.5'; }
    else                                    { this.onerror = null; this.src = POKEBALL_FALLBACK; this.style.opacity = '.5'; }
  };
}

// ─────────────────────────────────────────────────────────────────────────────
// SNAKE ORDER - for the read-only current/next display in Stage 1.
//   draft_order is the round-1 team sequence; even rounds (0-indexed) go forward,
//   odd rounds reverse. Skip-aware computation arrives in Stage 4.
// ─────────────────────────────────────────────────────────────────────────────
// ─────────────────────────────────────────────────────────────────────────────
// ACTIVE DIVISION CONTEXT
// The board renders one division at a time (or the whole season when undivided).
// These accessors translate the active scope into the globals existing code reads,
// so the bulk of the draft logic is untouched.
// ─────────────────────────────────────────────────────────────────────────────
function activeScope() { return divisions.length ? activeDivisionId : '__none__'; }
function hasDivisions() { return divisions.length > 0; }
function divisionMeta(id) { return divisions.find(d => d.id === id) || null; }
function otherDivisions() { return divisions.filter(d => d.id !== activeDivisionId); }

// Point the single-draft globals at the active scope. Called on load and on toggle.
function refreshActiveDivision() {
  const scope = activeScope();
  draft = draftByDivision[scope] || null;
  orderedTeams = orderByDivision[scope] || [];
  // draftedSet = the active scope's taken set, so all existing draftedSet.has()
  // call sites mean "taken in the division I'm currently viewing".
  draftedSet = new Set();
  for (const id in takenByDivision) { if (takenByDivision[id].has(scope)) draftedSet.add(id); }
}

// Is `id` taken in any division OTHER than the active one? (drives the cross border)
function takenInOtherDivision(id) {
  if (!hasDivisions()) return false;
  const set = takenByDivision[id];
  if (!set) return false;
  for (const d of otherDivisions()) if (set.has(d.id)) return true;
  return false;
}
// The color of the first other-division that has taken `id` (for the cross border).
function crossDivisionColor(id) {
  const set = takenByDivision[id];
  if (!set) return null;
  for (const d of otherDivisions()) if (set.has(d.id)) return d.color || 'var(--accent)';
  return null;
}

// Render the division toggle (hidden entirely when the season is undivided).
function renderDivToggle() {
  const el = document.getElementById('div-toggle');
  if (!el) return;
  if (!hasDivisions()) { el.hidden = true; el.innerHTML = ''; return; }
  el.hidden = false;
  el.innerHTML = divisions.map(d =>
    '<button class="' + (d.id === activeDivisionId ? 'active' : '') + '" '
    + 'style="' + (d.id === activeDivisionId && d.color ? 'background:' + d.color + ';' : '') + '" '
    + 'onclick="switchDivision(\'' + d.id + '\')">'
    + (d.color ? '<span class="swatch" style="background:' + (d.id === activeDivisionId ? '#fff' : d.color) + '"></span>' : '')
    + escapeHtml(d.abbr || d.name) + '</button>'
  ).join('');
}

// Toggle the active division: re-point the active-context globals and re-render the
// parts that depend on it (clock/sidebar follow the active draft; pool recolors).
function switchDivision(divId) {
  if (divId === activeDivisionId) return;
  activeDivisionId = divId;
  refreshActiveDivision();
  renderDivToggle();
  renderSidebar();
  renderStatus();
  renderPool();
}

function teamAtPick(pickNumber) {
  if (!draft || !orderedTeams.length || !season) return null;
  const n = orderedTeams.length;
  const totalPicks = n * (season.team_size || 0);
  if (pickNumber < 1 || (totalPicks && pickNumber > totalPicks)) return null;
  const round = Math.floor((pickNumber - 1) / n);   // 0-indexed round
  const idx   = (pickNumber - 1) % n;
  return (round % 2 === 0) ? orderedTeams[idx] : orderedTeams[n - 1 - idx];
}

// ─────────────────────────────────────────────────────────────────────────────
// DATA LOAD
// ─────────────────────────────────────────────────────────────────────────────
async function loadData() {
  // pokemon.json (reference data) + Supabase rows in parallel.
  // Guard the fetch: a 404 returns an HTML page, which would otherwise blow up
  // as "Unexpected token '<'" when we try to JSON.parse it.
  const pjPromise = fetch(POKEMON_JSON_URL).then(async res => {
    const ct = res.headers.get('content-type') || '';
    if (!res.ok || !ct.includes('json')) {
      throw new Error(
        'pokemon.json not found at "' + POKEMON_JSON_URL + '" (got ' + res.status +
        (ct ? ', ' + ct.split(';')[0] : '') + '). ' +
        'Place pokemon.json next to draft.html or set POKEMON_JSON_URL to its real location.'
      );
    }
    return res.json();
  });

  const { data: seasonRow, error: seasonErr } = await (async () => {
    const slug = new URLSearchParams(location.search).get('season');
    if (slug) {
      const bySlug = await sb.from('seasons').select('*').eq('slug', slug).maybeSingle();
      if (bySlug.error) return bySlug;
      if (bySlug.data) return bySlug;
    }
    return await sb.from('seasons').select('*').eq('is_current', true).maybeSingle();
  })();
  if (seasonErr) throw seasonErr;
  if (!seasonRow) throw new Error('No current season found (seasons.is_current = true).');
  season = seasonRow;

  const [teamsRes, tiersRes, draftRes, tradeRes, faRes, divRes] = await Promise.all([
    sb.from('teams').select('id,name,slug,logo_url,initial_seed,division_id').eq('season_id', season.id),
    sb.from('season_pokemon_tiers').select('pokemon_id, point_cost').eq('season_id', season.id),
    sb.from('drafts').select('id, division_id, draft_order, current_pick_number, status').eq('season_id', season.id),
    sb.from('trades').select('team_a_id, pokemon_a_id, team_b_id, pokemon_b_id, effective_week, occurred_at, notes').eq('season_id', season.id),
    sb.from('free_agency_moves').select('team_id, pokemon_added_id, pokemon_dropped_id, effective_week, occurred_at, notes').eq('season_id', season.id),
    sb.from('divisions').select('id, name, abbr, color, sort_order').eq('season_id', season.id).order('sort_order', { ascending: true }),
  ]);
  for (const r of [teamsRes, tiersRes, draftRes, tradeRes, faRes, divRes]) if (r.error) throw r.error;
  // Unfiltered all-seasons table → paginate past the 1000-row cap.
  const ownersAll = await fetchAll('team_owners', 'team_id, started_week, ended_week, players(display_name)');

  teams = teamsRes.data || [];
  const teamIds = teams.map(t => t.id);

  divisions = divRes.data || [];
  teamDivision = {};
  teams.forEach(t => { teamDivision[t.id] = t.division_id || null; });

  // Owner stints (for coach-as-of-week) + current coach (existing usage).
  coachByTeam = {}; ownersByTeam = {};
  ownersAll.forEach(o => {
    if (!teamIds.includes(o.team_id) || !o.players) return;
    (ownersByTeam[o.team_id] = ownersByTeam[o.team_id] || []).push({ started_week: o.started_week || 1, ended_week: o.ended_week, name: o.players.display_name });
    if (o.ended_week == null) coachByTeam[o.team_id] = o.players.display_name;
  });
  Object.values(ownersByTeam).forEach(list => list.sort((a, b) => a.started_week - b.started_week));

  tierCost = {};
  (tiersRes.data || []).forEach(t => { tierCost[t.pokemon_id] = t.point_cost; });

  // Index draft rows by division scope ('__none__' when undivided).
  draftByDivision = {};
  (draftRes.data || []).forEach(d => { draftByDivision[d.division_id || '__none__'] = d; });

  // Drafted picks for this season's teams.
  picksByTeam = {}; draftPicks = []; rosterByTeam = {}; takenByDivision = {};
  if (teamIds.length) {
    const picks = await fetchAllIn('team_pokemon', 'team_id, pokemon_id, draft_pick_number, acquired_via, acquired_week, released_week', 'team_id', teamIds);
    // Draft LOG (historical): every draft pick ever made, even if later traded away -
    // the log is a permanent record of who originally drafted what.
    (picks || [])
      .filter(p => p.acquired_via === 'draft')
      .sort((a, b) => (a.draft_pick_number || 0) - (b.draft_pick_number || 0))
      .forEach(p => {
        draftPicks.push({ pick_number: p.draft_pick_number, team_id: p.team_id, pokemon_id: p.pokemon_id });
      });
    // Current rosters → per-division "taken" sets. A Pokémon is taken within the
    // division of whichever team currently rosters it; the same id can be taken in
    // multiple divisions (separate pools), hence a Set of division scopes per id.
    (picks || [])
      .filter(p => p.released_week == null)
      .sort((a, b) => (a.acquired_week || 0) - (b.acquired_week || 0) || (a.draft_pick_number || 0) - (b.draft_pick_number || 0))
      .forEach(p => {
        (rosterByTeam[p.team_id] = rosterByTeam[p.team_id] || []).push(p.pokemon_id);
        const scope = teamDivision[p.team_id] || '__none__';
        (takenByDivision[p.pokemon_id] = takenByDivision[p.pokemon_id] || new Set()).add(scope);
      });
    picksByTeam = rosterByTeam;
  }

  // Order maps per division scope (built once; active one is surfaced as orderedTeams).
  orderByDivision = {};
  const scopes = divisions.length ? divisions.map(d => d.id) : ['__none__'];
  scopes.forEach(scope => {
    const scopeTeams = divisions.length ? teams.filter(t => (t.division_id || null) === scope) : teams.slice();
    const d = draftByDivision[scope];
    let order;
    if (d && Array.isArray(d.draft_order) && d.draft_order.length) {
      order = d.draft_order.filter(id => teamIds.includes(id));
    } else {
      order = scopeTeams
        .sort((a, b) => (a.initial_seed ?? 999) - (b.initial_seed ?? 999) || a.name.localeCompare(b.name))
        .map(t => t.id);
    }
    orderByDivision[scope] = order;
  });

  // Choose the initial active division: first by sort_order (null when undivided).
  activeDivisionId = divisions.length ? divisions[0].id : null;
  refreshActiveDivision();   // sets draft, orderedTeams, draftedSet from the active scope

  buildTxns(tradeRes.data, faRes.data);

  // pokemon.json index.
  const pj = await pjPromise;
  const arr = Array.isArray(pj) ? pj : pj.pokemon;
  pokemonById = {};
  arr.forEach(p => { pokemonById[p.id] = p; });

  // Illegal lanes are noisy; collapse them by default.
  collapsed.add('illegal');
}

// ─────────────────────────────────────────────────────────────────────────────
// RENDER
// ─────────────────────────────────────────────────────────────────────────────
function teamName(id)  { const t = teams.find(x => x.id === id); return t ? t.name : '-'; }
function teamSlug(id)  { const t = teams.find(x => x.id === id); return t && t.slug ? t.slug : (t ? t.id : id); }
function coachName(id) { return coachByTeam[id] || '-'; }
function pointsUsed(id){ return (picksByTeam[id] || []).reduce((s, pid) => s + (tierCost[pid] || 0), 0); }

// Render a row of drafted icons, optionally padded out to `slotCount` total slots
// with faded Pokéball placeholders for not-yet-drafted roster spots.
function iconRow(pokemonIds, sizeClass, slotCount) {
  const wrap = document.createElement('div');
  wrap.className = sizeClass;
  const ids = pokemonIds || [];
  ids.forEach(pid => {
    const mon = pokemonById[pid];
    const img = document.createElement('img');
    img.src = iconUrl(mon || { id: pid });
    img.alt = mon ? mon.name : pid;
    img.title = mon ? mon.name : pid;
    attachIconFallback(img, mon || { id: pid });
    wrap.appendChild(img);
  });
  // Pad to the team's roster size with empty (Pokéball) slots.
  const empties = Math.max(0, (slotCount || 0) - ids.length);
  for (let i = 0; i < empties; i++) {
    const img = document.createElement('img');
    img.className = 'slot-empty';
    img.src = POKEBALL_FALLBACK;
    img.alt = 'Empty slot';
    wrap.appendChild(img);
  }
  return wrap;
}

function renderSidebar() {
  const body = document.getElementById('sidebar-body');
  body.innerHTML = '';
  const currentTeam = draft ? teamAtPick(draft.current_pick_number) : null;
  const nextTeam    = draft ? teamAtPick((draft.current_pick_number || 0) + 1) : null;

  orderedTeams.forEach(id => {
    const card = document.createElement('div');
    card.className = 'team-card'
      + (id === currentTeam ? ' is-current' : '')
      + (id === nextTeam    ? ' is-next'    : '')
      + (id === selectedTeam ? ' selected'  : '');
    card.dataset.team = id;
    card.onclick = () => selectTeam(id);

    // Header row: name block (left) + point tracker (right).
    const head = document.createElement('div');
    head.className = 'team-card-head';

    const nameWrap = document.createElement('div');
    nameWrap.className = 'team-card-names';
    const tName = teamName(id), cName = coachName(id);
    const same = tName.trim().toLowerCase() === cName.trim().toLowerCase();
    // Coach name on top (bold, primary); team name beneath. When identical, show the
    // single name once in the bold primary format.
    const slug = teamSlug(id);
    nameWrap.innerHTML =
      '<a class="team-card-name" href="team.html#' + encodeURIComponent(slug) + '" onclick="event.stopPropagation()">' + escapeHtml(cName) + '</a>'
      + (same ? '' : '<div class="team-card-coach">' + escapeHtml(tName) + '</div>');
    head.appendChild(nameWrap);

    // Point tracker: spent sum (left, muted) · remaining (right, large/white) / total.
    const limit = season.point_limit ?? 0;
    const spent = pointsUsed(id);
    const pts = document.createElement('div');
    pts.className = 'team-card-pts';
    pts.innerHTML = '<span class="spent">' + spent + '</span>'
      + '<span class="rem">' + (limit - spent) + '<span class="total">/' + (season.point_limit ?? '-') + '</span></span>';
    head.appendChild(pts);
    card.appendChild(head);

    // Icon row: all roster slots in a single row.
    card.appendChild(iconRow(picksByTeam[id], 'team-card-icons', season.team_size));

    body.appendChild(card);
  });
}

function renderStatus() {
  const nowCard = document.getElementById('now-card');
  const upnext  = document.getElementById('upnext-text');

  if (!draft || draft.status === 'pending' || !draft.current_pick_number) {
    nowCard.innerHTML = '<div class="now-label">On the Clock</div>'
      + '<div class="now-coach">Draft not started</div>'
      + '<div class="now-team">' + (draft ? 'Status: ' + draft.status : 'No draft row for this season yet') + '</div>';
    upnext.textContent = '-';
    return;
  }

  const curId = teamAtPick(draft.current_pick_number);
  if (draft.status === 'complete' || !curId) {
    nowCard.innerHTML = '<div class="now-label">Draft</div>'
      + '<div class="now-coach">Draft complete</div>'
      + '<div class="now-team">All ' + (orderedTeams.length * (season.team_size || 0)) + ' picks are in.</div>';
    upnext.textContent = '-';
    return;
  }

  nowCard.innerHTML = '';
  const lab = document.createElement('div'); lab.className = 'now-label'; lab.textContent = 'On the Clock';
  nowCard.appendChild(lab);
  const tName = teamName(curId), cName = coachName(curId);
  const same = tName.trim().toLowerCase() === cName.trim().toLowerCase();
  const co  = document.createElement('div'); co.className = 'now-coach'; co.textContent = cName;
  nowCard.appendChild(co);
  if (!same) { const tm = document.createElement('div'); tm.className = 'now-team'; tm.textContent = tName; nowCard.appendChild(tm); }
  nowCard.appendChild(iconRow(picksByTeam[curId], 'now-icons', season.team_size));
  const limit = season.point_limit ?? 0;
  const spent = pointsUsed(curId);
  const pts = document.createElement('div'); pts.className = 'now-pts';
  pts.innerHTML = '<span class="spent">' + spent + '</span>'
    + '<span class="rem">' + (limit - spent) + '<span class="total">/' + (season.point_limit ?? '-') + '</span></span>';
  nowCard.appendChild(pts);

  const nextId = teamAtPick(draft.current_pick_number + 1);
  if (nextId) {
    const nName = teamName(nextId), ncName = coachName(nextId);
    const nSame = nName.trim().toLowerCase() === ncName.trim().toLowerCase();
    upnext.innerHTML = nSame ? escapeHtml(ncName) : escapeHtml(ncName) + ' <span class="pl">(' + escapeHtml(nName) + ')</span>';
  } else {
    upnext.textContent = 'Draft complete';
  }
}

function makeCard(mon) {
  const isIllegal = !(mon.id in tierCost);

  const card = document.createElement('div');
  card.className = 'pmon' + (isIllegal ? ' illegal-card' : '');
  card.dataset.id = mon.id;
  card.dataset.name = mon.name.toLowerCase();
  card.title = mon.name;

  const img = document.createElement('img');
  img.src = iconUrl(mon);
  img.alt = mon.name;
  attachIconFallback(img, mon);
  card.appendChild(img);

  const nm = document.createElement('div');
  nm.className = 'pmon-name';
  nm.textContent = mon.name;
  card.appendChild(nm);

  // Single-click = yellow pin; double-click = draft (admin, Stage 3). A single
  // click is delayed briefly so a double-click can cancel it - otherwise every
  // draft would also leave a stray yellow pin behind.
  card.addEventListener('click', () => {
    clearTimeout(card._clickTimer);
    card._clickTimer = setTimeout(() => onPoolClick(mon, card), 220);
  });
  card.addEventListener('dblclick', () => {
    clearTimeout(card._clickTimer);
    onPoolDblClick(mon, card);
  });

  applyCardState(card, mon.id);   // initial color (drafted / selected-team / pinned)
  return card;
}

// ── COLOR STATE ──
// Fill/precedence: team-pick (blue) > drafted (red, taken in active division) >
// pinned (yellow). The cross-division ring (xdiv) is an INDEPENDENT axis: it shows
// whenever another division has taken the Pokémon, and can co-exist with red (taken
// in both) - so a card can be plain+xdiv ("open to me, taken in the other division")
// or drafted+xdiv ("taken in both").
function applyCardState(card, id) {
  card.classList.remove('team-pick', 'drafted', 'pinned', 'xdiv');
  card.style.removeProperty('--xdiv');
  const ownedBySelected = selectedTeam && (picksByTeam[selectedTeam] || []).includes(id);
  if (ownedBySelected)        card.classList.add('team-pick');
  else if (draftedSet.has(id)) card.classList.add('drafted');
  else if (pinnedIds.has(id))  card.classList.add('pinned');

  // Cross-division ring - only meaningful in a divisioned season, and not shown on
  // the viewer's own blue selection (which already conveys ownership).
  if (!ownedBySelected && takenInOtherDivision(id)) {
    const color = crossDivisionColor(id);
    if (color) { card.style.setProperty('--xdiv', color); card.classList.add('xdiv'); }
  }
}

// Reapply color state to every pool card (after a selection change).
function refreshPoolColors() {
  document.querySelectorAll('.pmon').forEach(card => applyCardState(card, card.dataset.id));
}

// After a pick/undo, pool MEMBERSHIP can change while "Hide Drafted" is on (a newly
// drafted mon must vanish; an undone one must reappear). A recolor can't add/remove
// cards, so rebuild the pool in that case; otherwise a recolor suffices.
function refreshPoolAfterPickChange() {
  if (hideDrafted) renderPool();
  else refreshPoolColors();
}

// ── INTERACTIONS ──
function onPoolClick(mon, card) {
  // A drafted Pokémon can't be a draft target, so it can't be yellow-pinned.
  if (draftedSet.has(mon.id)) return;
  if (pinnedIds.has(mon.id)) pinnedIds.delete(mon.id);
  else                       pinnedIds.add(mon.id);
  applyCardState(card, mon.id);
  savePins();
}

function onPoolDblClick(mon, card) {
  if (!isAdmin) return;                       // public viewers: double-click is inert
  if (!draft || draft.status !== 'in_progress') { showToast('The draft isn\u2019t in progress.', 'err'); return; }
  if (!(mon.id in tierCost)) { showToast(mon.name + ' isn\u2019t a legal pick this season.', 'err'); return; }
  if (draftedSet.has(mon.id)) { showToast(mon.name + ' has already been drafted.', 'err'); return; }

  const teamId = teamAtPick(draft.current_pick_number);
  if (!teamId) { showToast('No team is on the clock.', 'err'); return; }

  const cost  = tierCost[mon.id] || 0;
  const left  = remaining(teamId);
  const picksMade = (picksByTeam[teamId] || []).length;
  const rosterFull = picksMade >= (season.team_size || Infinity);

  // Forward-looking budget check: after this pick, can the team still fill every
  // remaining roster slot at the cheapest legal cost? If not, flag it so the admin
  // can warn the player before committing.
  const minCost = minLegalCost();
  const slotsAfter = Math.max(0, (season.team_size || 0) - picksMade - 1);
  const budgetAfter = left - cost;
  const minNeeded = slotsAfter * minCost;
  const shortfall = minNeeded - budgetAfter;

  // Confirmation - surfaces team, cost, and any budget/roster warning before committing.
  let warn = '';
  if (cost > left)  warn += '<p class="modal-warn">Over budget by ' + (cost - left) + ' pts (' + left + ' remaining).</p>';
  if (rosterFull)   warn += '<p class="modal-warn">' + escapeHtml(teamName(teamId)) + ' already has a full roster.</p>';
  if (!rosterFull && cost <= left && slotsAfter > 0 && shortfall > 0) {
    warn += '<p class="modal-warn">Leaves ' + budgetAfter + ' pts for ' + slotsAfter
      + ' more pick' + (slotsAfter === 1 ? '' : 's') + ' - ' + shortfall + ' pt'
      + (shortfall === 1 ? '' : 's') + ' short of the minimum (' + minCost + ' pts each) to fill the roster.</p>';
  }

  openModal(
    '<h3>Draft this Pok\u00e9mon?</h3>'
    + '<div class="modal-mon">'
    +   '<img src="' + iconUrl(mon) + '" alt="">'
    +   '<div><div class="mm-name">' + escapeHtml(mon.name) + '</div>'
    +   '<div class="mm-cost">' + cost + ' pts</div></div>'
    + '</div>'
    + '<p>To <b>' + escapeHtml(teamName(teamId)) + '</b> (' + escapeHtml(coachName(teamId)) + ')'
    +   ' \u2014 pick #' + draft.current_pick_number + '. '
    +   'Budget after: ' + (left - cost) + '/' + (season.point_limit ?? '\u2014') + '.</p>'
    + warn
    + '<div class="modal-actions">'
    +   '<button class="btn" onclick="closeModal()">Cancel</button>'
    +   '<button class="btn btn-accent" id="confirm-draft-btn">Draft</button>'
    + '</div>'
  );
  document.getElementById('confirm-draft-btn').onclick = () => {
    closeModal();
    draftPokemon(mon, teamId, draft.current_pick_number);
  };
}

// Points a team has left to spend.
function remaining(teamId) { return (season.point_limit ?? 0) - pointsUsed(teamId); }
// Cheapest legal point cost available this season (for the roster-fill budget check).
let _minLegalCost = null;
function minLegalCost() {
  if (_minLegalCost == null) {
    const costs = Object.values(tierCost);
    _minLegalCost = costs.length ? Math.min(...costs) : 0;
  }
  return _minLegalCost;
}

// Commit a pick: insert the team_pokemon row, advance (or complete) the draft,
// then update local state and re-render. No realtime yet (Stage 5) - we update
// optimistically after the writes succeed.
async function draftPokemon(mon, teamId, pickNumber) {
  const totalPicks = orderedTeams.length * (season.team_size || 0);
  const isLast = totalPicks && pickNumber >= totalPicks;

  try {
    const { error: insErr } = await sb.from('team_pokemon').insert({
      team_id: teamId,
      pokemon_id: mon.id,
      acquired_week: 1,                 // draft picks join in week 1 per the schema
      acquired_via: 'draft',
      draft_pick_number: pickNumber,
    });
    if (insErr) throw insErr;

    const update = isLast
      ? { current_pick_number: pickNumber + 1, status: 'complete', completed_at: new Date().toISOString() }
      : { current_pick_number: pickNumber + 1 };
    // Target the ACTIVE division's draft row specifically. For an undivided season
    // there's a single row (its id), so this is equally correct there.
    let updQuery = sb.from('drafts').update(update);
    updQuery = draft && draft.id
      ? updQuery.eq('id', draft.id)
      : updQuery.eq('season_id', season.id);   // defensive fallback
    const { error: updErr } = await updQuery;
    if (updErr) throw updErr;

    // Local state.
    (picksByTeam[teamId] = picksByTeam[teamId] || []).push(mon.id);
    const scope = teamDivision[teamId] || '__none__';
    (takenByDivision[mon.id] = takenByDivision[mon.id] || new Set()).add(scope);
    draftedSet.add(mon.id);   // active scope === the picking team's scope here
    draftPicks.push({ pick_number: pickNumber, team_id: teamId, pokemon_id: mon.id });
    pinnedIds.delete(mon.id);           // a drafted Pokémon clears its yellow pin
    savePins();
    draft.current_pick_number = pickNumber + 1;
    if (isLast) { draft.status = 'complete'; }

    renderSidebar();
    renderStatus();
    refreshPoolAfterPickChange();
    updateUndoButton();
    showToast('Drafted ' + mon.name + ' to ' + teamName(teamId) + '.', 'ok');
    if (isLast) showToast('Draft complete!', 'ok');
  } catch (err) {
    console.error(err);
    showToast('Draft failed: ' + (err.message || err), 'err');
  }
}

function selectTeam(id) {
  selectedTeam = (selectedTeam === id) ? null : id;   // click again to deselect
  document.querySelectorAll('.team-card').forEach(c =>
    c.classList.toggle('selected', c.dataset.team === selectedTeam));
  refreshPoolColors();
  savePins();
  // On mobile the sidebar is an overlay; selecting a team closes it so the
  // newly blue-highlighted picks are visible in the pool underneath.
  if (selectedTeam && isMobile()) setSidebarCollapsed(true);
}

function makeLane(key, mons) {
  const isIllegal = key === 'illegal';
  const isCollapsed = collapsed.has(key);
  const lane = document.createElement('div');
  lane.className = 'tier-lane' + (isIllegal ? ' illegal-lane' : '') + (isCollapsed ? ' is-collapsed' : '');

  // Left rail: the point value (doubles as the collapse toggle). Counts reflect the
  // FULL tier (undrafted/total), independent of the Hide Drafted filter.
  const allMons = Object.values(pokemonById);
  const fullTier = isIllegal
    ? allMons.filter(m => !(m.id in tierCost))
    : allMons.filter(m => tierCost[m.id] === key);
  const total = fullTier.length;
  const undrafted = fullTier.filter(m => !draftedSet.has(m.id)).length;
  const rail = document.createElement('div');
  rail.className = 'tier-rail' + (isIllegal ? ' illegal-rail' : '');
  rail.onclick = () => { collapsed.has(key) ? collapsed.delete(key) : collapsed.add(key); renderPool(); };
  rail.innerHTML =
      '<span class="tier-pts' + (isIllegal ? ' illegal-pts' : '') + '">' + (isIllegal ? 'ILL' : String(key)) + '</span>'
    + '<span class="tier-count">' + undrafted + '<span class="cslash">/</span>' + total + '</span>'
    + '<span class="tier-collapse-icon">' + (isCollapsed ? '▶' : '▼') + '</span>';
  lane.appendChild(rail);

  // Cards row (right side), flex-wrapping evenly.
  const bodyEl = document.createElement('div');
  bodyEl.className = 'tier-body' + (isCollapsed ? ' collapsed' : '');
  if (mons.length === 0) {
    const msg = document.createElement('span'); msg.className = 'tier-empty-msg';
    msg.textContent = (hideDrafted && total > 0) ? 'All drafted' : 'No Pokémon in this tier';
    bodyEl.appendChild(msg);
  } else {
    mons.sort((a, b) => a.name.localeCompare(b.name));
    mons.forEach(m => bodyEl.appendChild(makeCard(m)));
  }
  lane.appendChild(bodyEl);
  return lane;
}

function renderPool() {
  const pool = document.getElementById('pool');
  pool.innerHTML = '';
  pool.classList.toggle('sprites-only', spritesOnly);

  // Optionally omit Pokémon already on a roster (shrinks lanes as the draft fills up).
  const visible = m => !(hideDrafted && draftedSet.has(m.id));

  // Legal lanes: distinct point costs present this season, descending.
  const costs = [...new Set(Object.values(tierCost))].sort((a, b) => b - a);
  const allMons = Object.values(pokemonById);

  costs.forEach(cost => {
    const mons = allMons.filter(m => tierCost[m.id] === cost && visible(m));
    pool.appendChild(makeLane(cost, mons));
  });

  // Illegal lane: everything not in this season's tier list.
  const illegalMons = allMons.filter(m => !(m.id in tierCost) && visible(m));
  pool.appendChild(makeLane('illegal', illegalMons));

  applySearch();
}

// ── POOL FILTER/VIEW TOGGLES ──
function toggleHideDrafted() {
  hideDrafted = document.getElementById('hide-drafted').checked;
  renderPool();
  savePins();
}
function toggleSpritesOnly() {
  spritesOnly = document.getElementById('sprites-only').checked;
  document.getElementById('pool').classList.toggle('sprites-only', spritesOnly);
  savePins();
}
// Mobile filters popover (the ellipsis button). Toggles open; closes on outside click.
function toggleFilters(e) {
  if (e) e.stopPropagation();
  const f = document.getElementById('toolbar-filters');
  f.classList.toggle('open');
}
document.addEventListener('click', function (e) {
  const f = document.getElementById('toolbar-filters');
  if (!f || !f.classList.contains('open')) return;
  if (f.contains(e.target) || e.target.closest('#filter-btn')) return;
  f.classList.remove('open');
});

// ── SEARCH (opacity-only dim in the pool + a selectable results dropdown) ──
let srResults = [];          // current dropdown matches
let srHighlight = -1;        // keyboard-highlighted index

function onSearch() {
  searchQ = document.getElementById('search-input').value.trim().toLowerCase();
  document.getElementById('search-clear').classList.toggle('visible', searchQ.length > 0);
  applySearch();
  renderSearchResults();
}
function clearSearch() {
  document.getElementById('search-input').value = '';
  searchQ = '';
  document.getElementById('search-clear').classList.remove('visible');
  applySearch();
  closeSearchResults();
}
function applySearch() {
  document.querySelectorAll('.pmon').forEach(card => {
    const name = card.dataset.name || '';
    if (!searchQ)                 { card.classList.remove('search-dim', 'search-match'); }
    else if (name.includes(searchQ)) { card.classList.remove('search-dim'); card.classList.add('search-match'); }
    else                          { card.classList.add('search-dim'); card.classList.remove('search-match'); }
  });
}

// Dropdown of up to 18 name/id matches; clicking scrolls to + flags that mon.
function renderSearchResults() {
  const el = document.getElementById('search-results');
  if (!searchQ) { closeSearchResults(); return; }
  srResults = Object.values(pokemonById)
    .filter(m => (m.id in tierCost)   // legal only - illegal mons aren't draftable
      && ((m.name || '').toLowerCase().includes(searchQ) || (m.id || '').toLowerCase().startsWith(searchQ)))
    .sort((a, b) => a.name.localeCompare(b.name))
    .slice(0, 18);
  srHighlight = -1;
  if (!srResults.length) { el.innerHTML = '<div class="sr-empty">No matches</div>'; el.classList.add('open'); return; }
  el.innerHTML = srResults.map((m, i) => {
    const drafted = draftedSet.has(m.id);
    const cost = tierCost[m.id] + ' pts';
    const sub = [m.type1, m.type2].filter(Boolean).join(' / ');
    return '<div class="sr-item' + (drafted ? ' drafted-r' : '') + '" data-idx="' + i + '" onmousedown="event.preventDefault();pickSearchResult(' + i + ')">'
      + '<img class="sr-sprite" src="' + spriteUrl(m) + '" alt="" onerror="this.onerror=null;this.src=this.src.replace(\'/sprites/\',\'/icons/\')">'
      + '<div><div class="sr-name">' + escapeHtml(m.name) + (drafted ? ' <span style="color:var(--red);font-size:10px">· drafted</span>' : '') + '</div>'
      + '<div class="sr-sub">' + escapeHtml(sub) + '</div></div>'
      + '<span class="sr-pts" style="color:var(--accent)">' + cost + '</span>'
      + '</div>';
  }).join('');
  el.classList.add('open');
}
function closeSearchResults() {
  document.getElementById('search-results').classList.remove('open');
  srHighlight = -1;
}
function updateSrHighlight() {
  document.querySelectorAll('.sr-item').forEach((el, i) => el.classList.toggle('highlighted', i === srHighlight));
  const hl = document.querySelector('.sr-item.highlighted');
  if (hl) hl.scrollIntoView({ block: 'nearest' });
}
function onSearchKey(e) {
  if (e.key === 'Escape') { clearSearch(); return; }
  if (!srResults.length) return;
  if (e.key === 'ArrowDown')      { e.preventDefault(); srHighlight = Math.min(srHighlight + 1, srResults.length - 1); updateSrHighlight(); }
  else if (e.key === 'ArrowUp')   { e.preventDefault(); srHighlight = Math.max(srHighlight - 1, 0); updateSrHighlight(); }
  else if (e.key === 'Enter')     { e.preventDefault(); pickSearchResult(srHighlight >= 0 ? srHighlight : 0); }
}
// Scroll the chosen Pokémon into view in the pool and flash a highlight ring.
function pickSearchResult(idx) {
  const mon = srResults[idx];
  if (!mon) return;
  closeSearchResults();
  // Make sure its tier lane is expanded so the card exists/visible.
  const key = (mon.id in tierCost) ? tierCost[mon.id] : 'illegal';
  if (collapsed.has(key)) { collapsed.delete(key); renderPool(); }
  const sel = (window.CSS && CSS.escape)
    ? '.pmon[data-id=' + CSS.escape(mon.id) + ']'
    : '.pmon[data-id="' + String(mon.id).replace(/["\\]/g, '\\$&') + '"]';
  const card = document.querySelector(sel);
  if (!card) return;
  card.scrollIntoView({ behavior: 'smooth', block: 'center' });
  card.classList.remove('search-flash'); void card.offsetWidth; // restart animation
  card.classList.add('search-flash');
  setTimeout(() => card.classList.remove('search-flash'), 1600);
}
// Hide the dropdown when focus leaves the search box (delay lets clicks register).
document.addEventListener('DOMContentLoaded', function () {
  const inp = document.getElementById('search-input');
  if (inp) inp.addEventListener('blur', () => setTimeout(closeSearchResults, 150));
});

// ── SIDEBAR COLLAPSE ──
function isMobile() { return window.matchMedia('(max-width: 768px)').matches; }

function setSidebarCollapsed(collapsed) {
  document.getElementById('sidebar').classList.toggle('collapsed', collapsed);
  document.getElementById('sidebar-toggle').textContent = collapsed ? '⟩' : '⟨';
  syncOverlayLock();
}

function toggleSidebar() {
  const isCollapsed = document.getElementById('sidebar').classList.contains('collapsed');
  setSidebarCollapsed(!isCollapsed);
}

// Lock the page behind a full-screen overlay (mobile only); unlock when both closed.
function syncOverlayLock() {
  if (!isMobile()) { document.body.classList.remove('overlay-open'); return; }
  const sidebarOpen  = !document.getElementById('sidebar').classList.contains('collapsed');
  const activityOpen = !document.getElementById('activity').classList.contains('collapsed');
  document.body.classList.toggle('overlay-open', sidebarOpen || activityOpen);
}

// ── KEYBOARD ──
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    if (!document.getElementById('modal-overlay').hidden) closeModal();
    else clearSearch();
  }
  if ((e.key === 'f' || e.key === 'F') && (e.ctrlKey || e.metaKey)) { e.preventDefault(); document.getElementById('search-input').focus(); }
});

// Resizing/rotating out of mobile while an overlay is open should release the lock.
window.addEventListener('resize', syncOverlayLock);

// ─────────────────────────────────────────────────────────────────────────────
// AUTH - admin status comes from the shared nav (nav.js owns the session);
// we just mirror it into the operator controls.
// ─────────────────────────────────────────────────────────────────────────────
function initAuth() {
  if (window.SBLNav && window.SBLNav.ready) {
    window.SBLNav.ready.then(({ isAdmin: a }) => { isAdmin = !!a; updateAuthUI(); });
  }
  window.addEventListener('sbl-auth', e => { isAdmin = !!(e.detail && e.detail.isAdmin); updateAuthUI(); });
}

function updateAuthUI() {
  // Operator hint and controls only when an admin can actually draft.
  document.getElementById('op-hint').hidden = !isAdmin;
  document.getElementById('admin-controls').hidden = !isAdmin;
  updateUndoButton();
}

// Enable Undo only when there's a pick to reverse.
function updateUndoButton() {
  const btn = document.getElementById('undo-btn');
  if (!btn) return;
  btn.disabled = !(isAdmin && draftPicks.length > 0);
}

// Reverse the most recent pick: delete its team_pokemon row, move the pointer
// back to that drafter, and return the Pokémon to the pool. No skips exist, so
// the last pick is simply the highest draft_pick_number.
function undoLastPick() {
  if (!isAdmin) return;
  // In a divisioned season, undo operates within the ACTIVE division: the last pick
  // is the highest-numbered pick made by a team in that division. Undivided seasons
  // use the global last pick as before.
  const scope = activeScope();
  const inScope = p => !hasDivisions() || (teamDivision[p.team_id] || '__none__') === scope;
  const candidates = draftPicks.filter(inScope);
  if (!candidates.length) { showToast('Nothing to undo' + (hasDivisions() ? ' in this division.' : '.'), 'err'); return; }
  const last = candidates.reduce((a, b) => ((b.pick_number || 0) > (a.pick_number || 0) ? b : a));
  const mon  = pokemonById[last.pokemon_id];
  const monName = mon ? mon.name : last.pokemon_id;

  openModal(
    '<h3>Undo last pick?</h3>'
    + '<p>This removes <b>' + escapeHtml(monName) + '</b> from <b>' + escapeHtml(teamName(last.team_id)) + '</b>'
    +   ' (pick #' + last.pick_number + ') and puts it back in the pool. '
    +   '<b>' + escapeHtml(coachName(last.team_id)) + '</b> goes back on the clock.</p>'
    + '<div class="modal-actions">'
    +   '<button class="btn" onclick="closeModal()">Cancel</button>'
    +   '<button class="btn btn-undo" id="confirm-undo-btn">Undo</button>'
    + '</div>'
  );
  document.getElementById('confirm-undo-btn').onclick = () => { closeModal(); performUndo(last); };
}

async function performUndo(last) {
  try {
    const { error: delErr } = await sb.from('team_pokemon')
      .delete()
      .eq('team_id', last.team_id)
      .eq('pokemon_id', last.pokemon_id)
      .eq('acquired_via', 'draft');
    if (delErr) throw delErr;

    // Pointer goes back to the undone pick; reopening the draft if it had completed.
    let undoQuery = sb.from('drafts')
      .update({ current_pick_number: last.pick_number, status: 'in_progress', completed_at: null });
    undoQuery = draft && draft.id ? undoQuery.eq('id', draft.id) : undoQuery.eq('season_id', season.id);
    const { error: updErr } = await undoQuery;
    if (updErr) throw updErr;

    // Local state.
    const li = draftPicks.lastIndexOf(last);
    if (li !== -1) draftPicks.splice(li, 1); else draftPicks.pop();
    // Remove the active scope from this Pokémon's taken set (it may still be taken
    // in the other division), and recompute draftedSet for the active scope.
    const undoScope = teamDivision[last.team_id] || '__none__';
    if (takenByDivision[last.pokemon_id]) {
      takenByDivision[last.pokemon_id].delete(undoScope);
      if (!takenByDivision[last.pokemon_id].size) delete takenByDivision[last.pokemon_id];
    }
    draftedSet.delete(last.pokemon_id);
    const arr = picksByTeam[last.team_id] || [];
    const at = arr.lastIndexOf(last.pokemon_id);
    if (at !== -1) arr.splice(at, 1);
    draft.current_pick_number = last.pick_number;
    draft.status = 'in_progress';

    renderSidebar();
    renderStatus();
    refreshPoolAfterPickChange();
    updateUndoButton();
    const mon = pokemonById[last.pokemon_id];
    showToast('Undid pick #' + last.pick_number + ' - ' + (mon ? mon.name : last.pokemon_id) + ' returned to the pool.', 'ok');
  } catch (err) {
    console.error(err);
    showToast('Undo failed: ' + (err.message || err), 'err');
  }
}

// ── MODAL ──
function openModal(html) {
  document.getElementById('modal').innerHTML = html;
  document.getElementById('modal-overlay').hidden = false;
}
function closeModal() { document.getElementById('modal-overlay').hidden = true; }

// ── TOAST ──
function showToast(msg, kind) {
  const t = document.createElement('div');
  t.className = 'toast' + (kind ? ' ' + kind : '');
  t.textContent = msg;
  document.getElementById('toast-container').appendChild(t);
  setTimeout(() => { t.style.transition = 'opacity .3s'; t.style.opacity = '0'; setTimeout(() => t.remove(), 300); }, 3200);
}

// ── MISC ──
function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
}

// ─────────────────────────────────────────────────────────────────────────────
// ACTIVITY LOG (right panel) - draft picks grouped by round + transactions by week,
// newest first. Accordion sections; only the most recent is open by default.
// Function declarations are hoisted, so refreshDraftState/init can call these.
// ─────────────────────────────────────────────────────────────────────────────
let activityOpen = {};   // section key -> bool (user toggles survive a re-render)

function buildTxns(tradeRows, faRows) {
  txns = [];
  (tradeRows || []).forEach(t => txns.push({
    kind: 'trade', week: t.effective_week, when: t.occurred_at, notes: t.notes,
    teamA: t.team_a_id, monA: t.pokemon_a_id, teamB: t.team_b_id, monB: t.pokemon_b_id,
  }));
  (faRows || []).forEach(f => txns.push({
    kind: 'fa', week: f.effective_week, when: f.occurred_at, notes: f.notes,
    team: f.team_id, added: f.pokemon_added_id, dropped: f.pokemon_dropped_id,
  }));
}

function coachAtWeek(teamId, week) {
  const stints = ownersByTeam[teamId] || [];
  let s = stints.find(x => x.started_week <= week && (x.ended_week == null || x.ended_week > week));
  if (!s) s = stints.find(x => x.ended_week == null) || stints[0];
  return s ? s.name : (coachByTeam[teamId] || null);
}

function monNm(id) { const m = pokemonById[id]; return m ? m.name : id; }
function teamSlug(id) { const t = teams.find(x => x.id === id); return t ? t.slug : ''; }
function fmtDateShort(s) {
  if (!s) return '';
  const d = new Date(s); if (isNaN(d.getTime())) return '';
  return (d.getMonth() + 1) + '/' + d.getDate();
}
function logTeamHtml(teamId, week) {
  const slug = teamSlug(teamId);
  // Coach-only here to save space in the narrow activity column; fall back to the
  // team name if no coach is on record for that week.
  const label = escapeHtml(coachAtWeek(teamId, week) || teamName(teamId));
  return slug ? '<a class="li-team" href="team.html#' + encodeURIComponent(slug) + '">' + label + '</a>'
              : '<span class="li-team">' + label + '</span>';
}
function logMonHtml(id, cls, prefix) {
  const m = pokemonById[id];
  return '<span class="li-mon ' + (cls || '') + '"><img src="' + iconUrl(m) + '" data-monid="' + escapeHtml(id) + '" alt="">'
    + '<span class="nm">' + (prefix || '') + escapeHtml(monNm(id)) + '</span></span>';
}

function txnItemHtml(x) {
  if (x.kind === 'trade') {
    return '<div class="log-item">'
      + '<div class="li-head"><span class="li-badge trade">Trade</span><span class="li-when">' + escapeHtml(fmtDateShort(x.when)) + '</span></div>'
      + '<div class="li-line">' + logTeamHtml(x.teamA, x.week) + '<span class="li-verb">got</span>' + logMonHtml(x.monB) + '</div>'
      + '<div class="li-line">' + logTeamHtml(x.teamB, x.week) + '<span class="li-verb">got</span>' + logMonHtml(x.monA) + '</div>'
      + (x.notes ? '<div class="li-notes">' + escapeHtml(x.notes) + '</div>' : '')
    + '</div>';
  }
  return '<div class="log-item">'
    + '<div class="li-head"><span class="li-badge fa">Free Agency</span><span class="li-when">' + escapeHtml(fmtDateShort(x.when)) + '</span></div>'
    + '<div class="li-line">' + logTeamHtml(x.team, x.week) + logMonHtml(x.added, 'add', '+ ') + logMonHtml(x.dropped, 'drop', '\u2212 ') + '</div>'
    + (x.notes ? '<div class="li-notes">' + escapeHtml(x.notes) + '</div>' : '')
  + '</div>';
}

function pickItemHtml(p) {
  return '<div class="log-item">'
    + '<div class="li-line"><span class="li-pickno">#' + p.pick_number + '</span>'
    +   logMonHtml(p.pokemon_id) + '<span class="li-verb">\u2192</span>' + logTeamHtml(p.team_id, 1) + '</div>'
  + '</div>';
}

function buildActivitySections() {
  const sections = [];

  // Transactions grouped by week, newest week first.
  const byWeek = {};
  txns.forEach(x => { (byWeek[x.week] = byWeek[x.week] || []).push(x); });
  Object.keys(byWeek).map(Number).sort((a, b) => b - a).forEach(w => {
    const items = byWeek[w].slice().sort((a, b) => String(b.when || '').localeCompare(String(a.when || '')));
    sections.push({ key: 'week-' + w, label: 'Week ' + w, count: items.length, body: items.map(txnItemHtml).join('') });
  });

  // Draft picks grouped into rounds of (team count), newest round first.
  const per = Math.max(1, teams.length);
  const byRound = {};
  draftPicks.forEach(p => {
    const rd = Math.floor(((p.pick_number || 1) - 1) / per) + 1;
    (byRound[rd] = byRound[rd] || []).push(p);
  });
  Object.keys(byRound).map(Number).sort((a, b) => b - a).forEach(rd => {
    const items = byRound[rd].slice().sort((a, b) => (b.pick_number || 0) - (a.pick_number || 0));
    sections.push({ key: 'round-' + rd, label: 'Round ' + rd, count: items.length, body: items.map(pickItemHtml).join('') });
  });

  return sections;
}

function renderActivity() {
  const body = document.getElementById('activity-body');
  if (!body) return;
  const sections = buildActivitySections();
  if (!sections.length) {
    body.innerHTML = '<div class="log-empty">No draft picks or transactions yet.</div>';
    return;
  }
  // Most-recent (first) section open by default; honor any section the user has toggled.
  const isOpen = (key, i) => (key in activityOpen) ? activityOpen[key] : (i === 0);

  body.innerHTML = sections.map((s, i) =>
    '<div class="log-sec' + (isOpen(s.key, i) ? '' : ' collapsed') + '" data-key="' + s.key + '">'
    + '<div class="log-sec-head"><span class="chev">\u25BC</span>' + escapeHtml(s.label) + '<span class="count">' + s.count + '</span></div>'
    + '<div class="log-sec-body">' + s.body + '</div>'
  + '</div>').join('');

  body.querySelectorAll('.log-sec').forEach(sec => {
    const key = sec.getAttribute('data-key');
    sec.querySelector('.log-sec-head').addEventListener('click', () => {
      const collapsed = sec.classList.toggle('collapsed');
      activityOpen[key] = !collapsed;
    });
  });
  body.querySelectorAll('img[data-monid]').forEach(img => attachIconFallback(img, pokemonById[img.getAttribute('data-monid')]));
}

function setActivityCollapsed(collapsed) { document.getElementById('activity').classList.toggle('collapsed', collapsed); syncOverlayLock(); }
function toggleActivity() { document.getElementById('activity').classList.toggle('collapsed'); syncOverlayLock(); }

// ─────────────────────────────────────────────────────────────────────────────
// REALTIME - subscribe to draft picks + the draft row. On any change, re-fetch the
// small slice of state and re-render. Re-fetching (rather than diffing the event
// payload) keeps inserts/updates/deletes uniform and sidesteps the thin DELETE
// payload. Client-only state (yellow pins, team selection, collapsed lanes,
// search) lives in globals the renderers read, so it survives a refresh untouched.
// ─────────────────────────────────────────────────────────────────────────────
let liveChannel = null;
let refreshTimer = null;

function initRealtime() {
  liveChannel = sb.channel('draft-live')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'team_pokemon' }, scheduleRefresh)
    .on('postgres_changes', { event: '*', schema: 'public', table: 'drafts' }, scheduleRefresh)
    .on('postgres_changes', { event: '*', schema: 'public', table: 'trades' }, scheduleRefresh)
    .on('postgres_changes', { event: '*', schema: 'public', table: 'free_agency_moves' }, scheduleRefresh)
    .subscribe(status => updateLiveBadge(status));
}

function updateLiveBadge(status) {
  const badge = document.getElementById('live-badge');
  const text  = document.getElementById('live-text');
  badge.classList.remove('on', 'err');
  if (status === 'SUBSCRIBED')      { badge.classList.add('on');  text.textContent = 'Live'; }
  else if (status === 'CHANNEL_ERROR' || status === 'TIMED_OUT') { badge.classList.add('err'); text.textContent = 'Reconnecting…'; }
  else                              { text.textContent = 'Connecting…'; }
}

// Coalesce bursts of events (e.g. an INSERT + a drafts UPDATE from one pick) into
// a single re-fetch.
function scheduleRefresh() {
  clearTimeout(refreshTimer);
  refreshTimer = setTimeout(refreshDraftState, 200);
}

async function refreshDraftState() {
  try {
    const teamIds = teams.map(t => t.id);

    const [draftRes, tradeRes, faRes] = await Promise.all([
      sb.from('drafts').select('id, division_id, draft_order, current_pick_number, status').eq('season_id', season.id),
      sb.from('trades').select('team_a_id, pokemon_a_id, team_b_id, pokemon_b_id, effective_week, occurred_at, notes').eq('season_id', season.id),
      sb.from('free_agency_moves').select('team_id, pokemon_added_id, pokemon_dropped_id, effective_week, occurred_at, notes').eq('season_id', season.id),
    ]);
    if (draftRes.error) throw draftRes.error;
    if (tradeRes.error) throw tradeRes.error;
    if (faRes.error) throw faRes.error;
    const picksRows = teamIds.length
      ? await fetchAllIn('team_pokemon', 'team_id, pokemon_id, draft_pick_number, acquired_via, acquired_week, released_week', 'team_id', teamIds)
      : [];

    // Re-index draft rows by scope.
    draftByDivision = {};
    (draftRes.data || []).forEach(d => { draftByDivision[d.division_id || '__none__'] = d; });

    // Rebuild pick-derived state from scratch.
    picksByTeam = {}; draftPicks = []; rosterByTeam = {}; takenByDivision = {};
    picksRows
      .filter(p => p.acquired_via === 'draft')
      .sort((a, b) => (a.draft_pick_number || 0) - (b.draft_pick_number || 0))
      .forEach(p => {
        draftPicks.push({ pick_number: p.draft_pick_number, team_id: p.team_id, pokemon_id: p.pokemon_id });
      });
    picksRows
      .filter(p => p.released_week == null)
      .sort((a, b) => (a.acquired_week || 0) - (b.acquired_week || 0) || (a.draft_pick_number || 0) - (b.draft_pick_number || 0))
      .forEach(p => {
        (rosterByTeam[p.team_id] = rosterByTeam[p.team_id] || []).push(p.pokemon_id);
        const scope = teamDivision[p.team_id] || '__none__';
        (takenByDivision[p.pokemon_id] = takenByDivision[p.pokemon_id] || new Set()).add(scope);
      });
    picksByTeam = rosterByTeam;

    // Recompute per-division order maps (admin may have edited an order).
    orderByDivision = {};
    const scopes = divisions.length ? divisions.map(d => d.id) : ['__none__'];
    scopes.forEach(scope => {
      const scopeTeams = divisions.length ? teams.filter(t => (t.division_id || null) === scope) : teams.slice();
      const d = draftByDivision[scope];
      orderByDivision[scope] = (d && Array.isArray(d.draft_order) && d.draft_order.length)
        ? d.draft_order.filter(id => teamIds.includes(id))
        : scopeTeams.sort((a, b) => (a.initial_seed ?? 999) - (b.initial_seed ?? 999) || a.name.localeCompare(b.name)).map(t => t.id);
    });

    // Re-point active-context globals (draft, orderedTeams, draftedSet) at the
    // active scope, then drop any now-drafted pins.
    refreshActiveDivision();
    pinnedIds.forEach(id => { if (draftedSet.has(id)) pinnedIds.delete(id); });

    buildTxns(tradeRes.data, faRes.data);

    renderSidebar();
    renderStatus();
    refreshPoolAfterPickChange();
    updateUndoButton();
    renderActivity();
  } catch (err) {
    console.error('Realtime refresh failed:', err);
  }
}

// ─────────────────────────────────────────────────────────────────────────────
// BOOT
// ─────────────────────────────────────────────────────────────────────────────
async function init() {
  const banner = document.getElementById('boot-banner');
  const navExtra = document.getElementById('nav-extra');
  if (navExtra) navExtra.innerHTML = '<span class="live-badge" id="live-badge" title="Live updates"><span class="live-dot"></span><span id="live-text">Connecting…</span></span>';
  try {
    await loadData();
    loadPins();        // restore yellow pins + blue team selection from a prior session
    renderDivToggle();
    renderSidebar();
    renderStatus();
    renderPool();
    renderActivity();
    if (isMobile()) { setSidebarCollapsed(true); setActivityCollapsed(true); }   // phones open to the tier-lanes view
    banner.hidden = true;
    document.getElementById('layout').hidden = false;
    initAuth();       // non-blocking; reveals admin controls once the session resolves
    initRealtime();   // live updates for all viewers
  } catch (err) {
    console.error(err);
    banner.className = 'banner err';
    banner.textContent = 'Could not load the draft: ' + (err.message || err);
  }
}
init();
