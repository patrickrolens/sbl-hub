<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SBL Hub — Statistics</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
/* ─── TOKENS (shared verbatim with the rest of the hub) ─── */
:root {
  --bg:#0f1117; --bg2:#1a1d27; --bg3:#22263a; --border:#2e3248;
  --text:#e8eaf6; --text2:#9095b8; --text3:#5a5f80;
  --accent:#7c6ff7; --red:#e05555; --green:#4caf7d; --blue:#60a5fa; --yellow:#f0c060;
  --nav-h: 49px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 13px; }
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* ─── PAGE ─── */
.wrap { padding: 14px; display: flex; flex-direction: column; gap: 14px; }
.card { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 14px; }
.card-title { font-size: 11px; font-weight: 700; letter-spacing: .5px; color: var(--text3); text-transform: uppercase; margin-bottom: 10px; }
.empty { font-size: 12px; color: var(--text3); font-style: italic; padding: 8px 0; }

/* ─── FILTER TOOLBAR (sits atop the table, sticky beneath the nav) ─── */
.toolbar { display: flex; flex-wrap: wrap; gap: 10px; align-items: flex-end; }
.table-card { padding-top: 0; }
#filter-bar {
  position: sticky; top: var(--nav-h); z-index: 6;
  background: var(--bg2); padding: 14px 0 12px; margin: 0 0 2px;
  border-bottom: 1px solid var(--border);
}
.toolbar .field { display: flex; flex-direction: column; gap: 3px; }
.toolbar label { font-size: 9px; font-weight: 700; letter-spacing: .4px; color: var(--text3); text-transform: uppercase; }
.toolbar input, .toolbar select { background: var(--bg3); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-size: 12px; padding: 7px 9px; outline: none; font-family: inherit; }
.toolbar input:focus, .toolbar select:focus { border-color: var(--accent); }
.toolbar input[type=text] { min-width: 180px; }
.toolbar .count { margin-left: auto; font-size: 11px; color: var(--text3); align-self: flex-end; padding-bottom: 7px; }

/* ─── SCATTER ─── */
.scatter-head { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 10px; margin-bottom: 10px; }
.scatter-head .scatter-btns { justify-self: start; display: flex; gap: 6px; }
.scatter-head .scatter-title { grid-column: 2; margin: 0; text-align: center; font-size: 15px; color: var(--text); }
.scatter-head .field { justify-self: end; flex-direction: row; align-items: center; gap: 6px; }
.scatter-btn { background: var(--bg3); border: 1px solid var(--border); border-radius: 6px; color: var(--text2); font-size: 14px; line-height: 1; padding: 5px 9px; cursor: pointer; }
.scatter-btn:hover { color: var(--text); border-color: var(--accent); }
.scatter-head label { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: .4px; font-weight: 700; }
.scatter-head select { background: var(--bg3); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-size: 12px; padding: 6px 8px; outline: none; font-family: inherit; }
/* Collapsed scatter card hides the plot, leaving just the header bar. */
#scatter-card.collapsed .scatter-wrap { display: none; }
.scatter-wrap { width: 100%; }
.scatter-wrap svg { width: 100%; height: auto; display: block; }

/* Fullscreen scatter modal. */
.scatter-modal { position: fixed; inset: 0; z-index: 200; background: var(--bg); display: flex; flex-direction: column; }
.scatter-modal[hidden] { display: none; }
.scatter-modal-bar { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-bottom: 1px solid var(--border); background: var(--bg2); }
.scatter-modal-title { font-size: 14px; font-weight: 700; letter-spacing: .5px; text-transform: uppercase; color: var(--text); margin-right: auto; }
.scatter-modal-bar .field { display: flex; align-items: center; gap: 6px; }
.scatter-modal-bar label { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: .4px; font-weight: 700; }
.scatter-modal-bar select { background: var(--bg3); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-size: 12px; padding: 6px 8px; outline: none; font-family: inherit; }
.scatter-modal-body { flex: 1; min-height: 0; padding: 16px; display: flex; align-items: center; justify-content: center; }
.scatter-modal-body svg { width: 100%; height: 100%; max-height: 100%; display: block; }
.scatter-wrap.expanded svg { height: calc(100vh - 220px); max-height: 80vh; }
.axis-line { stroke: var(--border); stroke-width: 1; }
.grid-line { stroke: var(--border); stroke-opacity: .35; stroke-width: 1; }
.axis-label { fill: var(--text3); font-size: 11px; font-weight: 600; }
.tick-label { fill: var(--text3); font-size: 10px; }
.scatter-empty { fill: var(--text3); font-size: 13px; font-style: italic; }
/* Histogram bars. */
.hist-bar { fill: var(--accent); fill-opacity: .7; transition: fill-opacity .12s; cursor: pointer; }
.hist-bar:hover { fill-opacity: 1; }
.hist-bar.open { fill-opacity: .22; stroke: var(--accent); stroke-width: 1.5; }
.box-team { fill: var(--text); font-size: 11px; font-weight: 600; }
.box-cluster { cursor: pointer; transition: fill-opacity .12s; }
.box-cluster:hover { fill-opacity: 1; }
.box-cluster-n { fill: #fff; font-size: 10px; font-weight: 800; pointer-events: none; paint-order: stroke; stroke: rgba(0,0,0,.5); stroke-width: 2px; }
#box-card.collapsed .scatter-wrap { display: none; }
/* Team labels on the bubble chart: white with a dark outline to read over any color. */
.pack-team { fill: #fff; font-size: 11px; font-weight: 700; paint-order: stroke; stroke: rgba(0,0,0,.75); stroke-width: 2.5px; }
#pack-card.collapsed .scatter-wrap { display: none; }
.hist-count { fill: var(--text2); font-size: 10px; font-weight: 600; }
.hist-controls { justify-self: end; display: flex; align-items: center; gap: 10px; }
.hist-controls .field { display: flex; align-items: center; gap: 6px; }
.hist-controls label { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: .4px; font-weight: 700; }
.hist-controls select, .hist-controls input { background: var(--bg3); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-size: 12px; padding: 6px 8px; outline: none; font-family: inherit; }
.hist-controls input[type=number] { width: 58px; }
#hist-card.collapsed .scatter-wrap { display: none; }
/* Clickable outline circle marking each plotted coordinate. */
.cl-ring { fill: rgba(124,111,247,.06); stroke: var(--accent); stroke-opacity: .5; stroke-width: 1.5; cursor: pointer; transition: fill .12s, stroke-opacity .12s; }
.cl-ring:hover { fill: rgba(124,111,247,.16); stroke-opacity: .9; }
/* Cluster tooltip (click a circle) — lists the point's values + Pokémon there. */
#cluster-tip { position: fixed; z-index: 999; display: none; min-width: 150px; max-width: 240px; max-height: 320px; overflow-y: auto; background: var(--bg2); border: 1px solid var(--accent); border-radius: 8px; padding: 9px 11px; box-shadow: 0 10px 30px rgba(0,0,0,.55); font-size: 12px; }
#cluster-tip .ct-head { font-weight: 700; color: var(--text); margin-bottom: 2px; }
#cluster-tip .ct-sub { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: .4px; margin-bottom: 6px; }
#cluster-tip .ct-mon { color: var(--text2); padding: 2px 0; border-top: 1px solid var(--bg3); }

/* ─── TABLE ─── */
/* No overflow here on desktop: an overflow value would trap the sticky header
   inside this box instead of letting it stick to the page under the filter bar. */
.table-scroll { overflow-x: visible; }
table.tbl { width: 100%; border-collapse: collapse; font-size: 12px; }
/* Header sticks just below the sticky filter bar (nav + ~filter height). Solid
   background + border so rows never bleed through or overlap it. */
.tbl th { text-align: left; font-size: 9px; text-transform: uppercase; letter-spacing: .4px; color: var(--text3); font-weight: 700; padding: 9px 8px; border-bottom: 1px solid var(--border); white-space: nowrap; cursor: pointer; user-select: none; position: sticky; top: var(--th-top, calc(var(--nav-h) + 60px)); background: var(--bg2); z-index: 4; }
.tbl th:hover { color: var(--text2); }
.tbl th .arrow { color: var(--accent); margin-left: 2px; }
.tbl th.num, .tbl td.num { text-align: right; font-variant-numeric: tabular-nums; }
.tbl td { padding: 7px 8px; border-bottom: 1px solid var(--bg3); white-space: nowrap; }
.tbl tbody tr:hover { background: var(--bg3); }
.tbl .pl { color: var(--text3); font-weight: 400; }
.tbl .pos { color: var(--blue); } .tbl .neg { color: var(--red); }
.tbl .sub { color: var(--text3); font-weight: 400; }
.tbl .inactive-tag { font-size: 9px; font-weight: 700; color: var(--text3); border: 1px solid var(--border); border-radius: 4px; padding: 1px 5px; margin-left: 6px; text-transform: uppercase; }
.mon-cell { display: flex; align-items: center; gap: 7px; }
.mon-cell img { width: 28px; height: 28px; image-rendering: pixelated; flex-shrink: 0; }

/* ─── BANNER ─── */
.banner { margin: 16px; padding: 10px 14px; border: 1px solid var(--border); border-radius: 8px; background: var(--bg2); font-size: 12px; color: var(--text2); }
.banner.err { border-color: rgba(224,85,85,.5); color: var(--red); }
@media (max-width: 820px) {
  .toolbar input[type=text] { min-width: 120px; }
  /* On small screens allow the wide table to scroll sideways. (The sticky header
     trades page-stick for box-stick here, which is fine on mobile.) */
  .table-scroll { overflow-x: auto; }
}
</style>
</head>
<body>

<script src="/nav.js"></script>

<div id="boot-banner" class="banner">Loading statistics…</div>

<div class="wrap" id="wrap" hidden>

  <div class="card" id="scatter-card">
    <div class="scatter-head">
      <div class="scatter-btns">
        <button class="scatter-btn" id="scatter-collapse" onclick="toggleScatterCollapse()" title="Hide chart" aria-label="Hide chart">▾</button>
        <button class="scatter-btn" id="scatter-expand" onclick="openScatterModal()" title="Expand chart" aria-label="Expand chart">⤢</button>
      </div>
      <div class="card-title scatter-title">KOs Scatter</div>
      <div class="field"><label>X axis</label>
        <select id="scatter-x" onchange="renderScatter()">
          <option value="faints">Faints</option>
          <option value="gp">Game Participation</option>
          <option value="mp">Match Participation</option>
        </select>
      </div>
    </div>
    <div class="scatter-wrap" id="scatter"></div>
  </div>

  <!-- Fullscreen scatter modal -->
  <div class="scatter-modal" id="scatter-modal" hidden>
    <div class="scatter-modal-bar">
      <div class="scatter-modal-title">KOs Scatter</div>
      <div class="field"><label>X axis</label>
        <select id="scatter-x-modal" onchange="syncModalAxis()">
          <option value="faints">Faints</option>
          <option value="gp">Game Participation</option>
          <option value="mp">Match Participation</option>
        </select>
      </div>
      <button class="scatter-btn" onclick="closeScatterModal()" title="Close" aria-label="Close">✕</button>
    </div>
    <div class="scatter-modal-body" id="scatter-modal-body"></div>
  </div>

  <div class="card" id="hist-card">
    <div class="scatter-head">
      <div class="scatter-btns">
        <button class="scatter-btn" id="hist-collapse" onclick="toggleHistCollapse()" title="Hide chart" aria-label="Hide chart">▾</button>
      </div>
      <div class="card-title scatter-title">Distribution</div>
      <div class="hist-controls">
        <div class="field"><label>Metric</label>
          <select id="hist-metric" onchange="renderHistogram()">
            <option value="kpg" selected>KOs / Game</option>
            <option value="kos">KOs</option>
            <option value="faints">Faints</option>
            <option value="kf">K/F Ratio</option>
            <option value="kfd">KF Δ</option>
            <option value="mb">Matches Brought</option>
            <option value="mp">Match Participation</option>
            <option value="gp">Game Participation</option>
          </select>
        </div>
        <div class="field"><label>Min games</label>
          <input type="number" id="hist-mingp" min="0" max="50" value="0" oninput="renderHistogram()">
        </div>
        <div class="field"><label>Bins</label>
          <input type="number" id="hist-bins" min="2" max="30" value="7" oninput="renderHistogram()">
        </div>
      </div>
    </div>
    <div class="scatter-wrap" id="histogram"></div>
  </div>

  <div class="card" id="box-card">
    <div class="scatter-head">
      <div class="scatter-btns">
        <button class="scatter-btn" id="box-collapse" onclick="toggleBoxCollapse()" title="Hide chart" aria-label="Hide chart">▾</button>
      </div>
      <div class="card-title scatter-title">Team Distribution</div>
      <div class="hist-controls">
        <div class="field"><label>Metric</label>
          <select id="box-metric" onchange="renderBoxPlot()">
            <option value="kos" selected>KOs</option>
            <option value="kpg">KOs / Game</option>
            <option value="kfd">KF Δ</option>
            <option value="kf">K/F Ratio</option>
            <option value="mb">Matches Brought</option>
            <option value="mp">Match Participation</option>
            <option value="gp">Game Participation</option>
          </select>
        </div>
        <div class="field"><label>Min games</label>
          <input type="number" id="box-mingp" min="0" max="50" value="0" oninput="renderBoxPlot()">
        </div>
      </div>
    </div>
    <div class="scatter-wrap" id="boxplot"></div>
  </div>

  <div class="card" id="pack-card">
    <div class="scatter-head">
      <div class="scatter-btns">
        <button class="scatter-btn" id="pack-collapse" onclick="togglePackCollapse()" title="Hide chart" aria-label="Hide chart">▾</button>
      </div>
      <div class="card-title scatter-title">Roster Bubbles</div>
      <div class="hist-controls">
        <div class="field"><label>Size by</label>
          <select id="pack-metric" onchange="renderPack()">
            <option value="kpg" selected>KOs / Game</option>
            <option value="kos">KOs</option>
            <option value="mb">Matches Brought</option>
            <option value="mp">Match Participation</option>
            <option value="gp">Game Participation</option>
          </select>
        </div>
      </div>
    </div>
    <div class="scatter-wrap" id="pack"></div>
  </div>

  <div class="card table-card">
    <div class="toolbar" id="filter-bar">
      <div class="field"><label>Search</label><input type="text" id="f-search" placeholder="Pokémon name…" oninput="applyFilters()"></div>
      <div class="field"><label>Team</label><select id="f-team" onchange="applyFilters()"></select></div>
      <div class="field"><label>Status</label><select id="f-status" onchange="applyFilters()"><option value="all">All</option><option value="active">Active</option><option value="inactive">Inactive</option></select></div>
      <div class="field"><label>Type</label><select id="f-type" onchange="applyFilters()"></select></div>
      <span class="count" id="row-count"></span>
    </div>
    <div class="table-scroll">
      <table class="tbl" id="stats-table"></table>
    </div>
  </div>

</div>


<script>
// ─────────────────────────────────────────────────────────────────────────────
// CONFIG
// ─────────────────────────────────────────────────────────────────────────────
const SUPABASE_URL      = "https://arypbyzeppbpbursmzcs.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_U8J3pV_KgomrWhbgoGBSUg_ttQ4d46m";
const sb = window.sb || supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
const POKEMON_JSON_URL = "https://planner.springfieldbattleleague.com/pokemon.json";
const ASSET_BASE = POKEMON_JSON_URL.replace(/[^/]*$/, '');
const POKEBALL_FALLBACK = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 40 40'%3E%3Ccircle cx='20' cy='20' r='19' fill='%23e05555' stroke='%23333' stroke-width='1.5'/%3E%3Cpath d='M1.1 20 A19 19 0 0 0 38.9 20 Z' fill='%23fff'/%3E%3Crect x='1' y='18' width='38' height='4' fill='%23333'/%3E%3Ccircle cx='20' cy='20' r='7' fill='%23fff' stroke='%23333' stroke-width='1.5'/%3E%3Ccircle cx='20' cy='20' r='3.5' fill='%23e8eaf6' stroke='%23333' stroke-width='1'/%3E%3C/svg%3E";
const TYPES = ["Normal","Fire","Water","Grass","Electric","Ice","Fighting","Poison","Ground","Flying","Psychic","Bug","Rock","Ghost","Dragon","Dark","Steel","Fairy"];

// ── STATE ──
let season = null, allTeams = [], teamById = {}, allOwners = [], coachByTeam = {};
let matches = [], gamesByMatch = {}, gameToMatch = {}, statRows = [], broughtRows = [];
let teamPokemon = [], pokemonById = {}, instances = [], filtered = [];
let sortState = { col: 'kos', dir: 'desc' };

// ── HELPERS ──
function localId(id) { const m = String(id).match(/^(\d+)(.*)$/); if (!m) return id; const n = parseInt(m[1]); return (n >= 1000 ? String(n) : String(n).padStart(3, '0')) + m[2]; }
function iconUrl(mon)   { return mon && mon.id ? ASSET_BASE + 'icons/'   + localId(mon.id) + '.png' : ''; }
function spriteUrl(mon) { return mon && mon.id ? ASSET_BASE + 'sprites/' + localId(mon.id) + '.png' : ''; }
function attachIconFallback(img, mon) { img.onerror = function () { if (this.src.includes('/icons/')) { this.src = spriteUrl(mon); } else { this.onerror = null; this.src = POKEBALL_FALLBACK; this.style.opacity = '.5'; } }; }
function escapeHtml(s) { return String(s).replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c])); }
function signed(n) { return (n > 0 ? '+' : '') + n; }
function deltaClass(n) { return n > 0 ? 'pos' : (n < 0 ? 'neg' : ''); }
function kfRatio(kos, faints) { if (faints === 0) return kos === 0 ? '—' : '∞'; return (kos / faints).toFixed(2); }
function kfSortValue(kos, faints) { return faints > 0 ? kos / faints : (kos > 0 ? 1e9 : 0); }
function monFor(id) { return pokemonById[id] || { id: id, name: id }; }
function teamLabelHtml(id) { const t = teamById[id]; if (!t) return '—'; const c = coachByTeam[id]; return escapeHtml(t.name) + (c ? ' <span class="pl">(' + escapeHtml(c) + ')</span>' : ''); }
function teamLabelText(id) { const t = teamById[id]; if (!t) return ''; const c = coachByTeam[id]; return t.name + (c ? ' (' + c + ')' : ''); }
function pctText(count, whole) { return whole > 0 ? Math.round((count / whole) * 100) + '% (' + count + ')' : '— (' + count + ')'; }
function pctSort(count, whole) { return whole > 0 ? count / whole : -1; }

// ─────────────────────────────────────────────────────────────────────────────
// DATA LOAD
// ─────────────────────────────────────────────────────────────────────────────
async function loadData() {
  const pjPromise = fetch(POKEMON_JSON_URL).then(async res => {
    const ct = res.headers.get('content-type') || '';
    if (!res.ok || !ct.includes('json')) throw new Error('pokemon.json not found at "' + POKEMON_JSON_URL + '" (got ' + res.status + ').');
    return res.json();
  });

  const { data: seasonRow, error: sErr } = await sb.from('seasons').select('*').eq('is_current', true).maybeSingle();
  if (sErr) throw sErr;
  if (!seasonRow) throw new Error('No current season found (seasons.is_current = true).');
  season = seasonRow;

  const [teamsRes, ownersRes, matchRes] = await Promise.all([
    sb.from('teams').select('id,name,slug,initial_seed').eq('season_id', season.id),
    sb.from('team_owners').select('team_id, ended_week, players(display_name)'),
    sb.from('matches').select('id, stage, week, team_a_id, team_b_id').eq('season_id', season.id),
  ]);
  for (const r of [teamsRes, ownersRes, matchRes]) if (r.error) throw r.error;

  allTeams = teamsRes.data || [];
  teamById = {}; allTeams.forEach(t => { teamById[t.id] = t; });
  const teamIds = allTeams.map(t => t.id);
  allOwners = (ownersRes.data || []).filter(o => teamIds.includes(o.team_id));
  coachByTeam = {};
  allOwners.filter(o => o.ended_week == null).forEach(o => { if (o.players) coachByTeam[o.team_id] = o.players.display_name; });
  matches = matchRes.data || [];

  // Rosters for every team (each row is an ownership instance).
  const { data: tp, error: tpErr } = teamIds.length
    ? await sb.from('team_pokemon').select('team_id, pokemon_id, acquired_week, released_week, acquired_via').in('team_id', teamIds)
    : { data: [], error: null };
  if (tpErr) throw tpErr;
  teamPokemon = tp || [];

  // Games + stats for the whole season (empty until results are entered).
  gamesByMatch = {}; gameToMatch = {}; statRows = []; broughtRows = [];
  const matchIds = matches.map(m => m.id);
  if (matchIds.length) {
    const { data: games, error: gErr } = await sb.from('games').select('id, match_id').in('match_id', matchIds);
    if (gErr) throw gErr;
    (games || []).forEach(g => { (gamesByMatch[g.match_id] = gamesByMatch[g.match_id] || []).push(g.id); gameToMatch[g.id] = g.match_id; });
    const gameIds = (games || []).map(g => g.id);
    if (gameIds.length) {
      const { data: stats, error: stErr } = await sb.from('game_pokemon_stats').select('game_id, team_id, pokemon_id, kills, deaths').in('game_id', gameIds);
      if (stErr) throw stErr;
      statRows = stats || [];
    }
    // Brought-six per match (drives MB / "matches brought" counts).
    const { data: mp, error: mpErr } = await sb.from('match_pokemon').select('match_id, team_id, pokemon_id').in('match_id', matchIds);
    if (mpErr) throw mpErr;
    broughtRows = mp || [];
  }

  const pj = await pjPromise;
  const arr = Array.isArray(pj) ? pj : pj.pokemon;
  pokemonById = {}; arr.forEach(p => { pokemonById[p.id] = p; });
}

// ─────────────────────────────────────────────────────────────────────────────
// PER-INSTANCE STATS — scoped to (team, Pokémon) within the ownership window,
// same scoping as the Team page (kills/participation while owned).
// ─────────────────────────────────────────────────────────────────────────────
let matchesByTeam = {}, statsByTP = {}, broughtByTP = {};
function buildIndexes() {
  matchesByTeam = {}; statsByTP = {}; broughtByTP = {};
  matches.forEach(m => {
    (matchesByTeam[m.team_a_id] = matchesByTeam[m.team_a_id] || []).push(m);
    (matchesByTeam[m.team_b_id] = matchesByTeam[m.team_b_id] || []).push(m);
  });
  statRows.forEach(s => { (statsByTP[s.team_id + '|' + s.pokemon_id] = statsByTP[s.team_id + '|' + s.pokemon_id] || []).push(s); });
  broughtRows.forEach(b => { (broughtByTP[b.team_id + '|' + b.pokemon_id] = broughtByTP[b.team_id + '|' + b.pokemon_id] || []).push(b.match_id); });
}

function statsForInstance(teamId, pid, aw, rw) {
  const owned = (matchesByTeam[teamId] || []).filter(m => m.week >= aw && (rw == null || m.week < rw));
  const ownedGameIds = new Set();
  let ownedGames = 0;
  owned.forEach(m => (gamesByMatch[m.id] || []).forEach(gid => { ownedGames++; ownedGameIds.add(gid); }));
  const ownedMatches = owned.length;

  let kos = 0, faints = 0;
  const appearedGames = new Set(), appearedMatches = new Set();
  (statsByTP[teamId + '|' + pid] || []).forEach(s => {
    if (!ownedGameIds.has(s.game_id)) return;
    appearedGames.add(s.game_id);
    const mid = gameToMatch[s.game_id]; if (mid) appearedMatches.add(mid);
    kos += s.kills || 0; faints += s.deaths || 0;
  });
  // MB = matches in the owned window where this mon was on the brought-six.
  const ownedMatchIds = new Set(owned.map(m => m.id));
  const mbCount = new Set((broughtByTP[teamId + '|' + pid] || []).filter(mid => ownedMatchIds.has(mid))).size;
  return { kos, faints, gpCount: appearedGames.size, mpCount: appearedMatches.size, mbCount, ownedGames, ownedMatches };
}

function buildInstances() {
  buildIndexes();
  instances = teamPokemon.map(tp => {
    const mon = monFor(tp.pokemon_id);
    const st = statsForInstance(tp.team_id, tp.pokemon_id, tp.acquired_week || 1, tp.released_week);
    return {
      pokemon_id: tp.pokemon_id, name: mon.name, type1: mon.type1 || null, type2: mon.type2 || null,
      team_id: tp.team_id, active: tp.released_week == null,
      kos: st.kos, faints: st.faints, kfDelta: st.kos - st.faints,
      kpg: st.gpCount > 0 ? st.kos / st.gpCount : 0,
      kfVal: kfSortValue(st.kos, st.faints), kfTxt: kfRatio(st.kos, st.faints),
      mpCount: st.mpCount, gpCount: st.gpCount, mbCount: st.mbCount, ownedMatches: st.ownedMatches, ownedGames: st.ownedGames,
      mpSort: pctSort(st.mpCount, st.ownedMatches), gpSort: pctSort(st.gpCount, st.ownedGames),
    };
  });
}

// ─────────────────────────────────────────────────────────────────────────────
// FILTER + SORT + RENDER
// ─────────────────────────────────────────────────────────────────────────────
function applyFilters() {
  const q = (document.getElementById('f-search').value || '').trim().toLowerCase();
  const team = document.getElementById('f-team').value;
  const status = document.getElementById('f-status').value;
  const type = document.getElementById('f-type').value;
  filtered = instances.filter(r => {
    if (q && !r.name.toLowerCase().includes(q)) return false;
    if (team !== 'all' && r.team_id !== team) return false;
    if (status === 'active' && !r.active) return false;
    if (status === 'inactive' && r.active) return false;
    if (type !== 'all' && r.type1 !== type && r.type2 !== type) return false;
    return true;
  });
  document.getElementById('row-count').textContent = filtered.length + ' of ' + instances.length + ' Pokémon';
  renderTable();
  renderScatter();
  renderHistogram();
  renderBoxPlot();
  renderPack();
}

const SORT_ACCESSORS = {
  pokemon: r => r.name.toLowerCase(), team: r => teamLabelText(r.team_id).toLowerCase(),
  kos: r => r.kos, faints: r => r.faints, kf: r => r.kfVal, kfd: r => r.kfDelta,
  mp: r => r.mpSort * 1000 + r.mpCount, gp: r => r.gpSort * 1000 + r.gpCount,
};
function sortBy(col) {
  if (sortState.col === col) sortState.dir = sortState.dir === 'asc' ? 'desc' : 'asc';
  else sortState = { col, dir: (col === 'pokemon' || col === 'team') ? 'asc' : 'desc' };
  renderTable();
}
function arrow(col) { return sortState.col === col ? '<span class="arrow">' + (sortState.dir === 'asc' ? '▲' : '▼') + '</span>' : ''; }

function renderTable() {
  const el = document.getElementById('stats-table');
  const acc = SORT_ACCESSORS[sortState.col];
  const dir = sortState.dir === 'asc' ? 1 : -1;
  const rows = filtered.slice().sort((a, b) => {
    const va = acc(a), vb = acc(b);
    if (va < vb) return -1 * dir; if (va > vb) return 1 * dir;
    return a.name.localeCompare(b.name);
  });

  let html = '<thead><tr>'
    + '<th onclick="sortBy(\'pokemon\')">Pokémon' + arrow('pokemon') + '</th>'
    + '<th onclick="sortBy(\'team\')">Team (Player)' + arrow('team') + '</th>'
    + '<th class="num" onclick="sortBy(\'kos\')">KOs' + arrow('kos') + '</th>'
    + '<th class="num" onclick="sortBy(\'faints\')">Faints' + arrow('faints') + '</th>'
    + '<th class="num" onclick="sortBy(\'kf\')">K/F' + arrow('kf') + '</th>'
    + '<th class="num" onclick="sortBy(\'kfd\')">KF Δ' + arrow('kfd') + '</th>'
    + '<th class="num" onclick="sortBy(\'mp\')">MP% (Count)' + arrow('mp') + '</th>'
    + '<th class="num" onclick="sortBy(\'gp\')">GP% (Count)' + arrow('gp') + '</th>'
    + '</tr></thead><tbody>';

  if (!rows.length) {
    html += '<tr><td colspan="8"><div class="empty">No Pokémon match these filters.</div></td></tr>';
  } else {
    rows.forEach(r => {
      const mon = monFor(r.pokemon_id);
      html += '<tr>'
        + '<td><div class="mon-cell"><img src="' + iconUrl(mon) + '" alt="" data-mid="' + escapeHtml(r.pokemon_id) + '"><span>' + escapeHtml(r.name) + '</span></div></td>'
        + '<td>' + teamLabelHtml(r.team_id) + (r.active ? '' : '<span class="inactive-tag">Inactive</span>') + '</td>'
        + '<td class="num">' + r.kos + '</td>'
        + '<td class="num">' + r.faints + '</td>'
        + '<td class="num">' + r.kfTxt + '</td>'
        + '<td class="num ' + deltaClass(r.kfDelta) + '">' + signed(r.kfDelta) + '</td>'
        + '<td class="num">' + pctText(r.mpCount, r.ownedMatches) + '</td>'
        + '<td class="num">' + pctText(r.gpCount, r.ownedGames) + '</td>'
        + '</tr>';
    });
  }
  el.innerHTML = html + '</tbody>';
  el.querySelectorAll('img[data-mid]').forEach(img => attachIconFallback(img, monFor(img.dataset.mid)));
  syncHeaderOffset();
}

// The column header sticks just below the sticky filter bar. Measure the bar's
// rendered height (it can wrap to 2 rows on narrow screens) and set the offset so
// the header never overlaps a data row or floats mid-table.
function syncHeaderOffset() {
  const bar = document.getElementById('filter-bar');
  if (!bar) return;
  const navH = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--nav-h')) || 49;
  document.documentElement.style.setProperty('--th-top', (navH + bar.offsetHeight) + 'px');
}
window.addEventListener('resize', syncHeaderOffset);

// ── SCATTER (hand-rolled SVG, no charting dependency) ──
// X = selectable stat, Y = KOs (axes swapped). Each plotted coordinate gets an
// outlined circle; the Pokémon icons sit on/around it. Clicking a circle opens a
// tooltip listing the point's values and which Pokémon are there.
const X_META = { faints: { label: 'Faints', get: r => r.faints }, gp: { label: 'Game Participation', get: r => r.gpCount }, mp: { label: 'Match Participation', get: r => r.mpCount } };
let scatterClusters = [];   // current clusters, for click→tooltip lookup

function niceTicks(max, count) {
  // Produce up to `count` integer-ish tick values from 0..max.
  if (max <= count) { const a = []; for (let i = 0; i <= max; i++) a.push(i); return a; }
  const step = Math.ceil(max / count);
  const a = []; for (let v = 0; v <= max; v += step) a.push(v);
  if (a[a.length - 1] !== max) a.push(max);
  return a;
}

function renderScatter() {
  const modalOpen = !document.getElementById('scatter-modal').hidden;
  const el = modalOpen ? document.getElementById('scatter-modal-body') : document.getElementById('scatter');
  const xKey = (modalOpen ? document.getElementById('scatter-x-modal') : document.getElementById('scatter-x')).value;
  const xMeta = X_META[xKey];
  // Modal renders large to fill the viewport; the inline card stays compact.
  const W = modalOpen ? 1280 : 720, H = modalOpen ? 720 : 380;
  const expanded = modalOpen;
  const padL = 50, padB = 40, padT = 14, padR = 18;
  const plotW = W - padL - padR, plotH = H - padT - padB, x0 = padL, y0 = H - padB;

  // A single-team filter naturally thins the field, so keep the 0-KO/0-faint mons.
  // Otherwise drop them — they'd pile up uselessly at the origin.
  const singleTeam = document.getElementById('f-team').value !== 'all';
  let src = filtered;
  if (!singleTeam) src = filtered.filter(r => r.kos > 0 || r.faints > 0);

  // Count how many plotted instances share each species; append the current coach to
  // a point's display name only when its species appears more than once.
  const speciesCount = {};
  src.forEach(r => { speciesCount[r.pokemon_id] = (speciesCount[r.pokemon_id] || 0) + 1; });
  const dispName = r => {
    const coach = coachByTeam[r.team_id];
    return (speciesCount[r.pokemon_id] > 1 && coach) ? r.name + ' (' + coach + ')' : r.name;
  };

  const pts = src.map(r => ({ x: xMeta.get(r), y: r.kos, id: r.pokemon_id, name: dispName(r), team: teamLabelText(r.team_id) }));
  const maxX = Math.max(1, ...pts.map(p => p.x));
  const maxY = Math.max(1, ...pts.map(p => p.y));
  const hasData = pts.length > 0;

  const sx = v => x0 + (v / maxX) * plotW;
  const sy = v => y0 - (v / maxY) * plotH;

  let svg = '<svg viewBox="0 0 ' + W + ' ' + H + '" role="img">';

  // gridlines + tick labels
  const xticks = niceTicks(maxX, 8), yticks = niceTicks(maxY, 8);
  xticks.forEach(v => {
    const x = sx(v);
    svg += '<line class="grid-line" x1="' + x.toFixed(1) + '" y1="' + padT + '" x2="' + x.toFixed(1) + '" y2="' + y0 + '"/>';
    svg += '<text class="tick-label" x="' + x.toFixed(1) + '" y="' + (y0 + 15) + '" text-anchor="middle">' + v + '</text>';
  });
  yticks.forEach(v => {
    const y = sy(v);
    svg += '<line class="grid-line" x1="' + x0 + '" y1="' + y.toFixed(1) + '" x2="' + (W - padR) + '" y2="' + y.toFixed(1) + '"/>';
    svg += '<text class="tick-label" x="' + (x0 - 7) + '" y="' + (y + 3).toFixed(1) + '" text-anchor="end">' + v + '</text>';
  });
  // axes (drawn over gridlines)
  svg += '<line class="axis-line" x1="' + x0 + '" y1="' + padT + '" x2="' + x0 + '" y2="' + y0 + '"/>';
  svg += '<line class="axis-line" x1="' + x0 + '" y1="' + y0 + '" x2="' + (W - padR) + '" y2="' + y0 + '"/>';
  // axis titles — X = selectable, Y = KOs
  svg += '<text class="axis-label" x="' + (x0 + plotW / 2) + '" y="' + (H - 5) + '" text-anchor="middle">' + escapeHtml(xMeta.label) + '</text>';
  svg += '<text class="axis-label" transform="translate(14,' + (padT + plotH / 2) + ') rotate(-90)" text-anchor="middle">KOs</text>';

  scatterClusters = [];
  if (!hasData) {
    svg += '<text class="scatter-empty" x="' + (x0 + plotW / 2) + '" y="' + (padT + plotH / 2) + '" text-anchor="middle">No game data yet</text>';
  } else {
    // Group points landing on the same pixel cell.
    const cells = {};
    pts.forEach(p => {
      const px = Math.round(sx(p.x)), py = Math.round(sy(p.y));
      const key = px + ',' + py;
      (cells[key] = cells[key] || { px, py, x: p.x, y: p.y, items: [] }).items.push(p);
    });

    let circles = '', icons = '';
    Object.values(cells).forEach((cell, ci) => {
      const n = cell.items.length;
      // Icon size shrinks as a cluster grows past 4.
      const base = expanded ? 26 : 20;
      const iconSize = n <= 4 ? base : Math.max(11, base - (n - 4) * 1.5);
      const ring = n > 1 ? iconSize * 0.6 : 0;
      // Outline circle sized to contain the cluster; clickable for the tooltip.
      const rad = (n > 1 ? ring + iconSize * 0.6 : iconSize * 0.62);
      scatterClusters.push({ x: cell.x, y: cell.y, items: cell.items.map(it => it.name) });
      circles += '<circle class="cl-ring" cx="' + cell.px + '" cy="' + cell.py + '" r="' + rad.toFixed(1) + '" data-ci="' + ci + '" onclick="showClusterTip(event,' + ci + ')"/>';
      cell.items.forEach((p, i) => {
        let cx = cell.px, cy = cell.py;
        if (n > 1) { const ang = (i / n) * Math.PI * 2; cx += Math.cos(ang) * ring; cy += Math.sin(ang) * ring; }
        icons += '<image href="' + iconUrl(monFor(p.id)) + '" x="' + (cx - iconSize / 2).toFixed(1) + '" y="' + (cy - iconSize / 2).toFixed(1) + '"'
          + ' width="' + iconSize.toFixed(1) + '" height="' + iconSize.toFixed(1) + '" style="image-rendering:pixelated;pointer-events:none"/>';
      });
    });
    svg += circles + icons;   // circles under icons
  }
  el.innerHTML = svg + '</svg>';
}

// Tooltip listing a cluster's coordinate values + the Pokémon located there.
function showClusterTip(e, ci) {
  e.stopPropagation();
  const c = scatterClusters[ci];
  if (!c) return;
  const xKey = document.getElementById('scatter-x').value;
  const xLabel = X_META[xKey].label;
  const list = c.items.map(n => '<div class="ct-mon">' + escapeHtml(n) + '</div>').join('');
  let tip = document.getElementById('cluster-tip');
  if (!tip) { tip = document.createElement('div'); tip.id = 'cluster-tip'; document.body.appendChild(tip); }
  tip.innerHTML = '<div class="ct-head">KOs ' + c.y + ' · ' + escapeHtml(xLabel) + ' ' + c.x + '</div>'
    + '<div class="ct-sub">' + c.items.length + ' Pokémon</div>' + list;
  tip.style.display = 'block';
  const px = e.clientX, py = e.clientY;
  const tr = tip.getBoundingClientRect();
  let left = px + 12, top = py + 12;
  if (left + tr.width > window.innerWidth - 8) left = px - tr.width - 12;
  if (top + tr.height > window.innerHeight - 8) top = window.innerHeight - tr.height - 8;
  tip.style.left = Math.max(8, left) + 'px';
  tip.style.top = Math.max(8, top) + 'px';
}
document.addEventListener('click', function () { const t = document.getElementById('cluster-tip'); if (t) t.style.display = 'none'; });

// Collapse/expand the inline scatter card body (hide it to focus on the table).
function toggleScatterCollapse() {
  const card = document.getElementById('scatter-card');
  const collapsed = card.classList.toggle('collapsed');
  document.getElementById('scatter-collapse').textContent = collapsed ? '▸' : '▾';
  document.getElementById('scatter-collapse').title = collapsed ? 'Show chart' : 'Hide chart';
}
// Fullscreen modal: mirror the current X-axis selection, render large.
function openScatterModal() {
  document.getElementById('scatter-x-modal').value = document.getElementById('scatter-x').value;
  document.getElementById('scatter-modal').hidden = false;
  document.body.style.overflow = 'hidden';
  renderScatter();
}
function closeScatterModal() {
  document.getElementById('scatter-modal').hidden = true;
  document.body.style.overflow = '';
  renderScatter();   // re-render the inline card
}
function syncModalAxis() {
  // Keep the inline selector in step so closing the modal preserves the choice.
  document.getElementById('scatter-x').value = document.getElementById('scatter-x-modal').value;
  renderScatter();
}
document.addEventListener('keydown', e => { if (e.key === 'Escape' && !document.getElementById('scatter-modal').hidden) closeScatterModal(); });

// ── HISTOGRAM (equal-width value bins over the filtered instances) ──
const HIST_META = {
  kpg:    { label: 'KOs / Game',          get: r => r.kpg,     dec: 2 },
  kos:    { label: 'KOs',                 get: r => r.kos,     dec: 0 },
  faints: { label: 'Faints',              get: r => r.faints,  dec: 0 },
  kf:     { label: 'K/F Ratio',           get: r => (r.faints > 0 ? r.kos / r.faints : r.kos), dec: 2 },
  kfd:    { label: 'KF Δ',                get: r => r.kfDelta, dec: 0 },
  mb:     { label: 'Matches Brought',     get: r => r.mbCount, dec: 0 },
  mp:     { label: 'Match Participation', get: r => r.mpCount, dec: 0 },
  gp:     { label: 'Game Participation',  get: r => r.gpCount, dec: 0 },
};
let histOpenBin = -1;   // which bin's members are revealed
function toggleHistCollapse() {
  const card = document.getElementById('hist-card');
  const collapsed = card.classList.toggle('collapsed');
  document.getElementById('hist-collapse').textContent = collapsed ? '▸' : '▾';
  document.getElementById('hist-collapse').title = collapsed ? 'Show chart' : 'Hide chart';
}
function fmtBin(v, dec) { return dec > 0 ? v.toFixed(dec) : String(Math.round(v)); }
function histToggleBin(i) { histOpenBin = (histOpenBin === i) ? -1 : i; renderHistogram(); }

function renderHistogram() {
  const el = document.getElementById('histogram');
  const metric = HIST_META[document.getElementById('hist-metric').value];
  let bins = parseInt(document.getElementById('hist-bins').value, 10);
  if (!Number.isFinite(bins) || bins < 2) bins = 7;
  bins = Math.min(30, bins);
  const minGp = Math.max(0, parseInt(document.getElementById('hist-mingp').value, 10) || 0);

  // Apply the games-played floor so the pile of 0-game mons doesn't dominate.
  const rows = filtered.filter(r => r.gpCount >= minGp);
  const W = 720, H = 380, padL = 44, padB = 46, padT = 14, padR = 14;
  const plotW = W - padL - padR, plotH = H - padT - padB, x0 = padL, y0 = H - padB;

  let svg = '<svg viewBox="0 0 ' + W + ' ' + H + '" role="img">';
  if (!rows.length) {
    svg += '<text class="scatter-empty" x="' + (x0 + plotW / 2) + '" y="' + (padT + plotH / 2) + '" text-anchor="middle">No data for these filters</text>';
    el.innerHTML = svg + '</svg>'; return;
  }

  const valOf = metric.get;
  const lo = Math.min(...rows.map(valOf)), hi = Math.max(...rows.map(valOf));
  const span = (hi - lo) || 1;
  const width = span / bins;
  const binMembers = Array.from({ length: bins }, () => []);
  rows.forEach(r => { let b = Math.floor((valOf(r) - lo) / width); if (b >= bins) b = bins - 1; if (b < 0) b = 0; binMembers[b].push(r); });
  const counts = binMembers.map(m => m.length);
  const maxCount = Math.max(1, ...counts);

  const yticks = niceTicks(maxCount, 6);
  yticks.forEach(c => {
    const y = y0 - (c / maxCount) * plotH;
    svg += '<line class="grid-line" x1="' + x0 + '" y1="' + y.toFixed(1) + '" x2="' + (W - padR) + '" y2="' + y.toFixed(1) + '"/>';
    svg += '<text class="tick-label" x="' + (x0 - 6) + '" y="' + (y + 3).toFixed(1) + '" text-anchor="end">' + c + '</text>';
  });
  svg += '<line class="axis-line" x1="' + x0 + '" y1="' + padT + '" x2="' + x0 + '" y2="' + y0 + '"/>';
  svg += '<line class="axis-line" x1="' + x0 + '" y1="' + y0 + '" x2="' + (W - padR) + '" y2="' + y0 + '"/>';

  const gap = 3, bw = plotW / bins;
  counts.forEach((c, i) => {
    const bx = x0 + i * bw;
    const bh = (c / maxCount) * plotH;
    const by = y0 - bh;
    const open = i === histOpenBin;
    svg += '<rect class="hist-bar' + (open ? ' open' : '') + '" x="' + (bx + gap / 2).toFixed(1) + '" y="' + by.toFixed(1) + '" width="' + (bw - gap).toFixed(1) + '" height="' + bh.toFixed(1) + '" rx="2" onclick="histToggleBin(' + i + ')">'
      + '<title>' + fmtBin(lo + i * width, metric.dec) + ' – ' + fmtBin(lo + (i + 1) * width, metric.dec) + ': ' + c + ' Pokémon (click to list)</title></rect>';
    if (c > 0 && !open) svg += '<text class="hist-count" x="' + (bx + bw / 2).toFixed(1) + '" y="' + (by - 4).toFixed(1) + '" text-anchor="middle">' + c + '</text>';
    svg += '<text class="tick-label" x="' + bx.toFixed(1) + '" y="' + (y0 + 14) + '" text-anchor="middle">' + fmtBin(lo + i * width, metric.dec) + '</text>';
  });
  svg += '<text class="tick-label" x="' + (x0 + plotW).toFixed(1) + '" y="' + (y0 + 14) + '" text-anchor="middle">' + fmtBin(hi, metric.dec) + '</text>';

  // Revealed bin members: stack icons up the column; overflow continues above the bar.
  if (histOpenBin >= 0 && binMembers[histOpenBin] && binMembers[histOpenBin].length) {
    const members = binMembers[histOpenBin];
    const bx = x0 + histOpenBin * bw;
    // Shrink icons for crowded bins so the stack stays on-screen (>60 → progressively
    // smaller, down to a 9px floor).
    const n = members.length;
    let iconW = 22;
    if (n > 60) iconW = Math.max(9, Math.round(22 - (n - 60) / 12));
    const drawW = iconW - 2;
    const perRow = Math.max(1, Math.floor((bw - 2) / iconW));
    const colCenter = bx + bw / 2;
    members.forEach((r, k) => {
      const row = Math.floor(k / perRow), col = k % perRow;
      const rowW = Math.min(perRow, members.length - row * perRow) * iconW;
      const ix = colCenter - rowW / 2 + col * iconW;
      const iy = y0 - (row + 1) * iconW + 2;   // stack upward from the axis, overflow above
      svg += '<image href="' + iconUrl(monFor(r.pokemon_id)) + '" x="' + ix.toFixed(1) + '" y="' + iy.toFixed(1) + '" width="' + drawW + '" height="' + drawW + '" style="image-rendering:pixelated;pointer-events:none"><title>' + escapeHtml(r.name) + '</title></image>';
    });
  }

  svg += '<text class="axis-label" x="' + (x0 + plotW / 2) + '" y="' + (H - 6) + '" text-anchor="middle">' + escapeHtml(metric.label) + '</text>';
  svg += '<text class="axis-label" transform="translate(12,' + (padT + plotH / 2) + ') rotate(-90)" text-anchor="middle"># Pokémon</text>';

  el.innerHTML = svg + '</svg>';
}

// ── BOX PLOT (per-team distribution of a metric, with each Pokémon as an icon) ──
const BOX_META = HIST_META;   // same metric set
let boxClusters = [];         // dense same-point groups, for click→tooltip
function showBoxCluster(e, idx) {
  e.stopPropagation();
  const c = boxClusters[idx]; if (!c) return;
  const list = c.items.map(n => '<div class="ct-mon">' + escapeHtml(n) + '</div>').join('');
  let tip = document.getElementById('cluster-tip');
  if (!tip) { tip = document.createElement('div'); tip.id = 'cluster-tip'; document.body.appendChild(tip); }
  tip.innerHTML = '<div class="ct-head">' + escapeHtml(c.metricLabel) + ' ' + fmtBin(c.value, c.dec) + '</div>'
    + '<div class="ct-sub">' + c.items.length + ' Pokémon</div>' + list;
  tip.style.display = 'block';
  const tr = tip.getBoundingClientRect();
  let left = e.clientX + 12, top = e.clientY + 12;
  if (left + tr.width > window.innerWidth - 8) left = e.clientX - tr.width - 12;
  if (top + tr.height > window.innerHeight - 8) top = window.innerHeight - tr.height - 8;
  tip.style.left = Math.max(8, left) + 'px';
  tip.style.top = Math.max(8, top) + 'px';
}
function toggleBoxCollapse() {
  const card = document.getElementById('box-card');
  const collapsed = card.classList.toggle('collapsed');
  document.getElementById('box-collapse').textContent = collapsed ? '▸' : '▾';
  document.getElementById('box-collapse').title = collapsed ? 'Show chart' : 'Hide chart';
}
function quantile(sorted, q) {
  if (!sorted.length) return 0;
  const pos = (sorted.length - 1) * q, base = Math.floor(pos), rest = pos - base;
  return sorted[base + 1] !== undefined ? sorted[base] + rest * (sorted[base + 1] - sorted[base]) : sorted[base];
}
function renderBoxPlot() {
  const el = document.getElementById('boxplot');
  const metric = BOX_META[document.getElementById('box-metric').value];
  const minGp = Math.max(0, parseInt(document.getElementById('box-mingp').value, 10) || 0);
  const valOf = metric.get;
  boxClusters = [];

  // Group the filtered instances by team (respecting the games-played floor).
  const byTeam = {};
  filtered.filter(r => r.gpCount >= minGp).forEach(r => { (byTeam[r.team_id] = byTeam[r.team_id] || []).push(r); });
  const teamIds = Object.keys(byTeam).sort((a, b) => {
    const ma = Math.max(...byTeam[a].map(valOf)), mb = Math.max(...byTeam[b].map(valOf));
    return mb - ma;   // teams with the highest single value on top
  });

  const rowH = 76, padT = 28, padB = 40, padL = 150, padR = 24, W = 720;
  const H = padT + padB + teamIds.length * rowH;
  const plotW = W - padL - padR, x0 = padL;
  const allVals = filtered.filter(r => r.gpCount >= minGp).map(valOf);
  const hi = Math.max(1, ...allVals);
  const sx = v => x0 + (v / hi) * plotW;

  let svg = '<svg viewBox="0 0 ' + W + ' ' + H + '" role="img" style="width:100%;height:auto">';
  if (!teamIds.length) {
    svg = '<svg viewBox="0 0 ' + W + ' 120" role="img"><text class="scatter-empty" x="' + (W / 2) + '" y="60" text-anchor="middle">No data for these filters</text></svg>';
    el.innerHTML = svg; return;
  }

  // X axis + gridlines
  const xticks = niceTicks(hi, 8);
  xticks.forEach(v => {
    const x = sx(v);
    svg += '<line class="grid-line" x1="' + x.toFixed(1) + '" y1="' + padT + '" x2="' + x.toFixed(1) + '" y2="' + (H - padB) + '"/>';
    svg += '<text class="tick-label" x="' + x.toFixed(1) + '" y="' + (H - padB + 15) + '" text-anchor="middle">' + fmtBin(v, metric.dec) + '</text>';
  });
  svg += '<text class="axis-label" x="' + (x0 + plotW / 2) + '" y="' + (H - 6) + '" text-anchor="middle">' + escapeHtml(metric.label) + '</text>';

  const ramps = ['#534AB7', '#1D9E75', '#D85A30', '#378ADD', '#BA7517', '#D4537E', '#0F6E56', '#993C1D'];
  teamIds.forEach((tid, ti) => {
    const cy = padT + ti * rowH + rowH / 2;
    const color = ramps[ti % ramps.length];
    const vals = byTeam[tid].map(valOf).sort((a, b) => a - b);
    const q1 = quantile(vals, 0.25), med = quantile(vals, 0.5), q3 = quantile(vals, 0.75);
    const lo = vals[0], top = vals[vals.length - 1];

    svg += '<text class="box-team" x="' + (padL - 12) + '" y="' + (cy + 3) + '" text-anchor="end">' + escapeHtml(teamLabelShort(tid)) + '</text>';
    // whisker
    svg += '<line x1="' + sx(lo).toFixed(1) + '" y1="' + cy + '" x2="' + sx(top).toFixed(1) + '" y2="' + cy + '" stroke="' + color + '" stroke-width="1.5"/>';
    svg += '<line x1="' + sx(lo).toFixed(1) + '" y1="' + (cy - 6) + '" x2="' + sx(lo).toFixed(1) + '" y2="' + (cy + 6) + '" stroke="' + color + '" stroke-width="1.5"/>';
    svg += '<line x1="' + sx(top).toFixed(1) + '" y1="' + (cy - 6) + '" x2="' + sx(top).toFixed(1) + '" y2="' + (cy + 6) + '" stroke="' + color + '" stroke-width="1.5"/>';
    // box
    svg += '<rect x="' + sx(q1).toFixed(1) + '" y="' + (cy - 11) + '" width="' + Math.max(1, sx(q3) - sx(q1)).toFixed(1) + '" height="22" rx="3" fill="' + color + '" fill-opacity="0.18" stroke="' + color + '" stroke-width="1.5"/>';
    svg += '<line x1="' + sx(med).toFixed(1) + '" y1="' + (cy - 11) + '" x2="' + sx(med).toFixed(1) + '" y2="' + (cy + 11) + '" stroke="' + color + '" stroke-width="2.5"/>';
    // Icons per Pokémon. Group those landing on the same X pixel. Up to 3 fan
    // vertically; 4+ collapse into a filled count circle (clickable for the list)
    // so they never bleed into neighboring team rows.
    const ICON = 18, STACK = 15;
    const buckets = {};
    byTeam[tid].forEach(r => { const px = Math.round(sx(valOf(r))); (buckets[px] = buckets[px] || []).push(r); });
    Object.keys(buckets).forEach(px => {
      const group = buckets[px];
      const cx = +px;
      if (group.length > 3) {
        const v = valOf(group[0]);
        const idx = boxClusters.length;
        boxClusters.push({ value: v, metricLabel: metric.label, dec: metric.dec, items: group.map(g => g.name) });
        svg += '<circle class="box-cluster" cx="' + cx + '" cy="' + cy + '" r="9" fill="' + color + '" fill-opacity="0.9" stroke="' + color + '" stroke-width="1.5" onclick="showBoxCluster(event,' + idx + ')"/>';
        svg += '<text class="box-cluster-n" x="' + cx + '" y="' + (cy + 3) + '" text-anchor="middle">' + group.length + '</text>';
      } else {
        group.forEach((r, j) => {
          const v = valOf(r);
          const step = Math.ceil(j / 2) * (j % 2 === 1 ? 1 : -1);   // 0, +1, -1
          const ix = cx - ICON / 2;
          const iy = cy - ICON / 2 + step * STACK;
          svg += '<image href="' + iconUrl(monFor(r.pokemon_id)) + '" x="' + ix.toFixed(1) + '" y="' + iy.toFixed(1) + '" width="' + ICON + '" height="' + ICON + '" style="image-rendering:pixelated"><title>' + escapeHtml(r.name) + ' — ' + fmtBin(v, metric.dec) + '</title></image>';
        });
      }
    });
  });

  el.innerHTML = svg + '</svg>';
}
function teamLabelShort(tid) {
  const t = teamById[tid];
  if (!t) return '—';
  const c = coachByTeam[tid];
  return c || t.name;
}

// ── CIRCLE PACKING ("Roster Bubbles") — season → teams → Pokémon, sized by metric.
//    Team bubble area ∝ the team's cumulative metric; Pokémon circle area ∝ value.
//    Both levels are packed so circles never overlap (front-chain packing).
const PACK_META = {
  kpg: { label: 'KOs / Game', get: r => r.kpg }, kos: { label: 'KOs', get: r => r.kos },
  mb: { label: 'Matches Brought', get: r => r.mbCount }, mp: { label: 'Match Participation', get: r => r.mpCount },
  gp: { label: 'Game Participation', get: r => r.gpCount },
};
function togglePackCollapse() {
  const card = document.getElementById('pack-card');
  const collapsed = card.classList.toggle('collapsed');
  document.getElementById('pack-collapse').textContent = collapsed ? '▸' : '▾';
  document.getElementById('pack-collapse').title = collapsed ? 'Show chart' : 'Hide chart';
}

// Pack circles (given their radii) with no overlaps, centered near the origin.
// Front-chain algorithm: place each new circle tangent to two existing ones, choosing
// the spot nearest the centroid; falls back to a radial push if no tangent fits.
function packCircles(radii) {
  const nodes = radii.map(r => ({ r, x: 0, y: 0 }));
  if (!nodes.length) return { nodes, R: 0 };
  if (nodes.length === 1) { return { nodes, R: nodes[0].r }; }
  // seed first three
  nodes[0].x = 0; nodes[0].y = 0;
  nodes[1].x = nodes[0].r + nodes[1].r; nodes[1].y = 0;
  if (nodes[2]) place3(nodes[0], nodes[1], nodes[2]);
  const placed = nodes.slice(0, Math.min(3, nodes.length));
  for (let i = 3; i < nodes.length; i++) {
    const c = nodes[i];
    let best = null, bestD = Infinity;
    // try tangent to each pair of already-placed circles
    for (let a = 0; a < placed.length; a++) {
      for (let b = a + 1; b < placed.length; b++) {
        const cand = tangentTo(placed[a], placed[b], c.r);
        for (const pt of cand) {
          if (collides(pt, c.r, placed, 0.01)) continue;
          const d = Math.hypot(pt.x, pt.y);
          if (d < bestD) { bestD = d; best = pt; }
        }
      }
    }
    if (!best) {
      // radial fallback: push outward from centroid until clear
      let ang = (i * 2.39996), rr = 0; const stepR = c.r;
      do { rr += stepR; best = { x: Math.cos(ang) * rr, y: Math.sin(ang) * rr }; ang += 0.7; }
      while (collides(best, c.r, placed, 0.01) && rr < 100000);
    }
    c.x = best.x; c.y = best.y; placed.push(c);
  }
  // recenter on centroid of extents, compute enclosing radius
  let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
  nodes.forEach(n => { minX = Math.min(minX, n.x - n.r); maxX = Math.max(maxX, n.x + n.r); minY = Math.min(minY, n.y - n.r); maxY = Math.max(maxY, n.y + n.r); });
  const ox = (minX + maxX) / 2, oy = (minY + maxY) / 2;
  nodes.forEach(n => { n.x -= ox; n.y -= oy; });
  let R = 0; nodes.forEach(n => { R = Math.max(R, Math.hypot(n.x, n.y) + n.r); });
  return { nodes, R };
}
function place3(a, b, c) {
  // position c tangent to both a and b
  const d = Math.hypot(b.x - a.x, b.y - a.y);
  const ra = a.r + c.r, rb = b.r + c.r;
  const x = (d * d + ra * ra - rb * rb) / (2 * d);
  const h = Math.sqrt(Math.max(0, ra * ra - x * x));
  const ux = (b.x - a.x) / d, uy = (b.y - a.y) / d;
  c.x = a.x + ux * x - uy * h; c.y = a.y + uy * x + ux * h;
}
function tangentTo(a, b, r) {
  const d = Math.hypot(b.x - a.x, b.y - a.y);
  const ra = a.r + r, rb = b.r + r;
  if (d > ra + rb || d < Math.abs(ra - rb) || d === 0) return [];
  const x = (d * d + ra * ra - rb * rb) / (2 * d);
  const h2 = ra * ra - x * x; if (h2 < 0) return [];
  const h = Math.sqrt(h2);
  const ux = (b.x - a.x) / d, uy = (b.y - a.y) / d;
  const mx = a.x + ux * x, my = a.y + uy * x;
  return [{ x: mx - uy * h, y: my + ux * h }, { x: mx + uy * h, y: my - ux * h }];
}
function collides(pt, r, list, eps) {
  for (const n of list) { if (Math.hypot(pt.x - n.x, pt.y - n.y) < n.r + r - eps) return true; }
  return false;
}

function renderPack() {
  const el = document.getElementById('pack');
  const metric = PACK_META[document.getElementById('pack-metric').value];
  const valOf = metric.get;

  const byTeam = {};
  filtered.forEach(r => { (byTeam[r.team_id] = byTeam[r.team_id] || []).push(r); });
  const teamIds = Object.keys(byTeam);
  if (!teamIds.length) { el.innerHTML = '<svg viewBox="0 0 720 120"><text class="scatter-empty" x="360" y="60" text-anchor="middle">No data for these filters</text></svg>'; return; }

  const ramps = ['#534AB7', '#1D9E75', '#D85A30', '#378ADD', '#BA7517', '#D4537E', '#0F6E56', '#993C1D', '#8A5CD4', '#2E8B8B'];

  // For each team: pack its Pokémon (radius ∝ √value, zeros excluded) into a group;
  // the group is scaled later to fill the team bubble.
  const teamData = teamIds.map((tid, ti) => {
    const mons = byTeam[tid].filter(r => valOf(r) > 0).sort((a, b) => valOf(b) - valOf(a));
    const radii = mons.map(r => Math.sqrt(valOf(r)));   // relative; scaled to fill later
    const packed = packCircles(radii);
    return { tid, ti, mons, packed, innerR: packed.R || 1, color: ramps[ti % ramps.length],
             total: mons.reduce((s, r) => s + valOf(r), 0) };
  });

  // Team bubble radius ∝ √(cumulative metric).
  const maxTotal = Math.max(0.0001, ...teamData.map(t => t.total));
  teamData.forEach(t => {
    t.R = Math.max(30, Math.sqrt(t.total / maxTotal) * 165);
    // Scale factor that makes the packed Pokémon group fill this bubble (with padding).
    t.fill = (t.R - 6) / t.innerR;
  });

  // Pack the team bubbles against each other (no overlaps), using their radii.
  const teamPack = packCircles(teamData.map(t => t.R + 6));   // +6 gap between teams
  teamPack.nodes.forEach((n, i) => { teamData[i].cx = n.x; teamData[i].cy = n.y; });

  // Fit everything into the SVG viewport.
  const W = 720, margin = 8;
  const scale = (W - margin * 2) / (teamPack.R * 2);
  const H = teamPack.R * 2 * scale + margin * 2;
  const ox = W / 2, oy = H / 2;
  const SX = v => ox + v * scale, SY = v => oy + v * scale;

  let svg = '<svg viewBox="0 0 ' + W + ' ' + H.toFixed(0) + '" role="img" style="width:100%;height:auto">';
  teamData.forEach(t => {
    const cx = SX(t.cx), cy = SY(t.cy), R = t.R * scale;
    svg += '<circle cx="' + cx.toFixed(1) + '" cy="' + cy.toFixed(1) + '" r="' + R.toFixed(1) + '" fill="' + t.color + '" fill-opacity="0.12" stroke="' + t.color + '" stroke-width="1.5"/>';
    t.mons.forEach((r, k) => {
      const node = t.packed.nodes[k];
      // Scale the packed group to fill the team bubble, then to screen.
      const px = cx + node.x * t.fill * scale, py = cy + node.y * t.fill * scale, pr = node.r * t.fill * scale;
      const v = valOf(r), vTxt = Number.isInteger(v) ? v : v.toFixed(2);
      svg += '<circle cx="' + px.toFixed(1) + '" cy="' + py.toFixed(1) + '" r="' + pr.toFixed(1) + '" fill="' + t.color + '" fill-opacity="0.4" stroke="' + t.color + '" stroke-width="1"><title>' + escapeHtml(r.name) + ' — ' + metric.label + ': ' + vTxt + '</title></circle>';
      // Icon at a fixed fraction of the circle — drawn only if the circle is big
      // enough to hold a legible icon (no icon scaling beyond the circle fit).
      const isz = pr * 1.45;
      if (isz >= 14) {
        svg += '<image href="' + iconUrl(monFor(r.pokemon_id)) + '" x="' + (px - isz / 2).toFixed(1) + '" y="' + (py - isz / 2).toFixed(1) + '" width="' + isz.toFixed(1) + '" height="' + isz.toFixed(1) + '" style="image-rendering:pixelated;pointer-events:none"/>';
      }
    });
    // team label tucked just inside the top edge of the bubble
    svg += '<text class="pack-team" x="' + cx.toFixed(1) + '" y="' + (cy - R + 13).toFixed(1) + '" text-anchor="middle">' + escapeHtml(teamLabelShort(t.tid)) + '</text>';
  });
  el.innerHTML = svg + '</svg>';
}

// ── populate filter dropdowns ──
function populateFilters() {
  const teamSel = document.getElementById('f-team');
  const teamOpts = [...allTeams].sort((a, b) => (a.initial_seed ?? 999) - (b.initial_seed ?? 999) || a.name.localeCompare(b.name));
  teamSel.innerHTML = '<option value="all">All teams</option>' + teamOpts.map(t => '<option value="' + t.id + '">' + escapeHtml(teamLabelText(t.id)) + '</option>').join('');
  const present = new Set(); instances.forEach(r => { if (r.type1) present.add(r.type1); if (r.type2) present.add(r.type2); });
  const typeSel = document.getElementById('f-type');
  typeSel.innerHTML = '<option value="all">All types</option>' + TYPES.filter(t => present.has(t)).map(t => '<option value="' + t + '">' + t + '</option>').join('');
}

async function init() {
  const banner = document.getElementById('boot-banner');
  try {
    await loadData();
    buildInstances();
    populateFilters();
    applyFilters();
    banner.hidden = true;
    document.getElementById('wrap').hidden = false;
  } catch (err) {
    console.error(err);
    banner.className = 'banner err';
    banner.textContent = 'Could not load the statistics page: ' + (err.message || err);
  }
}
