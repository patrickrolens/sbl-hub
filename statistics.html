<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="/assets/favicon.png">
<title>SBL Hub — Statistics</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<link rel="stylesheet" href="/tokens.css?v=20260709">
<style>
/* ─── TOKENS (shared verbatim with the rest of the hub) ─── */
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 13px; }
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* ─── PAGE ─── */
.wrap { padding: 14px; display: flex; flex-direction: column; gap: 14px; }
.card { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 14px; }
.card-title { font-size: 11px; font-weight: 700; letter-spacing: .5px; color: var(--text3); text-transform: uppercase; margin-bottom: 10px; }
.empty { font-size: 12px; color: var(--text3); font-style: italic; padding: 8px 0; }

/* ─── SHARED FILTER BAR (sticky, top of page; also moved into the modal) ─── */
.filter-bar { display: flex; flex-wrap: wrap; gap: 10px; align-items: flex-end;
  position: sticky; top: var(--nav-h); z-index: 20;
  background: var(--bg2); border: 1px solid var(--border); border-radius: 10px;
  padding: 12px 14px; margin-bottom: 14px; }
.filter-bar .field { display: flex; flex-direction: column; gap: 3px; }
.filter-bar label { font-size: 9px; font-weight: 700; letter-spacing: .4px; color: var(--text3); text-transform: uppercase; }
.filter-bar input, .filter-bar select { background: var(--bg3); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-size: 12px; padding: 7px 9px; outline: none; font-family: inherit; }
.filter-bar input:focus, .filter-bar select:focus { border-color: var(--accent); }
.filter-bar input[type=text] { min-width: 170px; }
.filter-bar input[type=number] { width: 64px; }
.filter-bar .count { margin-left: auto; font-size: 11px; color: var(--text3); align-self: flex-end; padding-bottom: 7px; }
.table-card { padding-top: 14px; }

/* ─── 2-UP VISUAL GRID ─── */
.viz-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 14px; }
.viz-grid .viz-full { grid-column: 1 / -1; }
.viz { min-width: 0; }
/* Collapse-all bar above the 2×2 grid. */
.grid-bar { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.grid-bar-label { font-size: 11px; font-weight: 700; letter-spacing: .5px; text-transform: uppercase; color: var(--text3); }
.viz-grid.collapsed { display: none; }
/* Collapsed full-width pack card hides its body, leaving just the header. */
#pack-card.collapsed .scatter-wrap { display: none; }

/* ─── CHART HEADER (shared by every visual) ─── */
.scatter-head { display: grid; grid-template-columns: auto 1fr auto; align-items: center; gap: 10px; margin-bottom: 10px; }
.scatter-head .scatter-btns { justify-self: start; display: flex; gap: 6px; }
.scatter-head .scatter-title { grid-column: 2; margin: 0; text-align: center; font-size: 14px; color: var(--text); }
.scatter-head .field, .scatter-head .hist-controls { justify-self: end; }
.scatter-head .field { flex-direction: row; align-items: center; gap: 6px; display: flex; }
.scatter-btn { background: var(--bg3); border: 1px solid var(--border); border-radius: 6px; color: var(--text2); font-size: 14px; line-height: 1; padding: 5px 9px; cursor: pointer; }
.scatter-btn:hover { color: var(--text); border-color: var(--accent); }
.scatter-head label { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: .4px; font-weight: 700; }
.scatter-head select, .scatter-head input { background: var(--bg3); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-size: 12px; padding: 6px 8px; outline: none; font-family: inherit; }
.scatter-wrap { width: 100%; }
.scatter-wrap svg { width: 100%; height: auto; display: block; }

/* ─── SHARED CHART MODAL ─── */
.viz-modal { position: fixed; inset: 0; z-index: 200; background: var(--bg); display: flex; flex-direction: column; }
.viz-modal[hidden] { display: none; }
.viz-modal-bar { display: flex; align-items: center; flex-wrap: wrap; gap: 10px 14px; padding: 10px 16px; border-bottom: 1px solid var(--border); background: var(--bg2); }
.viz-modal-title { font-size: 14px; font-weight: 700; letter-spacing: .5px; text-transform: uppercase; color: var(--text); white-space: nowrap; }
/* Filter bar, relocated inline into the header: drop its sticky/card chrome. */
.viz-modal-filter { display: flex; align-items: center; gap: 10px; flex: 1 1 auto; flex-wrap: wrap; }
.viz-modal-filter .filter-bar { position: static; margin: 0; border: none; padding: 0; background: transparent; gap: 8px; flex-wrap: wrap; }
.viz-modal-filter .filter-bar .field { flex-direction: row; align-items: center; gap: 5px; }
.viz-modal-filter .filter-bar input[type=text] { min-width: 130px; }
.viz-modal-filter .filter-bar .count { display: none; }
.viz-modal-controls { display: flex; align-items: center; gap: 10px; margin-left: auto; }
.viz-modal-controls .field, .viz-modal-controls .hist-controls { display: flex; align-items: center; gap: 6px; flex-direction: row; }
.viz-modal-controls label { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: .4px; font-weight: 700; }
.viz-modal-controls select, .viz-modal-controls input { background: var(--bg3); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-size: 12px; padding: 6px 8px; outline: none; font-family: inherit; }
.viz-modal-controls input[type=number] { width: 60px; }
/* Charts that must stay legible (axis-dependent) keep their intrinsic width and
   let the body scroll horizontally on mobile, instead of shrinking to fit. */
.viz-modal-body { flex: 1 1 auto; min-height: 0; overflow: auto; }
.viz-modal-body.scroll-x > svg { width: auto; max-width: none; }
.viz-modal-body svg { display: block; margin: 0 auto; }
.viz-modal-body > svg { width: 100%; }
.axis-line { stroke: var(--border); stroke-width: 1; }
.grid-line { stroke: var(--border); stroke-opacity: .35; stroke-width: 1; }
.axis-label { fill: var(--text3); font-size: 11px; font-weight: 600; }
.tick-label { fill: var(--text3); font-size: 10px; }
/* In the expanded modal, axis titles and tick labels scale up to match the big chart. */
#viz-modal-body .axis-label { font-size: 18px; }
#viz-modal-body .tick-label { font-size: 15px; }
.scatter-empty { fill: var(--text3); font-size: 13px; font-style: italic; }
/* Histogram bars. */
.hist-bar { fill: var(--accent); fill-opacity: .7; transition: fill-opacity .12s; cursor: pointer; }
.hist-bar:hover { fill-opacity: 1; }
.hist-bar.open { fill-opacity: .22; stroke: var(--accent); stroke-width: 1.5; }
.box-team { fill: var(--text); font-weight: 600; }
.box-cluster { cursor: pointer; transition: fill-opacity .12s; }
.box-cluster:hover { fill-opacity: 1; }
.box-cluster-n { fill: #fff; font-weight: 800; pointer-events: none; paint-order: stroke; stroke: rgba(0,0,0,.5); stroke-width: 2px; }
/* Box card fills its grid cell so its scroll area can match the taller neighbor. */
/* Inline box plot and matrix are both taller than the other charts; lock them to the
   same fixed height and let each scroll, so the 2×2 row stays even with no dead space. */
#boxplot, #matrix { height: 560px; overflow-y: auto; overflow-x: hidden; }
/* Team labels on the bubble chart: white with a dark outline to read over any color. */
.pack-team { fill: #fff; font-size: 11px; font-weight: 700; paint-order: stroke; stroke: rgba(0,0,0,.75); stroke-width: 2.5px; cursor: pointer; }
.pack-team:hover { fill: var(--accent); }
/* Matchup matrix. */
.mx-cell { stroke: var(--bg); stroke-width: 1; }
.mx-cell:hover { stroke: var(--text); stroke-width: 1.5; }
.mx-row { fill: var(--text2); }
.mx-col { fill: var(--text2); }
.mx-leg { fill: var(--text3); }
/* Roster-breakdown tooltip rows: name left, value right. */
#cluster-tip .ct-mon { display: flex; justify-content: space-between; gap: 14px; }
#cluster-tip .ct-mon .ct-v { color: var(--text); font-weight: 700; font-variant-numeric: tabular-nums; }
#cluster-tip .ct-link { display: inline-block; margin-top: 8px; color: var(--accent); text-decoration: none; font-weight: 600; font-size: 12px; }
#cluster-tip .ct-link:hover { text-decoration: underline; }
.hist-count { fill: var(--text2); font-size: 10px; font-weight: 600; }
.hist-controls { display: flex; align-items: center; gap: 10px; }
.hist-controls .field { display: flex; align-items: center; gap: 6px; }
.hist-controls label { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: .4px; font-weight: 700; }
.hist-controls select, .hist-controls input { background: var(--bg3); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-size: 12px; padding: 6px 8px; outline: none; font-family: inherit; }
.hist-controls input[type=number] { width: 58px; }
/* Clickable outline circle marking each plotted coordinate. */
.cl-ring { fill: rgba(124,111,247,.06); stroke: var(--accent); stroke-opacity: .5; stroke-width: 1.5; cursor: pointer; transition: fill .12s, stroke-opacity .12s; }
.cl-ring:hover { fill: rgba(124,111,247,.16); stroke-opacity: .9; }
/* Cluster tooltip (click a circle) — lists the point's values + Pokémon there. */
#cluster-tip { position: fixed; z-index: 999; display: none; min-width: 150px; max-width: 240px; max-height: 320px; overflow-y: auto; background: var(--bg2); border: 1px solid var(--accent); border-radius: 8px; padding: 9px 11px; box-shadow: 0 10px 30px rgba(0,0,0,.55); font-size: 12px; }
#cluster-tip .ct-head { font-weight: 700; color: var(--text); margin-bottom: 2px; }
#cluster-tip .ct-sub { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: .4px; margin-bottom: 6px; }
#cluster-tip .ct-mon { color: var(--text2); padding: 2px 0; border-top: 1px solid var(--bg3); }

/* ─── TABLE ─── */
/* No overflow here on desktop: an overflow value would trap the sticky header
   inside this box instead of letting it stick to the page under the filter bar. */
/* Vertical scroll: show ~25 Pokémon at a time so the page isn't over-long. The
   sticky header sticks to the top of this scroll box (not the page). */
.table-scroll { overflow-x: visible; max-height: 1120px; overflow-y: auto; }
table.tbl { width: 100%; border-collapse: collapse; font-size: 12px; }
/* Header sticks just below the sticky filter bar (nav + ~filter height). Solid
   background + border so rows never bleed through or overlap it. */
.tbl th { text-align: center; font-size: 9px; text-transform: uppercase; letter-spacing: .4px; color: var(--text3); font-weight: 700; padding: 9px 8px; border-bottom: 1px solid var(--border); white-space: nowrap; cursor: pointer; user-select: none; position: sticky; top: 0; background: var(--bg2); z-index: 4; }
.tbl th:hover { color: var(--text2); }
.tbl th .arrow { color: var(--accent); margin-left: 2px; }
.tbl td.num { text-align: right; font-variant-numeric: tabular-nums; }
.tbl td { padding: 7px 8px; border-bottom: 1px solid var(--bg3); white-space: nowrap; }
.tbl tbody tr:hover { background: var(--bg3); }
.tbl .pl { color: var(--text2); font-weight: 400; }
.tbl .pos { color: var(--blue); } .tbl .neg { color: var(--red); }
.tbl .sub { color: var(--text3); font-weight: 400; }
.tbl .inactive-tag { font-size: 9px; font-weight: 700; color: var(--text3); border: 1px solid var(--border); border-radius: 4px; padding: 1px 5px; margin-left: 6px; text-transform: uppercase; }
.mon-cell { display: flex; align-items: center; gap: 7px; }
.mon-cell img { width: 28px; height: 28px; image-rendering: pixelated; flex-shrink: 0; }

/* ─── BANNER ─── */
.banner { margin: 16px; padding: 10px 14px; border: 1px solid var(--border); border-radius: 8px; background: var(--bg2); font-size: 12px; color: var(--text2); }
.banner.err { border-color: rgba(224,85,85,.5); color: var(--red); }
@media (max-width: 820px) {
  .filter-bar input[type=text] { min-width: 120px; }
  .viz-grid { grid-template-columns: 1fr; }
  .table-scroll { overflow-x: auto; }

  /* Per-visual headers: drop the 3-column grid, let title + controls stack and wrap. */
  .scatter-head { grid-template-columns: 1fr auto; row-gap: 8px; }
  .scatter-head .scatter-title { grid-column: 1 / -1; order: -1; text-align: left; }
  .scatter-head .field,
  .scatter-head .hist-controls { justify-self: stretch; flex-wrap: wrap; }
  .scatter-head select,
  .scatter-head input { min-width: 0; }

  /* Control groups inside any header can shrink instead of forcing width. */
  .hist-controls { flex-wrap: wrap; }
  .hist-controls .field { min-width: 0; }

  /* Modal control rows wrap too. */
  .viz-modal-controls { flex-wrap: wrap; margin-left: 0; }
  .viz-modal-controls .field,
  .viz-modal-controls .hist-controls { min-width: 0; flex-wrap: wrap; }
}

/* Collapsible filter/controls inside the modal bar (mainly for mobile). */
.viz-modal-filter-toggle { display: none; }   /* hidden on desktop; filters always shown */
.viz-modal.filters-collapsed .viz-modal-filter,
.viz-modal.filters-collapsed .viz-modal-controls { display: none; }
.viz-modal-filter-toggle .caret { transition: transform .15s; display: inline-block; }
.viz-modal.filters-collapsed .viz-modal-filter-toggle .caret { transform: rotate(-90deg); }

@media (max-width: 820px) {
  .viz-modal-filter-toggle {
    display: inline-flex; align-items: center; gap: 6px;
    background: var(--bg3); border: 1px solid var(--border); border-radius: 6px;
    color: var(--text2); font-size: 12px; font-weight: 600; padding: 6px 10px;
    cursor: pointer; font-family: inherit; margin-left: auto;
  }
  .viz-modal-filter-toggle:hover { color: var(--text); border-color: var(--accent); }
  /* When expanded on mobile, give filters + controls their own full-width rows. */
  .viz-modal-filter, .viz-modal-controls { flex-basis: 100%; }
}
</style>
</head>
<body>

<script src="/nav.js?v=20260709"></script>
<script src="/utils.js?v=20260709"></script>

<div id="week-banner" class="sbln-week-banner" hidden></div>
<div id="boot-banner" class="banner">Loading statistics…</div>

<div class="wrap" id="wrap" hidden>

  <!-- Shared filter bar (sticky, top of page; also cloned into the modal). -->
  <div class="filter-bar" id="filter-bar">
    <div class="field"><label>Search</label><input type="text" id="f-search" placeholder="Pokémon name…" oninput="applyFilters()"></div>
    <div class="field"><label>Team</label><select id="f-team" onchange="applyFilters()"></select></div>
    <div class="field"><label>Status</label><select id="f-status" onchange="applyFilters()"><option value="all">All</option><option value="active">Active</option><option value="inactive">Inactive</option></select></div>
    <div class="field"><label>Type</label><select id="f-type" onchange="applyFilters()"></select></div>
    <div class="field"><label>Min games</label><input type="number" id="f-mingp" min="0" max="50" value="1" oninput="applyFilters()"></div>
    <span class="count" id="row-count"></span>
  </div>

  <div class="grid-bar">
    <button class="scatter-btn" id="grid-collapse" onclick="toggleGridCollapse()" title="Hide these charts" aria-label="Hide these charts">▾</button>
    <span class="grid-bar-label">Visualizations</span>
  </div>
  <div class="viz-grid" id="viz-grid">
    <div class="card viz" id="scatter-card">
      <div class="scatter-head">
        <div class="scatter-btns"><button class="scatter-btn" onclick="openModal('scatter')" title="Expand chart" aria-label="Expand chart">⤢</button></div>
        <div class="card-title scatter-title">KOs Scatter</div>
        <div class="field"><label>X axis</label>
          <select id="scatter-x" onchange="renderScatter()">
            <option value="faints">Faints</option>
            <option value="gp">Game Participation</option>
            <option value="mp">Match Participation</option>
          </select>
        </div>
      </div>
      <div class="scatter-wrap" id="scatter"></div>
    </div>

    <div class="card viz" id="hist-card">
      <div class="scatter-head">
        <div class="scatter-btns"><button class="scatter-btn" onclick="openModal('hist')" title="Expand chart" aria-label="Expand chart">⤢</button></div>
        <div class="card-title scatter-title">Distribution</div>
        <div class="hist-controls">
          <div class="field"><label>Metric</label>
            <select id="hist-metric" onchange="renderHistogram()">
              <option value="kpg" selected>KOs / Game</option>
              <option value="kos">KOs</option>
              <option value="faints">Faints</option>
              <option value="kf">K/F Ratio</option>
              <option value="kfd">KF Δ</option>
              <option value="mb">Sets Brought</option>
              <option value="mp">Match Participation</option>
              <option value="gp">Game Participation</option>
            </select>
          </div>
          <div class="field"><label>Bins</label>
            <input type="number" id="hist-bins" min="2" max="30" value="7" oninput="renderHistogram()">
          </div>
        </div>
      </div>
      <div class="scatter-wrap" id="histogram"></div>
    </div>

    <div class="card viz" id="box-card">
      <div class="scatter-head">
        <div class="scatter-btns"><button class="scatter-btn" onclick="openModal('box')" title="Expand chart" aria-label="Expand chart">⤢</button></div>
        <div class="card-title scatter-title">Team Distribution</div>
        <div class="hist-controls">
          <div class="field"><label>Metric</label>
            <select id="box-metric" onchange="renderBoxPlot()">
              <option value="kos" selected>KOs</option>
              <option value="kpg">KOs / Game</option>
              <option value="kfd">KF Δ</option>
              <option value="kf">K/F Ratio</option>
              <option value="mb">Sets Brought</option>
              <option value="mp">Match Participation</option>
              <option value="gp">Game Participation</option>
            </select>
          </div>
        </div>
      </div>
      <div class="scatter-wrap" id="boxplot"></div>
    </div>

    <div class="card viz" id="matrix-card">
      <div class="scatter-head">
        <div class="scatter-btns"><button class="scatter-btn" onclick="openModal('matrix')" title="Expand chart" aria-label="Expand chart">⤢</button></div>
        <div class="card-title scatter-title">Matchup Matrix</div>
        <div class="hist-controls">
          <div class="field"><label>Stage</label>
            <select id="matrix-stage" onchange="renderMatrix()">
              <option value="regular" selected>Regular season</option>
              <option value="all">All matches</option>
            </select>
          </div>
        </div>
      </div>
      <div class="scatter-wrap" id="matrix"></div>
    </div>

    <div class="card viz viz-full" id="pack-card">
      <div class="scatter-head">
        <div class="scatter-btns"><button class="scatter-btn" onclick="toggleCollapse('pack-card')" title="Hide chart" aria-label="Hide chart">▾</button><button class="scatter-btn" onclick="openModal('pack')" title="Expand chart" aria-label="Expand chart">⤢</button></div>
        <div class="card-title scatter-title">Roster Bubbles</div>
        <div class="hist-controls">
          <div class="field"><label>Size by</label>
            <select id="pack-metric" onchange="renderPack()">
              <option value="kpg" selected>KOs / Game</option>
              <option value="kos">KOs</option>
              <option value="mb">Sets Brought</option>
              <option value="mp">Match Participation</option>
              <option value="gp">Game Participation</option>
            </select>
          </div>
        </div>
      </div>
      <div class="scatter-wrap" id="pack"></div>
    </div>
  </div>

  <div class="card table-card">
    <div class="table-scroll">
      <table class="tbl" id="stats-table"></table>
    </div>
  </div>

</div>

<!-- Shared fullscreen modal: hosts any chart + the filter bar (in the header). -->
<div class="viz-modal" id="viz-modal" hidden>
  <div class="viz-modal-bar">
    <button class="scatter-btn" onclick="closeModal()" title="Close" aria-label="Close">✕</button>
    <div class="viz-modal-title" id="viz-modal-title">Chart</div>
    <button class="viz-modal-filter-toggle" id="viz-modal-filter-toggle" onclick="toggleModalFilters()">
      <span class="caret">▾</span> Filters
    </button>
    <div class="viz-modal-filter" id="viz-modal-filter"></div>
    <div class="viz-modal-controls" id="viz-modal-controls"></div>
  </div>
  <div class="viz-modal-body" id="viz-modal-body"></div>
</div>


<script>
// ─────────────────────────────────────────────────────────────────────────────
// CONFIG
// ─────────────────────────────────────────────────────────────────────────────
const SUPABASE_URL      = "https://arypbyzeppbpbursmzcs.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_U8J3pV_KgomrWhbgoGBSUg_ttQ4d46m";
const sb = window.sb || supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
const POKEMON_JSON_URL = "https://planner.springfieldbattleleague.com/pokemon.json";
const ASSET_BASE = POKEMON_JSON_URL.replace(/[^/]*$/, '');
const POKEBALL_FALLBACK = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 40 40'%3E%3Ccircle cx='20' cy='20' r='19' fill='%23e05555' stroke='%23333' stroke-width='1.5'/%3E%3Cpath d='M1.1 20 A19 19 0 0 0 38.9 20 Z' fill='%23fff'/%3E%3Crect x='1' y='18' width='38' height='4' fill='%23333'/%3E%3Ccircle cx='20' cy='20' r='7' fill='%23fff' stroke='%23333' stroke-width='1.5'/%3E%3Ccircle cx='20' cy='20' r='3.5' fill='%23e8eaf6' stroke='%23333' stroke-width='1'/%3E%3C/svg%3E";
const TYPES = ["Normal","Fire","Water","Grass","Electric","Ice","Fighting","Poison","Ground","Flying","Psychic","Bug","Rock","Ghost","Dragon","Dark","Steel","Fairy"];

// ── STATE ──
let season = null, allTeams = [], teamById = {}, allOwners = [], ownersByTeam = {}, coachByTeam = {};
let coachAtWeek = () => null;   // bound to ownersByTeam once loaded (see utils.js makeCoachAtWeek)
let matches = [], gamesByMatch = {}, gameToMatch = {}, statRows = [], broughtRows = [];
let weekCap = null, trueMaxWeek = 0;   // ?week=N from the nav's Week Selector, and the season's actual latest week
let teamPokemon = [], pokemonById = {}, instances = [], filtered = [];
let sortState = { col: 'kos', dir: 'desc' };

// ── HELPERS ──
function signed(n) { return (n > 0 ? '+' : '') + n; }
function deltaClass(n) { return n > 0 ? 'pos' : (n < 0 ? 'neg' : ''); }
function kfRatio(kos, faints) { if (faints === 0) return kos === 0 ? '—' : '∞'; return (kos / faints).toFixed(2); }
function kfSortValue(kos, faints) { return faints > 0 ? kos / faints : (kos > 0 ? 1e9 : 0); }
function monFor(id) { return pokemonById[id] || { id: id, name: id }; }

function teamLabelHtml(id) { const t = teamById[id]; if (!t) return '—'; const c = coachByTeam[id]; return escapeHtml(t.name) + (c ? ' <span class="pl">(' + escapeHtml(c) + ')</span>' : ''); }
function teamLabelText(id) { const t = teamById[id]; if (!t) return ''; const c = coachByTeam[id]; return t.name + (c ? ' (' + c + ')' : ''); }

// Shared 20-color palette + a stable team→color map used by every chart so a given
// team is always the same color (box plot, circle packing, future bump chart).
const TEAM_PALETTE = ['#e6194B','#3cb44b','#ffe119','#4363d8','#f58231','#911eb4','#42d4f4','#f032e6','#bfef45','#fabed4','#469990','#dcbeff','#9A6324','#fffac8','#800000','#aaffc3','#808000','#ffd8b1','#000075','#a9a9a9'];
let teamColorMap = {};
function buildTeamColors() {
  teamColorMap = {};
  const ordered = [...allTeams].sort((a, b) => (a.initial_seed ?? 999) - (b.initial_seed ?? 999) || a.name.localeCompare(b.name));
  ordered.forEach((t, i) => { teamColorMap[t.id] = TEAM_PALETTE[i % TEAM_PALETTE.length]; });
}
function teamColor(tid) { return teamColorMap[tid] || '#a9a9a9'; }
function pctText(count, whole) { return whole > 0 ? Math.round((count / whole) * 100) + '% (' + count + ')' : '— (' + count + ')'; }
function pctSort(count, whole) { return whole > 0 ? count / whole : -1; }

// ─────────────────────────────────────────────────────────────────────────────
// DATA LOAD
// ─────────────────────────────────────────────────────────────────────────────

async function loadData() {
  const pjPromise = fetch(POKEMON_JSON_URL).then(async res => {
    const ct = res.headers.get('content-type') || '';
    if (!res.ok || !ct.includes('json')) throw new Error('pokemon.json not found at "' + POKEMON_JSON_URL + '" (got ' + res.status + ').');
    return res.json();
  });

  season = await resolveSeason();

  const [teamsRes, matchRes] = await Promise.all([
    sb.from('teams').select('id,name,slug,initial_seed').eq('season_id', season.id),
    sb.from('matches').select('id, stage, week, team_a_id, team_b_id, team_a_score, team_b_score, winner_team_id').eq('season_id', season.id),
  ]);
  for (const r of [teamsRes, matchRes]) if (r.error) throw r.error;
  // Unfiltered, all-seasons table → paginate past the 1000-row cap.
  const ownersAll = await fetchAll('team_owners', 'team_id, started_week, ended_week, players(display_name)');

  allTeams = teamsRes.data || [];
  teamById = {}; allTeams.forEach(t => { teamById[t.id] = t; });
  const teamIds = allTeams.map(t => t.id);
  // Stable team→color map (consistent across every chart). Keyed by seed order so a
  // team always gets the same color regardless of filtering or render order.
  buildTeamColors();
  allOwners = ownersAll.filter(o => teamIds.includes(o.team_id));
  ownersByTeam = {};
  allOwners.filter(o => o.players).forEach(o => {
    (ownersByTeam[o.team_id] = ownersByTeam[o.team_id] || []).push({ started_week: o.started_week || 1, ended_week: o.ended_week, name: o.players.display_name });
  });
  Object.values(ownersByTeam).forEach(list => list.sort((a, b) => a.started_week - b.started_week));
  coachAtWeek = makeCoachAtWeek(ownersByTeam);
  matches = matchRes.data || [];

  // Week cap (?week=N): the nav's Week Selector caps every query on this page at a
  // chosen week (see utils.js).
  weekCap = resolveWeekCap();
  ({ filtered: matches, trueMaxWeek } = applyWeekCap(matches, weekCap));
  updateWeekBanner(weekCap, trueMaxWeek);

  // Coach attribution "as of" the week cap (or live, if uncapped) - a team's stats
  // for a capped week should be credited to whoever coached it then (see coachAtWeek).
  coachByTeam = {};
  teamIds.forEach(tid => { const name = coachAtWeek(tid, weekCap); if (name) coachByTeam[tid] = name; });

  // Rosters for every team (each row is an ownership instance). Paginated: a full
  // season's team_pokemon can approach the cap once trades/FA accumulate.
  const teamPokemonRows = teamIds.length
    ? await fetchAllIn('team_pokemon', 'team_id, pokemon_id, acquired_week, released_week, acquired_via', 'team_id', teamIds)
    : [];
  teamPokemon = teamPokemonRows;

  // Games + stats for the whole season (empty until results are entered).
  gamesByMatch = {}; gameToMatch = {}; statRows = []; broughtRows = [];
  const matchIds = matches.map(m => m.id);
  if (matchIds.length) {
    const games = await fetchAllIn('games', 'id, match_id', 'match_id', matchIds);
    (games || []).forEach(g => { (gamesByMatch[g.match_id] = gamesByMatch[g.match_id] || []).push(g.id); gameToMatch[g.id] = g.match_id; });
    const gameIds = (games || []).map(g => g.id);
    if (gameIds.length) {
      statRows = await fetchAllIn('game_pokemon_stats', 'game_id, team_id, pokemon_id, kills, deaths', 'game_id', gameIds);
    }
    // Brought-six per match (drives MB / "matches brought" counts).
    broughtRows = await fetchAllIn('match_pokemon', 'match_id, team_id, pokemon_id', 'match_id', matchIds);
  }

  const pj = await pjPromise;
  const arr = Array.isArray(pj) ? pj : pj.pokemon;
  pokemonById = {}; arr.forEach(p => { pokemonById[p.id] = p; });
}

// ─────────────────────────────────────────────────────────────────────────────
// PER-INSTANCE STATS — scoped to (team, Pokémon) within the ownership window,
// same scoping as the Team page (kills/participation while owned).
// ─────────────────────────────────────────────────────────────────────────────
let matchesByTeam = {}, statsByTP = {}, broughtByTP = {};
function buildIndexes() {
  matchesByTeam = {}; statsByTP = {}; broughtByTP = {};
  matches.forEach(m => {
    (matchesByTeam[m.team_a_id] = matchesByTeam[m.team_a_id] || []).push(m);
    (matchesByTeam[m.team_b_id] = matchesByTeam[m.team_b_id] || []).push(m);
  });
  statRows.forEach(s => { (statsByTP[s.team_id + '|' + s.pokemon_id] = statsByTP[s.team_id + '|' + s.pokemon_id] || []).push(s); });
  broughtRows.forEach(b => { (broughtByTP[b.team_id + '|' + b.pokemon_id] = broughtByTP[b.team_id + '|' + b.pokemon_id] || []).push(b.match_id); });
}

function statsForInstance(teamId, pid, aw, rw) {
  const owned = (matchesByTeam[teamId] || []).filter(m => m.week >= aw && (rw == null || m.week < rw));
  const ownedGameIds = new Set();
  let ownedGames = 0;
  owned.forEach(m => (gamesByMatch[m.id] || []).forEach(gid => { ownedGames++; ownedGameIds.add(gid); }));
  const ownedMatches = owned.length;

  let kos = 0, faints = 0;
  const appearedGames = new Set(), appearedMatches = new Set();
  (statsByTP[teamId + '|' + pid] || []).forEach(s => {
    if (!ownedGameIds.has(s.game_id)) return;
    appearedGames.add(s.game_id);
    const mid = gameToMatch[s.game_id]; if (mid) appearedMatches.add(mid);
    kos += s.kills || 0; faints += s.deaths || 0;
  });
  // MB = matches in the owned window where this mon was on the brought-six.
  const ownedMatchIds = new Set(owned.map(m => m.id));
  const mbCount = new Set((broughtByTP[teamId + '|' + pid] || []).filter(mid => ownedMatchIds.has(mid))).size;
  return { kos, faints, gpCount: appearedGames.size, mpCount: appearedMatches.size, mbCount, ownedGames, ownedMatches };
}

function buildInstances() {
  buildIndexes();
  instances = teamPokemon.map(tp => {
    const mon = monFor(tp.pokemon_id);
    const st = statsForInstance(tp.team_id, tp.pokemon_id, tp.acquired_week || 1, tp.released_week);
    return {
      pokemon_id: tp.pokemon_id, name: mon.name, type1: mon.type1 || null, type2: mon.type2 || null,
      team_id: tp.team_id, active: tp.released_week == null,
      kos: st.kos, faints: st.faints, kfDelta: st.kos - st.faints,
      kpg: st.gpCount > 0 ? st.kos / st.gpCount : 0,
      kfVal: kfSortValue(st.kos, st.faints), kfTxt: kfRatio(st.kos, st.faints),
      mpCount: st.mpCount, gpCount: st.gpCount, mbCount: st.mbCount, ownedMatches: st.ownedMatches, ownedGames: st.ownedGames,
      mpSort: pctSort(st.mpCount, st.ownedMatches), gpSort: pctSort(st.gpCount, st.ownedGames),
    };
  });
}

// ─────────────────────────────────────────────────────────────────────────────
// FILTER + SORT + RENDER
// ─────────────────────────────────────────────────────────────────────────────
function applyFilters() {
  const q = (document.getElementById('f-search').value || '').trim().toLowerCase();
  const team = document.getElementById('f-team').value;
  const status = document.getElementById('f-status').value;
  const type = document.getElementById('f-type').value;
  const minGp = Math.max(0, parseInt(document.getElementById('f-mingp').value, 10) || 0);
  filtered = instances.filter(r => {
    if (q && !r.name.toLowerCase().includes(q)) return false;
    if (team !== 'all' && r.team_id !== team) return false;
    if (status === 'active' && !r.active) return false;
    if (status === 'inactive' && r.active) return false;
    if (type !== 'all' && r.type1 !== type && r.type2 !== type) return false;
    if (r.gpCount < minGp) return false;
    return true;
  });
  document.getElementById('row-count').textContent = filtered.length + ' of ' + instances.length + ' Pokémon';
  renderTable();
  renderScatter();
  renderHistogram();
  renderBoxPlot();
  renderPack();
  // The matrix is filter-independent (teams, not Pokémon), but re-render if it's the
  // open modal so its sizing stays correct.
  if (modalChart === 'matrix') renderMatrix();
}

function toggleModalFilters() {
  const m = document.getElementById('viz-modal');
  m.classList.toggle('filters-collapsed');
  // The chart sizes to available space, so re-render after the bar resizes.
  if (modalChart && CHART_REGISTRY[modalChart]) {
    requestAnimationFrame(() => CHART_REGISTRY[modalChart].render());
  }
}

function modalBodySize() {
  const b = document.getElementById('viz-modal-body');
  const pad = 32;
  const avail = (b.clientWidth || 1200) - pad;
  // On narrow screens, render charts at a fixed legible width and let the body
  // scroll, rather than squishing axis-dependent charts to fit the viewport.
  const isMobile = window.innerWidth <= 820;
  const w = isMobile ? Math.max(640, avail) : Math.max(320, avail);
  return { w, h: Math.max(280, (b.clientHeight || 700) - pad) };
}

const SORT_ACCESSORS = {
  pokemon: r => r.name.toLowerCase(), team: r => teamLabelText(r.team_id).toLowerCase(),
  kos: r => r.kos, faints: r => r.faints, kf: r => r.kfVal, kfd: r => r.kfDelta,
  mp: r => r.mpSort * 1000 + r.mpCount, gp: r => r.gpSort * 1000 + r.gpCount,
};
function sortBy(col) {
  if (sortState.col === col) sortState.dir = sortState.dir === 'asc' ? 'desc' : 'asc';
  else sortState = { col, dir: (col === 'pokemon' || col === 'team') ? 'asc' : 'desc' };
  renderTable();
}
function arrow(col) { return sortState.col === col ? '<span class="arrow">' + (sortState.dir === 'asc' ? '▲' : '▼') + '</span>' : ''; }

function renderTable() {
  const el = document.getElementById('stats-table');
  const acc = SORT_ACCESSORS[sortState.col];
  const dir = sortState.dir === 'asc' ? 1 : -1;
  const rows = filtered.slice().sort((a, b) => {
    const va = acc(a), vb = acc(b);
    if (va < vb) return -1 * dir; if (va > vb) return 1 * dir;
    return a.name.localeCompare(b.name);
  });

  let html = '<thead><tr>'
    + '<th onclick="sortBy(\'pokemon\')">Pokémon' + arrow('pokemon') + '</th>'
    + '<th onclick="sortBy(\'team\')">Team (Coach)' + arrow('team') + '</th>'
    + '<th class="num" onclick="sortBy(\'kos\')">KOs' + arrow('kos') + '</th>'
    + '<th class="num" onclick="sortBy(\'faints\')">Faints' + arrow('faints') + '</th>'
    + '<th class="num" onclick="sortBy(\'kf\')">K/F' + arrow('kf') + '</th>'
    + '<th class="num" onclick="sortBy(\'kfd\')">KF Δ' + arrow('kfd') + '</th>'
    + '<th class="num" onclick="sortBy(\'mp\')">MP% (Count)' + arrow('mp') + '</th>'
    + '<th class="num" onclick="sortBy(\'gp\')">GP% (Count)' + arrow('gp') + '</th>'
    + '</tr></thead><tbody>';

  if (!rows.length) {
    html += '<tr><td colspan="8"><div class="empty">No Pokémon match these filters.</div></td></tr>';
  } else {
    rows.forEach(r => {
      const mon = monFor(r.pokemon_id);
      html += '<tr>'
        + '<td><div class="mon-cell"><img loading="lazy" src="' + iconUrl(mon) + '" alt="" data-mid="' + escapeHtml(r.pokemon_id) + '"><span>' + escapeHtml(r.name) + '</span></div></td>'
        + '<td>' + teamLabelHtml(r.team_id) + (r.active ? '' : '<span class="inactive-tag">Inactive</span>') + '</td>'
        + '<td class="num">' + r.kos + '</td>'
        + '<td class="num">' + r.faints + '</td>'
        + '<td class="num">' + r.kfTxt + '</td>'
        + '<td class="num ' + deltaClass(r.kfDelta) + '">' + signed(r.kfDelta) + '</td>'
        + '<td class="num">' + pctText(r.mpCount, r.ownedMatches) + '</td>'
        + '<td class="num">' + pctText(r.gpCount, r.ownedGames) + '</td>'
        + '</tr>';
    });
  }
  el.innerHTML = html + '</tbody>';
  el.querySelectorAll('img[data-mid]').forEach(img => attachIconFallback(img, monFor(img.dataset.mid)));
}

// ── SCATTER (hand-rolled SVG, no charting dependency) ──
// X = selectable stat, Y = KOs (axes swapped). Each plotted coordinate gets an
// outlined circle; the Pokémon icons sit on/around it. Clicking a circle opens a
// tooltip listing the point's values and which Pokémon are there.
const X_META = { faints: { label: 'Faints', get: r => r.faints }, gp: { label: 'Game Participation', get: r => r.gpCount }, mp: { label: 'Match Participation', get: r => r.mpCount } };
let scatterClusters = [];   // current clusters, for click→tooltip lookup

function niceTicks(max, count) {
  // Produce up to `count` integer-ish tick values from 0..max.
  if (max <= count) { const a = []; for (let i = 0; i <= max; i++) a.push(i); return a; }
  const step = Math.ceil(max / count);
  const a = []; for (let v = 0; v <= max; v += step) a.push(v);
  if (a[a.length - 1] !== max) a.push(max);
  return a;
}

function renderScatter() {
  const inModal = modalChart === 'scatter';
  const el = inModal ? document.getElementById('viz-modal-body') : document.getElementById('scatter');
  const xKey = document.getElementById('scatter-x').value;
  const xMeta = X_META[xKey];
  // Modal renders to the real body size to fill the view; inline stays compact.
  const sz = inModal ? modalBodySize() : null;
  const W = inModal ? sz.w : 720, H = inModal ? sz.h : 380;
  const expanded = inModal;
  const padL = 50, padB = 40, padT = 14, padR = 18;
  const plotW = W - padL - padR, plotH = H - padT - padB, x0 = padL, y0 = H - padB;

  // A single-team filter naturally thins the field, so keep the 0-KO/0-faint mons.
  // Otherwise drop them — they'd pile up uselessly at the origin.
  const singleTeam = document.getElementById('f-team').value !== 'all';
  let src = filtered;
  if (!singleTeam) src = filtered.filter(r => r.kos > 0 || r.faints > 0);

  // Count how many plotted instances share each species; append the current coach to
  // a point's display name only when its species appears more than once.
  const speciesCount = {};
  src.forEach(r => { speciesCount[r.pokemon_id] = (speciesCount[r.pokemon_id] || 0) + 1; });
  const dispName = r => {
    const coach = coachByTeam[r.team_id];
    return (speciesCount[r.pokemon_id] > 1 && coach) ? r.name + ' (' + coach + ')' : r.name;
  };

  const pts = src.map(r => ({ x: xMeta.get(r), y: r.kos, id: r.pokemon_id, name: dispName(r), team: teamLabelText(r.team_id) }));
  const maxX = Math.max(1, ...pts.map(p => p.x));
  const maxY = Math.max(1, ...pts.map(p => p.y));
  const hasData = pts.length > 0;

  const sx = v => x0 + (v / maxX) * plotW;
  const sy = v => y0 - (v / maxY) * plotH;

  const _dims = (inModal && window.innerWidth <= 820) ? (' width="' + W + '" height="' + H + '"') : '';
  let svg = '<svg viewBox="0 0 ' + W + ' ' + H + '"' + _dims + ' role="img">';

  // gridlines + tick labels
  const xticks = niceTicks(maxX, 8), yticks = niceTicks(maxY, 8);
  xticks.forEach(v => {
    const x = sx(v);
    svg += '<line class="grid-line" x1="' + x.toFixed(1) + '" y1="' + padT + '" x2="' + x.toFixed(1) + '" y2="' + y0 + '"/>';
    svg += '<text class="tick-label" x="' + x.toFixed(1) + '" y="' + (y0 + 15) + '" text-anchor="middle">' + v + '</text>';
  });
  yticks.forEach(v => {
    const y = sy(v);
    svg += '<line class="grid-line" x1="' + x0 + '" y1="' + y.toFixed(1) + '" x2="' + (W - padR) + '" y2="' + y.toFixed(1) + '"/>';
    svg += '<text class="tick-label" x="' + (x0 - 7) + '" y="' + (y + 3).toFixed(1) + '" text-anchor="end">' + v + '</text>';
  });
  // axes (drawn over gridlines)
  svg += '<line class="axis-line" x1="' + x0 + '" y1="' + padT + '" x2="' + x0 + '" y2="' + y0 + '"/>';
  svg += '<line class="axis-line" x1="' + x0 + '" y1="' + y0 + '" x2="' + (W - padR) + '" y2="' + y0 + '"/>';
  // axis titles — X = selectable, Y = KOs
  svg += '<text class="axis-label" x="' + (x0 + plotW / 2) + '" y="' + (H - 5) + '" text-anchor="middle">' + escapeHtml(xMeta.label) + '</text>';
  svg += '<text class="axis-label" transform="translate(14,' + (padT + plotH / 2) + ') rotate(-90)" text-anchor="middle">KOs</text>';

  scatterClusters = [];
  if (!hasData) {
    svg += '<text class="scatter-empty" x="' + (x0 + plotW / 2) + '" y="' + (padT + plotH / 2) + '" text-anchor="middle">No game data yet</text>';
  } else {
    // Group points landing on the same pixel cell.
    const cells = {};
    pts.forEach(p => {
      const px = Math.round(sx(p.x)), py = Math.round(sy(p.y));
      const key = px + ',' + py;
      (cells[key] = cells[key] || { px, py, x: p.x, y: p.y, items: [] }).items.push(p);
    });

    let circles = '', icons = '';
    Object.values(cells).forEach((cell, ci) => {
      const n = cell.items.length;
      // Icon size shrinks as a cluster grows past 4.
      const base = expanded ? 40 : 20;
      const iconSize = n <= 4 ? base : Math.max(11, base - (n - 4) * 1.5);
      const ring = n > 1 ? iconSize * 0.6 : 0;
      // Outline circle sized to contain the cluster; clickable for the tooltip.
      const rad = (n > 1 ? ring + iconSize * 0.6 : iconSize * 0.62);
      scatterClusters.push({ x: cell.x, y: cell.y, items: cell.items.map(it => it.name) });
      circles += '<circle class="cl-ring" cx="' + cell.px + '" cy="' + cell.py + '" r="' + rad.toFixed(1) + '" data-ci="' + ci + '" onclick="showClusterTip(event,' + ci + ')"/>';
      cell.items.forEach((p, i) => {
        let cx = cell.px, cy = cell.py;
        if (n > 1) { const ang = (i / n) * Math.PI * 2; cx += Math.cos(ang) * ring; cy += Math.sin(ang) * ring; }
        icons += '<image href="' + iconUrl(monFor(p.id)) + '" x="' + (cx - iconSize / 2).toFixed(1) + '" y="' + (cy - iconSize / 2).toFixed(1) + '"'
          + ' width="' + iconSize.toFixed(1) + '" height="' + iconSize.toFixed(1) + '" style="image-rendering:pixelated;pointer-events:none"/>';
      });
    });
    svg += circles + icons;   // circles under icons
  }
  el.innerHTML = svg + '</svg>';
}

// Tooltip listing a cluster's coordinate values + the Pokémon located there.
function showClusterTip(e, ci) {
  e.stopPropagation();
  const c = scatterClusters[ci];
  if (!c) return;
  const xKey = document.getElementById('scatter-x').value;
  const xLabel = X_META[xKey].label;
  const list = c.items.map(n => '<div class="ct-mon">' + escapeHtml(n) + '</div>').join('');
  let tip = document.getElementById('cluster-tip');
  if (!tip) { tip = document.createElement('div'); tip.id = 'cluster-tip'; document.body.appendChild(tip); }
  tip.innerHTML = '<div class="ct-head">KOs ' + c.y + ' · ' + escapeHtml(xLabel) + ' ' + c.x + '</div>'
    + '<div class="ct-sub">' + c.items.length + ' Pokémon</div>' + list;
  tip.style.display = 'block';
  const px = e.clientX, py = e.clientY;
  const tr = tip.getBoundingClientRect();
  let left = px + 12, top = py + 12;
  if (left + tr.width > window.innerWidth - 8) left = px - tr.width - 12;
  if (top + tr.height > window.innerHeight - 8) top = window.innerHeight - tr.height - 8;
  tip.style.left = Math.max(8, left) + 'px';
  tip.style.top = Math.max(8, top) + 'px';
}
document.addEventListener('click', function () { const t = document.getElementById('cluster-tip'); if (t) t.style.display = 'none'; });

// ─── GENERIC CHART MODAL ───────────────────────────────────────────────────────
// Each chart renders into its inline card, or into the shared modal when expanded.
// `modalChart` holds the id of whichever chart is currently in the modal (or null).
// To avoid two-copies-out-of-sync, we physically MOVE the chart's own controls and
// the shared filter bar into the modal while open, then move them back on close.
let modalChart = null;
const CHART_REGISTRY = {
  scatter: { title: 'KOs Scatter',      render: renderScatter,   controls: 'scatter-card' },
  hist:    { title: 'Distribution',     render: renderHistogram, controls: 'hist-card' },
  box:     { title: 'Team Distribution', render: renderBoxPlot,   controls: 'box-card' },
  matrix:  { title: 'Matchup Matrix',   render: renderMatrix,    controls: 'matrix-card' },
  pack:    { title: 'Roster Bubbles',   render: renderPack,      controls: 'pack-card' },
};
function chartControlsEl(id) { return document.querySelector('#' + CHART_REGISTRY[id].controls + ' .scatter-head > :not(.scatter-btns):not(.card-title)'); }

function openModal(id) {
  const reg = CHART_REGISTRY[id]; if (!reg) return;
  modalChart = id;
  document.getElementById('viz-modal-title').textContent = reg.title;
  // Move this chart's control group (axis/metric/etc.) into the modal bar.
  const ctrl = chartControlsEl(id);
  const dst = document.getElementById('viz-modal-controls');
  if (ctrl) { ctrl._home = ctrl.parentNode; dst.appendChild(ctrl); }
  // Move the shared filter bar into the modal so filtering works while expanded.
  const fb = document.getElementById('filter-bar');
  fb._home = fb.parentNode; fb._next = fb.nextSibling;
  document.getElementById('viz-modal-filter').appendChild(fb);
  document.getElementById('viz-modal').hidden = false;
  document.body.style.overflow = 'hidden';
  // Render after layout so modalBodySize() reads real dimensions (fills the view).
  // On mobile, start with filters collapsed so the chart gets the screen.

// Pack circles (given their radii) with no overlaps, centered near the origin.
// Front-chain algorithm: place each new circle tangent to two existing ones, choosing

  const wd = pt => Math.hypot(pt.x, pt.y * aspect);   // aspect-weighted distance
  for (let i = 3; i < nodes.length; i++) {

    for (let a = 0; a < placed.length; a++) {

        for (const pt of cand) {
          if (collides(pt, c.r, placed, 0.01)) continue;
          const d = wd(pt);

function renderPack() {

    const radii = mons.map(r => Math.sqrt(valOf(r)));   // relative; scaled to fill later
    const packed = packCircles(radii);
    return { tid, ti, mons, packed, innerR: packed.R || 1, color: teamColor(tid),
             total: mons.reduce((s, r) => s + valOf(r), 0) };
  });

  // Team bubble radius ∝ √(cumulative metric).
  const maxTotal = Math.max(0.0001, ...teamData.map(t => t.total));
  teamData.forEach(t => {
    t.R = Math.max(30, Math.sqrt(t.total / maxTotal) * 165);
    // Scale factor that makes the packed Pokémon group fill this bubble (with padding).
    t.fill = (t.R - 6) / t.innerR;
  });

  // Pack the team bubbles against each other (no overlaps). Bias toward a wide
  // elliptical cluster so it fills the wide panel and stays shorter than a circle.
  const W = inModal ? Math.max(900, modalBodySize().w) : 720, margin = 8;
  const maxH = inModal ? modalBodySize().h : 300;
  const targetAspect = (W - margin * 2) / (maxH - margin * 2);
  const teamPack = packCircles(teamData.map(t => t.R + 6), Math.max(1.4, targetAspect * 0.7));
  teamPack.nodes.forEach((n, i) => { teamData[i].cx = n.x; teamData[i].cy = n.y; });

  // Fit by the cluster's real half-extents so a wide cluster fills width while the
  // reduced height keeps it within the viewport (no tall dead bands).
  const cw = teamPack.halfW * 2, ch = teamPack.halfH * 2;
  const scale = Math.min((W - margin * 2) / cw, (maxH - margin * 2) / ch);
  const H = Math.min(maxH, ch * scale + margin * 2);
  const ox = W / 2, oy = H / 2;
  const SX = v => ox + v * scale, SY = v => oy + v * scale;

  const _dims = (inModal && window.innerWidth <= 820) ? (' width="' + W + '" height="' + H + '"') : '';
  let svg = '<svg viewBox="0 0 ' + W + ' ' + H + '"' + _dims + ' role="img">';
  packTeamTips = [];
  teamData.forEach(t => {
    const cx = SX(t.cx), cy = SY(t.cy), R = t.R * scale;
    svg += '<circle cx="' + cx.toFixed(1) + '" cy="' + cy.toFixed(1) + '" r="' + R.toFixed(1) + '" fill="' + t.color + '" fill-opacity="0.12" stroke="' + t.color + '" stroke-width="1.5"/>';
    t.mons.forEach((r, k) => {
      const node = t.packed.nodes[k];
      // Scale the packed group to fill the team bubble, then to screen.
      const px = cx + node.x * t.fill * scale, py = cy + node.y * t.fill * scale, pr = node.r * t.fill * scale;
      const v = valOf(r), vTxt = Number.isInteger(v) ? v : v.toFixed(2);
      svg += '<circle cx="' + px.toFixed(1) + '" cy="' + py.toFixed(1) + '" r="' + pr.toFixed(1) + '" fill="' + t.color + '" fill-opacity="0.4" stroke="' + t.color + '" stroke-width="1"><title>' + escapeHtml(r.name) + ' — ' + metric.label + ': ' + vTxt + '</title></circle>';
      // Icon at a fixed fraction of the circle — drawn only if the circle is big
      // enough to hold a legible icon (no icon scaling beyond the circle fit).
      const isz = pr * 1.45;
      if (isz >= 14) {
        svg += '<image href="' + iconUrl(monFor(r.pokemon_id)) + '" x="' + (px - isz / 2).toFixed(1) + '" y="' + (py - isz / 2).toFixed(1) + '" width="' + isz.toFixed(1) + '" height="' + isz.toFixed(1) + '" style="image-rendering:pixelated;pointer-events:none"/>';
      }
    });
    // team label tucked just inside the top edge of the bubble — click for a roster
    // breakdown (cumulative total + each Pokémon by score, descending).
    const ti = packTeamTips.length;
    packTeamTips.push({
      label: teamLabelShort(t.tid),
      metricLabel: metric.label,
      total: t.total,
      rows: t.mons.map(r => ({ name: r.name, v: valOf(r) })),   // already sorted desc
    });
    svg += '<text class="pack-team" x="' + cx.toFixed(1) + '" y="' + (cy - R + 13).toFixed(1) + '" text-anchor="middle" onclick="showPackTip(event,' + ti + ')">' + escapeHtml(teamLabelShort(t.tid)) + '</text>';
  });
  el.innerHTML = svg + '</svg>';
}

// ── MATCHUP MATRIX (teams × teams; blue=win, red=loss, yellow=upcoming) ──
function shortName(t) { const c = coachByTeam[t.id]; return c || t.name; }
function scoreStr(a, b) { return (a == null || b == null) ? '' : a + '–' + b; }
let matrixCells = [];   // clickable cell data → tooltip
function renderMatrix() {
  const inModal = modalChart === 'matrix';
  const el = inModal ? document.getElementById('viz-modal-body') : document.getElementById('matrix');
  const stage = document.getElementById('matrix-stage').value;
  const teams = [...allTeams].sort((a, b) => (a.initial_seed ?? 999) - (b.initial_seed ?? 999) || a.name.localeCompare(b.name));
  if (teams.length < 2) { el.innerHTML = '<svg viewBox="0 0 720 120"><text class="scatter-empty" x="360" y="60" text-anchor="middle">Not enough teams</text></svg>'; return; }
  const idx = {}; teams.forEach((t, i) => idx[t.id] = i);
  const N = teams.length;

  // Row = team's perspective; mirror for the column team. Keep the match id + scores.
  const cell = {};
  const rel = stage === 'all' ? matches : matches.filter(m => m.stage === 'regular');
  rel.forEach(m => {
    const ra = idx[m.team_a_id], rb = idx[m.team_b_id];
    if (ra == null || rb == null) return;
    const hasResult = m.winner_team_id != null || (m.team_a_score != null && m.team_b_score != null && (m.team_a_score || m.team_b_score));
    let aState, bState;
    if (!hasResult) { aState = bState = 'upcoming'; }
    else {
      const aWon = m.winner_team_id ? m.winner_team_id === m.team_a_id : (m.team_a_score > m.team_b_score);
      aState = aWon ? 'win' : 'loss'; bState = aWon ? 'loss' : 'win';
    }
    cell[ra + ',' + rb] = { state: aState, mine: m.team_a_score, theirs: m.team_b_score, id: m.id };
    cell[rb + ',' + ra] = { state: bState, mine: m.team_b_score, theirs: m.team_a_score, id: m.id };
  });

  const labelW = inModal ? 200 : 130, headH = inModal ? 190 : 110, pad = 6, W = inModal ? Math.max(720, modalBodySize().w) : 720;
  const grid = W - labelW - pad;
  const cs = Math.max(10, Math.floor(grid / N));
  const gridW = cs * N;
  const H = headH + gridW + 10;
  const COL = { win: '#4363d8', loss: '#e6194B', upcoming: '#ffe119', self: '#2e3248' };
  const lblSize = inModal ? 20 : 10;

  matrixCells = [];
  const _dims = (inModal && window.innerWidth <= 820) ? (' width="' + W + '" height="' + H + '"') : '';
  let svg = '<svg viewBox="0 0 ' + W + ' ' + H + '"' + _dims + ' role="img">';
  // Cells + row labels first…
  teams.forEach((tr, r) => {
    const y = headH + r * cs;
    svg += '<text class="mx-row" x="' + (labelW - 8) + '" y="' + (y + cs / 2 + 3) + '" font-size="' + lblSize + '" text-anchor="end">' + escapeHtml(shortName(tr)) + '</text>';
    teams.forEach((tc, c) => {
      const x = labelW + c * cs;
      if (r === c) { svg += '<rect class="mx-cell" x="' + x + '" y="' + y + '" width="' + (cs - 2) + '" height="' + (cs - 2) + '" rx="2" fill="' + COL.self + '"/>'; return; }
      const cl = cell[r + ',' + c];
      const fill = cl ? COL[cl.state] : 'var(--bg3)';
      let clickAttr = '';
      if (cl) {
        const ci = matrixCells.length;
        matrixCells.push({ row: shortName(tr), col: shortName(tc), state: cl.state, mine: cl.mine, theirs: cl.theirs, id: cl.id });
        clickAttr = ' style="cursor:pointer" onclick="showMatrixTip(event,' + ci + ')"';
      }
      svg += '<rect class="mx-cell" x="' + x + '" y="' + y + '" width="' + (cs - 2) + '" height="' + (cs - 2) + '" rx="2" fill="' + fill + '"' + clickAttr + '></rect>';
    });
  });
  // …then diagonal column labels ON TOP. Anchor at the column's grid-top point and
  // rotate -45°: with start-anchoring the text reads up-and-to-the-right, sitting
  // entirely in the reserved header band above the first cell row.
  teams.forEach((t, c) => {
    const x = labelW + c * cs + cs / 2;
    const baseY = headH - 8;   // a hair above the grid
    svg += '<text class="mx-col" x="' + x + '" y="' + baseY + '" font-size="' + lblSize + '" text-anchor="start" transform="rotate(-45 ' + x + ' ' + baseY + ')">' + escapeHtml(shortName(t)) + '</text>';
  });

  // Legend in the empty top-left area (above the rows, left of the columns).
  const leg = [['win', 'Win'], ['loss', 'Loss'], ['upcoming', 'Upcoming'], ['self', 'Self']];
  const legSize = inModal ? 16 : 10, sw0 = inModal ? 16 : 12, lh = inModal ? 24 : 17;
  const lx = 6, lyTop = inModal ? 18 : 12;
  leg.forEach(([k, lbl], i) => {
    const yy = lyTop + i * lh;
    svg += '<rect x="' + lx + '" y="' + yy + '" width="' + sw0 + '" height="' + sw0 + '" rx="2" fill="' + COL[k] + '"/>';
    svg += '<text class="mx-leg" x="' + (lx + sw0 + 6) + '" y="' + (yy + sw0 - 3) + '" font-size="' + legSize + '">' + lbl + '</text>';
  });

  el.innerHTML = svg + '</svg>';
}
// Cell tooltip: matchup, score, and a link to the match on the Matches page.
function showMatrixTip(e, ci) {
  e.stopPropagation();
  const c = matrixCells[ci]; if (!c) return;
  let tip = document.getElementById('cluster-tip');
  if (!tip) { tip = document.createElement('div'); tip.id = 'cluster-tip'; document.body.appendChild(tip); }
  let body;
  if (c.state === 'upcoming') body = '<div class="ct-sub">Upcoming</div>';
  else {
    const verb = c.state === 'win' ? 'Won' : 'Lost';
    body = '<div class="ct-sub">' + verb + ' ' + scoreStr(c.mine, c.theirs) + '</div>';
  }
  const link = c.id ? '<a class="ct-link" href="' + withSeason('matches.html#' + encodeURIComponent(c.id)) + '">View match →</a>' : '';
  tip.innerHTML = '<div class="ct-head">' + escapeHtml(c.row) + ' vs ' + escapeHtml(c.col) + '</div>' + body + link;
  tip.style.display = 'block';
  const tr = tip.getBoundingClientRect();
  let left = e.clientX + 12, top = e.clientY + 12;
  if (left + tr.width > window.innerWidth - 8) left = e.clientX - tr.width - 12;
  if (top + tr.height > window.innerHeight - 8) top = window.innerHeight - tr.height - 8;
  tip.style.left = Math.max(8, left) + 'px';
  tip.style.top = Math.max(8, top) + 'px';
}

// ── populate filter dropdowns ──
function populateFilters() {
  const teamSel = document.getElementById('f-team');
  const teamOpts = [...allTeams].sort((a, b) => (a.initial_seed ?? 999) - (b.initial_seed ?? 999) || a.name.localeCompare(b.name));
  teamSel.innerHTML = '<option value="all">All teams</option>' + teamOpts.map(t => '<option value="' + t.id + '">' + escapeHtml(teamLabelText(t.id)) + '</option>').join('');
  const present = new Set(); instances.forEach(r => { if (r.type1) present.add(r.type1); if (r.type2) present.add(r.type2); });
  const typeSel = document.getElementById('f-type');
  typeSel.innerHTML = '<option value="all">All types</option>' + TYPES.filter(t => present.has(t)).map(t => '<option value="' + t + '">' + t + '</option>').join('');
}


// ─────────────────────────────────────────────────────────────────────────────
// BOOT
// ─────────────────────────────────────────────────────────────────────────────
async function init() {
  const banner = document.getElementById('boot-banner');
  try {
    await loadData();
    buildInstances();
    populateFilters();
    applyFilters();
    renderMatrix();
    banner.hidden = true;
    document.getElementById('wrap').hidden = false;
    patchStaticSeasonLinks();
  } catch (err) {
    console.error(err);
    banner.className = 'banner err';
    banner.textContent = 'Could not load the statistics page: ' + (err.message || err);
  }
}
init();
</script>
