<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SBL Hub — Statistics</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
/* ─── TOKENS (shared verbatim with the rest of the hub) ─── */
:root {
  --bg:#0f1117; --bg2:#1a1d27; --bg3:#22263a; --border:#2e3248;
  --text:#e8eaf6; --text2:#9095b8; --text3:#5a5f80;
  --accent:#7c6ff7; --red:#e05555; --green:#4caf7d; --blue:#60a5fa; --yellow:#f0c060;
  --nav-h: 49px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 13px; }
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* ─── NAV ─── */
nav { background: var(--bg2); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 1rem; position: sticky; top: 0; z-index: 100; }
.nav-logo { font-size: 15px; font-weight: 700; color: var(--accent); padding: 14px 16px 14px 0; margin-right: 8px; border-right: 1px solid var(--border); white-space: nowrap; }
.nav-tabs { display: flex; align-items: stretch; }
.nav-tab { padding: 14px 16px; font-size: 13px; font-weight: 600; color: var(--text2); text-decoration: none; border-bottom: 2px solid transparent; transition: color .15s, border-color .15s; }
.nav-tab:hover { color: var(--text); }
.nav-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
.nav-right { margin-left: auto; display: flex; align-items: center; gap: 10px; padding-left: 12px; }

.nav-tab-wrap { position: relative; display: flex; align-items: stretch; }
button.nav-tab { background: none; border-top: none; border-left: none; border-right: none; font-family: inherit; cursor: pointer; display: inline-flex; align-items: center; gap: 5px; }
.nav-trigger .caret { font-size: 10px; transition: transform .15s; }
.nav-trigger[aria-expanded="true"] .caret { transform: rotate(180deg); }
.team-menu { position: fixed; z-index: 150; width: 280px; max-width: calc(100vw - 16px); max-height: min(60vh, 460px); display: flex; flex-direction: column; overflow: hidden; background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; box-shadow: 0 14px 34px rgba(0,0,0,.5); }
.team-menu[hidden] { display: none; }
.team-menu-search { padding: 8px; border-bottom: 1px solid var(--border); }
.team-menu-search input { width: 100%; background: var(--bg3); border: 1px solid var(--border); border-radius: 6px; padding: 7px 10px; color: var(--text); font-size: 13px; outline: none; }
.team-menu-search input:focus { border-color: var(--accent); }
.team-menu-list { overflow-y: auto; padding: 6px; display: flex; flex-direction: column; gap: 2px; }
.team-menu-item { display: block; width: 100%; text-align: left; background: none; border: none; border-radius: 6px; padding: 8px 10px; color: var(--text); font-size: 13px; cursor: pointer; font-family: inherit; }
.team-menu-item:hover, .team-menu-item.kbd { background: var(--bg3); }
.team-menu-item .pl { color: var(--text3); font-weight: 400; }
.team-menu-empty { font-size: 12px; color: var(--text3); padding: 8px 10px; font-style: italic; }

.btn { background: var(--bg3); border: 1px solid var(--border); border-radius: 7px; color: var(--text); font-size: 12px; font-weight: 600; padding: 7px 14px; cursor: pointer; font-family: inherit; transition: border-color .15s, background .15s; }
.btn:hover { border-color: var(--accent); }
.btn-accent { background: var(--accent); border-color: var(--accent); color: #fff; }
.user-chip { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--text2); }
.user-chip .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); }
.user-chip .email { color: var(--text); font-weight: 600; }

/* ─── PAGE ─── */
.wrap { padding: 14px; display: flex; flex-direction: column; gap: 14px; }
.card { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 14px; }
.card-title { font-size: 11px; font-weight: 700; letter-spacing: .5px; color: var(--text3); text-transform: uppercase; margin-bottom: 10px; }
.empty { font-size: 12px; color: var(--text3); font-style: italic; padding: 8px 0; }

/* ─── FILTER TOOLBAR ─── */
.toolbar { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
.toolbar .field { display: flex; flex-direction: column; gap: 3px; }
.toolbar label { font-size: 9px; font-weight: 700; letter-spacing: .4px; color: var(--text3); text-transform: uppercase; }
.toolbar input, .toolbar select { background: var(--bg3); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-size: 12px; padding: 7px 9px; outline: none; font-family: inherit; }
.toolbar input:focus, .toolbar select:focus { border-color: var(--accent); }
.toolbar input[type=text] { min-width: 180px; }
.toolbar .count { margin-left: auto; font-size: 11px; color: var(--text3); align-self: flex-end; padding-bottom: 7px; }

/* ─── SCATTER ─── */
.scatter-head { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 8px; flex-wrap: wrap; }
.scatter-head .card-title { margin: 0; }
.scatter-head .field { display: flex; align-items: center; gap: 6px; }
.scatter-head label { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: .4px; font-weight: 700; }
.scatter-head select { background: var(--bg3); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-size: 12px; padding: 6px 8px; outline: none; font-family: inherit; }
.scatter-wrap { width: 100%; }
.scatter-wrap svg { width: 100%; height: auto; display: block; }
.axis-line { stroke: var(--border); stroke-width: 1; }
.axis-label { fill: var(--text3); font-size: 11px; font-weight: 600; }
.tick-label { fill: var(--text3); font-size: 10px; }
.dot { fill: var(--accent); fill-opacity: .55; stroke: var(--accent); stroke-opacity: .9; }
.scatter-empty { fill: var(--text3); font-size: 13px; font-style: italic; }

/* ─── TABLE ─── */
.table-scroll { overflow-x: auto; }
table.tbl { width: 100%; border-collapse: collapse; font-size: 12px; }
.tbl th { text-align: left; font-size: 9px; text-transform: uppercase; letter-spacing: .4px; color: var(--text3); font-weight: 700; padding: 7px 8px; border-bottom: 1px solid var(--border); white-space: nowrap; cursor: pointer; user-select: none; position: sticky; top: var(--nav-h); background: var(--bg2); }
.tbl th:hover { color: var(--text2); }
.tbl th .arrow { color: var(--accent); margin-left: 2px; }
.tbl th.num, .tbl td.num { text-align: right; font-variant-numeric: tabular-nums; }
.tbl td { padding: 7px 8px; border-bottom: 1px solid var(--bg3); white-space: nowrap; }
.tbl tbody tr:hover { background: var(--bg3); }
.tbl .pl { color: var(--text3); font-weight: 400; }
.tbl .pos { color: var(--green); } .tbl .neg { color: var(--red); }
.tbl .sub { color: var(--text3); font-weight: 400; }
.tbl .inactive-tag { font-size: 9px; font-weight: 700; color: var(--text3); border: 1px solid var(--border); border-radius: 4px; padding: 1px 5px; margin-left: 6px; text-transform: uppercase; }
.mon-cell { display: flex; align-items: center; gap: 7px; }
.mon-cell img { width: 28px; height: 28px; image-rendering: pixelated; flex-shrink: 0; }

/* ─── BANNER / MODAL / TOAST ─── */
.banner { margin: 16px; padding: 10px 14px; border: 1px solid var(--border); border-radius: 8px; background: var(--bg2); font-size: 12px; color: var(--text2); }
.banner.err { border-color: rgba(224,85,85,.5); color: var(--red); }
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.6); z-index: 200; display: flex; align-items: center; justify-content: center; padding: 20px; }
.modal-overlay[hidden] { display: none; }
.modal { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 20px; width: 100%; max-width: 380px; box-shadow: 0 12px 40px rgba(0,0,0,.5); }
.modal h3 { font-size: 16px; font-weight: 700; margin-bottom: 6px; }
.modal p { font-size: 13px; color: var(--text2); line-height: 1.5; margin-bottom: 14px; }
.modal input[type=email] { width: 100%; background: var(--bg3); border: 1px solid var(--border); border-radius: 7px; padding: 9px 12px; color: var(--text); font-size: 13px; outline: none; margin-bottom: 14px; }
.modal input[type=email]:focus { border-color: var(--accent); }
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; }
#toast-container { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 300; display: flex; flex-direction: column; gap: 8px; align-items: center; }
.toast { background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; padding: 10px 16px; font-size: 13px; color: var(--text); box-shadow: 0 4px 16px rgba(0,0,0,.4); max-width: 90vw; }
.toast.ok { border-color: rgba(76,175,125,.5); } .toast.err { border-color: rgba(224,85,85,.55); color: #ff9c9c; }

@media (max-width: 820px) {
  nav { padding: 0 8px; overflow-x: auto; scrollbar-width: none; }
  nav::-webkit-scrollbar { display: none; }
  .nav-logo { padding: 12px 10px 12px 0; margin-right: 6px; font-size: 14px; flex-shrink: 0; }
  .nav-tabs { flex-shrink: 0; }
  .nav-tab { padding: 12px 10px; white-space: nowrap; flex-shrink: 0; }
  .nav-right { flex-shrink: 0; padding-left: 8px; gap: 8px; }
  .user-chip .email { max-width: 96px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .btn { padding: 6px 10px; }
  .toolbar input[type=text] { min-width: 120px; }
}
</style>
</head>
<body>

<nav>
  <div class="nav-logo">SBL Hub</div>
  <div class="nav-tabs">
    <a class="nav-tab" href="standings.html">Standings</a>
    <div class="nav-tab-wrap">
      <button class="nav-tab nav-trigger" id="teams-tab" onclick="toggleTeamMenu(event)" aria-haspopup="true" aria-expanded="false">Teams <span class="caret">▾</span></button>
      <div class="team-menu" id="team-menu" hidden>
        <div class="team-menu-search">
          <input type="text" id="team-search" placeholder="Search teams…" autocomplete="off" oninput="filterTeamMenu()" onkeydown="onTeamSearchKey(event)">
        </div>
        <div class="team-menu-list" id="team-menu-list"></div>
      </div>
    </div>
    <a class="nav-tab" href="draft.html">Draft</a>
    <a class="nav-tab" href="schedule.html">Schedule</a>
    <a class="nav-tab active" href="statistics.html">Stats</a>
  </div>
  <div class="nav-right">
    <button class="btn" id="login-btn" onclick="openLogin()" hidden>Admin Login</button>
    <span class="user-chip" id="user-chip" hidden>
      <span class="dot"></span><span class="email" id="user-email"></span>
      <button class="btn" onclick="doLogout()">Log out</button>
    </span>
  </div>
</nav>

<div id="boot-banner" class="banner">Loading statistics…</div>

<div class="wrap" id="wrap" hidden>

  <div class="card">
    <div class="toolbar">
      <div class="field"><label>Search</label><input type="text" id="f-search" placeholder="Pokémon name…" oninput="applyFilters()"></div>
      <div class="field"><label>Team</label><select id="f-team" onchange="applyFilters()"></select></div>
      <div class="field"><label>Status</label><select id="f-status" onchange="applyFilters()"><option value="all">All</option><option value="active">Active</option><option value="inactive">Inactive</option></select></div>
      <div class="field"><label>Type</label><select id="f-type" onchange="applyFilters()"></select></div>
      <span class="count" id="row-count"></span>
    </div>
  </div>

  <div class="card">
    <div class="scatter-head">
      <div class="card-title">KOs Scatter</div>
      <div class="field"><label>Y axis</label>
        <select id="scatter-y" onchange="renderScatter()">
          <option value="faints">Faints</option>
          <option value="gp">Game Participation</option>
          <option value="mp">Match Participation</option>
        </select>
      </div>
    </div>
    <div class="scatter-wrap" id="scatter"></div>
  </div>

  <div class="card">
    <div class="table-scroll">
      <table class="tbl" id="stats-table"></table>
    </div>
  </div>

</div>

<div class="modal-overlay" id="modal-overlay" hidden onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modal"></div>
</div>
<div id="toast-container"></div>

<script>
// ─────────────────────────────────────────────────────────────────────────────
// CONFIG
// ─────────────────────────────────────────────────────────────────────────────
const SUPABASE_URL      = "https://arypbyzeppbpbursmzcs.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_U8J3pV_KgomrWhbgoGBSUg_ttQ4d46m";
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
const POKEMON_JSON_URL = "https://planner.springfieldbattleleague.com/pokemon.json";
const ASSET_BASE = POKEMON_JSON_URL.replace(/[^/]*$/, '');
const POKEBALL_FALLBACK = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 40 40'%3E%3Ccircle cx='20' cy='20' r='19' fill='%23e05555' stroke='%23333' stroke-width='1.5'/%3E%3Cpath d='M1.1 20 A19 19 0 0 0 38.9 20 Z' fill='%23fff'/%3E%3Crect x='1' y='18' width='38' height='4' fill='%23333'/%3E%3Ccircle cx='20' cy='20' r='7' fill='%23fff' stroke='%23333' stroke-width='1.5'/%3E%3Ccircle cx='20' cy='20' r='3.5' fill='%23e8eaf6' stroke='%23333' stroke-width='1'/%3E%3C/svg%3E";
const TYPES = ["Normal","Fire","Water","Grass","Electric","Ice","Fighting","Poison","Ground","Flying","Psychic","Bug","Rock","Ghost","Dragon","Dark","Steel","Fairy"];

// ── STATE ──
let season = null, allTeams = [], teamById = {}, allOwners = [], coachByTeam = {};
let matches = [], gamesByMatch = {}, gameToMatch = {}, statRows = [];
let teamPokemon = [], pokemonById = {}, instances = [], filtered = [];
let sortState = { col: 'kos', dir: 'desc' };
let currentUser = null, isAdmin = false;

// ── HELPERS ──
function localId(id) { const m = String(id).match(/^(\d+)(.*)$/); if (!m) return id; const n = parseInt(m[1]); return (n >= 1000 ? String(n) : String(n).padStart(3, '0')) + m[2]; }
function iconUrl(mon)   { return mon && mon.id ? ASSET_BASE + 'icons/'   + localId(mon.id) + '.png' : ''; }
function spriteUrl(mon) { return mon && mon.id ? ASSET_BASE + 'sprites/' + localId(mon.id) + '.png' : ''; }
function attachIconFallback(img, mon) { img.onerror = function () { if (this.src.includes('/icons/')) { this.src = spriteUrl(mon); } else { this.onerror = null; this.src = POKEBALL_FALLBACK; this.style.opacity = '.5'; } }; }
function escapeHtml(s) { return String(s).replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c])); }
function signed(n) { return (n > 0 ? '+' : '') + n; }
function deltaClass(n) { return n > 0 ? 'pos' : (n < 0 ? 'neg' : ''); }
function kfRatio(kos, faints) { if (faints === 0) return kos === 0 ? '—' : '∞'; return (kos / faints).toFixed(2); }
function kfSortValue(kos, faints) { return faints > 0 ? kos / faints : (kos > 0 ? 1e9 : 0); }
function monFor(id) { return pokemonById[id] || { id: id, name: id }; }
function teamLabelHtml(id) { const t = teamById[id]; if (!t) return '—'; const c = coachByTeam[id]; return escapeHtml(t.name) + (c ? ' <span class="pl">(' + escapeHtml(c) + ')</span>' : ''); }
function teamLabelText(id) { const t = teamById[id]; if (!t) return ''; const c = coachByTeam[id]; return t.name + (c ? ' (' + c + ')' : ''); }
function pctText(count, whole) { return whole > 0 ? Math.round((count / whole) * 100) + '% (' + count + ')' : '— (' + count + ')'; }
function pctSort(count, whole) { return whole > 0 ? count / whole : -1; }

// ─────────────────────────────────────────────────────────────────────────────
// DATA LOAD
// ─────────────────────────────────────────────────────────────────────────────
async function loadData() {
  const pjPromise = fetch(POKEMON_JSON_URL).then(async res => {
    const ct = res.headers.get('content-type') || '';
    if (!res.ok || !ct.includes('json')) throw new Error('pokemon.json not found at "' + POKEMON_JSON_URL + '" (got ' + res.status + ').');
    return res.json();
  });

  const { data: seasonRow, error: sErr } = await sb.from('seasons').select('*').eq('is_current', true).maybeSingle();
  if (sErr) throw sErr;
  if (!seasonRow) throw new Error('No current season found (seasons.is_current = true).');
  season = seasonRow;

  const [teamsRes, ownersRes, matchRes] = await Promise.all([
    sb.from('teams').select('id,name,slug,initial_seed').eq('season_id', season.id),
    sb.from('team_owners').select('team_id, ended_week, players(display_name)'),
    sb.from('matches').select('id, stage, week, team_a_id, team_b_id').eq('season_id', season.id),
  ]);
  for (const r of [teamsRes, ownersRes, matchRes]) if (r.error) throw r.error;

  allTeams = teamsRes.data || [];
  teamById = {}; allTeams.forEach(t => { teamById[t.id] = t; });
  const teamIds = allTeams.map(t => t.id);
  allOwners = (ownersRes.data || []).filter(o => teamIds.includes(o.team_id));
  coachByTeam = {};
  allOwners.filter(o => o.ended_week == null).forEach(o => { if (o.players) coachByTeam[o.team_id] = o.players.display_name; });
  matches = matchRes.data || [];

  // Rosters for every team (each row is an ownership instance).
  const { data: tp, error: tpErr } = teamIds.length
    ? await sb.from('team_pokemon').select('team_id, pokemon_id, acquired_week, released_week, acquired_via').in('team_id', teamIds)
    : { data: [], error: null };
  if (tpErr) throw tpErr;
  teamPokemon = tp || [];

  // Games + stats for the whole season (empty until results are entered).
  gamesByMatch = {}; gameToMatch = {}; statRows = [];
  const matchIds = matches.map(m => m.id);
  if (matchIds.length) {
    const { data: games, error: gErr } = await sb.from('games').select('id, match_id').in('match_id', matchIds);
    if (gErr) throw gErr;
    (games || []).forEach(g => { (gamesByMatch[g.match_id] = gamesByMatch[g.match_id] || []).push(g.id); gameToMatch[g.id] = g.match_id; });
    const gameIds = (games || []).map(g => g.id);
    if (gameIds.length) {
      const { data: stats, error: stErr } = await sb.from('game_pokemon_stats').select('game_id, team_id, pokemon_id, kills, deaths').in('game_id', gameIds);
      if (stErr) throw stErr;
      statRows = stats || [];
    }
  }

  const pj = await pjPromise;
  const arr = Array.isArray(pj) ? pj : pj.pokemon;
  pokemonById = {}; arr.forEach(p => { pokemonById[p.id] = p; });
}

// ─────────────────────────────────────────────────────────────────────────────
// PER-INSTANCE STATS — scoped to (team, Pokémon) within the ownership window,
// same scoping as the Team page (kills/participation while owned).
// ─────────────────────────────────────────────────────────────────────────────
let matchesByTeam = {}, statsByTP = {};
function buildIndexes() {
  matchesByTeam = {}; statsByTP = {};
  matches.forEach(m => {
    (matchesByTeam[m.team_a_id] = matchesByTeam[m.team_a_id] || []).push(m);
    (matchesByTeam[m.team_b_id] = matchesByTeam[m.team_b_id] || []).push(m);
  });
  statRows.forEach(s => { (statsByTP[s.team_id + '|' + s.pokemon_id] = statsByTP[s.team_id + '|' + s.pokemon_id] || []).push(s); });
}

function statsForInstance(teamId, pid, aw, rw) {
  const owned = (matchesByTeam[teamId] || []).filter(m => m.week >= aw && (rw == null || m.week < rw));
  const ownedGameIds = new Set();
  let ownedGames = 0;
  owned.forEach(m => (gamesByMatch[m.id] || []).forEach(gid => { ownedGames++; ownedGameIds.add(gid); }));
  const ownedMatches = owned.length;

  let kos = 0, faints = 0;
  const appearedGames = new Set(), appearedMatches = new Set();
  (statsByTP[teamId + '|' + pid] || []).forEach(s => {
    if (!ownedGameIds.has(s.game_id)) return;
    appearedGames.add(s.game_id);
    const mid = gameToMatch[s.game_id]; if (mid) appearedMatches.add(mid);
    kos += s.kills || 0; faints += s.deaths || 0;
  });
  return { kos, faints, gpCount: appearedGames.size, mpCount: appearedMatches.size, ownedGames, ownedMatches };
}

function buildInstances() {
  buildIndexes();
  instances = teamPokemon.map(tp => {
    const mon = monFor(tp.pokemon_id);
    const st = statsForInstance(tp.team_id, tp.pokemon_id, tp.acquired_week || 1, tp.released_week);
    return {
      pokemon_id: tp.pokemon_id, name: mon.name, type1: mon.type1 || null, type2: mon.type2 || null,
      team_id: tp.team_id, active: tp.released_week == null,
      kos: st.kos, faints: st.faints, kfDelta: st.kos - st.faints,
      kfVal: kfSortValue(st.kos, st.faints), kfTxt: kfRatio(st.kos, st.faints),
      mpCount: st.mpCount, gpCount: st.gpCount, ownedMatches: st.ownedMatches, ownedGames: st.ownedGames,
      mpSort: pctSort(st.mpCount, st.ownedMatches), gpSort: pctSort(st.gpCount, st.ownedGames),
    };
  });
}

// ─────────────────────────────────────────────────────────────────────────────
// FILTER + SORT + RENDER
// ─────────────────────────────────────────────────────────────────────────────
function applyFilters() {
  const q = (document.getElementById('f-search').value || '').trim().toLowerCase();
  const team = document.getElementById('f-team').value;
  const status = document.getElementById('f-status').value;
  const type = document.getElementById('f-type').value;
  filtered = instances.filter(r => {
    if (q && !r.name.toLowerCase().includes(q)) return false;
    if (team !== 'all' && r.team_id !== team) return false;
    if (status === 'active' && !r.active) return false;
    if (status === 'inactive' && r.active) return false;
    if (type !== 'all' && r.type1 !== type && r.type2 !== type) return false;
    return true;
  });
  document.getElementById('row-count').textContent = filtered.length + ' of ' + instances.length + ' Pokémon';
  renderTable();
  renderScatter();
}

const SORT_ACCESSORS = {
  pokemon: r => r.name.toLowerCase(), team: r => teamLabelText(r.team_id).toLowerCase(),
  kos: r => r.kos, faints: r => r.faints, kf: r => r.kfVal, kfd: r => r.kfDelta,
  mp: r => r.mpSort * 1000 + r.mpCount, gp: r => r.gpSort * 1000 + r.gpCount,
};
function sortBy(col) {
  if (sortState.col === col) sortState.dir = sortState.dir === 'asc' ? 'desc' : 'asc';
  else sortState = { col, dir: (col === 'pokemon' || col === 'team') ? 'asc' : 'desc' };
  renderTable();
}
function arrow(col) { return sortState.col === col ? '<span class="arrow">' + (sortState.dir === 'asc' ? '▲' : '▼') + '</span>' : ''; }

function renderTable() {
  const el = document.getElementById('stats-table');
  const acc = SORT_ACCESSORS[sortState.col];
  const dir = sortState.dir === 'asc' ? 1 : -1;
  const rows = filtered.slice().sort((a, b) => {
    const va = acc(a), vb = acc(b);
    if (va < vb) return -1 * dir; if (va > vb) return 1 * dir;
    return a.name.localeCompare(b.name);
  });

  let html = '<thead><tr>'
    + '<th onclick="sortBy(\'pokemon\')">Pokémon' + arrow('pokemon') + '</th>'
    + '<th onclick="sortBy(\'team\')">Team (Player)' + arrow('team') + '</th>'
    + '<th class="num" onclick="sortBy(\'kos\')">KOs' + arrow('kos') + '</th>'
    + '<th class="num" onclick="sortBy(\'faints\')">Faints' + arrow('faints') + '</th>'
    + '<th class="num" onclick="sortBy(\'kf\')">K/F' + arrow('kf') + '</th>'
    + '<th class="num" onclick="sortBy(\'kfd\')">KF Δ' + arrow('kfd') + '</th>'
    + '<th class="num" onclick="sortBy(\'mp\')">MP% (Count)' + arrow('mp') + '</th>'
    + '<th class="num" onclick="sortBy(\'gp\')">GP% (Count)' + arrow('gp') + '</th>'
    + '</tr></thead><tbody>';

  if (!rows.length) {
    html += '<tr><td colspan="8"><div class="empty">No Pokémon match these filters.</div></td></tr>';
  } else {
    rows.forEach(r => {
      const mon = monFor(r.pokemon_id);
      html += '<tr>'
        + '<td><div class="mon-cell"><img src="' + iconUrl(mon) + '" alt="" data-mid="' + escapeHtml(r.pokemon_id) + '"><span>' + escapeHtml(r.name) + '</span></div></td>'
        + '<td>' + teamLabelHtml(r.team_id) + (r.active ? '' : '<span class="inactive-tag">Inactive</span>') + '</td>'
        + '<td class="num">' + r.kos + '</td>'
        + '<td class="num">' + r.faints + '</td>'
        + '<td class="num">' + r.kfTxt + '</td>'
        + '<td class="num ' + deltaClass(r.kfDelta) + '">' + signed(r.kfDelta) + '</td>'
        + '<td class="num">' + pctText(r.mpCount, r.ownedMatches) + '</td>'
        + '<td class="num">' + pctText(r.gpCount, r.ownedGames) + '</td>'
        + '</tr>';
    });
  }
  el.innerHTML = html + '</tbody>';
  el.querySelectorAll('img[data-mid]').forEach(img => attachIconFallback(img, monFor(img.dataset.mid)));
}

// ── SCATTER (hand-rolled SVG, no charting dependency) ──
const Y_META = { faints: { label: 'Faints', get: r => r.faints }, gp: { label: 'Game Participation', get: r => r.gpCount }, mp: { label: 'Match Participation', get: r => r.mpCount } };
function renderScatter() {
  const el = document.getElementById('scatter');
  const yKey = document.getElementById('scatter-y').value;
  const yMeta = Y_META[yKey];
  const W = 640, H = 360, padL = 46, padB = 34, padT = 12, padR = 14;
  const plotW = W - padL - padR, plotH = H - padT - padB, x0 = padL, y0 = H - padB;

  const pts = filtered.map(r => ({ x: r.kos, y: yMeta.get(r), name: r.name, team: teamLabelText(r.team_id) }));
  const maxX = Math.max(1, ...pts.map(p => p.x));
  const maxY = Math.max(1, ...pts.map(p => p.y));
  const hasData = pts.some(p => p.x > 0 || p.y > 0);

  const sx = v => x0 + (v / maxX) * plotW;
  const sy = v => y0 - (v / maxY) * plotH;

  let svg = '<svg viewBox="0 0 ' + W + ' ' + H + '" role="img">';
  // axes
  svg += '<line class="axis-line" x1="' + x0 + '" y1="' + padT + '" x2="' + x0 + '" y2="' + y0 + '"/>';
  svg += '<line class="axis-line" x1="' + x0 + '" y1="' + y0 + '" x2="' + (W - padR) + '" y2="' + y0 + '"/>';
  // tick labels (0, max on each axis)
  svg += '<text class="tick-label" x="' + x0 + '" y="' + (y0 + 14) + '" text-anchor="middle">0</text>';
  svg += '<text class="tick-label" x="' + (W - padR) + '" y="' + (y0 + 14) + '" text-anchor="end">' + maxX + '</text>';
  svg += '<text class="tick-label" x="' + (x0 - 6) + '" y="' + (y0 + 3) + '" text-anchor="end">0</text>';
  svg += '<text class="tick-label" x="' + (x0 - 6) + '" y="' + (padT + 8) + '" text-anchor="end">' + maxY + '</text>';
  // axis titles
  svg += '<text class="axis-label" x="' + (x0 + plotW / 2) + '" y="' + (H - 4) + '" text-anchor="middle">KOs</text>';
  svg += '<text class="axis-label" transform="translate(13,' + (padT + plotH / 2) + ') rotate(-90)" text-anchor="middle">' + yMeta.label + '</text>';

  if (!hasData) {
    svg += '<text class="scatter-empty" x="' + (x0 + plotW / 2) + '" y="' + (padT + plotH / 2) + '" text-anchor="middle">No game data yet</text>';
  } else {
    pts.forEach(p => {
      svg += '<circle class="dot" cx="' + sx(p.x).toFixed(1) + '" cy="' + sy(p.y).toFixed(1) + '" r="5">'
        + '<title>' + escapeHtml(p.name) + (p.team ? ' — ' + escapeHtml(p.team) : '') + '\nKOs: ' + p.x + '  ·  ' + yMeta.label + ': ' + p.y + '</title></circle>';
    });
  }
  el.innerHTML = svg + '</svg>';
}

// ── populate filter dropdowns ──
function populateFilters() {
  const teamSel = document.getElementById('f-team');
  const teamOpts = [...allTeams].sort((a, b) => (a.initial_seed ?? 999) - (b.initial_seed ?? 999) || a.name.localeCompare(b.name));
  teamSel.innerHTML = '<option value="all">All teams</option>' + teamOpts.map(t => '<option value="' + t.id + '">' + escapeHtml(teamLabelText(t.id)) + '</option>').join('');
  const present = new Set(); instances.forEach(r => { if (r.type1) present.add(r.type1); if (r.type2) present.add(r.type2); });
  const typeSel = document.getElementById('f-type');
  typeSel.innerHTML = '<option value="all">All types</option>' + TYPES.filter(t => present.has(t)).map(t => '<option value="' + t + '">' + t + '</option>').join('');
}

// ─────────────────────────────────────────────────────────────────────────────
// TEAM SELECTOR (navigates to the team page) + AUTH — shared hub chrome
// ─────────────────────────────────────────────────────────────────────────────
let teamMenuKbdIndex = -1;
function teamMenuEntries() { return [...allTeams].sort((a, b) => (a.initial_seed ?? 999) - (b.initial_seed ?? 999) || a.name.localeCompare(b.name)).map(t => ({ t, coach: coachByTeam[t.id] || '', hay: (t.name + ' ' + (coachByTeam[t.id] || '')).toLowerCase() })); }
function positionTeamMenu() { const menu = document.getElementById('team-menu'); if (!menu || menu.hidden) return; const r = document.getElementById('teams-tab').getBoundingClientRect(); const w = menu.offsetWidth; menu.style.left = Math.max(8, Math.min(r.left, window.innerWidth - w - 8)) + 'px'; menu.style.top = r.bottom + 'px'; }
function toggleTeamMenu(e) { if (e) e.stopPropagation(); const m = document.getElementById('team-menu'); m.hidden ? openTeamMenu() : closeTeamMenu(); }
function openTeamMenu() { const menu = document.getElementById('team-menu'); menu.hidden = false; document.getElementById('teams-tab').setAttribute('aria-expanded', 'true'); positionTeamMenu(); const s = document.getElementById('team-search'); s.value = ''; teamMenuKbdIndex = -1; filterTeamMenu(); setTimeout(() => s.focus(), 20); }
function closeTeamMenu() { document.getElementById('team-menu').hidden = true; document.getElementById('teams-tab').setAttribute('aria-expanded', 'false'); }
function filterTeamMenu() {
  const q = (document.getElementById('team-search').value || '').trim().toLowerCase();
  const list = document.getElementById('team-menu-list');
  const rows = teamMenuEntries().filter(e => !q || e.hay.includes(q));
  teamMenuKbdIndex = -1;
  if (!rows.length) { list.innerHTML = '<div class="team-menu-empty">No teams match “' + escapeHtml(q) + '”.</div>'; return; }
  list.innerHTML = '';
  rows.forEach(e => { const b = document.createElement('button'); b.className = 'team-menu-item'; b.dataset.slug = e.t.slug || ''; b.innerHTML = escapeHtml(e.t.name) + (e.coach ? ' <span class="pl">(' + escapeHtml(e.coach) + ')</span>' : ''); b.onclick = () => gotoTeam(e.t.slug); list.appendChild(b); });
}
function onTeamSearchKey(e) {
  const items = [...document.querySelectorAll('.team-menu-item')];
  if (e.key === 'Escape') { closeTeamMenu(); return; }
  if (e.key === 'Enter') { e.preventDefault(); const pick = items[teamMenuKbdIndex] || items[0]; if (pick) gotoTeam(pick.dataset.slug); return; }
  if (e.key === 'ArrowDown' || e.key === 'ArrowUp') { e.preventDefault(); if (!items.length) return; teamMenuKbdIndex = e.key === 'ArrowDown' ? Math.min(items.length - 1, teamMenuKbdIndex + 1) : Math.max(0, teamMenuKbdIndex - 1); items.forEach((it, i) => it.classList.toggle('kbd', i === teamMenuKbdIndex)); items[teamMenuKbdIndex].scrollIntoView({ block: 'nearest' }); }
}
function gotoTeam(slug) { if (slug) location.href = 'team.html#' + slug; }
document.addEventListener('click', e => { if (!e.target.closest('.nav-tab-wrap')) closeTeamMenu(); });
window.addEventListener('resize', () => { setNavHeight(); positionTeamMenu(); });

async function initAuth() {
  const { data: { session } } = await sb.auth.getSession();
  await applySession(session);
  sb.auth.onAuthStateChange((_e, s) => applySession(s));
}
async function applySession(session) {
  currentUser = session ? session.user : null;
  const loginBtn = document.getElementById('login-btn'), chip = document.getElementById('user-chip');
  if (currentUser) {
    const { data: prof } = await sb.from('profiles').select('is_admin').eq('id', currentUser.id).maybeSingle();
    isAdmin = !!(prof && prof.is_admin);
    loginBtn.hidden = true; chip.hidden = false; document.getElementById('user-email').textContent = currentUser.email || 'admin';
  } else { isAdmin = false; loginBtn.hidden = false; chip.hidden = true; }
}
function openLogin() {
  openModal('<h3>Admin Login</h3><p>Enter your admin email and we\u2019ll send a magic sign-in link.</p><input type="email" id="login-email" placeholder="you@example.com" autocomplete="email"><div class="modal-actions"><button class="btn" onclick="closeModal()">Cancel</button><button class="btn btn-accent" id="send-link-btn" onclick="sendMagicLink()">Send link</button></div>');
  setTimeout(() => document.getElementById('login-email').focus(), 30);
  document.getElementById('login-email').addEventListener('keydown', e => { if (e.key === 'Enter') sendMagicLink(); });
}
async function sendMagicLink() {
  const email = (document.getElementById('login-email').value || '').trim();
  if (!email) { showToast('Enter an email first.', 'err'); return; }
  const btn = document.getElementById('send-link-btn'); btn.disabled = true; btn.textContent = 'Sending…';
  const { error } = await sb.auth.signInWithOtp({ email, options: { emailRedirectTo: window.location.origin + window.location.pathname } });
  if (error) { showToast('Could not send link: ' + error.message, 'err'); btn.disabled = false; btn.textContent = 'Send link'; return; }
  closeModal(); showToast('Magic link sent to ' + email + '.', 'ok');
}
async function doLogout() { await sb.auth.signOut(); showToast('Logged out.', 'ok'); }
function openModal(html) { document.getElementById('modal').innerHTML = html; document.getElementById('modal-overlay').hidden = false; }
function closeModal() { document.getElementById('modal-overlay').hidden = true; }
function showToast(msg, kind) { const t = document.createElement('div'); t.className = 'toast' + (kind ? ' ' + kind : ''); t.textContent = msg; document.getElementById('toast-container').appendChild(t); setTimeout(() => { t.style.transition = 'opacity .3s'; t.style.opacity = '0'; setTimeout(() => t.remove(), 300); }, 3200); }
function setNavHeight() { const nav = document.querySelector('nav'); if (nav) document.documentElement.style.setProperty('--nav-h', nav.offsetHeight + 'px'); }

// ─────────────────────────────────────────────────────────────────────────────
// BOOT
// ─────────────────────────────────────────────────────────────────────────────
async function init() {
  const banner = document.getElementById('boot-banner');
  try {
    await loadData();
    buildInstances();
    populateFilters();
    applyFilters();
    setNavHeight();
    banner.hidden = true;
    document.getElementById('wrap').hidden = false;
    initAuth();
  } catch (err) {
    console.error(err);
    banner.className = 'banner err';
    banner.textContent = 'Could not load the statistics page: ' + (err.message || err);
  }
}
init();
</script>
