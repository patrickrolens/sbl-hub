<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<style>
*{box-sizing:border-box;margin:0;padding:0}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:24px;margin:12px 14px}
body{font-family:Segoe UI,system-ui,-apple-system,Roboto,Arial,sans-serif;background:var(--bg);color:var(--text);padding:0 0 14px}
.page-wrap{margin:0 auto}
.search-row{display:flex;gap:8px;align-items:center;position:sticky;top:var(--nav-h);z-index:10;background:var(--bg2);border-radius:8px}
.form-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.form-row-inner{position:relative}
.form-input{background:var(--bg3);border:1px solid var(--border);padding:8px;border-radius:6px;color:var(--text);min-height:28px}
.form-input.wide{min-width:260px}
.spinner-text{margin-left:8px;color:var(--text2);font:inherit}
.status-text{margin-left:12px;color:var(--text2);font:inherit}
.card-body{margin-top:12px;color:var(--text)}
.card-footer{margin-top:10px}
.card-heading{font-weight:800;margin-bottom:6px;font-size:1.05rem}
.card-copy{color:var(--text2);font-size:13px;margin-bottom:18px}
.suggestions{position:absolute;background:var(--bg2);border:1px solid var(--border);margin-top:6px;border-radius:6px;overflow:auto;max-height:220px;width:320px}
.suggestions button{display:block;width:100%;text-align:left;padding:8px 10px;border:none;background:none;color:var(--text);cursor:pointer}
.suggestions button:hover{background:var(--bg3)}
.empty{color:var(--text2);font-style:italic;padding:10px}
.link{color:var(--accent);text-decoration:none;font-weight:600}
.team-sprites{display:flex;gap:8px;align-items:center;flex-wrap:nowrap;overflow:hidden}
.team-sprites img.sprite{width:36px;height:36px;border-radius:6px;background:rgba(255,255,255,0.02);padding:4px;object-fit:contain;border:1px solid var(--border)}
.sprite-more{display:inline-flex;align-items:center;justify-content:center;min-width:36px;height:36px;border-radius:6px;background:rgba(124,111,247,0.10);color:var(--accent);font-size:12px;padding:4px;border:1px solid rgba(124,111,247,0.12)}
.history-card-header{display:flex;flex-direction:column;align-items:center;text-align:center;gap:10px;margin:18px 0 16px}
.history-sprite{width:104px;height:104px;border-radius:18px;background:rgba(255,255,255,0.03);border:1px solid var(--border);padding:12px;object-fit:contain}
.history-heading-text{font-size:1.7rem;font-weight:800}
.history-subtitle{color:var(--text2);font-size:13px;margin-top:4px}
.history-list{list-style:none;padding:0;margin:0;display:flex;flex-direction:column;gap:12px}
.history-item{padding:16px;border:1px solid rgba(255,255,255,0.08);background:rgba(255,255,255,0.02);border-radius:12px}
.history-team-name{color:var(--accent);font-weight:700}
.team-link{color:var(--accent);font-weight:700;text-decoration:none}.team-link:hover{text-decoration:underline}
.history-item-copy{color:var(--text2);line-height:1.5}
.history-season{color:var(--text2);font-size:0.7rem;text-transform:uppercase;letter-spacing:0.1em;font-weight:700;margin-top:6px}
.link:hover{text-decoration:underline}

/* Stat tiles + collapsible sections (same treatment as players.html) */
.record-stats-row{display:flex;flex-wrap:wrap;gap:16px;max-width:860px;margin:14px auto 0;width:100%}
.record-stat{flex:1;display:flex;flex-direction:column;gap:8px;padding:12px 0;min-width:110px;text-align:center}
.record-stat-title{color:#6b7280;font-size:0.65rem;text-transform:uppercase;letter-spacing:0.12em}
.record-stat-value{font-size:2rem;font-weight:800;color:#ffffff;line-height:1}
.record-stat-value.positive{color:#4ade80}
.record-stat-value.negative{color:#f87171}
.record-stat-sub{color:var(--text2);font-size:11px}
.badge-row{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px;justify-content:center}
.accolade{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:14px;background:rgba(124,111,247,0.12);color:var(--accent);font-size:12px;font-weight:700;border:1px solid rgba(124,111,247,0.2)}
.accolade a{color:inherit;text-decoration:none}
.accolade a:hover{text-decoration:underline}
details.record-section{margin:26px 0 0}
details.record-section>summary{cursor:pointer;list-style:none;user-select:none}
details.record-section>summary::-webkit-details-marker{display:none}
details.record-section>summary::before{content:'▸';display:inline-block;margin-right:8px;color:var(--accent);transition:transform .15s}
details.record-section[open]>summary::before{transform:rotate(90deg)}
.section-title{font-size:1.05rem;font-weight:800;margin:0 0 10px}
.table-wrap{overflow-x:auto}
.stat-table{width:100%;border-collapse:collapse;font-size:13px}
.stat-table th{color:var(--text2);text-transform:uppercase;font-size:0.65rem;letter-spacing:0.08em;text-align:left;padding:8px 10px;border-bottom:1px solid var(--border);white-space:nowrap}
.stat-table td{padding:8px 10px;border-bottom:1px solid rgba(46,50,72,0.35);white-space:nowrap}
.stat-table tr:last-child td{border-bottom:none}
.stat-table .num{text-align:right}
@media (max-width:640px){.record-stats-row{gap:8px}.record-stat{min-width:90px}.record-stat-value{font-size:1.5rem}}

/* League-leader tiles (landing view, below the search card) */
.leader-tiles{display:flex;flex-wrap:wrap;gap:12px;margin-top:14px}
.leader-tile{flex:1;min-width:130px;display:flex;flex-direction:column;align-items:center;gap:6px;padding:14px 8px;background:rgba(255,255,255,0.02);border:1px solid var(--border);border-radius:12px;cursor:pointer;color:var(--text);font:inherit;text-align:center}
.leader-tile:hover{border-color:var(--accent);background:rgba(124,111,247,0.06)}
.leader-tile img{width:52px;height:52px;object-fit:contain}
.leader-tile-name{font-weight:700;font-size:13px}
.leader-tile-value{font-size:1.3rem;font-weight:800;color:var(--accent);line-height:1}
.leader-row-btn{display:flex;align-items:center;gap:7px;background:none;border:none;color:var(--text);font:inherit;cursor:pointer;padding:0}
.leader-row-btn:hover span{color:var(--accent);text-decoration:underline}
.leader-row-btn img{width:28px;height:28px;image-rendering:pixelated;flex-shrink:0}
details.leaders-fold{margin:0}
.leader-table-title{font-size:1.05rem;font-weight:800;margin:22px 0 10px}
.stat-table th.sortable{cursor:pointer;user-select:none}
.stat-table th.sortable:hover{color:var(--text)}
.stat-table th.sortable:focus-visible{outline:2px solid var(--accent);outline-offset:-2px;color:var(--text)}
.stat-table th .arrow{color:var(--accent);margin-left:2px}
@media (max-width:640px){.leader-tiles{gap:8px}.leader-tile{min-width:104px}}
</style>

<div class="page-wrap">
<div class="card">
  <div class="card-heading">Pokémon History</div>
  <div class="card-copy">Search for a Pokémon to see its all-time record, combat stats, draft history, and which teams owned it across seasons.</div>

  <div class="search-row form-row">
    <div class="form-row-inner">
      <input id="search" class="form-input wide" placeholder="Search Pokémon name…" autocomplete="off">
      <div id="suggestions" class="suggestions" hidden></div>

  <div id="results" class="card-body"></div>
  <div class="card-footer"><button id="load-more" class="sbln-btn" hidden>Load more</button></div>

<div class="card" id="leaders-card" hidden>

    <summary class="section-title card-heading">All-Time Leaders</summary>
    <div class="card-copy" id="leaders-copy">Across every season. Click any Pokémon to open its full history.</div>
    <div id="leaders-tiles" class="leader-tiles"></div>
    <div id="leaders-table"></div>
  </details>
</div>

<script>
const SUPABASE_URL      = "https://arypbyzeppbpbursmzcs.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_U8J3pV_KgomrWhbgoGBSUg_ttQ4d46m";
const sb = window.sb || supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
const POKEMON_JSON_URL = "https://planner.springfieldbattleleague.com/pokemon.json";
const POKEBALL_FALLBACK = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 40 40'%3E%3Ccircle cx='20' cy='20' r='19' fill='%23e05555' stroke='%23333' stroke-width='1.5'/%3E%3Cpath d='M1.1 20 A19 19 0 0 0 38.9 20 Z' fill='%23fff'/%3E%3Crect x='1' y='18' width='38' height='4' fill='%23333'/%3E%3Ccircle cx='20' cy='20' r='7' fill='%23fff' stroke='%23333' stroke-width='1.5'/%3E%3Ccircle cx='20' cy='20' r='3.5' fill='%23e8eaf6' stroke='%23333' stroke-width='1'/%3E%3C/svg%3E";
const ASSET_BASE = POKEMON_JSON_URL.replace(/[^/]*$/, '');

function spriteUrlById(id) { return id ? ASSET_BASE + 'sprites/' + localId(id) + '.png' : ''; }
// pokemonNameById/pokemonEntryById/slugifyName come from utils.js.
function playerLink(name) {
  return '<a class="link" href="players.html#' + slugifyName(name) + '">' + escapeHtml(name) + '</a>';
}
function renderStatTile(title, value, cls, subHtml) {
  return '<div class="record-stat"><div class="record-stat-title">' + title + '</div>'
    + '<div class="record-stat-value' + (cls ? ' ' + cls : '') + '">' + value + '</div>'
    + (subHtml || '') + '</div>';
}
// Collapsible section wrapper — native <details>, open by default (players.html
// pattern); pass closed=true for long sections that should start collapsed.
function sectionHtml(title, bodyHtml, closed) {
  return '<details class="record-section"' + (closed ? '' : ' open') + '>'
    + '<summary class="section-title">' + title + '</summary>'
    + bodyHtml
  + '</details>';
}

// ownerStintAtMatch comes from utils.js.

function getAcquisitionInfo(via) {
  const key = String(via || '').toLowerCase();
  if (key.includes('draft')) return { label: 'drafted', priority: 0 };
  if (key.includes('trade')) return { label: 'traded for', priority: 1 };
  if (key.includes('waiver')) return { label: 'claimed', priority: 2 };
  if (key.includes('drop')) return { label: 'picked up', priority: 2 };
  if (key.includes('pick')) return { label: 'added', priority: 2 };
  return { label: 'acquired', priority: 3 };
}

function formatSeasonWeek(team, week) {
  const seasonLabel = (team && team.season && (team.season.name || team.season.slug)) ? (team.season.name || team.season.slug) : 'Season';
  return seasonLabel + (week == null ? '' : ' Week ' + week);
}

function getOwnerDisplayName(team, week) {
  if (!team || !team.owners || !team.owners.length) return '';
  if (week != null) {
    const owner = team.owners.slice().reverse().find(o => {
      const started = o.started_week == null ? -Infinity : o.started_week;
      const ended = o.ended_week == null ? Infinity : o.ended_week;
      return started <= week && ended >= week;
    });
    if (owner && owner.display_name) return owner.display_name;
  }
  return team.owners[team.owners.length - 1].display_name || '';
}

function getTeamLabel(team, week) {
  if (!team) return 'Unknown team';
  const name = team.name || 'Unknown team';
  const ownerName = getOwnerDisplayName(team, week);
  if (!ownerName) return name;
  const normalizedTeam = String(name).trim().toLowerCase();
  const normalizedOwner = String(ownerName).trim().toLowerCase();
  if (!normalizedTeam || normalizedTeam === normalizedOwner) return name;
  return name + ' (' + ownerName + ')';
}

function createHistoryItem(row, pokemonName) {
  const teamName = (row.team && row.team.name) || 'Unknown team';
  const ownerName = getOwnerDisplayName(row.team, row.acquired_week);
  const action = getAcquisitionInfo(row.acquired_via).label;
  const when = formatSeasonWeek(row.team, row.acquired_week);
  const releaseNote = row.released_week == null ? '' : ' It was dropped Week ' + row.released_week + '.';
  const teamSlug = row.team && row.team.slug;
  const teamSeasonSlug = row.team && row.team.season && row.team.season.slug;
  const teamHtml = teamSlug && teamSeasonSlug
    ? '<a class="history-team-name team-link" href="team.html?season=' + teamSeasonSlug + '#' + encodeURIComponent(teamSlug) + '">' + escapeHtml(teamName) + '</a>'
    : '<span class="history-team-name">' + escapeHtml(teamName) + '</span>';
  // Owner rides outside the team link so it can carry its own players.html link.
  const ownerHtml = ownerName && String(ownerName).trim().toLowerCase() !== String(teamName).trim().toLowerCase()
    ? ' (' + playerLink(ownerName) + ')' : '';
  return '<li class="history-item">'
    + '<div class="history-item-copy">' + teamHtml + ownerHtml + ' ' + escapeHtml(action) + ' ' + escapeHtml(pokemonName) + ' in ' + escapeHtml(when) + '.' + escapeHtml(releaseNote) + '</div>'
    + '</li>';
}

function attachImageFallback(container) {
  const imgs = container.querySelectorAll('img');
  imgs.forEach(img => { img.onerror = function(){ this.onerror = null; this.src = POKEBALL_FALLBACK; this.style.opacity = '.5'; }; });
}

let pokemonList = [];
let suggestIndex = -1;
let debounceTimer = null;
let pageOffset = 0, pageSize = 100, lastPokemonId = null, allRows = [];
// Bumped by every new search; in-flight loaders compare their captured copy
// after each await and bail if a newer search started, so a slow response can
// never write into the view (or the shared allRows) of a later search.
let searchToken = 0;
// Ledger team/owner data accumulated across "Load more" pages, so each page
// only fetches teams it hasn't seen yet. Reset per search.
let ledgerTeamById = {};

function $id(id) { return document.getElementById(id); }
function showStatus(txt, kind) { const s = $id('status'); s.textContent = txt || ''; s.style.color = kind === 'err' ? 'var(--red)' : 'var(--text2)'; }

async function boot() {
  $id('do-search').addEventListener('click', () => onSearchClick());
  const input = $id('search');
  input.addEventListener('input', e => { onSearchInput(e); });
  input.addEventListener('keydown', onInputKeyDown);
  input.addEventListener('blur', () => setTimeout(() => { $id('suggestions').hidden = true; suggestIndex = -1; }, 150));
  $id('load-more').addEventListener('click', loadMore);

  // Try to prefetch pokemon.json but tolerate failures.
  try {
    const res = await fetch(POKEMON_JSON_URL);
    if (!res.ok) throw new Error('Not found');
    const pj = await res.json();
    pokemonList = Array.isArray(pj) ? pj : (pj.pokemon || []);
  } catch (e) {
    console.warn('pokemon.json load failed', e);
    showStatus('Pokémon names unavailable (offline). You can still search by id.', 'err');
  }

  // deep-link support: ?q=Charizard
  const q = new URLSearchParams(location.search).get('q');
  if (q) { $id('search').value = q; debounce(() => onSearchClick(), 60); }

  // League leaders fill in below the search card; never block the search UI.
  loadLeagueLeaders();
}

function debounce(fn, ms) {
  clearTimeout(debounceTimer); debounceTimer = setTimeout(fn, ms);
}

function onSearchInput(e) {
  const q = (e.target.value || '').trim().toLowerCase();
  if (!q) { $id('suggestions').hidden = true; return; }
  // local suggest immediately
  const matches = pokemonList.filter(p => (p.name || '').toLowerCase().includes(q)).slice(0,10);
  const box = $id('suggestions');
  if (!matches.length) { box.hidden = true; return; }
  box.innerHTML = '';
  matches.forEach((m, i) => {
    const b = document.createElement('button');
    b.type = 'button';
    b.className = 'sugg-btn';
    b.dataset.idx = i;
    b.textContent = m.name;
    b.addEventListener('click', () => { $id('search').value = m.name; box.hidden = true; doSearchById(m.id); });
    box.appendChild(b);
  });
  suggestIndex = -1; box.hidden = false;
}

function onInputKeyDown(e) {
  const box = $id('suggestions');
  const items = box.hidden ? [] : [...box.querySelectorAll('.sugg-btn')];
  if (e.key === 'ArrowDown' && items.length) { e.preventDefault(); suggestIndex = Math.min(items.length - 1, suggestIndex + 1); updateSuggestFocus(items); }
  else if (e.key === 'ArrowUp' && items.length) { e.preventDefault(); suggestIndex = Math.max(0, suggestIndex - 1); updateSuggestFocus(items); }
  else if (e.key === 'Enter') {
    if (!box.hidden && suggestIndex >= 0 && items[suggestIndex]) { e.preventDefault(); items[suggestIndex].click(); return; }
    // otherwise run search
  }
}

function updateSuggestFocus(items) {
  items.forEach((it, i) => it.style.background = i === suggestIndex ? 'var(--bg3)' : '');
  if (items[suggestIndex]) items[suggestIndex].scrollIntoView({ block: 'nearest' });
}

function setLoading(loading) {
  $id('do-search').disabled = loading;
  $id('search').disabled = loading;
  $id('spinner').hidden = !loading;
}

async function onSearchClick() {
  const q = ($id('search').value || '').trim().toLowerCase();
  if (!q) return;
  // prefer exact name match if we have the data
  let hit = pokemonList.find(p => (p.name || '').toLowerCase() === q);
  if (!hit) hit = pokemonList.find(p => (p.name || '').toLowerCase().includes(q));
  if (!hit) {
    showStatus('No Pokémon found.');
    return;
  }
  doSearchById(hit.id);
}

async function doSearchById(pokemonId) {
  // reset paging + invalidate any in-flight loaders from a previous search
  searchToken++;
  pageOffset = 0; lastPokemonId = pokemonId; allRows = []; ledgerTeamById = {};
  const name = pokemonNameById(pokemonId) || 'Pokémon';
  // Keep the URL shareable: ?q=<name> round-trips through the boot deep-link.
  try {
    const sp = new URLSearchParams(location.search);
    sp.set('q', name);
    history.replaceState(null, '', location.pathname + '?' + sp.toString() + location.hash);
  } catch (e) { /* history API unavailable — links just won't carry ?q */ }
  const mon = pokemonEntryById(pokemonId);
  const types = mon ? [mon.type1, mon.type2].filter(Boolean).join(' · ') : '';
  // Skeleton first: the ledger (loadPage) and the stats bundle (loadMonStats)
  // load in parallel and each fills its own container.
  $id('results').innerHTML = '<div class="history-card-header">'
    + renderPokemonSprite(pokemonId, name)
    + '<div><div class="history-heading-text">' + escapeHtml(name) + '</div>'
    + (types ? '<div class="history-subtitle">' + escapeHtml(types) + '</div>' : '')
    + '<div id="mon-badges"></div></div>'
    + '</div>'
    + '<div id="mon-stats"></div><div id="mon-draft"></div><div id="mon-ledger"></div>';
  attachImageFallback($id('results'));
  await Promise.all([loadPage(), loadMonStats(pokemonId)]);
  renderDraftSection(); // needs both: ledger rows (teams) + tier costs
}

// ----- Combat/usage stats for one Pokémon -----
let _tiersBySeason = {}, _statsSeasonById = {};
// Seasons can't change mid-session; fetch once and reuse across searches.
let _seasonsPromise = null;
function getSeasons() {
  if (!_seasonsPromise) _seasonsPromise = fetchAll('seasons', 'id,name,slug,point_limit')
    .catch(e => { _seasonsPromise = null; throw e; });
  return _seasonsPromise;
}
async function loadMonStats(pokemonId) {
  const el = $id('mon-stats');
  if (!el) return;
  const token = searchToken;
  try {
    const [mpRows, gpsRows, tiers, potwRows, seasons, tpRows] = await Promise.all([
      fetchAllIn('match_pokemon', 'match_id,team_id', 'pokemon_id', [pokemonId]),
      fetchAllIn('game_pokemon_stats', 'game_id,team_id,kills,deaths', 'pokemon_id', [pokemonId]),
      fetchAllIn('season_pokemon_tiers', 'season_id,point_cost', 'pokemon_id', [pokemonId]).catch(() => []),
      fetchAllIn('potw', 'season_id,week,player_id', 'pokemon_id', [pokemonId]).catch(() => []),
      getSeasons(),
      fetchAllIn('team_pokemon', 'team_id', 'pokemon_id', [pokemonId]).catch(() => [])
    ]);
    if (token !== searchToken) return;
    _tiersBySeason = {}; tiers.forEach(t => _tiersBySeason[t.season_id] = t.point_cost);
    _statsSeasonById = {}; seasons.forEach(s => _statsSeasonById[s.id] = s);

    const gameIds = [...new Set(gpsRows.map(r => r.game_id))];
    const teamIds = [...new Set(mpRows.map(r => r.team_id).concat(gpsRows.map(r => r.team_id)).filter(Boolean))];
    const [games, owners] = await Promise.all([
      gameIds.length ? fetchAllIn('games', 'id,match_id,winner_team_id', 'id', gameIds) : [],
      teamIds.length ? fetchAllIn('team_owners', 'team_id,player_id,started_week,ended_week', 'team_id', teamIds) : []
    ]);
    if (token !== searchToken) return;
    const gameToMatch = {}; games.forEach(g => gameToMatch[g.id] = g.match_id);
    const gameById = {}; games.forEach(g => gameById[g.id] = g);
    const matchIds = [...new Set(mpRows.map(r => r.match_id).concat(games.map(g => g.match_id)).filter(Boolean))];
    const playerIds = [...new Set(owners.map(o => o.player_id).concat(potwRows.map(r => r.player_id)).filter(Boolean))];
    const [matches, players] = await Promise.all([
      matchIds.length ? fetchAllIn('matches', 'id,season_id,stage,week,team_a_id,team_b_id,team_a_score,team_b_score,winner_team_id', 'id', matchIds) : [],
      playerIds.length ? fetchAllIn('players', 'id,display_name', 'id', playerIds) : []
    ]);
    if (token !== searchToken) return;
    const matchById = {}; matches.forEach(m => matchById[m.id] = m);
    const playerById = {}; players.forEach(p => playerById[p.id] = p);
    const ownersByTeam = {};
    owners.forEach(o => { if (o.team_id) (ownersByTeam[o.team_id] = ownersByTeam[o.team_id] || []).push(o); });
    Object.values(ownersByTeam).forEach(list => list.sort((a, b) => (a.started_week || 1) - (b.started_week || 1)));

    let w = 0, l = 0, d = 0, kills = 0, deaths = 0;
    const bySeason = {}; // season_id -> { brought, w, l, d, kills, deaths }
    const byHandler = {}; // player_id -> { name, brought, w, l, d, kills }
    mpRows.forEach(r => {
      const m = matchById[r.match_id]; if (!m) return;
      const res = matchResultFor(m, r.team_id);
      const sAgg = bySeason[m.season_id] = bySeason[m.season_id] || { brought: 0, w: 0, l: 0, d: 0, kills: 0, deaths: 0 };
      sAgg.brought++;
      if (res === 'W') { w++; sAgg.w++; } else if (res === 'L') { l++; sAgg.l++; } else if (res === 'D') { d++; sAgg.d++; }
      const stint = ownerStintAtMatch(ownersByTeam, r.team_id, m);
      const pl = stint && playerById[stint.player_id];
      if (pl) {
        const h = byHandler[pl.id] = byHandler[pl.id] || { name: pl.display_name, brought: 0, w: 0, l: 0, d: 0, kills: 0 };
        h.brought++;
        if (res === 'W') h.w++; else if (res === 'L') h.l++; else if (res === 'D') h.d++;
      }
    });
    let gameW = 0, gameL = 0;
    gpsRows.forEach(r => {
      kills += r.kills || 0; deaths += r.deaths || 0;
      const g = gameById[r.game_id];
      if (g && g.winner_team_id) { if (g.winner_team_id === r.team_id) gameW++; else gameL++; }
      const m = matchById[gameToMatch[r.game_id]];
      if (!m) return;
      const sAgg = bySeason[m.season_id] = bySeason[m.season_id] || { brought: 0, w: 0, l: 0, d: 0, kills: 0, deaths: 0 };
      sAgg.kills += r.kills || 0; sAgg.deaths += r.deaths || 0;
      const stint = ownerStintAtMatch(ownersByTeam, r.team_id, m);
      const pl = stint && playerById[stint.player_id];
      if (pl && byHandler[pl.id]) byHandler[pl.id].kills += r.kills || 0;
    });

    // POTW badges under the heading
    const badgeEl = $id('mon-badges');
    if (badgeEl && potwRows.length) {
      badgeEl.className = 'badge-row';
      badgeEl.innerHTML = potwRows
        .sort((a, b) => parseSeasonNumberLabel((_statsSeasonById[a.season_id] || {}).name) - parseSeasonNumberLabel((_statsSeasonById[b.season_id] || {}).name) || (a.week || 0) - (b.week || 0))
        .map(r => {
          const pl = playerById[r.player_id];
          return '<span class="accolade">⭐ POTW ' + escapeHtml(seasonShortLabel(_statsSeasonById[r.season_id]) + ' W' + r.week)
            + (pl ? ' — ' + playerLink(pl.display_name) : '') + '</span>';
        }).join('');
    }

    if (!mpRows.length && !gpsRows.length) { el.innerHTML = ''; return; }

    // Streaks + regular/postseason splits + best season (players.html patterns).
    // Chronological order: season number, regular before postseason, then week.
    const seasonNumOf = m => parseSeasonNumberLabel(((_statsSeasonById[m.season_id] || {}).name) || ((_statsSeasonById[m.season_id] || {}).slug) || '');
    const chrono = mpRows
      .map(r => { const m = matchById[r.match_id]; return m ? { m, res: matchResultFor(m, r.team_id) } : null; })
      .filter(x => x && x.res)
      .sort((a, b) => seasonNumOf(a.m) - seasonNumOf(b.m)
        || ((a.m.stage && a.m.stage !== 'regular') ? 1 : 0) - ((b.m.stage && b.m.stage !== 'regular') ? 1 : 0)
        || (a.m.week || 0) - (b.m.week || 0));
    const results = chrono.map(x => x.res);
    let longestW = 0, run = 0;
    results.forEach(r => { if (r === 'W') { run++; if (run > longestW) longestW = run; } else run = 0; });
    let curType = null, curLen = 0;
    for (let i = results.length - 1; i >= 0; i--) {
      const r = results[i];
      if (r === 'D') break;
      if (curType == null) { curType = r; curLen = 1; }
      else if (r === curType) curLen++;
      else break;
    }
    let regW = 0, regL = 0, postW = 0, postL = 0, postAny = false;
    chrono.forEach(x => {
      const reg = !x.m.stage || x.m.stage === 'regular';
      if (!reg) postAny = true;
      if (x.res === 'W') { reg ? regW++ : postW++; }
      else if (x.res === 'L') { reg ? regL++ : postL++; }
    });
    // Best season by win % over decided matches; ties go to the bigger sample.
    let bestSid = null, bestScore = -1, bestAgg = null;
    Object.keys(bySeason).forEach(sid => {
      const a = bySeason[sid], dec = a.w + a.l + a.d;
      if (!dec) return;
      const score = a.w / dec;
      if (score > bestScore || (score === bestScore && bestAgg && dec > (bestAgg.w + bestAgg.l + bestAgg.d))) { bestScore = score; bestSid = sid; bestAgg = a; }
    });
    const teamsOwned = [...new Set(tpRows.map(t => t.team_id).filter(Boolean))].length;

    // Tiles — match record (whole series, bench included) and game record (games
    // it actually appeared in, per games.winner_team_id) side by side.
    const decided = w + l + d;
    const pct = decided ? ((w / decided) * 100).toFixed(1) : null;
    const gameDecided = gameW + gameL;
    const gamePct = gameDecided ? ((gameW / gameDecided) * 100).toFixed(1) : null;
    // Win % rides as a sub-label under its record tile (players.html's
    // record-stat-sub pattern) instead of being a separate tile.
    const recCls = p => p != null ? (parseFloat(p) >= 50 ? 'positive' : 'negative') : '';
    const recSub = p => p != null ? '<div class="record-stat-sub">' + escapeHtml(p + '% W') + '</div>' : '';
    let html = '<div class="record-stats-row">'
      + renderStatTile('Sets', String(mpRows.length))
      + renderStatTile('Matches', escapeHtml(w + '-' + l + (d ? '-' + d : '')), recCls(pct), recSub(pct))
      + renderStatTile('Games', escapeHtml(gameW + '-' + gameL), recCls(gamePct), recSub(gamePct))
      + renderStatTile('KOs', String(kills))
      + renderStatTile('Faints', String(deaths))
      + renderStatTile('K/F', (kills / Math.max(deaths, 1)).toFixed(2))
    + '</div>'
    + '<div class="record-stats-row">'
      + renderStatTile('Current Streak', curType ? escapeHtml(curType + curLen) : '—', curType === 'W' ? 'positive' : (curType === 'L' ? 'negative' : ''))
      + renderStatTile('Longest Win Streak', String(longestW))
      + renderStatTile('Regular Season', escapeHtml(regW + '-' + regL))
      + (postAny ? renderStatTile('Postseason', escapeHtml(postW + '-' + postL)) : '')
      + (bestSid ? renderStatTile('Best Season', escapeHtml(seasonShortLabel(_statsSeasonById[bestSid])), '',
          '<div class="record-stat-sub">' + escapeHtml(bestAgg.w + '-' + bestAgg.l + (bestAgg.d ? '-' + bestAgg.d : '') + ' (' + Math.round(bestScore * 100) + '%)') + '</div>') : '')
      + (teamsOwned ? renderStatTile('Teams', String(teamsOwned)) : '')
    + '</div>';

    // Season-by-season usage (union of seasons it was used in or priced for)
    const sids = [...new Set(Object.keys(bySeason).concat(Object.keys(_tiersBySeason)))]
      .sort((a, b) => parseSeasonNumberLabel((_statsSeasonById[a] || {}).name || (_statsSeasonById[a] || {}).slug) - parseSeasonNumberLabel((_statsSeasonById[b] || {}).name || (_statsSeasonById[b] || {}).slug));
    if (sids.length) {
      const rows = sids.map(sid => {
        const a = bySeason[sid] || { brought: 0, w: 0, l: 0, d: 0, kills: 0, deaths: 0 };
        return '<tr>'
          + '<td>' + escapeHtml(seasonShortLabel(_statsSeasonById[sid])) + '</td>'
          + '<td class="num">' + draftCostCell(_tiersBySeason[sid], sid) + '</td>'
          + '<td class="num">' + a.brought + '</td>'
          + '<td class="num">' + (a.brought ? escapeHtml(a.w + '-' + a.l + (a.d ? '-' + a.d : '')) : '—') + '</td>'
          + '<td class="num">' + a.kills + '</td>'
          + '<td class="num">' + a.deaths + '</td>'
        + '</tr>';
      }).join('');
      html += sectionHtml('Season by season',
        '<div class="table-wrap"><table class="stat-table"><thead><tr>'
        + '<th>Season</th><th class="num">Draft cost</th><th class="num">Sets</th><th class="num">Record</th><th class="num">KOs</th><th class="num">Faints</th>'
        + '</tr></thead><tbody>' + rows + '</tbody></table></div>');
    }

    // Best handlers
    const handlers = Object.values(byHandler).sort((x, y) => y.brought - x.brought || y.w - x.w || x.name.localeCompare(y.name));
    if (handlers.length) {
      const rows = handlers.map(h => {
        const hd = h.w + h.l + h.d;
        const hp = hd ? ((h.w / hd) * 100).toFixed(0) + '%' : '—';
        return '<tr>'
          + '<td>' + playerLink(h.name) + '</td>'
          + '<td class="num">' + h.brought + '</td>'
          + '<td class="num">' + escapeHtml(h.w + '-' + h.l + (h.d ? '-' + h.d : '')) + '</td>'
          + '<td class="num">' + hp + '</td>'
          + '<td class="num">' + h.kills + '</td>'
        + '</tr>';
      }).join('');
      html += sectionHtml('Trainers',
        '<div class="table-wrap"><table class="stat-table"><thead><tr>'
        + '<th>Trainer</th><th class="num">Sets</th><th class="num">Record</th><th class="num">Win %</th><th class="num">KOs</th>'
        + '</tr></thead><tbody>' + rows + '</tbody></table></div>');
    }

    el.innerHTML = html;
  } catch (e) {
    console.error('mon stats load failed', e);
    el.innerHTML = '';
  }
}

// ----- League leaders (all-time, every Pokémon) -----
// Loads once in the background after boot; the card hides again if it fails.
// Data source, in order of preference: the pokemon_alltime_leaders view (one
// query, aggregated server-side), else client-side aggregation over the raw
// tables (~25 paginated requests). Either result is cached in sessionStorage
// so revisits within the TTL skip the network entirely. Names are NOT cached —
// they re-resolve from pokemon.json each load.
let _leagueMons = [], _leaderSort = { col: 'winpct', dir: 'desc' }, _leaderMin = 30;
const LEADERS_CACHE_KEY = 'sbl-leaders-v1', LEADERS_CACHE_TTL = 10 * 60 * 1000;

function readLeadersCache() {
  try {
    const c = JSON.parse(sessionStorage.getItem(LEADERS_CACHE_KEY));
    return (c && Array.isArray(c.rows) && Date.now() - c.t < LEADERS_CACHE_TTL) ? c.rows : null;
  } catch (e) { return null; }
}
function writeLeadersCache(rows) {
  try { sessionStorage.setItem(LEADERS_CACHE_KEY, JSON.stringify({ t: Date.now(), rows })); } catch (e) {}
}

async function fetchLeadersViaView() {
  const rows = await paginate(() => sb.from('pokemon_alltime_leaders').select('*').order('pokemon_id'));
  if (!rows.length) throw new Error('pokemon_alltime_leaders empty');
  return rows.map(r => ({
    id: r.pokemon_id, sets: r.sets || 0, games: r.games || 0,
    gw: r.game_wins || 0, gl: r.game_losses || 0,
    kills: r.kills || 0, faints: r.faints || 0,
    teams: r.teams || 0, potw: r.potw || 0
  }));
}

async function fetchLeadersViaTables() {
  const [mpRows, gpsRows, games, tpRows, potwRows] = await Promise.all([
    fetchAll('match_pokemon', 'pokemon_id'),
    fetchAll('game_pokemon_stats', 'game_id,team_id,pokemon_id,kills,deaths'),
    fetchAll('games', 'id,winner_team_id'),
    fetchAll('team_pokemon', 'pokemon_id,team_id'),
    fetchAll('potw', 'pokemon_id').catch(() => [])
  ]);
  const gameById = {}; games.forEach(g => gameById[g.id] = g);
  const byMon = {};
  const agg = id => byMon[id] = byMon[id] || { id, sets: 0, games: 0, gw: 0, gl: 0, kills: 0, faints: 0, teamSet: new Set(), potw: 0 };
  mpRows.forEach(r => agg(r.pokemon_id).sets++);
  // Game-level record: each game_pokemon_stats row is one game the mon actually
  // played in, and games.winner_team_id decides it — no match-level bench credit.
  gpsRows.forEach(r => {
    const a = agg(r.pokemon_id);
    a.games++; a.kills += r.kills || 0; a.faints += r.deaths || 0;
    const g = gameById[r.game_id];
    if (g && g.winner_team_id) { if (g.winner_team_id === r.team_id) a.gw++; else a.gl++; }
  });
  tpRows.forEach(r => { if (r.team_id) agg(r.pokemon_id).teamSet.add(r.team_id); });
  potwRows.forEach(r => agg(r.pokemon_id).potw++);
  return Object.values(byMon).map(a => ({
    id: a.id, sets: a.sets, games: a.games, gw: a.gw, gl: a.gl,
    kills: a.kills, faints: a.faints, teams: a.teamSet.size, potw: a.potw
  }));
}

async function loadLeagueLeaders() {
  const card = $id('leaders-card');
  if (!card) return;
  $id('leaders-copy').textContent = 'Loading all-time leaders…';
  card.hidden = false;
  try {
    let rows = readLeadersCache();
    if (!rows) {
      try { rows = await fetchLeadersViaView(); }
      catch (e) { rows = await fetchLeadersViaTables(); }
      writeLeadersCache(rows);
    }
    _leagueMons = rows.map(a => {
      const dec = a.gw + a.gl;
      return {
        id: a.id, name: pokemonNameById(a.id),
        brought: a.sets, games: a.games, gw: a.gw, gl: a.gl,
        winpct: dec ? (a.gw / dec) * 100 : 0,
        kills: a.kills, deaths: a.faints, kd: a.kills / Math.max(a.faints, 1),
        teams: a.teams, potw: a.potw
      };
    });
    if (!_leagueMons.length) { card.hidden = true; return; }
    // Relax the qualifying floor for young leagues so the card never comes up empty.
    while (_leaderMin > 1 && _leagueMons.filter(x => x.games >= _leaderMin).length < 5) _leaderMin = _leaderMin > 5 ? 5 : 1;
    $id('leaders-copy').textContent = 'Across every season. Win rate and K/F leaders need at least '
      + _leaderMin + ' games played. Click any Pokémon to open its full history.';
    renderLeaders();
  } catch (e) { console.error('league leaders load failed', e); card.hidden = true; }
}

function topBy(list, score) {
  return list.slice().sort((a, b) => score(b) - score(a) || b.games - a.games || a.name.localeCompare(b.name))[0] || null;
}

function leaderTile(title, mon, value) {
  return '<button type="button" class="leader-tile" onclick="leaderGo(\'' + escapeHtml(String(mon.id)) + '\')">'
    + '<div class="record-stat-title">' + title + '</div>'
    + '<img src="' + escapeHtml(spriteUrlById(mon.id)) + '" data-mid="' + escapeHtml(String(mon.id)) + '" alt="">'
    + '<div class="leader-tile-name">' + escapeHtml(mon.name) + '</div>'
    + '<div class="leader-tile-value">' + escapeHtml(value) + '</div>'
  + '</button>';
}

function leaderGo(id) {
  const name = pokemonNameById(id);
  $id('search').value = name;
  doSearchById(id);
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function renderLeaders() {
  const qualified = _leagueMons.filter(x => x.games >= _leaderMin);
  const tiles = [];
  const win = topBy(qualified, x => x.winpct);
  if (win) tiles.push(leaderTile('Best Win Rate', win, win.winpct.toFixed(1) + '%'));
  const kos = topBy(_leagueMons, x => x.kills);
  if (kos && kos.kills) tiles.push(leaderTile('Most KOs', kos, String(kos.kills)));
  const kd = topBy(qualified, x => x.kd);
  if (kd && kd.kills) tiles.push(leaderTile('Best K/F', kd, kd.kd.toFixed(2)));
  const wh = topBy(_leagueMons, x => x.brought);
  if (wh && wh.brought) tiles.push(leaderTile('Most Sets', wh, String(wh.brought)));
  const jm = topBy(_leagueMons, x => x.teams);
  if (jm && jm.teams > 1) tiles.push(leaderTile('Most Teams', jm, String(jm.teams)));
  const pw = topBy(_leagueMons, x => x.potw);
  if (pw && pw.potw) tiles.push(leaderTile('Most POTW', pw, String(pw.potw)));
  const el = $id('leaders-tiles');
  el.innerHTML = tiles.join('');
  el.querySelectorAll('img[data-mid]').forEach(img => attachSpriteFallback(img, img.dataset.mid));
  renderLeaderTable();
}

const LEADER_COLS = [
  { key: 'name', label: 'Pokémon', num: false },
  { key: 'brought', label: 'Sets', num: true },
  { key: 'games', label: 'Games', num: true },
  { key: 'record', label: 'Record', num: true },
  { key: 'winpct', label: 'Win %', num: true },
  { key: 'kills', label: 'KOs', num: true },
  { key: 'deaths', label: 'Faints', num: true },
  { key: 'kd', label: 'K/F', num: true },
];

function leaderSortBy(col) {
  if (_leaderSort.col === col) _leaderSort.dir = _leaderSort.dir === 'asc' ? 'desc' : 'asc';
  else _leaderSort = { col, dir: col === 'name' ? 'asc' : 'desc' };
  renderLeaderTable();
  // Re-render replaces the <thead>; put focus back on the header that was
  // activated so keyboard sorting doesn't dump focus to <body>.
  const th = document.querySelector('#leaders-table th[data-key="' + col + '"]');
  if (th) th.focus();
}

function renderLeaderTable() {
  const el = $id('leaders-table');
  const qualified = _leagueMons.filter(x => x.games >= _leaderMin);
  const col = _leaderSort.col, dir = _leaderSort.dir === 'asc' ? 1 : -1;
  const val = x => col === 'name' ? x.name.toLowerCase() : (col === 'record' ? x.gw : x[col]);
  const rows = qualified.slice().sort((a, b) => {
    const va = val(a), vb = val(b);
    if (va < vb) return -1 * dir;
    if (va > vb) return 1 * dir;
    return b.games - a.games || a.name.localeCompare(b.name);
  }).slice(0, 25);

  const head = LEADER_COLS.map(c => {
    const active = _leaderSort.col === c.key;
    return '<th class="sortable' + (c.num ? ' num' : '') + '" tabindex="0" data-key="' + c.key + '"'
      + ' aria-sort="' + (active ? (_leaderSort.dir === 'asc' ? 'ascending' : 'descending') : 'none') + '"'
      + ' onclick="leaderSortBy(\'' + c.key + '\')"'
      + ' onkeydown="if(event.key===\'Enter\'||event.key===\' \'){event.preventDefault();leaderSortBy(\'' + c.key + '\')}">'
      + c.label
      + (active ? '<span class="arrow">' + (_leaderSort.dir === 'asc' ? '▲' : '▼') + '</span>' : '') + '</th>';
  }).join('');
  const body = rows.map((x, i) => '<tr>'
    + '<td class="num">' + (i + 1) + '</td>'
    + '<td><button type="button" class="leader-row-btn" onclick="leaderGo(\'' + escapeHtml(String(x.id)) + '\')">'
      + '<img src="' + escapeHtml(iconUrl(x.id)) + '" data-mid="' + escapeHtml(String(x.id)) + '" alt=""><span>' + escapeHtml(x.name) + '</span></button></td>'
    + '<td class="num">' + x.brought + '</td>'
    + '<td class="num">' + x.games + '</td>'
    + '<td class="num">' + escapeHtml(x.gw + '-' + x.gl) + '</td>'
    + '<td class="num">' + x.winpct.toFixed(1) + '</td>'
    + '<td class="num">' + x.kills + '</td>'
    + '<td class="num">' + x.deaths + '</td>'
    + '<td class="num">' + x.kd.toFixed(2) + '</td>'
  + '</tr>').join('');

  el.innerHTML = '<div class="leader-table-title">Top 25 Pokémon</div>'
    + '<div class="table-wrap"><table class="stat-table"><thead><tr><th class="num">#</th>' + head + '</tr></thead>'
    + '<tbody>' + body + '</tbody></table></div>';
  el.querySelectorAll('img[data-mid]').forEach(img => attachIconFallback(img, img.dataset.mid));
}

// Cost shown against that season's draft budget (seasons.point_limit) — 80 pts
// means nothing on its own when budgets ranged from 115 to 310 across seasons.
function draftCostCell(cost, seasonId) {
  if (cost == null) return '—';
  const limit = ((_statsSeasonById[seasonId] || {}).point_limit) || 0;
  if (!limit) return escapeHtml(cost + ' pts');
  const pct = Math.round((cost / limit) * 100);
  return escapeHtml(String(cost)) + '<span style="color:var(--text2)"> / ' + limit + ' pts</span>'
    + ' <span style="color:var(--text2);font-size:11px">(' + pct + '%)</span>';
}

function renderDraftSection() {
  const el = $id('mon-draft');
  if (!el) return;
  const drafts = allRows.filter(r => String(r.acquired_via || '').toLowerCase().includes('draft') && r.team);
  if (!drafts.length) { el.innerHTML = ''; return; }
  const rows = drafts.slice().sort((a, b) => getSeasonNumber(a.team) - getSeasonNumber(b.team)).map(r => {
    const season = r.team.season || null;
    const cost = r.team.season_id != null ? _tiersBySeason[r.team.season_id] : null;
    const teamHtml = r.team.slug && season && season.slug
      ? '<a class="team-link" href="team.html?season=' + season.slug + '#' + encodeURIComponent(r.team.slug) + '">' + escapeHtml(r.team.name || '?') + '</a>'
      : escapeHtml(r.team.name || '?');
    const drafter = getOwnerDisplayName(r.team, 1); // week-1 owner = the drafter
    return '<tr>'
      + '<td>' + escapeHtml(seasonShortLabel(season)) + '</td>'
      + '<td>' + teamHtml + '</td>'
      + '<td>' + (drafter ? playerLink(drafter) : '—') + '</td>'
      + '<td class="num">' + (r.draft_pick_number != null ? '#' + r.draft_pick_number : '—') + '</td>'
      + '<td class="num">' + draftCostCell(cost, r.team.season_id) + '</td>'
    + '</tr>';
  }).join('');
  el.innerHTML = sectionHtml('Draft history',
    '<div class="table-wrap"><table class="stat-table"><thead><tr>'
    + '<th>Season</th><th>Team</th><th>Drafted by</th><th class="num">Pick</th><th class="num">Cost</th>'
    + '</tr></thead><tbody>' + rows + '</tbody></table></div>');
}

async function loadPage() {
  if (!lastPokemonId) return;
  const token = searchToken;
  setLoading(true);
  try {
    const from = pageOffset;
    const to = pageOffset + pageSize - 1;
    const sel = 'team_id, pokemon_id, acquired_week, released_week, acquired_via, draft_pick_number';
    const { data: rows, error } = await sb.from('team_pokemon').select(sel).eq('pokemon_id', lastPokemonId).order('acquired_week', { ascending: true }).order('team_id', { ascending: true }).range(from, to);
    if (token !== searchToken) return;
    if (error) throw error;
    if (!rows || !rows.length) {
      if (!allRows.length) showStatus('No ownership records found.');
      else showStatus('No more records.');
      $id('load-more').hidden = true;
      renderResults(allRows);
      return;
    }
    allRows.push(...rows);
    // Only fetch team/owner data for teams this ledger hasn't seen yet — a
    // "Load more" page reuses everything already in ledgerTeamById.
    const teamIds = [...new Set(rows.map(r => r.team_id).filter(id => id && !ledgerTeamById[id]))];
    if (teamIds.length) {
      const [teamsRes, ownersRes, seasons] = await Promise.all([
        sb.from('teams').select('id,name,slug,logo_url,season_id').in('id', teamIds),
        sb.from('team_owners').select('team_id,player_id,started_week,ended_week').in('team_id', teamIds),
        getSeasons()
      ]);
      if (token !== searchToken) return;
      if (teamsRes.error) throw teamsRes.error;
      if (ownersRes.error) throw ownersRes.error;
      const teams = teamsRes.data || [];
      const owners = ownersRes.data || [];
      const playerIds = [...new Set(owners.map(o => o.player_id).filter(Boolean))];
      const playersRes = playerIds.length
        ? await sb.from('players').select('id,display_name').in('id', playerIds)
        : { data: [], error: null };
      if (token !== searchToken) return;
      if (playersRes.error) throw playersRes.error;
      const playerById = {};
      (playersRes.data || []).forEach(p => { playerById[p.id] = p; });
      const seasonById = {};
      seasons.forEach(ss => seasonById[ss.id] = ss);
      teams.forEach(t => {
        t.season = seasonById[t.season_id] || null;
        ledgerTeamById[t.id] = t;
      });
      owners.forEach(o => {
        const team = ledgerTeamById[o.team_id];
        if (!team) return;
        team.owners = team.owners || [];
        team.owners.push({
          player_id: o.player_id,
          started_week: o.started_week,
          ended_week: o.ended_week,
          display_name: playerById[o.player_id] ? playerById[o.player_id].display_name : ''
        });
      });
      teams.forEach(team => {
        if (team.owners) team.owners.sort((a, b) => (a.started_week || 0) - (b.started_week || 0));
      });
    }
    // attach team info in place — renderDraftSection and exportCSV read allRows too
    allRows.forEach(r => { if (!r.team) r.team = ledgerTeamById[r.team_id] || null; });
    renderResults(allRows);
    // show load-more if this page was full
    pageOffset += rows.length;
    $id('load-more').hidden = rows.length < pageSize;
    showStatus('Found ' + allRows.length + ' records.');
  } catch (e) {
    console.error(e);
    showStatus('Could not query records — check network or database permissions.', 'err');
  } finally { if (token === searchToken) setLoading(false); }
}

async function loadMore() { await loadPage(); renderDraftSection(); }

function renderResults(rows) {
  const el = $id('mon-ledger') || $id('results');
  el.innerHTML = '';
  if (!rows || !rows.length) { el.innerHTML = '<div class="empty">No ownership records.</div>'; return; }
  const pokemonName = pokemonNameById(lastPokemonId) || 'Pokémon';
  const sortedRows = rows.slice().sort((a,b) => {
    const aSeason = getSeasonNumber(a.team);
    const bSeason = getSeasonNumber(b.team);
    if (aSeason !== bSeason) return aSeason - bSeason;
    const aWeek = a.acquired_week == null ? Infinity : a.acquired_week;
    const bWeek = b.acquired_week == null ? Infinity : b.acquired_week;
    if (aWeek !== bWeek) return aWeek - bWeek;
    const aAction = getAcquisitionInfo(a.acquired_via).priority;
    const bAction = getAcquisitionInfo(b.acquired_via).priority;
    return aAction - bAction;
  });
  // Grouped by season with small subheaders
  let list = '', lastSeasonKey = null;
  sortedRows.forEach(r => {
    const key = r.team && r.team.season ? seasonShortLabel(r.team.season) : '?';
    if (key !== lastSeasonKey) {
      list += '<li class="history-season">' + escapeHtml(key === '?' ? 'Unknown season' : 'Season ' + key.replace(/^S/, '')) + '</li>';
      lastSeasonKey = key;
    }
    list += createHistoryItem(r, pokemonName);
  });
  el.innerHTML = sectionHtml('Ownership history', '<ul class="history-list">' + list + '</ul>', true);
  attachImageFallback(el);
}

// parseSeasonNumberLabel comes from utils.js.
function getSeasonNumber(team) {
  if (!team || !team.season) return 0;
  return parseSeasonNumberLabel(team.season.name || team.season.slug || '');
}
function seasonShortLabel(season) {
  const n = parseSeasonNumberLabel((season && (season.name || season.slug)) || '');
  return n ? 'S' + n : ((season && season.slug) || '?');
}

function renderPokemonSprite(id, name) {
  const src = spriteUrlById(id) || POKEBALL_FALLBACK;
  return '<img class="history-sprite" src="' + escapeHtml(src) + '" title="' + escapeHtml(name) + '" alt="' + escapeHtml(name) + '">';
}

// initialize
boot();
</script>
