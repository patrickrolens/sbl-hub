<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SBL Hub — Schedule &amp; Matches</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --bg:#0f1117; --bg2:#1a1d27; --bg3:#22263a; --border:#2e3248;
  --text:#e8eaf6; --text2:#9095b8; --text3:#5a5f80;
  --accent:#7c6ff7; --red:#e05555; --green:#4caf7d; --blue:#60a5fa; --yellow:#f0c060;
  --nav-h: 49px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 13px; }
::-webkit-scrollbar { width: 7px; height: 7px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
a { color: inherit; }

/* ── LAYOUT ── */
.layout { display: flex; align-items: flex-start; }
.schedule-col { flex: 1 1 auto; min-width: 0; padding: 18px 16px 60px; }
.detail-col { flex: 0 0 44%; max-width: 44%; align-self: stretch; border-left: 1px solid var(--border);
  position: sticky; top: var(--nav-h); height: calc(100vh - var(--nav-h)); background: var(--bg2);
  display: flex; flex-direction: column; }
.detail-col.collapsed { display: none; }

.page-title { font-size: 19px; font-weight: 700; }
.page-sub { font-size: 12px; color: var(--text2); margin-top: 2px; }
.sched-head { position: relative; margin-bottom: 16px; min-height: 34px; }
.sched-head .grow { text-align: center; }
.sched-head #open-panel-btn { position: absolute; right: 0; top: 0; }

.btn { background: var(--bg3); border: 1px solid var(--border); border-radius: 7px; color: var(--text); font-size: 12px; font-weight: 600; padding: 7px 12px; cursor: pointer; font-family: inherit; }
.btn:hover { border-color: var(--accent); }
.btn-icon { background: none; border: none; color: var(--text2); cursor: pointer; font-size: 14px; font-family: inherit; padding: 6px 10px; border-radius: 6px; font-weight: 600; flex-shrink: 0; }
.btn-icon:hover { background: var(--bg3); color: var(--text); }

/* ── SCHEDULE GRID ── */
.week-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(min(360px, 100%), 1fr)); gap: 12px; align-items: start; }
.week-block { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 10px 11px 11px; }
.week-block.current { border-color: var(--accent); box-shadow: inset 0 0 0 1px var(--accent); }
.week-block h3 { font-size: 11px; font-weight: 700; letter-spacing: .4px; text-transform: uppercase; color: var(--text2); margin-bottom: 8px; text-align: center; }
.week-block.current h3 { color: var(--accent); }
.stage-divider { height: 1px; background: var(--border); margin: 20px 0; }

.match-line { display: flex; align-items: center; gap: 8px; padding: 6px 7px; border-radius: 7px; cursor: pointer; margin: 0 -3px; }
.match-line:hover { background: var(--bg3); }
.match-line.selected { background: var(--bg3); outline: 1px solid var(--accent); }
.match-line .sc { font-size: 13px; font-weight: 800; font-variant-numeric: tabular-nums; color: var(--text3); flex-shrink: 0; }
.match-line .sc.win { color: var(--blue); }
.match-line .mu { flex: 1 1 auto; min-width: 0; font-size: 12px; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.match-line .vs { color: var(--text3); margin: 0 3px; }
.match-line .pl { color: var(--text3); }

.empty-state { color: var(--text3); font-size: 13px; font-style: italic; padding: 28px 4px; }

/* ── DETAIL PANEL ── */
.detail-head { flex: 0 0 auto; z-index: 2; background: var(--bg2); border-bottom: 1px solid var(--border); padding: 9px 12px; display: flex; align-items: center; gap: 8px; }
.detail-head .dh-title { flex: 1 1 auto; min-width: 0; font-size: 13px; font-weight: 700; text-align: center; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.detail-body { flex: 1 1 auto; min-height: 0; overflow-y: auto; overscroll-behavior: contain; padding: 16px 16px 40px; }
.dm-loading, .dm-empty { color: var(--text3); font-size: 13px; font-style: italic; padding: 16px 2px; }

.dm-score { text-align: center; font-size: 30px; font-weight: 800; font-variant-numeric: tabular-nums; color: var(--text2); }
.dm-score .win { color: var(--blue); }
.dm-score .dash { color: var(--text3); margin: 0 6px; font-weight: 600; }
.dm-meta { text-align: center; font-size: 11px; color: var(--text3); margin-top: 2px; margin-bottom: 14px; }

.dm-sides { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
/* Top brought-row: team | vertical divider | team. */
.dm-sides.dm-top { grid-template-columns: 1fr 1px 1fr; gap: 12px; margin-bottom: 18px; }
.dm-side-divider { background: var(--border); width: 1px; align-self: stretch; }
.dm-side { min-width: 0; }
.dm-team { display: block; font-size: 13px; font-weight: 700; text-decoration: none; margin-bottom: 8px; text-align: center; overflow: hidden; text-overflow: ellipsis; }
.dm-team:hover { color: var(--accent); }
.dm-team .pl { color: var(--text3); font-weight: 400; }
.brought-row { display: flex; flex-wrap: wrap; gap: 5px; justify-content: center; }
.brought-row img.bi { width: 40px; height: 40px; object-fit: contain; border-bottom: 2px solid transparent; padding-bottom: 1px; cursor: pointer; border-radius: 3px; }
/* Appeared in battle → white underline; team top-KO scorer(s) → yellow (overrides). */
.brought-row img.bi.played { border-bottom-color: var(--text); }
.brought-row img.bi.top-ko { border-bottom-color: var(--yellow); }
.brought-row img.ball { width: 40px; height: 40px; opacity: .4; }

.dm-section-title { font-size: 11px; font-weight: 700; letter-spacing: .5px; text-transform: uppercase; color: var(--text3); margin: 4px 0 9px; padding-top: 14px; border-top: 1px solid var(--border); }
.dm-section-title.center { text-align: center; }

/* ── GAME CARD: per-team Pokémon / K / F grid, vertical divider between teams. ── */
.dm-game { background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; padding: 9px 10px; margin-bottom: 8px; }
/* Header: title centered, replay pinned top-left over it. */
.dm-game-head { position: relative; font-size: 13px; font-weight: 700; color: var(--text2); margin-bottom: 9px; text-align: center; min-height: 18px; }
.dm-game-head .gh-title { display: inline-block; }
.dm-game-head .gh-replay { position: absolute; left: 0; top: 0; }
.dm-game-head .gw { color: var(--blue); }
.dm-game-head .replay { color: var(--accent); text-decoration: none; font-weight: 600; font-size: 12px; }
.dm-game-head .replay:hover { text-decoration: underline; }
.game-sides { display: grid; grid-template-columns: 1fr 1px 1fr; gap: 12px; align-items: start; }
.game-divider { background: var(--border); width: 1px; align-self: stretch; }
.game-side { min-width: 0; }
/* Tighter K/F columns sit close to their Pokémon; banding on alternating rows.
   Name column hugs its content so K/F sit just past the longest name (not pushed
   to the far edge), with a little breathing room before the K column. */
.game-grid { display: grid; grid-template-columns: auto auto auto; column-gap: 0; row-gap: 0; align-items: center; justify-content: center; }
.game-grid .gg-head { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .3px; color: var(--text3); padding-bottom: 4px; }
.game-grid .gg-head.gg-mon { text-align: center; }
.game-grid .gg-mon { display: flex; align-items: center; gap: 6px; min-width: 0; font-size: 13px; padding: 4px 4px 4px 3px; }
.game-grid .gg-mon img { width: 26px; height: 26px; object-fit: contain; flex-shrink: 0; }
.game-grid .gg-mon .gmn { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
/* Padding before the K column so it isn't flush against the longest name. */
.game-grid .gg-k { padding-left: 36px; }
.game-grid .gg-num { font-size: 14px; font-weight: 700; font-variant-numeric: tabular-nums; text-align: center; min-width: 24px; padding: 4px 0; }
.game-grid .band { background: rgba(255,255,255,.04); }
.game-grid .gg-mon.band { border-radius: 5px 0 0 5px; }
.game-grid .gg-num.band:last-child { border-radius: 0 5px 5px 0; }
.game-grid .gg-mon.fainted { opacity: .45; }

/* ── CHRONOLOGICAL LIST (no selection) ── */
.chrono { display: flex; flex-direction: column; gap: 4px; }
.chrono-week-head { font-size: 11px; font-weight: 700; letter-spacing: .4px; text-transform: uppercase; color: var(--text3); padding: 12px 2px 5px; border-bottom: 1px solid var(--border); margin-bottom: 2px; text-align: center; }
.chrono-week-head:first-child { padding-top: 2px; }
.chrono-row { display: flex; align-items: center; gap: 8px; padding: 8px 9px; border: 1px solid var(--border); border-radius: 8px; cursor: pointer; background: var(--bg3); }
.chrono-row:hover { border-color: var(--accent); }
.chrono-row .csc { font-size: 13px; font-weight: 800; font-variant-numeric: tabular-nums; color: var(--text3); flex-shrink: 0; }
.chrono-row .csc.win { color: var(--blue); }
.chrono-row .cmu { flex: 1 1 auto; min-width: 0; font-size: 12px; text-align: center; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.chrono-row .vs { color: var(--text3); margin: 0 3px; }
.chrono-row .pl { color: var(--text3); }
.chrono-row .cup { font-size: 9px; font-weight: 700; text-transform: uppercase; color: var(--text3); border: 1px solid var(--border); border-radius: 4px; padding: 1px 5px; flex-shrink: 0; }
/* All-matches labels: Team (Coach) on wide, coach only on narrow */
.mu-narrow { display: none; }
@media (max-width: 900px) { .mu-wide { display: none; } .mu-narrow { display: inline; } }

.banner { margin: 16px; padding: 10px 14px; border: 1px solid var(--border); border-radius: 8px; background: var(--bg2); font-size: 12px; color: var(--text2); }
.banner.err { border-color: rgba(224,85,85,.5); color: var(--red); }

#toast-container { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 300; display: flex; flex-direction: column; gap: 8px; align-items: center; }
.toast { background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; padding: 10px 16px; font-size: 13px; color: var(--text); box-shadow: 0 4px 16px rgba(0,0,0,.4); max-width: 90vw; }
.toast.err { border-color: rgba(224,85,85,.55); color: #ff9c9c; }

/* ── NARROW: detail panel becomes a full-screen overlay ── */
@media (max-width: 900px) {
  .detail-col { position: static; display: block; flex: 1 1 100%; width: 100%; max-width: none; height: auto; border-left: none; }
  .detail-head { position: sticky; top: var(--nav-h); z-index: 40; }
  .detail-body { overflow: visible; }
  body.panel-open .schedule-col { display: none; }
  /* Game grids go icons-only so names never truncate in the narrow panel. The
     brought-six row above still carries names via its tooltips. */
  .game-grid .gg-mon .gmn { display: none; }
  .game-grid .gg-head.gg-mon { font-size: 0; }            /* hide "Pokémon" label */
  .game-grid .gg-mon { justify-content: center; padding: 4px 6px; }
  .game-grid .gg-mon img { width: 30px; height: 30px; }   /* a touch larger since it stands alone */
  .game-grid .gg-k { padding-left: 10px; }
}
@media (max-width: 768px) {
  .week-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<script src="/nav.js"></script>
<script src="/tooltip.js?v=2"></script>

<div id="boot-banner" class="banner">Loading…</div>

<div class="layout" id="layout" hidden>
  <div class="schedule-col">
    <div class="sched-head">
      <div class="grow">
        <div class="page-title">Schedule</div>
        <div class="page-sub" id="season-sub"></div>
      </div>
      <button class="btn" id="open-panel-btn" onclick="showAllMatches()">Browse all matches ▸</button>
    </div>
    <div id="schedule"></div>
  </div>

  <div class="detail-col collapsed" id="detail-col">
    <div class="detail-head">
      <button class="btn-icon" id="dh-back" onclick="showAllMatches()" style="visibility:hidden">‹ All</button>
      <span class="dh-title" id="dh-title">Matches</span>
      <button class="btn-icon" onclick="closePanel()">✕</button>
    </div>
    <div class="detail-body" id="detail-body"></div>
  </div>
</div>

<div id="toast-container"></div>

<script>
// ── CONFIG ──
const SUPABASE_URL      = "https://arypbyzeppbpbursmzcs.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_U8J3pV_KgomrWhbgoGBSUg_ttQ4d46m";
const sb = window.sb || supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const POKEMON_JSON_URL = "https://planner.springfieldbattleleague.com/pokemon.json";
const ASSET_BASE = POKEMON_JSON_URL.replace(/[^/]*$/, '');
const POKEBALL_FALLBACK = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 40 40'%3E%3Ccircle cx='20' cy='20' r='19' fill='%23e05555' stroke='%23333' stroke-width='1.5'/%3E%3Cpath d='M1.1 20 A19 19 0 0 0 38.9 20 Z' fill='%23fff'/%3E%3Crect x='1' y='18' width='38' height='4' fill='%23333'/%3E%3Ccircle cx='20' cy='20' r='7' fill='%23fff' stroke='%23333' stroke-width='1.5'/%3E%3Ccircle cx='20' cy='20' r='3.5' fill='%23e8eaf6' stroke='%23333' stroke-width='1'/%3E%3C/svg%3E";

// ── STATE ──
let season = null;
let teams = [], teamById = {}, ownersByTeam = {};
let matches = [], matchById = {};
let pokemonById = {};
let panelOpen = false;
let selectedMatchId = null;
let matchDetailCache = {};   // id -> { games, stats, mp }
let detailLoading = {};

// ── HELPERS ──
function escapeHtml(s) { return String(s).replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c])); }
function fmtDateTime(s) {
  if (!s) return 'Date TBD';
  const d = new Date(s); if (isNaN(d.getTime())) return 'Date TBD';
  const p = n => String(n).padStart(2, '0');
  return p(d.getMonth() + 1) + '/' + p(d.getDate()) + '/' + d.getFullYear() + ' ' + p(d.getHours()) + ':' + p(d.getMinutes());
}
function stageLabel(s) { return ({ regular: 'Regular Season', playoffs: 'Playoffs', cup: 'Cup' })[s] || 'Regular Season'; }
function stageRank(s) { return s === 'playoffs' ? 0 : s === 'cup' ? 1 : 2; }
function monName(id) { const p = pokemonById[id]; return p ? p.name : id; }
function localId(id) {
  const m = String(id).match(/^(\d+)(.*)$/); if (!m) return id;
  const num = parseInt(m[1]);
  return (num >= 1000 ? String(num) : String(num).padStart(3, '0')) + m[2];
}
function iconUrl(id) { return id ? ASSET_BASE + 'icons/' + localId(id) + '.png' : ''; }
function spriteUrl(id) { return id ? ASSET_BASE + 'sprites/' + localId(id) + '.png' : ''; }
function attachIconFallback(img, id) {
  img.onerror = function () {
    if (this.src.includes('/icons/')) { this.src = spriteUrl(id); }
    else { this.onerror = null; this.src = POKEBALL_FALLBACK; this.style.opacity = '.5'; }
  };
}
function teamName(id) { const t = teamById[id]; return t ? t.name : 'TBD'; }
// Coach (owner) active for a team during a given week — falls back to the current owner, then the team name.
function coachAtWeek(teamId, week) {
  const stints = ownersByTeam[teamId] || [];
  let s = stints.find(x => x.started_week <= week && (x.ended_week == null || x.ended_week > week));
  if (!s) s = stints.find(x => x.ended_week == null) || stints[0];
  return s ? s.name : null;
}
function coachLabelText(teamId, week) { return coachAtWeek(teamId, week) || teamName(teamId); }
function matchupCoachHtml(m) {
  return escapeHtml(coachLabelText(m.team_a_id, m.week)) + '<span class="vs">vs</span>' + escapeHtml(coachLabelText(m.team_b_id, m.week));
}
// All-matches matchup: renders both "Team (Coach)" and coach-only; CSS shows the right one per width.
function chronoSideHtml(teamId, week) {
  const coach = coachAtWeek(teamId, week);
  const name = teamName(teamId);
  const wide = coach ? escapeHtml(name) + ' <span class="pl">(' + escapeHtml(coach) + ')</span>' : escapeHtml(name);
  const narrow = escapeHtml(coach || name);
  return '<span class="mu-wide">' + wide + '</span><span class="mu-narrow">' + narrow + '</span>';
}
function matchupChronoHtml(m) {
  return chronoSideHtml(m.team_a_id, m.week) + '<span class="vs">vs</span>' + chronoSideHtml(m.team_b_id, m.week);
}
function teamLinkHtml(id, week) {
  const t = teamById[id]; if (!t) return '<span class="dm-team">TBD</span>';
  const c = coachAtWeek(id, week);
  return '<a class="dm-team" href="team.html#' + encodeURIComponent(t.slug) + '">'
    + escapeHtml(t.name) + (c ? ' <span class="pl">(' + escapeHtml(c) + ')</span>' : '') + '</a>';
}
function matchHasResults(m) { return !!m.winner_team_id || (m.team_a_score || 0) > 0 || (m.team_b_score || 0) > 0; }
function dateKey(m) { return m.match_date ? new Date(m.match_date).getTime() : Infinity; }

// "Current" week = earliest week with an undecided match; if all decided, the last week.
function computeCurrentWeek() {
  if (!matches.length) return null;
  const undecided = matches.filter(m => !m.winner_team_id);
  return undecided.length ? Math.min(...undecided.map(m => m.week)) : Math.max(...matches.map(m => m.week));
}

// ─────────────────────────────────────────────────────────────────────────────
// LOAD
// ─────────────────────────────────────────────────────────────────────────────
async function init() {
  const banner = document.getElementById('boot-banner');
  try {
    const pjPromise = fetch(POKEMON_JSON_URL).then(r => r.ok ? r.json() : Promise.reject(new Error('pokemon.json ' + r.status)));

    const { data: seasonRow, error: sErr } = await sb.from('seasons').select('*').eq('is_current', true).maybeSingle();
    if (sErr) throw sErr;
    if (!seasonRow) throw new Error('No current season found.');
    season = seasonRow;

    const [teamsRes, ownersRes, matchRes] = await Promise.all([
      sb.from('teams').select('id, name, slug, initial_seed').eq('season_id', season.id),
      sb.from('team_owners').select('team_id, started_week, ended_week, players(display_name)'),
      sb.from('matches').select('id, stage, week, postseason_round, series_length, team_a_id, team_b_id, team_a_score, team_b_score, match_date, winner_team_id').eq('season_id', season.id),
    ]);
    for (const r of [teamsRes, ownersRes, matchRes]) if (r.error) throw r.error;

    teams = teamsRes.data || [];
    teams.forEach(t => { teamById[t.id] = t; });
    const teamIds = new Set(teams.map(t => t.id));
    (ownersRes.data || []).filter(o => teamIds.has(o.team_id) && o.players).forEach(o => {
      (ownersByTeam[o.team_id] = ownersByTeam[o.team_id] || []).push({ started_week: o.started_week || 1, ended_week: o.ended_week, name: o.players.display_name });
    });
    Object.values(ownersByTeam).forEach(list => list.sort((a, b) => a.started_week - b.started_week));
    matches = matchRes.data || [];
    matches.forEach(m => { matchById[m.id] = m; });

    try {
      const pj = await pjPromise;
      const arr = Array.isArray(pj) ? pj : (pj.pokemon || []);
      arr.forEach(p => { pokemonById[p.id] = p; });
    } catch (e) { console.error('pokemon.json:', e); showToast('Pokémon data didn\u2019t load — names/icons may be missing.', 'err'); }

    document.getElementById('season-sub').textContent = season.name;
    banner.hidden = true;
    document.getElementById('layout').hidden = false;

    syncFromHash();
    render();
  } catch (err) {
    console.error(err);
    banner.className = 'banner err';
    banner.textContent = 'Could not load: ' + (err.message || err);
  }
}

async function loadMatchDetail(id) {
  detailLoading[id] = true;
  try {
    const { data: games, error: gErr } = await sb.from('games')
      .select('id, game_number, replay_url, winner_team_id').eq('match_id', id).order('game_number');
    if (gErr) throw gErr;
    const gameIds = (games || []).map(g => g.id);
    let stats = [];
    if (gameIds.length) {
      const { data, error } = await sb.from('game_pokemon_stats').select('game_id, team_id, pokemon_id, kills, deaths').in('game_id', gameIds);
      if (error) throw error; stats = data || [];
    }
    const { data: mp, error: mpErr } = await sb.from('match_pokemon').select('team_id, pokemon_id').eq('match_id', id);
    if (mpErr) throw mpErr;
    matchDetailCache[id] = { games: games || [], stats, mp: mp || [] };
  } catch (err) {
    console.error(err); matchDetailCache[id] = { games: [], stats: [], mp: [], error: true };
    showToast('Could not load match details.', 'err');
  } finally {
    detailLoading[id] = false;
    if (selectedMatchId === id) render();
  }
}

// ─────────────────────────────────────────────────────────────────────────────
// ROUTING  (#<matchId> deep-links a match)
// ─────────────────────────────────────────────────────────────────────────────
function syncFromHash() {
  const id = location.hash.slice(1);
  if (id && matchById[id]) { selectedMatchId = id; panelOpen = true; }
  else { selectedMatchId = null; }
}
window.addEventListener('hashchange', () => { syncFromHash(); render(); if (panelOpen) scrollPanelTop(); });

// On narrow screens the panel flows in the page, so jump to the top when it opens.
function scrollPanelTop() { if (window.innerWidth <= 900) window.scrollTo({ top: 0 }); }

// Re-fit when the viewport changes (e.g. rotating a phone). CSS handles the
// responsive layout; this refreshes the rendered content and keeps panel scroll.
let resizeTimer = null;
function onViewportChange() {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => {
    if (document.getElementById('layout').hidden) return;
    const body = document.getElementById('detail-body');
    const st = body ? body.scrollTop : 0;
    render();
    if (body) body.scrollTop = st;
  }, 150);
}
window.addEventListener('resize', onViewportChange);
window.addEventListener('orientationchange', onViewportChange);

function selectMatch(id) {
  if (location.hash.slice(1) === id) { panelOpen = true; render(); scrollPanelTop(); return; }
  location.hash = id;   // → hashchange → render
}
function showAllMatches() {
  panelOpen = true; selectedMatchId = null;
  scrollPanelTop();
  if (location.hash) location.hash = ''; else render();
}
function closePanel() {
  panelOpen = false; selectedMatchId = null;
  if (location.hash) location.hash = ''; else render();
}

// ─────────────────────────────────────────────────────────────────────────────
// RENDER
// ─────────────────────────────────────────────────────────────────────────────
function render() {
  document.getElementById('detail-col').classList.toggle('collapsed', !panelOpen);
  document.body.classList.toggle('panel-open', panelOpen);
  document.getElementById('open-panel-btn').style.display = panelOpen ? 'none' : '';
  renderSchedule();
  if (panelOpen) renderDetail();
}

function renderSchedule() {
  const el = document.getElementById('schedule');
  if (!matches.length) { el.innerHTML = '<div class="empty-state">No matches scheduled yet.</div>'; return; }
  const cw = computeCurrentWeek();
  let h = '';

  const reg = matches.filter(m => m.stage === 'regular');
  if (reg.length) {
    const weeks = [...new Set(reg.map(m => m.week))].sort((a, b) => a - b);
    h += '<div class="week-grid">';
    weeks.forEach(w => { h += weekBlockHtml('Week ' + w + ' — Regular Season', w, reg.filter(m => m.week === w), cw); });
    h += '</div>';
  }

  const post = matches.filter(m => m.stage !== 'regular');
  if (post.length) {
    const groups = {};
    post.forEach(m => { const k = m.stage + '|' + m.week; (groups[k] = groups[k] || []).push(m); });
    h += '<div class="stage-divider"></div><div class="week-grid">';
    Object.keys(groups).sort((A, B) => {
      const [sa, wa] = A.split('|'), [sB, wB] = B.split('|');
      return (+wa) - (+wB) || stageRank(sa) - stageRank(sB);
    }).forEach(k => {
      const [s, w] = k.split('|');
      h += weekBlockHtml('Week ' + w + ' — ' + stageLabel(s), +w, groups[k], cw);
    });
    h += '</div>';
  }

  el.innerHTML = h;
  el.querySelectorAll('.match-line').forEach(r => { r.onclick = () => selectMatch(r.getAttribute('data-id')); });
}

function weekBlockHtml(label, week, mlist, cw) {
  const lines = [...mlist]
    .sort((a, b) => coachLabelText(a.team_a_id, a.week).localeCompare(coachLabelText(b.team_a_id, b.week)))
    .map(m => {
      const aWin = m.winner_team_id === m.team_a_id, bWin = m.winner_team_id === m.team_b_id;
      const sel = m.id === selectedMatchId ? ' selected' : '';
      return '<div class="match-line' + sel + '" data-id="' + m.id + '">'
        + '<span class="sc ' + (aWin ? 'win' : '') + '">' + (m.team_a_score || 0) + '</span>'
        + '<span class="mu">' + matchupCoachHtml(m) + '</span>'
        + '<span class="sc ' + (bWin ? 'win' : '') + '">' + (m.team_b_score || 0) + '</span></div>';
    }).join('');
  return '<div class="week-block' + (week === cw ? ' current' : '') + '"><h3>' + escapeHtml(label) + '</h3>' + lines + '</div>';
}

function renderDetail() {
  const body = document.getElementById('detail-body');
  const title = document.getElementById('dh-title');
  const back = document.getElementById('dh-back');

  if (!selectedMatchId) {
    back.style.visibility = 'hidden';
    title.textContent = 'All matches';
    renderChrono(body);
    return;
  }
  back.style.visibility = 'visible';
  const m = matchById[selectedMatchId];
  title.textContent = teamName(m.team_a_id) + ' vs ' + teamName(m.team_b_id);

  if (!matchDetailCache[selectedMatchId]) {
    body.innerHTML = '<div class="dm-loading">Loading match\u2026</div>';
    if (!detailLoading[selectedMatchId]) loadMatchDetail(selectedMatchId);
    return;
  }
  renderMatchDetail(body, m, matchDetailCache[selectedMatchId]);
}

function broughtIds(matchId, teamId) {
  const d = matchDetailCache[matchId]; if (!d) return [];
  let ids = d.mp.filter(r => r.team_id === teamId).map(r => r.pokemon_id);
  if (!ids.length) {   // fallback: distinct mons that appear in the games
    const seen = new Set();
    d.stats.filter(s => s.team_id === teamId).forEach(s => seen.add(s.pokemon_id));
    ids = [...seen];
  }
  return ids.slice(0, 6);
}

// Per-Pokémon match contribution for a team: { id: {kos, faints, played} }.
function monStatsFor(matchId, teamId) {
  const d = matchDetailCache[matchId]; if (!d) return {};
  const out = {};
  d.stats.filter(s => s.team_id === teamId).forEach(s => {
    const o = out[s.pokemon_id] = out[s.pokemon_id] || { kos: 0, faints: 0, played: false };
    o.kos += s.kills || 0; o.faints += s.deaths || 0; o.played = true;   // a stat row = appeared in that game
  });
  return out;
}

// The brought-six row: each icon tooltipped with KOs/Faints; white bottom border if
// the mon appeared in battle, yellow if it was (one of) the team's top KO scorer(s).
// Pokéball placeholders and never-played mons get no border.
function broughtIconsHtml(ids, stats) {
  // Top-KO threshold for this team (only meaningful if > 0).
  let topKos = 0;
  ids.forEach(id => { const o = stats[id]; if (o && o.kos > topKos) topKos = o.kos; });

  let h = '';
  for (let i = 0; i < 6; i++) {
    const id = ids[i];
    if (!id) { h += '<img class="bi ball" src="' + POKEBALL_FALLBACK + '" alt="">'; continue; }
    const o = stats[id] || { kos: 0, faints: 0, played: false };
    let cls = 'bi';
    if (o.played) cls += (topKos > 0 && o.kos === topKos) ? ' top-ko' : ' played';
    const tip = 'KOs ' + o.kos + ' · Faints ' + o.faints;
    h += '<img class="' + cls + '" src="' + iconUrl(id) + '" data-mon="' + escapeHtml(id) + '"'
      + ' alt="' + escapeHtml(monName(id)) + '"'
      + ' data-tip-title="' + escapeHtml(monName(id)) + '" data-tip="' + escapeHtml(tip) + '">';
  }
  return h;
}
function gameHtml(m, g, d) {
  const winName = g.winner_team_id ? teamName(g.winner_team_id) : null;
  let title = 'Game ' + g.game_number;
  if (winName) title += ' \u00B7 <span class="gw">' + escapeHtml(winName) + ' won</span>';
  const replay = g.replay_url
    ? '<a class="replay" href="' + escapeHtml(g.replay_url) + '" target="_blank" rel="noopener">Replay \u2197</a>'
    : '';

  // One team's grid: a header row (Pokémon / K / F) then a row per mon.
  const sideGrid = teamId => {
    const rows = d.stats.filter(s => s.game_id === g.id && s.team_id === teamId);
    if (!rows.length) return '<div class="dm-empty">—</div>';
    let gh = '<div class="game-grid">'
      + '<div class="gg-head gg-mon">Pokémon</div><div class="gg-head gg-num gg-k">K</div><div class="gg-head gg-num">F</div>';
    rows.forEach((s, i) => {
      const fainted = (s.deaths || 0) > 0;
      const band = i % 2 === 1 ? ' band' : '';
      gh += '<div class="gg-mon' + (fainted ? ' fainted' : '') + band + '">'
        + '<img src="' + iconUrl(s.pokemon_id) + '" data-mon="' + escapeHtml(s.pokemon_id) + '" alt="">'
        + '<span class="gmn">' + escapeHtml(monName(s.pokemon_id)) + '</span></div>'
        + '<div class="gg-num gg-k' + band + '">' + (s.kills || 0) + '</div>'
        + '<div class="gg-num' + band + '">' + (s.deaths || 0) + '</div>';
    });
    gh += '</div>';
    return gh;
  };
  return '<div class="dm-game">'
    + '<div class="dm-game-head">' + (replay ? '<span class="gh-replay">' + replay + '</span>' : '') + '<span class="gh-title">' + title + '</span></div>'
    + '<div class="game-sides">'
    +   '<div class="game-side">' + sideGrid(m.team_a_id) + '</div>'
    +   '<div class="game-divider"></div>'
    +   '<div class="game-side">' + sideGrid(m.team_b_id) + '</div>'
    + '</div></div>';
}

function renderMatchDetail(body, m, d) {
  const aWin = m.winner_team_id === m.team_a_id, bWin = m.winner_team_id === m.team_b_id;
  const h = [];
  h.push('<div class="dm-score"><span class="' + (aWin ? 'win' : '') + '">' + (m.team_a_score || 0) + '</span><span class="dash">–</span><span class="' + (bWin ? 'win' : '') + '">' + (m.team_b_score || 0) + '</span></div>');
  // Meta line: omit the date entirely when there isn't one (no "TBD").
  let meta = escapeHtml(stageLabel(m.stage)) + ' \u00B7 Week ' + m.week + ' \u00B7 Bo' + (m.series_length || 3);
  if (m.match_date) meta += ' \u00B7 ' + escapeHtml(fmtDateTime(m.match_date));
  h.push('<div class="dm-meta">' + meta + '</div>');

  // Per-team: name + brought-six. Each icon is tooltipped with KOs/Faints; white
  // bottom border = appeared in battle, yellow = team's top KO scorer(s).
  h.push('<div class="dm-sides dm-top">');
  [m.team_a_id, m.team_b_id].forEach((teamId, i) => {
    const stats = monStatsFor(m.id, teamId);
    h.push('<div class="dm-side">' + teamLinkHtml(teamId, m.week)
      + '<div class="brought-row">' + broughtIconsHtml(broughtIds(m.id, teamId), stats) + '</div></div>');
    if (i === 0) h.push('<div class="dm-side-divider"></div>');
  });
  h.push('</div>');

  h.push('<div class="dm-section-title center">Games</div>');
  if (d.games.length) {
    d.games.forEach(g => h.push(gameHtml(m, g, d)));
  } else {
    h.push('<div class="dm-empty">' + (matchHasResults(m) ? 'Result recorded without game-by-game detail.' : 'This match hasn\u2019t been played yet.') + '</div>');
  }

  body.innerHTML = h.join('');
  body.querySelectorAll('img[data-mon]').forEach(img => attachIconFallback(img, img.getAttribute('data-mon')));
  if (window.SBLTooltip) window.SBLTooltip.refresh();
}

function renderChrono(body) {
  const ordered = [...matches].sort((a, b) =>
    a.week - b.week || stageRank(a.stage) - stageRank(b.stage) || dateKey(a) - dateKey(b)
    || coachLabelText(a.team_a_id, a.week).localeCompare(coachLabelText(b.team_a_id, b.week)));
  let h = '<div class="chrono">';
  let lastKey = null;
  ordered.forEach(m => {
    const key = m.stage + '|' + m.week;
    if (key !== lastKey) {
      h += '<div class="chrono-week-head">Week ' + m.week + ' — ' + escapeHtml(stageLabel(m.stage)) + '</div>';
      lastKey = key;
    }
    const aWin = m.winner_team_id === m.team_a_id, bWin = m.winner_team_id === m.team_b_id;
    h += '<div class="chrono-row" data-id="' + m.id + '">'
      + '<span class="csc ' + (aWin ? 'win' : '') + '">' + (m.team_a_score || 0) + '</span>'
      + '<span class="cmu">' + matchupChronoHtml(m) + '</span>'
      + '<span class="csc ' + (bWin ? 'win' : '') + '">' + (m.team_b_score || 0) + '</span>'
      + (matchHasResults(m) ? '' : '<span class="cup">upcoming</span>')
      + '</div>';
  });
  h += '</div>';
  body.innerHTML = h;
  body.querySelectorAll('.chrono-row').forEach(r => { r.onclick = () => selectMatch(r.getAttribute('data-id')); });
}

// ── TOAST ──
function showToast(msg, kind) {
  const t = document.createElement('div');
  t.className = 'toast' + (kind ? ' ' + kind : '');
  t.textContent = msg;
  document.getElementById('toast-container').appendChild(t);
  setTimeout(() => { t.style.transition = 'opacity .3s'; t.style.opacity = '0'; setTimeout(() => t.remove(), 300); }, 3400);
}

init();
</script>
</body>
